<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <!-- <link rel="stylesheet" href="../../css/test.css"> -->
    <!-- <link rel="stylesheet" href="../../css/semo_cont_nh.css"> -->


    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg gray">
            <!-- 상단 타이틀 -->
            <!-- <div class="title">급여명세서 발송</div> -->
            <!-- //상단 타이틀 -->

            <div class="wrap staff">
                <div class="staff_info_share_wrap">
                    <div class="staff_top_share">
                        <div class="staff_top_icon">
                            <i class="ico_cen"></i>
                            <p>직원관리 도움말</p>
                        </div>
                        <div class="staff_top_con">
                            <span>
                                <b>급여작성 내역</b>
                                <p>세무사님 안녕하세요 <br>
                                    이달 급여 내역 전송 드립니다. 수고하세요 !
                                </p>
                            </span>
                        </div>
                    </div>
                    <div class="staff_owner_name">
                        <span>
                            <p>상호명</p>
                            <b>세모식당</b>
                        </span>
                        <span>
                            <p>대표자명</p>
                            <b>왕세모</b>
                        </span>
                    </div>
                    <div class="staff_main_con way">
                        <b>급여대장 파일 등록방법</b>
                        <span>
                            <i class="ico_cen"></i>
                            <p>더존에서 다운받은 급여대장 엑셀 파일을 
                                등록해주세요. <br>
                                (파일 첨부는 꼭 엑셀파일로 등록해주세요)</p>
                        </span>
                        <span>
                            <i class="ico_cen"></i>
                            <p>엑셀파일에 걸려있는 비밀번호는 해제한 후
                                저장해주세요.</p>
                        </span>
                        <span>
                            <i class="ico_cen"></i>
                            <p>엑셀 양식 파일에 들어가 있는 여백을
                                지워주세요. <em>여백 제거 방법</em></p>
                        </span>

                        <div class="staff_excel_upload">
                            
                            <p>
                                <i class="ico_cen"></i>
                                더존 급여대장 엑셀 업로드</p>
                            <i class="ico_cen"></i>
                        </div>
                    </div>
                    <div class="staff_wemembers">
                        <p>위멤버스클럽으로 쉽고 <br>
                            <b>간편하게 공유 받기</b>
                        </p>
                        <span>무료 체험으로 새로운 세무증빙관리 업무를 혁신하세요</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
