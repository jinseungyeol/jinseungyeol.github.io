name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 배포는 한 번에 하나만. 진행 중인 배포는 취소하지 않는다.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 1. 메인 포트폴리오 (React Router SPA) → dist/
      - name: Build portfolio
        run: |
          npm ci
          npm run build
          mkdir -p dist
          cp -r build/client/. dist/

      # SPA 폴백. GitHub Pages는 Netlify의 _redirects를 읽지 않는다.
      # /project/* 는 실제 파일이므로 404.html보다 우선한다.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      # 2. 정적 데모 8개는 그대로 복사 (전부 상대경로라 서브경로에서 동작)
      - name: Copy static demos
        run: |
          mkdir -p dist/project
          for d in kt-jangbu m-kt-jangbu kt-jangbu-app ione-soho-app \
                   semoreport smjb-app nh-soho-app linkpath; do
            cp -r "projects/$d" "dist/project/$d"
          done

      # 3. wemembers-scheduler만 Vite 앱이라 빌드가 필요하다.
      #    base와 라우터 basename은 /project/wemembers-scheduler/ 로 맞춰져 있다.
      # 이 앱은 클라이언트 라우팅을 쓰고(/output/login 등), 목록 페이지의 링크는
      # 전부 새 탭으로 열려 항상 직접 진입이 된다. Netlify에서는 _redirects가
      # 폴백을 맡았지만 Pages는 루트 404.html만 사용하므로(하위 404.html은 무시된다)
      # build 스크립트가 라우트마다 실제 index.html을 생성한다.
      - name: Build wemembers-scheduler
        working-directory: projects/wemembers-scheduler
        run: |
          npm ci
          npm run build

      - name: Copy wemembers-scheduler build
        run: cp -r projects/wemembers-scheduler/dist dist/project/wemembers-scheduler

      # 배포 결과가 기대와 맞는지 확인. 하나라도 없으면 여기서 실패시킨다.
      - name: Verify deploy tree
        run: |
          set -e
          for f in dist/index.html \
                   dist/404.html \
                   dist/project/kt-jangbu/index.html \
                   dist/project/kt-jangbu/img/bg_cont02_tab01.png \
                   dist/project/m-kt-jangbu/index.html \
                   dist/project/kt-jangbu-app/index.html \
                   dist/project/ione-soho-app/index.html \
                   dist/project/semoreport/index.html \
                   dist/project/semoreport/publGuide/markupUI/html/index.html \
                   dist/project/smjb-app/index.html \
                   dist/project/nh-soho-app/index.html \
                   dist/project/linkpath/index.html \
                   dist/project/wemembers-scheduler/index.html \
                   dist/project/wemembers-scheduler/output/index.html \
                   dist/project/wemembers-scheduler/output/login/index.html \
                   dist/project/wemembers-scheduler/output/clt/auto/index.html; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          echo "모든 배포 대상 확인됨"

      # 스케줄러 목록 페이지(OutputList)가 링크하는 경로가 전부 실제 파일로
      # 해석되는지 대조한다. 목록은 사용자가 실제로 클릭하는 대상이므로,
      # 라우터나 목록이 바뀌었는데 프리렌더가 못 따라가면 여기서 잡힌다.
      - name: Verify scheduler routes resolve
        run: |
          set -e
          node -e '
            const fs = require("fs");
            const src = fs.readFileSync("projects/wemembers-scheduler/src/pages/OutputList.tsx", "utf8");
            const paths = [...src.matchAll(/path:\s*"([^"]*)"/g)].map(m => m[1]);
            if (paths.length < 20) throw new Error("목록 링크를 " + paths.length + "개만 찾았다. 정규식이 구조를 놓쳤을 수 있다.");
            const missing = paths.filter(p => {
              const f = "dist/project/wemembers-scheduler/output" + (p ? "/" + p : "") + "/index.html";
              return !fs.existsSync(f);
            });
            if (missing.length) throw new Error("해석되지 않는 링크:\n  " + missing.map(m => "/output/" + m).join("\n  "));
            console.log("스케줄러 목록 링크 " + paths.length + "개 모두 실제 파일로 해석됨");
          '

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
