<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../../css/semo_cont.css" />
    <title>SEMO</title>
  </head>
  <body>
    <div class="new_content">
      <div class="cont_bg cont_pd">
        <!-- 클래스 cont_pd fix_button 포함 패딩-->

        <!-- 상단 타이틀 -->
        <div class="title">가입 서비스 변경</div>
        <!-- //상단 타이틀 -->

        <div class="wrap setting">
          <div class="setting_box">
            <!-- pro/lite 요금 정보 -->
            <div class="fee_wrap">
              <div class="fee_box">
                <div class="fee lite">
                  <p class="fee_classify"><i class="ico_check_fee"></i>LITE</p>
                  <p class="fee_mothly promotion">월 <em>2,000</em>원</p>
                  <button class="btn_fee">자세히보기</button>
                </div>
                <div class="fee pro on">
                  <!--비활성화 클래스 on-->
                  <p class="fee_classify"><i></i>PRO</p>
                  <p class="fee_mothly promotion">월 <em>9,000</em>원</p>
                  <button class="btn_fee">자세히보기</button>
                </div>
              </div>
              <p class="fee_txt">가입비·연회비 / VAT 별도</p>
            </div>
            <!-- // pro/lite 요금 정보 -->

            <!-- 안내 -->
            <div class="noti_box posi_defalt">
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>세무사 증빙 자동 제출</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>세모주치의 무료 컨설팅</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>직원 관리 무제한</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>간편송금 송금수수료 20회 면제</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>무료 스마트팩스 제공<br />(수신 무제한 무료)</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>프리미엄 알림 서비스</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>SNS 매출정보 프리미엄</span>
              </p>
            </div>
            <!-- 안내 -->
          </div>
        </div>
      </div>

      <!-- 하단 fix 버튼 -->
      <div class="btm_fix">
        <span>변경하기</span>
      </div>
      <!-- 하단 fix 버튼 -->
    </div>
  </body>
</html>
