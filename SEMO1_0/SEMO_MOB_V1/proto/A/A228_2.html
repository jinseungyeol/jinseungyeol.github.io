<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">추가 입력</div>
      <!-- //상단 타이틀 -->

      <!-- 이체계좌 등록 -->
      <div class="wrap account">
        <div class="input_info_box">
          <span class="info_tit">사용자 ID/PW를 입력해 주세요.</span>
          <input class="info_input" placeholder="아이디 입력(영문, 숫자)" value="SEMOJANGBU">
          <input type="password" class="info_input" placeholder="비밀번호 입력(영문, 숫자)" value="sdf123!@#">
        </div>

        <!-- 안내 -->
        <div class="noti_box posi_defalt">
          <div class="nb_tit">하위 사용자가 있는 경우</div>
          <p class="nomal_noti nb_mgset">
            <i class="character">-</i> 
            <span>관리자는 인터넷뱅킹 이용자ID와  접속 비밀번호를 입력해 주세요</span>
          </p>
          <p class="nomal_noti nb_mgset">
            <i class="character">-</i>
            <span>업무담당자는 관리자로부터 부여 받은 담당자ID와 비밀번호를 입력해 주세요.</span>
          </p>
          <p class="nomal_noti nb_mgset color">
            <i class="character">-</i>
            <span>업무담당자로서 ID나 PW를 잊으신 경우에는 회사 대표자 또는 관리자에게 문의해 주시기 바랍니다.</span>
          </p>
        </div>
        <!-- 안내 -->
      </div>
      <!-- //이체계좌 등록 -->
      
    </div>
    
    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>아이디를 입력해 주세요.</span>
    </div>
    <!-- 토스트 팝업 -->

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>취소</span>
      <span class="bgc_green">확인</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
