                        <span>Q.나의 업종 정보는?</span>
                    </div>
                    <div class="rm_input_wrap">
                        <div class="rm_input">
                            <span class="active">선택하기</span>
                        </div>
                        <div class="rm_ico">
                            <i class="ico_cont aco"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="long_button">
                <span>저장하고 닫기</span>
