<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!--뒤로가기-->
    <div class="header">
      <div class="process_bar_box">
        <p class="process_bar" style="width:50%;"></p> <!--진행 상태 width %값으로 최소 0 ~ 최대 100%-->
      </div>
      <a class="btn_back"><i class="ico_back"></i><em class="new_blind">뒤로가기</em></a>
    </div>
    <!--//뒤로가기-->

    <div class="cont_bg cont_pd_hd"> <!-- 클래스 cont_pd_hd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">회원가입</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">
        <div class="join_box">

          <div class="title_sub">사업자 번호를 입력해 주세요.</div>
          
          <div class="join_block">
            <input type="number" class="join_input" placeholder="'-'를 빼고 입력해 주세요." value="123456789">
          </div>

        </div>
      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
