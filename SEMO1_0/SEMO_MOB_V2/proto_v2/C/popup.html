<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <!-- <link rel="stylesheet" href="../../css_v2/kt_style.css"> -->
    <link rel="import" href="../C/C602.html">
  <script src="/js_v2/jquery-3.5.1.min.js"></script>
    <title>Document</title>

    <script>
        $(document).ready(function () {
            $(".section_nation").click(function () {
                $("#slide_popup").fadeIn(500);
                $("#slide_popup > .popup.bottom").css("bottom", "0");

            });
            // 팝업 배경터치하면 사라짐
            $(document).click(function (e) {
                if ($(".popup_bg").is(e.target)) {
                    $(".popup_bg").fadeOut(200);
                    $(".popup.bottom").show().animate({
                        bottom: "-100%"
                    }, 200);
                }
            });
            $(".section_content").click(function () {
                $(this).addClass("active");
                $(this).siblings().removeClass("active");
            });
        });
    </script>
</head>

<body>
    <div class="popup_bg" id="slide_popup" >
        <div class="popup bottom" style="bottom:0;">
            <div class="popup_title">
                <b>국적 선택</b>
                <i class="ico_cen del"></i>
            </div>
            <div class="popup_bottom_con set_mgt17">
                <span>
                    <b>내국인</b>

                </span>
                <span>
                    <b>외국인</b>
                </span>
            </div>
        </div>
    </div>
</body>
</html>
