<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  <!-- container -->
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_linkpath.svg" alt="로고">
            </a>
          </h1>
        </div>
      </div>
    </header>
    <!-- //header -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult fixB">
        <div class="inner">
          <div class="certiTitArea">
            <img src="../../img/wp/ico/ico_court.svg" alt="대법원">
            <strong class="certiTit">
              대법원 간편인증
              <span class="progress">(1/3)</span>
            </strong>
          </div>
          <div class="stepWrap">
            <div class="stepTitArea">
              <strong>간편인증 진행안내</strong>
            </div>
            <div class="step">
              <img src="../../img/wp/bg/bg_certi_kakao.svg" alt="인증 메세지 확인">
              <div class="stepTxt">
                <p>STEP. 01</p>
                <div class="info">
                  <span>휴대폰에서 인증요청</span>
                  <span>메세지 확인하기</span>
                </div>
              </div>
            </div>
            <div class="step">
              <img src="../../img/wp/bg/bg_certi_kakao02.svg" alt="인증완료 확인">
              <div class="stepTxt">
                <p>STEP. 02</p>
                <div class="info">
                  <span>카카오톡에서</span>
                  <span>인증완료 확인하기</span>
                </div>
              </div>
            </div>
            <div class="step">
              <img src="../../img/wp/bg/bg_certi_kakao03.svg" alt="간편인증 완료">
              <div class="stepTxt">
                <p>STEP. 03</p>
                <div class="info">
                  <span>해당페이지로 돌아와서</span>
                  <span>간편인증 완료하기</span>
                </div>
              </div>
            </div>
          </div>
          <div class="areaFixedBottom">
            <div class="fixedBottomInner">
              <div class="cell">
                <button class="activeBodyBtn"><span>대법원 간편인증 요청</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
