<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

      
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button header 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">지문 설정</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join jb_min1">
        <div class="join_box">
          <div class="join_fingerprint">
            <p class="fp_txt">세모장부는 빠르고 안전한 지문로그인을 지원합니다.</p>
            <p class="fp_ico"><i class="ico_finger"></i><em class="new_blind">지문</em></p>
            <p class="fp_info"><u>지문인증 이용안내</u></p>
          </div>
        </div>  

        <!-- 안내 -->
        <div class="noti_box">
          <p class="nomal_noti">
            <i class="character"><em class="noti_dot"></em></i> 
            <span>지문인증을 설정하시면 고객님 휴대폰에 등록되어 있는 지문으로 쉽고 빠르게 세모장부에 로그인하실 수 있습니다.</span>
          </p>
          <p class="nomal_noti">
            <i class="character"><em class="noti_dot"></em></i>
            <span>지문인증 설정은 언제든지 사용/중지가 가능합니다.</span>
          </p>
          <p class="join_noti">
            <i class="character"></i>
            <span>단, 고객님의 휴대폰에 저장된 모든 지문으로 고객님 계정에 로그인이 가능하오니 주의하시기 바랍니다. </span>
          </p>
        </div>
        <!-- 안내 -->
      </div>
      <!-- //회원가입 -->
      
    </div>
    
    
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">지문인증 사용</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
