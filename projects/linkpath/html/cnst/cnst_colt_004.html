<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  <!-- container -->
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_linkpath.svg" alt="로고">
            </a>
          </h1>
        </div>
      </div>
    </header>
    <!-- //header -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult fixB">
        <div class="inner">
          <div class="certiTitArea">
            <img src="../../img/wp/ico/ico_court.svg" alt="대한민국법원 아이콘">
            <strong class="certiTit">
              가족관계증명서
              <span class="progress">(1/3)</span>
            </strong>
          </div>
          <div class="infoMsgBox">
            <p class="infoMsg">
              가족관계증명서를 발급하기 위한 추가정보를 입력해주세요.
            </p>
          </div>
          <div class="userInfoSection">
            <div class="InfoPanel">
              <p class="pannelTit">추가정보 확인</p>
            </div>
            <div class="selectWrap">
              <div class="userInfoBox">
                <div class="item">
                  <div class="addrWrap">
                    <div class="selectBox consultCnt">
                      <select>
                        <option value="선택">선택</option>
                        <option value="부 성명">부 성명</option>
                        <option value="모 성명">모 성명</option>
                        <option value="배우자 성명">배우자 성명</option>
                        <option value="자녀 성명">자녀 성명</option>
                      </select>
                    </div>
                    <div class="selectBox consultCnt">
                      <!-- error 클래스 추가시 에러, 입력 시 x버튼 노출 js처리 -->
                      <input type="text" placeholder="성명을 입력해주세요." readonly>
                      <button type="button" class="deleteBtn"></button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="areaFixedBottom">
            <div class="fixedBottomInner">
              <div class="cell">
                <button class="activeBodyBtn inActiveBodyBtn"><span>다음</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
