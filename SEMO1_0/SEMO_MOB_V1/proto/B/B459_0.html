<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">송금 핀번호 확인</div> <!--띄어쓰기 송금 핀번호 -> 송금 핀번호-->
      <!-- //상단 타이틀 -->

      <div class="wrap account">
        <div class="account_box">
            <div class="title_sub">새로운 송금 핀번호를 입력해 주세요.<br>(간편송금 시 사용)</div> <!--띄어쓰기 송금 핀번호 -> 송금 핀번호-->

            <p class="noti_star color">
              <i class="character"></i>
              <span>송금 핀번호는 설정에서 변경 할 수 있습니다.</span> <!--띄어쓰기 송금 핀번호 -> 송금 핀번호-->
            </p>

            <!-- 핀번호 입력 -->
            <div class="pin_box">
              <div class="pin_wrap">
                <div class="pin_box "></div>
                <div class="pin_box"></div>
                <div class="pin_box"></div>
                <div class="pin_box"></div>
                <div class="pin_box"></div>
                <div class="pin_box"></div>
              </div>
            </div>
            <!-- //핀번호 입력 -->

        </div>
      </div>
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>확인</span>
    </div>
    <!-- 하단 fix 버튼 -->
    
  </div>
</body>
</html>
