<body>
  
  <div class="cont_bg">
    <div class="container complete">
      <div class="certificate_title">
        <h1>가나상사 사장님,<br>
          <span><em>인증서 제출이 완료</em>되었습니다.</span>
        </h1>
        <p>
          공동인증서 연결이 완료되면 모바일앱으로<br>
          등록결과를 알려드립니다.
        </p>
      </div>
      <div class="caution_box">
        <p>개인용 / 사업용 인증서를 각각 제출해주세요.</p>
        <p>
          단, 기관(은행, 카드사, 홈택스)에 공동인증서가<br>
          등록되어 있지 않으면 연결할 수 없습니다. 
        </p>
      </div>
      <div class="btn mgt50 button_sig">확인</div>
      <!-- button_sig 로 제어 / 제휴사별 컬러 -->
    </div>
  </div>
