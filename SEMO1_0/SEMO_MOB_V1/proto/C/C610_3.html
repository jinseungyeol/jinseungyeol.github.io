<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
  <script src="../../js/design.js"></script>
    <script src="../../js/jquery-3.5.1.min.js"></script>
    <!-- <link rel="stylesheet" href="../../css/test.css"> -->
    <!-- <link rel="stylesheet" href="../../css/semo_cont_nh.css"> -->
    <script>
        $(document).ready(function () {
            buttonClickAcion();
        });
    </script>

    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg c_gray" >

            <!-- 상단 타이틀 -->
            <!-- <div class="title">담당 세무사 정보</div> -->
            <!-- //상단 타이틀 -->
            <div class="wrap staff">
                <div class="staff_info_share_wrap set_pdb90">
                    <div class="staff_top_share">
                        <div class="staff_top_icon">
                            <i class="ico_cen"></i>
                            <p>입사서류 도움말</p>
                        </div>
                        <div class="staff_top_con">
                            <span>
                                <b>입사서류 제출</b>
                                <p>안녕하세요. 입사를 축하 드립니다. <br>
                                    입사시 필요한 정보를 등록해주세요.
                                </p>
                            </span>
                        </div>
                    </div>
                    <div class="staff_owner_name">
                        <span>
                            <p>제출회사명</p>
                            <b>세모식당</b>
                        </span>
                        <span>
                            <p>대표자명</p>
                            <b>왕세모</b>
                        </span>
                    </div>
                    <div class="staff_em_info ">
                        <div class="staff_basic_info_con">
                            <div class="staff_info_cell">
                                <p>주민등록번호</p>
                                <div class="staff_reg_number">
                                    <div>
                                        <input type="text" placeholder="생년월일 6자리" maxlength="6">
                                    </div>

                                    <div>
                                        <input type="text" maxlength="1">
                                        <div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="staff_info_cell">
                                <p>급여계좌</p>
                                <div class="staff_bank_select">
                                    <div>
                                        <div>
                                            <i class="logo_bank ico_lb003"></i>
                                            <p>은행선택</p>
                                        </div>
                                        <input type="number" placeholder="계좌번호 입력">
                                    </div>
                                    <div>
                                        <div class="staff_bank_search active">
                                            예금주 조회
                                        </div>
                                        <input type="text" value="예금주:" class="active">
                                    </div>
                                </div>
                            </div>
                            <div class="staff_info_cell">
                                <p>이메일주소</p>
                                <div>
                                    <div class="staff_info_number">
                                        <input type="text" placeholder="이메일 주소 입력">
                                    </div>

                                </div>
                            </div>
                            <div class="staff_info_cell">
                                <p>주소</p>
                                <div>
                                    <div class="staff_info_number">
                                        <input type="text" placeholder="우편번호" class="disable">
                                    </div>

                                </div>
                                <div class="salary_select_wrap">
                                    <select class="date_select" required="">
                                        <option value="" hidden="" disabled="" selected="">주소 검색</option>
                                    </select>
                                    <i class="ico_cen"></i><!-- up클래스로 활성화 -->
                                </div>
                                <div>
                                    <div class="staff_info_number">
                                        <input type="text" placeholder="나머지 주소 입력">
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="staff_em_info">
                        <div class="staff_em_info_title">
                            <b>+ 주민등록등본</b>
                        </div>
                    </div>
                    <div class="staff_em_info">
                        <div class="staff_em_info_title">
                            <b>+ 보건증</b>
                        </div>
                    </div>
                    <span class="staff_date_end">
                        본 페이지는 7일 이내에만 접속 가능 합니다. <br>
                        <b>접속 만료일 : 2021.07.01</b>
                    </span>
                </div>
                <div class="btm_button">
                    <span class="bgc_green">서류제출하기</span>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
