<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->

      <div class="wrap document">
        <div class="send_ready_wrap">
          <p class="send_ready_tit">
            <i class="ico_cen"></i>
            <span>홍길동 님께<br>2,500,000원을 송금합니다.</span>
          </p>
          <div class="send_ready_info">
            <p>
              <i class="ico_cen logo_bank ico_lb003"></i>
              <!-- 
                .ico_lb003 -> ibk기업 / .ico_lb004 -> 국민 / .ico_lb020 -> 우리 / .ico_lb088 -> 신한 / 
                .ico_lb081 -> 하나 / .ico_lb011 -> 농협 / .ico_lb023 -> sc / .ico_lb027 -> 씨티 / 
                .ico_lb002 -> 산업 / .ico_lb071 -> 우체국 / .ico_lb032 -> 부산 / .ico_lb045 -> 새마을 / 
                .ico_lb034 -> 광주 / .ico_lb007 -> 수협 / .ico_lb031 -> 대구 / .ico_lb039 -> 경남 / 
                .ico_lb035 -> 제주 / .ico_lb037 -> 전북 / .ico_lb089 -> k / .ico_lb048 -> 신협 
              -->
              <span>IBK기업</span>
            </p>
            <span>47900932341222</span>
          </div>
          <div class="send_ready_input_wrap">
            <div class="sri_box">
              <span class="sri_tit">받는 분 통장표시</span>
              <p class="memo_input on"> <!--메모 입력시 x 그림 진해짐 활성 클래스 on-->
                <input class="sri_input" type="text" placeholder="최대 10자 입력" value="로움아이티(주)">
                <a><i class="ico_cen"></i><em class="new_blind">삭제</em></a>
              </p>
            </div>
            <div class="sri_box">
              <span class="sri_tit">내 통장표시</span>
              <p class="memo_input on"> <!--메모 입력시 x 그림 진해짐 활성 클래스 on-->
                <input class="sri_input" type="text" placeholder="최대 10자 입력" value="홍길동">
                <a><i class="ico_cen"></i><em class="new_blind">삭제</em></a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">보내기 (무료수수료 10회 남음)</span>
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
