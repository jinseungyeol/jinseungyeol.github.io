<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>계좌에 연결하면</title>
</head>
<body>

    <!-- 헤더 타이틀 -->
    <div class="title bgc_gray01">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">카드매출 관리</span>
    </div>

    <div class="basic_wrapper bgc_gray01">

        <div class="card_connect_wrap">
            <section class="ys_connect account_link">

                <!-- '카드매출을 연결하면?' 텍스트 -->
                <article class="text">
                    <h1 class="tit">
                        계좌에 연결하면
                    </h1>
                    <h2 class="sub_tit">
                        흩어진 나의 현금흐름을 한 눈에<br>
                        잔액과 입출내역을 자동으로 수집해요
                    </h2>
                </article>

                <!-- 계산기 이미지 -->
                <article class="img">
                    <span class="ico_cen link_01"></span>
                </article>

                <!-- 하단고정 -->
                <article class="bot_fix_pd20 bgc_gray01 set_pdb27">
                    <!-- 디스크립션 -->
                    <div class="desc">
                        <em>아래의 방법 중 선택해 주세요</em>
                    </div>

                    <!-- 버튼 / bgc_sig 클래스로 제휴별 배경색상 제어 -->
                    <button type="button" class="type_B link">
                        <div class="no_certi_link">
                            <p>공동인증서 없이 연결하기</p>
                            <span>개인명의 계좌만 가능해요</span>
                        </div>
                        <i class="right_white"></i>
                    </button>
                    <button type="button" class="type_B link bgc_sig">
                        <div class="no_certi_link">
                            <p>공동인증서 없이 연결하기</p>
                        </div>
                        <i class="right_white"></i>
                    </button>
                </article>

            </section>
        </div>


    </div>
    
</body>
</html>
