<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">


    <div class="cont_bg cont_hd"> <!-- 클래스 cont_pd header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">회원 가입</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">
        <div class="join_box">
          
          <!-- 양식변경 2020-02-03 -->
          <div class="title_sub">로그인 비밀번호를 입력해 주세요.</div> 
          
          <div class="join_block">
            <input type="tel" class="join_input" placeholder="비밀번호 입력 (6자리 이상)" maxlength="6">
          </div>

          <div class="join_noti">
            <i class="character"></i> 
            <span>3자 이상 연속된 숫자, 동일한 숫자는 사용할 수 없습니다.</span>
          </div>
          <!-- //양식변경 2020-02-03 -->

        </div>
      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>비밀번호가 일치하지 않습니다.</span> <!-- 문구수정 2020-02-03 -->
    </div>
    <!-- 토스트 팝업 -->

  </div>
</body>
</html>
