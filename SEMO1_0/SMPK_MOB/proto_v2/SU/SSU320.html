<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/kt_style.css">
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <title>S_회원가입04</title>
</head>
<body>
  
    <!-- 헤더 타이틀  -->
    <div class="title">
        <div class="title_left">
            <i class="ico_cen left_arrow set_pdl20"></i>
        </div>
        <span class="title_text">주소 검색</span>
    </div>

    <div class="basic_wrapper semo-join_adress">

        <!-- 검색창 -->
        <section class="title_serach_section big">
            <i class="ico_cen search"></i>
            <input type="text" placeholder="영등포로 91, 영등포동8가, 세교동 1-2">
        </section>

        <!-- 주소 검색하기 전 -->
        <section class="search_address big">
            <i class="ico_cont location"></i>
            <b class="c_b2">주소를 검색해주세요.</b>
            <span>
                <p><em>도로명+건물번호</em> 예)영신로 220</p>
                <p><em>지역명(동/리)+번지</em> 예)영등포동8가 92</p>
                <p><em>지역명(동/리)+ 건물명</em> 예)영등포동8가 knk타워</p>
            </span>
        </section>

        <!-- 주소 검색하기 후 -->
        <section class="address_list_wrap big set_mgt10" style="display: none;">
            <div class="address_list">
                <span>07228</span>
                <p>서울 영등포구 영신로 220 (KnK디지털타워)</p>
                <em>서울 영등포구 영등포동8가 92</em>
            </div>
            <div class="address_list">
                <span>07228</span>
                <p>경기 평택시 영신로 220 (평택여자종합고등학교)</p>
                <em>경기 평택시 세교동 1-2</em>
            </div>
        </section>
        
    </div>

</body>

</html>
