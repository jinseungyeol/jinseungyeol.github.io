<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd">

      <!-- 회원가입 -->
      <div class="wrap join type2">
        <div class="join_box">
          
          <div class="join_login">
            <!-- 전환성공 -->
            <div class="join_result"> 
              <i class="ico_result success"></i>
              <span class="join_result_txt">전환이 완료되었습니다.</span>
            </div> 
            <!-- //전환성공 -->
            
            <!-- 정보 -->
            <div class="login_info">
              <p>
                <span>사업자 번호</span>
                <span class="info_busi_number">123-45-67890</span>
              </p>
              <p>
                <span>상호명</span>
                <span class="info_busi_name">가나상사</span>
              </p>
              <p>
                <span>휴대폰번호</span>
                <span class="info_mobile_number">010-1234-5678</span>
              </p>
            </div>
            <!-- 정보 -->
  
            <div class="join_noti center"> 로그인하신 후 계정 정보를 등록해 주세요.</div>
          </div>

        </div>
      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">로그인하기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
