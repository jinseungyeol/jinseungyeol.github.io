<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->
            
      <!-- 간편송금 -->
      <div class="wrap account">
        <div class="account_box">
          <div class="transfer_result">
            <i class="ico_tr fail"><em class="new_blind">지급완료아이콘</em></i> <!--fail-->
            <strong>
              영업점 방문이<br/>필요합니다.
            </strong>
          </div>
 
          <p class="normal_sentence set_mgt16">
            고객님은 IBK 기업은행 가입 고객입니다.<br>
            가까운 IBK기업은행 영업점을 방문하여 <br>
            해지 신청을 해주시기 바랍니다.
          </p>

          <div class="branch_select_wrap">  

            <div class="branch_select_box">
              <span class="bsb_tit">상호</span>
              <div class="bsb_txt">
                가나상사
              </div>
            </div>
  
            <div class="branch_select_box">
              <span class="bsb_tit">사업자 번호</span>
              <div class="bsb_txt">
                123-45-67890
              </div>
            </div>

            <div class="branch_select_box">
              <span class="bsb_tit">가입일</span>
              <div class="bsb_txt ">
                2020.03.24
              </div>
            </div> 
            
            <div class="branch_select_box">
              <span class="bsb_tit">가입영업점</span>
              <div class="bsb_txt ">
                당산동(123456)
              </div>
            </div> 
          </div>  

          <p class="alert_q4 set_mgt15 set_pdb26">
            <i class="ico_cen"></i>
            <span>
              IBK기업은행 고객센터(1566-2566)로 <br>
              연락하시면 가까운 영업점을 안내 <br>
              받을 수 있습니다. 
            </span>
          </p>  
        </div>
      </div>
      <!-- //간편송금 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
