<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content"> 

   <div class="cont_bg cont_pd"> <!-- 2020-06-09 클래스 cont_pd_hd -> cont_pd로 수정 -->
      
      <!-- 상단 타이틀 -->
      <div class="title_box">
        <!-- 2020-06-09 클래스 tit_big -> tit_small로 수정 -->
        <span class="tit_small">이용 수수료를 자동 이체하실 출금계좌 정보를 등록해주세요.<br>매달 10, 17, 24일에 자동출금합니다.</span>
      </div>
      
      <!-- //상단 타이틀 -->

      <!-- 납부계좌 등록 -->
      <div class="wrap join none"> <!--2020-06-09 클래스 posi_type2 -> none 로 수정-->
        <div class="pay_box">
          <p class="nomal_noti">
            <i class="character"></i> 
            <span>출금계좌를 변경하시면 다음달 출금부터 변경됩니다.</span>
          </p>

          <!-- 정보입력 -->
          <div class="pay_input_box">
            <div class="input_info_box">
              <span class="info_tit">은행 <em>(필수)</em></span>
              <div class="info_box">
                <span class="ib_bank"><i class="logo_bank ico_lb003"><em class="new_blind">은행 로고</em></i>IBK기업</span>
                <a><i class="ico_arr"></i><em class="new_blind">팝업열기</em></a>
              </div>
            </div>

            <div class="input_info_box">
              <span class="info_tit">계좌번호 <em>(필수)</em></span>
              <div class="info_box">
                <span class="ib_account"><span>123-456-7890-1111</span></span>
                <a><i class="ico_arr"></i><em class="new_blind">팝업열기</em></a>
              </div>
            </div>

            <div class="input_info_box">
              <span class="info_tit">사업자(주민)번호 <em>(필수)</em></span>
              <input class="info_input" placeholder="계좌 소유주의 사업자(주민)번호를 입력해 주세요.">

              <p class="nomal_noti">
                <i class="character"></i> 
                <span>사업자 번호는 10자리, 주민번호는 생년월일 6자리를 입력해 주세요</span>
              </p>
            </div>

          </div>
          <!-- //정보입력 -->

        </div>
      </div>
      <!-- //납부계좌 등록 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>예금주실명 조회</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
