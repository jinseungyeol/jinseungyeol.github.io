<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css"> 
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->
            
      <!-- 간편송금 -->
      <div class="wrap account">
        <div class="account_box">
          <div class="transfer_result tr_pd">
            <i class="ico_tr transf"><em class="new_blind">지급아이콘</em></i> <!--transf-->
            <span>
              "<em class="tr_name">홍길동</em>"님께<br>
              <em class="tr_won">2,500,000원</em>을 송금합니다!
            </span>
          </div>
          <!--2020-06-10 추가-->
          <div class="branch_select_wrap"> 
            <div class="branch_select_box">
              <span class="bsb_date">2020년 01월 누적</span> 
            </div>

            <div class="branch_select_box">
              <span class="bsb_tit">이용상품명</span>
              <div class="bsb_txt">
                LITE
              </div>
            </div>
  
            <div class="branch_select_box">
              <span class="bsb_tit">누적건수</span>
              <div class="bsb_txt">
                <em>10</em>건
              </div>
            </div>

            <div class="branch_select_box">
              <span class="bsb_tit">누적 송금수수료</span>
              <div class="bsb_txt ">
                <em>5000</em>원
              </div>
            </div>  
          </div>
           <!--2020-06-10 추가--> 
        </div>
      </div>
      <!-- //간편송금 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">보내기 (수수료 무료 <em class="ft_count">10</em>회 남음)</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
