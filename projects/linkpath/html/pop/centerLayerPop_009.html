<body>
  <div class="popWrap pageEdit">

                  </div>

              </div>

                  <div class="selectBox readonly">
                    <!-- 선택시 notSelected 클래스 제거 -->
                    <button type="button" class="optionBtn selectTaget notSelected">페이지 유형을 선택해주세요.</button>
                    <div class="selectListWrap">
                      <ul class="selectList">
                        <li class="currentSelected">
                          <label><span>컨설팅</span></label>

                        <li>
                          <label><span>절세진단</span></label>
                        </li>
                        <li>

                    </div>
                  </div>

                </div>
              </div>

              <!-- 컨설팅 항목 -->

                          <p class="selectListTit">컨설팅 서류</p>
                        </div>
                        <ul class="selectList radio">
                          <li class="all">
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>전체</span>
                            </label>
                          </li>
                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>경정청구 (<em>7</em>건)</span>

                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>정책자금 (<em>7</em>건)</span>

                            <label class="radioWrap">

                            <label class="radioWrap">
                              <input type="checkbox">

                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>절세진단 (<em>7</em>건)</span>

                            <label class="radioWrap">
                              <input type="checkbox">

                            </label>
                          </li>
                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>자본거래 (<em>7</em>건)</span>
                            </label>
                          </li>
                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>근로소득비과세 (<em>7</em>건)</span>
                            </label>
                          </li>
                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>고용지원금 (<em>7</em>건)</span>
                            </label>
                          </li>
                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>CEO 보험 (<em>7</em>건)</span>

                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>부가세 절세진단 (<em>7</em>건)</span>

                          </li>
                          <!-- 2025-01-08 -->
                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span class="">연말정산 간소화 자료 (<em>7</em>건)</span>
                            </label>
                          </li>
                          <!-- //2025-01-08 -->
                          <li>
                            <label class="radioWrap">
                              <input type="checkbox">
                              <span>신규고객 접수 (<em>7</em>건)</span>
                            </label>
                          </li>
                        </ul>
                        <div class="listBtnWrap">
                          <button class="activeBodyBtn">적용하기</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <!-- //컨설팅 항목 -->
              <!-- 로고 -->
              <div class="selectWrap">
                <div class="item">
                  <p class="title">로고 (선택)</p>
                  <button type="button" class="thumnail"><!-- active 클래스 추가시 로고이미지 보임 -->
                    <div class="thumInner">
                      <div class="thumnailDesc">
                        <strong>로고 이미지 업로드</strong>
                        <div class="desc">
                          <p>이미지 파일 (PNG, JPG)</p>
                          <p>사이즈 : W(290) x H(80)</p>
                        </div>
                      </div>
                      <img src="../../img/wp/logo/logo_circle_primary.svg" class="logoImg" alt="로고이미지">
                    </div>
                  </button>
                </div>
              </div>
              <!-- //로고 -->
              <!-- 링크 -->
              <div class="selectWrap">
                <div class="item">
                  <p class="title">링크 (선택)</p>
                  <div class="selectBox leftIcon">
                    <img src="../../img/wp/ico/ico_home.svg" class="ico" alt="홈페이지">
                    <input type="text" placeholder="홈페이지 링크를 입력해주세요.">
                    <button type="button" class="deleteBtn"></button>
                  </div>
                  <div class="selectBox leftIcon">
                    <img src="../../img/wp/ico/ico_consult.svg" class="ico" alt="카카오">
                    <input type="text" placeholder="카카오톡 채널 링크를 입력해주세요.">
                    <button type="button" class="deleteBtn"></button>
                  </div>
                  <div class="infoMark">
                    <button class="infoBtn"></button>
                    <span class="qmTarget infoTxt">링크를 미입력하시면 버튼은 노출되지 않습니다.</span>
                  </div>
                </div>
              </div>
              <!-- //링크 -->
            </div>
            <div class="areaBtn">
              <button class="cancelBigBodyBtn"><span>취소</span></button>
              <button class="activeBigBodyBtn inActiveBodyBtn"><span>저장하기</span></button> <!-- 활성화 시 inActiveBodyBtn 클래스 제거 -->

          </div>
          <div class="gCol data">
            <div class="titleWrapCenter">
              <div class="lCont">
                <!-- 2024-11-21 -->
                <img class="landingLogo" src="../../img/wp/logo/logo_primary02.svg" alt="로고이미지">

              <div class="rCont">
                <div class="rContBtnCol">

                    <button class="bdGrayBodyBtn">
                      <span>홈페이지</span>
                    </button>
                  </div>
                  <div class="btnBox">
                    <button class="bdGrayBodyBtn">
                      <span>문의하기</span>
                    </button>
                  </div>
                  <div class="btnBox">
                    <button class="bdGrayBodyBtn">
                      <img class="leftIcon" src="../../img/wp/ico/ico_link_gray.svg" alt="링크">
                      <span>공유하기</span>
                    </button>
                  </div>
                </div>
              </div>

                        <div class="desc">
                          <p>이미지 파일 (PNG, JPG)</p>

                      <div class="changeBox">

                          <strong>이미지 변경</strong>

                      <div class="changeBox">
                        <div class="changeBoxInner">
                          <strong>이미지 변경</strong>
                          <div class="desc">
                            <p>이미지 파일 (PNG, JPG)</p>
                            <p>사이즈 : W(1920) x H(1080)</p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </button>
                </li>
                <li>
                  <!-- edit 클래스 추가 시 이미지변경 -->
                  <button type="button" class="editBoxBtn">
                    <div class="editBox">
                      <div class="thumnailDesc">
                        <strong>Section4 이미지 영역</strong><!-- 2025-01-08 -->
                        <div class="desc">
                          <p>이미지 파일 (PNG, JPG)</p>

                          <strong>이미지 변경</strong>

                    <div class="editBox">
                      <div class="thumnailDesc">
