<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/swiper-bundle.min.js"></script>
    <title>슬라이드팝업</title>
</head>

<body>

    <div class="new_content pretendard">
        <div class="overlay">
            <div class="common-popup bottom swiper-container">
                <div class="common-popup_top swiper-wrapper">
                    <article class="banner-list swiper-slide">
                        <i class="ico_cen banner018"></i>
                    </article>
                    <article class="banner-list swiper-slide">
                        <i class="ico_cen banner017"></i>
                    </article>
                </div>
                <div class="swiper-pagination"></div>
                <div class="common-popup_btn">
                    <div class="check-area">
                        <button type="button">오늘하루 보지않기</button>
                    </div>
                    <div class="check-area">
                        <button type="button">닫기</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var swiper = new Swiper(".common-popup", {
            effect: "fade",
                fadeEffect: { crossFade: true },
                    pagination: {
                        el: ".swiper-pagination",
                    clickable: true,
                },
            loop: false,
        });
    </script>
</body>

</html>
