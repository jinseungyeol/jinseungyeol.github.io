<body>
    <div class="new_content">
        <div class="cont_bg">
            <!-- 상단 타이틀 -->

            <!-- //상단 타이틀 -->

            <div class="wrap staff">
                <div class="staff_wrapper">
                    <div class="staff_basic_info">
                        <div class="staff_basic_alret">
                            <p>직원 정보 및 서류 요청하기</p>
                        </div>

                        <div class="staff_em_country">
                            <b>직원정보</b>
                            <div class="staff_em_select_country">
                                <div class="staff_em_local">
                                    <b class="active">내국인</b>
                                    <div>
                                        <span>
                                            <input type="checkbox" checked>
                                            <b>
                                                주민등록번호
                                            </b>
                                        </span>
                                        <span>
                                            <input type="checkbox" checked>
                                            <b>
                                                급여계좌
                                            </b>
                                        </span>
                                        <span>
                                            <input type="checkbox">
                                            <em>이메일</em>
                                        </span>
                                        <span>
                                            <input type="checkbox">
                                            <em>주소</em>
                                        </span>
                                        <span>
                                            <input type="checkbox">
                                            <em>부양가족수 (본인제외)</em>
                                        </span>
                                    </div>
                                </div>
                                <div class="staff_em_foreigner">
                                    <b>외국인</b>
                                    <div>
                                        <span>
                                            <input type="checkbox" checked>
                                            <b>
                                                외국인등록번호
                                            </b>
                                        </span>
                                        <span>
                                            <input type="checkbox" checked>
                                            <b>
                                                급여계좌*
                                            </b>
                                        </span>
                                        <span>
                                            <input type="checkbox">
                                            <em>이메일</em>
                                        </span>
                                        <span>
                                            <input type="checkbox">
                                            <em>주소</em>
                                        </span>
                                        <!-- 2021-06-29 수정되버림 -->
                                        <span>
                                            <input type="checkbox">
                                            <em>부양가족수 (본인제외)</em>
                                        </span>
                                        <!-- 2021-06-29 수정되버림 -->
                                    </div>
                                </div>

                            </div>
                            <div class="staff_company_document">
                                <div class="staff_company_document_list">
                                    <b>입사서류</b>

                                    <span>
                                        <input type="checkbox" checked>
                                        <b>주민등록등본 </b>
                                    </span>
                                    <span>
                                        <input type="checkbox" checked>
                                        <b>보건증 (만료일자 기재)</b>
                                    </span>
                                    <span>
                                        <input type="checkbox">
                                        <em>가족관계증명서 (부양가족 별도 거주시)</em>
                                    </span>
                                    <span>
                                        <input type="checkbox">
                                        <em>차량등록증(본인명의차량, 비과세 공제시)</em>
                                    </span>
                                    <span>
                                        <input type="checkbox">
                                        <em>신분증 사본 (주민증, 운전면허증, 여권) </em>
                                    </span>
                                    <span>
                                        <input type="checkbox">
                                        <em>자격증 사본</em>
                                    </span>
                                    <span>

                                    <span>
                                        <input type="checkbox">

                            </div>

                    <span class="bgc_green">직원에게 발송 미리보기</span>
