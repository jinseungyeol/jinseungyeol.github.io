<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">  
    <div class="cont_bg cont_pd">

      <!-- 상단 타이틀 -->
      <div class="title">부가서비스 출금계좌 관리</div> 
      <!-- //상단 타이틀 -->
            
      <div class="wrap setting">
        <div class="setting_box">
          <div class="withdraw_tit type2">
            <p>일반회원</p>
            <span>월정액 (VAT 포함)</span>
          </div>

          <div class="withdraw_card2">
            <p>
              <i class="logo_bank ico_lb003"></i> 
              <span class="wc_bank">가상계좌</span> 
            </p>
            <p class="wc_txt">
              등록하신 이메일로 가상계좌<br>
              정보가 발송됩니다
            </p>
          </div>

          <div class="withdraw_info">
            <p class="wi_width">
              <span class="wi_tit"><i class="wi_dot"></i> 가입일</span>
              <span class="wi_txt">2020.03.16</span>
            </p>
            <p class="wi_width">
              <span class="wi_tit"><i class="wi_dot"></i> 출금 동의일</span>
              <span class="wi_txt">2020.03.21</span>
            </p>
            <p class="wi_width">
              <span class="wi_tit"><i class="wi_dot"></i> 청구 예정일</span>
              <span class="wi_txt">10, 17, 24일 중</span>
            </p>
          </div>
          
        </div>
      </div>   

    </div>

     <!-- 하단 fix 버튼 -->
     <div class="btm_fix">
      <span class="bgc_green">출금계좌 변경</span>
    </div>
    <!-- 하단 fix 버튼 -->

    </div>
</body>
</html>
