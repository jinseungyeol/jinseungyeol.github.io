<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <title>Document</title>
</head>
<body>

  <div class="new_content pretendard fail">
    <div class="cont_bg padding20">
      <div class="send_display_wrap">
        <div class="checkmark-circle set_mgb31">
          <div class="background bgc_gray02"></div>
          <div class="ex_mark "></div>
          <div class="dot"></div>
        </div>
        <p class="c_b2 font_w_b">
          제출하신 인증서로<br>
          조회된 계정이 없습니다.
        </p>
      </div>
      <div class="loan_noti_box set_mgt50">
        <span class="title_sub">안내사항</span>
        <p class="loan_notice_text">
          <i class="set_pdt1">-</i>
          <span>제출하신 인증서로 조회된 계정이 없습니다.</span>
        </p>
        <p class="loan_notice_text set_mgt5">
          <i class="set_pdt1">-</i>
          <span>도움말을 확인하신 후 이용해주시기 바랍니다.</span>
        </p>
        <p class="loan_notice_text set_mgt5 set_mgt22 font_w_b">
          <i class="set_pdt1 c_b1 font_w_b">*</i>
          <span class="c_b1 font_w_b">조회 가능 기관:</span>
        </p>
        <p class="loan_notice_text set_mgt_unset">
          <i class="set_pdt1"></i>
          <span class="c_b1">은행, 카드사, 홈택스, 건강보험공단</span>
        </p>
      </div>
      <div class="help">
        <span class="ico_cen"></span>
        <u>도움말 보러가기</u>
      </div>
    </div>
    <div class="btm_button pos_absolute">
      <span class="close">닫기</span>
      <span class="replay bg_sig">다시 조회하기</span>
    </div>      
  </div>
  
</body>
</html>
