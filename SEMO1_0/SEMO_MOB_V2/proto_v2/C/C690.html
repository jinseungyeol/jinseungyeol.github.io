<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <!-- <link rel="stylesheet" href="../../css_v2/kt_style.css"> -->
    <title>C690</title>
</head>

<body>
    <div class="title b_gray">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">원천세납부</span>
        <div class="title_right">
            <i class="ico_cen info"></i>
        </div>
    </div>
    <div class="basic_wrapper b_gray" > 
        <div class="padding_wrapper20 set_pdb20">
           <div class="withholding">
              <div class="withholding_top flex_cs">
                  <div class="withholding_tit">
                      <span>납부기한</span>
                  </div>
                  <div class="refresh_btn">
                      <i class="ico_cen"></i><span>다시조회</span>
                  </div>
              </div>
              <div class="time_limit">
                  <span>21.05.10 23:00 까지</span>
              </div>
              <div class="withholding_warn">
                  <i class="ico_cen"></i>
                  <span>기한이 지날 경우 가산세가 부과됩니다.</span>
              </div>
              <div class="withholding_list_wrap">
                  <div class="withholding_list">
                      <div class="withholding_list_top flex_cs">
                          <div class="wl_tit">
                            <span>근로소득세</span>
                          </div>
                          
                          <div class="wl_condi">
                            <p class="wi_complete">납부대기</p>
                          </div>
                      </div>
                      <div class="withholding_list_amount flex_cs">
                          <span class="wl_amount_txt">
                              납부금액
                          </span>
                          <span class="wl_amount_num "><em>38,400</em>원</span>
                      </div>
                      <div class="withholding_list_account flex_cs">
                          <span>가상계좌</span>
                          <span>기업/121-1010-5451-111</span>
                      </div>
                      <!-- <div class="withholding_list_btn">
                         <span>간편납부</span>
                      </div> -->
                      <div class="active_button set_mgt15">
                          <span>간편납부</span>
                      </div>
                  </div>
                  <div class="withholding_list">
                      <div class="withholding_list_top flex_cs">
                          <div class="wl_tit">
                            <span>지방소득세</span>
                          </div>
                          
                          <div class="wl_condi">
                            <span class="wl_con_date">21.05.09</span>
                            <p class="wl_complete">납부완료</p>
                          </div>
                      </div>
                      <div class="withholding_list_amount flex_cs">
                          <span class="wl_amount_txt">
                              납부금액
                          </span>
                          <span class="wl_amount_num "><em>38,400</em>원</span>
                      </div>
                      <div class="withholding_list_account flex_cs">
                          <span>가상계좌</span>
                          <span>기업/121-1010-5451-111</span>
                      </div>
                      <div class="active_button active set_mgt15">
                        <span>간편납부</span>
                    </div>
                     
                  </div>
              </div>
           </div>
        </div>  
    </div>

</body>

</html>
