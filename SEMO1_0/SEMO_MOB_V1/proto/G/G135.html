<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_kt.css">
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">

    <div class="cont_bg">

      <!-- 상단 타이틀 -->
      <div class="title">이용약관</div>
      <!-- //상단 타이틀 -->

      <!-- 설정  -->
      <div class="wrap setting">
        <div class="setting_menu">
          <div class="stmn">
            <div class="stmn_tit">
              <i class="ico_stmn terms"></i>
              <span>이용약관</span>
            </div>
            <ul>
              <li class="stmn_list">
                <span>서비스 이용약관</span>
                <a class="stmn_list_arr"><i class="ico_arr_right"></i><em class="new_blind">이동</em></a>
              </li>
              <li class="stmn_list">
                <span>개인정보 처리방침</span>
                <a class="stmn_list_arr"><i class="ico_arr_right"></i><em class="new_blind">이동</em></a>
              </li>
            </ul>
          </div>
        </div>
        <div class="setting_menu">
          <div class="stmn">
            <div class="stmn_tit">
              <i class="ico_stmn terms"></i>
              <span>이용약관 동의 및 철회</span>
            </div>
            <ul>
              <li class="stmn_list static">
                <div class="stmn_list-name">
                  <span>마케팅 활용 동의</span>
                  <a class="stmn_list_arr"><i class="ico_arr_right gray"></i><em class="new_blind">이동</em></a>
                </div>
                <div class="onoffBox bgc_none on">
                  <div>
                    <input type="checkbox" id="onoffCheck" class="onoffCheck">
                    <label for="onoffCheck" class="onoffCheck">
                      <span class="slider"></span>
                      <span class="onoff"></span>
                    </label>
                  </div>
                </div>
              </li>
              <li class="stmn_list">
                <span>절세컨설팅 동의</span>
                <div class="onoffBox bgc_none on">
                  <div>
                    <input type="checkbox" id="onoffCheck" class="onoffCheck">
                    <label for="onoffCheck" class="onoffCheck">
                      <span class="slider"></span>
                      <span class="onoff"></span>
                    </label>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>

</html>
