<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">세모주치의 관리</div>
      <!-- //상단 타이틀 -->

      <div class="wrap setting">
        <div class="accountant_info_wrap">
          <span class="title_sub">세모주치의를 선택해 주세요.</span>  
          <div class="accountant_info_box">
            <div class="select_accountant">
              <span class="sa_name">한효성 세무사</span> 
              <a class="btn_sa_name"><i></i><span class="new_blind">세무사 선택하기</span></a>
            </div>
            <div class="accountant_info">
              <p>
                <span class="ai_tit">수임처명</span>
                <span class="ai_info">한효성 세무사</span>
              </p>
              <p>
                <span class="ai_tit">사업자 번호</span>
                <span class="ai_info">214-86-54125</span>
              </p>
              <p>
                <span class="ai_tit">수임동의일</span>
                <span class="ai_info">2019-05-08</span>
              </p>
            </div>
          </div>
     
          <!-- 안내 -->
          <div class="noti_box posi_defalt">
            <span class="nb_tit2">수임동의 내용</span>
            <p class="nomal_noti">
              <i class="character"><em class="noti_dot"></em></i> 
              <span>세모장부에 조회된 증빙을 수임 세무사가 조회 할 수 있습니다.</span>
            </p>
            <p class="nomal_noti">
              <i class="character"><em class="noti_dot"></em></i>
              <span>수임 세무사가 수임처 앱에서 최신 증빙을 직접 조회 할 수 있습니다.</span>
            </p> 
            <p class="agree_txt">수임동의를 하시겠습니까?</p>
          </div>
          <!-- 안내 -->

        </div>
      </div>
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">  
      <span class="bgc_green">수임 동의</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
