<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

      
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button header 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">PC에서 공인(공동)인증서 가져오기</div>
      <!-- //상단 타이틀 -->

      <div class="wrap certi jb_min3">
        <div class="certi_box">
          <div class="title_sub">인증서를 등록하기 위해서는 PC에서 스마트폰으로 인증서를 복사하여야 합니다.</div>
          <i class="ico_certi"></i>
          <div class="certi_number_box">
            <p class="cn_tit">인증번호</p>
            <p class="cn_number">
              <input type="number" class="certi_number" maxlength="4" value="1234">
              <input type="number" class="certi_number" maxlength="4" value="1234">
              <input type="number" class="certi_number" maxlength="4" value="1234">
            </p>
          </div>
        </div>

        <!-- 안내 -->
        <div class="noti_box">
          <div class="noti_board">
            <p class="nb_tit">PC 공인(공동)인증서 복사 방법</p>
            <p class="nb_list">1. PC에서 semobooks.co.kr 에 접속</p>
            <p class="nb_list">2. 상단 “공인(공동)인증서 복사” 버튼 클릭</p>
            <p class="nb_list">3. 공인(공동)인증서 로그인 후 위 12자리 숫자 입력</p>
            <p class="nb_list">4. 공인(공동)인증서 가져오기(확인) 클릭</p>
          </div>
        </div>
        <!-- //안내  -->
      </div>
      
    </div>
    
    
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">가져오기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
