<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <div class="wrap setting">
        <div class="setting_box">
          <div class="result_wrap fail">
            <i class="ico_rw fail"><em class="new_blind">지급실패아이콘</em></i> <!--fail-->
            <span class="fail"><strong>카드 매출 등록이</strong><br>실패하였습니다.</span>
          </div>

          <div class="nomal_noti">
            <i class="character c_orange"></i> 
            <span class="c_orange">해당 기관의 관련페이지 변경으로 거래가 실패하였습니다. [80002F32]</span>
          </div>

          <div class="nomal_noti">
            <span class="c_gray">
              카드 매출을 다시 등록해 주세요.<br>
              동일한 오류가 계속 발생할 경우 <br>
              고객센터 > 1:1문의로 문의해 주세요.
            </span>
          </div>
        </div>
      </div>
      
    </div>


    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다시 등록하기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
