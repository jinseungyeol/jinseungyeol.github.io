<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_nh.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd_hd fix_button 포함 패딩--> 

      <!-- 상단 타이틀 -->
      <div class="title">카드 정보</div>
      <!-- //상단 타이틀 -->  
       
      <div class="wrap setting">
        <div class="card_info">
          <p>
            <span class="ci_tit">카드사(회원사)</span>
            <span class="ci_info">BC(IBK기업)</span>
          </p>
          <p>
            <span class="ci_tit">상품명</span>
            <span class="ci_info">쇼핑엔조이</span>
          </p>          
          <p>
            <!-- 2020-10-14 수정 -->
            <span class="ci_tit set_al">카드번호</span> <!--클래스 추가-->
            <span class="ci_info set_fldir"> <!--클래스 추가-->
              <span>
                5428-79**-****-1248
              </span>
              <button>카드번호 입력</button> <!--문구 수정-->
            </span>
            <!-- 2020-10-14 수정 -->
          </p>          
          <p>
            <span class="ci_tit">카드 구분</span>
            <span class="ci_check">
              <input type="radio" id="card_classify1" class="card_classify" name="card_classify" value="기업" checked>
              <label for="card_classify1">기업</label>
            
              <input type="radio" id="card_classify2" class="card_classify" name="card_classify" value="개인">
              <label for="card_classify2">개인</label>
            </span>
          </p>
        </div>

        <div class="card_certi">
          <div class="title_sub blod">공인(공동)인증서</div>  <!-- blod 클래스 추가 -->
          <!-- 인증서 -->
          <div class="cbi_box">
            <div class="certi_info_box">
              <i class="ico_certi_m"></i>
              <div class="certi_info">
                <p>
                  <span class="certi_cmp_name">웹케시글로벌(webcashglobal)112233445566778899112233</span>
                </p>
                <p>  
                  <span class="certi_class">기업</span><i>,</i>
                  <span class="certi_use">용도제한용</span><i>/</i>
                  <span class="certi_issue">금융결제원</span>
                </p>
                <p>
                  <span class="certi_end">만료일</span>
                  <span><em class="certi_end_data">2020.10.31</em><i class="certi_end_txt">(만료)</i></span>
                </p>
              </div>
              <a class="btn_change_certi"><i></i><em class="new_blind">인증서 변경</em></a>
            </div>
          </div>
          <!-- //인증서 -->
          <p class="noti_star wd_set color_b">
            <i class="character"></i>
            <span>인증서가 만료된 경우 인증서를 교체할 수 있습니다. </span>
          </p>
        </div>
      </div> 
    </div>
    
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>삭제</span>
      <span class="bgc_green">확인</span>
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
