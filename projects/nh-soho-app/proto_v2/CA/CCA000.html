<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css_v2/common.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- JS -->
    <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <script src="../../js_v2/wow.min.js"></script>
    <script src="../../js_v2/chart-3.5.1.min.js"></script>
    <title>CAC000</title>
</head>
<body>
  <div class="media_query">
    <!-- ## 헤더타이틀 ## -->
    <div class="title b_white">
      <span class="title_text set_pdl0">계정 삭제 요청</span>
    </div>
    <div class="basic_wrapper">
      <div class="wrap_pd20">
        <!--  ## 필수 정보 입력 ## -->
        <section class="ness_info">
          <div class="cnt">
            <article class="tit">
              <h1 class="c_b2">필수 정보를 입력해 주세요</h1>
            </article>
            <!-- 1. 사업자번호 -->
            <article class="info_box_wrap num desc">
              <label for="info01" class="info_box">
                <div class="left">
                  <input type="text" id="info01" maxlength="10" required="required" oninput="autoHyphen(this)">
                  <p>사업자번호</p>
                </div>
                <div class="right">
                  <button type="button" class="ico_cen close_bg_gray"></button>
                </div>
              </label>
              <em>사업자번호를 입력해 주세요</em>
            </article>
            <!-- 이름 -->
            <article class="info_box_wrap ceo">
              <label for="info02" class="info_box">
                <div class="left">
                  <input type="text" id="info02" required="required">
                  <p>이름</p>
                </div>
                <div class="right">
                  <button type="button" class="ico_cen close_bg_gray"></button>
                </div>
              </label>
            </article>
            <!-- 3. 주민등록번호 -->
            <!-- error 클래스 추가 = 오류일때 밑에 border 빨간줄 -->
            <article class="info_box_wrap social">
              <label for="info03" class="info_box">
                <div class="left">
                  <input type="text" id="info03" required="required" maxlength="6">
                  <b>-</b>
                  <input type="text" required="required" class="back_number" maxlength="1">
                  <div class="dot">
                    <span>●</span>
                    <span>●</span>
                    <span>●</span>
                    <span>●</span>
                    <span>●</span>
                    <span style="margin-right: 0;">●</span>
                  </div>
                  <p>주민등록번호</p>
                </div>
                <div class="right">
                  <button type="button" class="ico_cen close_bg_gray"></button>
                </div>
              </label>
            </article>
            <article class="info_box_wrap phone">
              <!-- 4. 휴대폰번호 -->
              <label for="info0444" class="info_box">
                <div class="left">
                  <div class="service commu">
                    <b class="c_b2">통신사</b>
                    <span class="ico_cen down_01"></span>
                  </div>
                  <input type="text" id="info04" required="required" maxlength="11" oninput="autoHyphen2(this)">
                  <p>휴대폰번호</p>
                </div>

                <!-- active 클래스로 활성화 -->
                <div class="right">
                  <button type="button" class="mini typeB">인증요청</button>
                </div>
              </label>
            </article>
            <!-- 5. 인증번호 -->
            <article class="info_box_wrap certi">
              <label for="info05" class="info_box">
                <div class="left">
                  <input type="text" id="info05" required="required" maxlength="6">
                  <div class="service">
                    <p>인증번호</p>
                  </div>
                </div>
                <div class="right">
                  <div id="timer"><span class="min">03</span> : <span class="sec">00</span></div>
                </div>
              </label>
            </article>
          </div>
        </section>
        <!-- 안내사항 -->
        <ul class="link-template_list">
          <li class="item_wrap">
            <strong>안내사항</strong>
            <p>계정 삭제 전에 읽어보세요</p>
            <div class="basic_item">
              <div class="txt">
                <span>개인정보 처리방침</span>
              </div>
              <div class="icon">
                <i class="ico_cont"></i>
              </div>
            </div>
            <section class="agree_wrap">
              <article class="all_wrap">
                <div class="all">
                  <div class="all_checkbox">
                    <label for="all_check">
                      <input type="checkbox" id="all_check">
                      <em>위 내용을 모두 확인하였으며, 동의합니다.</em>
                    </label>
                  </div>
                </div>
              </article>
            </section>
          </li>
        </ul>
        <!-- //안내사항 -->
      </div>
      <!-- ## 버튼 ## -->
      <div class="bot_fix ">
        <!-- bgc_sig 클래스로 제어 -->
        <button type="button" class="type_A bgc_sig">
          <span>확인</span>
        </button>
      </div>
    </div>
    <!-- ## 토스트 팝업 ## -->
    <div class="toast">
      <span>
        인증요청 제한 횟수를 초과했습니다.<br>
        종료 후 다시 시도해주세요.
      </span>
    </div>
  </div>
  <script>
    $('.ness_info .info_box_wrap').click(function () {
      $(this).addClass('active').siblings(".ceo, .social").removeClass('active');
      $(this).find(".close_bg_gray").mousedown(function () {
        $(this).parent().siblings().find("input").val("");
      })
    });
    $('.info_box_wrap.phone .info_box .mini').click(function () {
      $(this).addClass('active');
      $(".ness_info .info_box_wrap.certi").addClass('show');
    });
    // input[id="info01"] 사업자번호 하이픈
    const autoHyphen = (target) => {
      target.value = target.value
        .replace(/[^0-9]/, '')
        .replace(/^(\d{3})(\d{2})(\d{5})$/, `$1-$2-$3`);
    }

    // input[id="info04"] 휴대폰번호 하이픈
    const autoHyphen2 = (target) => {
      target.value = target.value
        .replace(/[^0-9]/, '')
        .replace(/^(\d{3})(\d{4})(\d{4})$/, `$1-$2-$3`);
    }
  </script>

</body>
</html>
