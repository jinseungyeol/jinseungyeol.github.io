<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_kt.css">
    <title>SEMO</title>

<body>
    <div class="new_content">


        <div class="cont_bg gray">
            <!-- <div class="title">회원가입</div> -->

            <!-- 회원가입 -->
            <div class="wrap reg">
                <div class="reg_pay_title">
                    <b>기본요금 4,950원</b>
                    <span>결제방식에 따라 할인혜택과 수수료가 <br>
                        다르게 적용될 수 있습니다.</span>
                    <div class="reg_choice">
                        <i class="ico_cen"></i>
                        <div>
                            <span>
                                아이폰 고객의 경우 <br>
                                <b>두 가지 결제방식 중 선택</b>
                                이 가능합니다.
                            </span>
                        </div>
                    </div>
                </div>
                <div class="reg_pay_cont">
                    <span class="reg_pay_c_title">
                        <i class="ico_cen"></i>
                        <p>오픈이벤트</p>
                        <em>90일 무료</em>
                    </span>
                    <div class="reg_pay_btn first">
                        <span>KT통신요금 합산 결제</span>
                        <i class="ico_cen"></i>
                    </div>
                    <p class="reg_open_evnet_info">
                        <span>[오픈 이벤트 안내]</span>
                        <em>지금 결제하시면 오픈이벤트로 <b>최초 90일 무료</b>로 이용하실 수 있습니다.</em>
                    </p>
                    <div class="reg_pay_btn secound">
                        <span>앱스토어로 별도 결제</span>
                        <i class="ico_cen"></i>
                    </div>
                    <p class="reg_appstore_pay">
                        <span>[앱스토어 결제 시]</span>
                        <em> 앱스토어 정책으로 현재 진행중인 오픈 이벤트 최초 90일 무료 혜택은 <b>제공 불가</b>합니다.</em>
                    </p>
                </div>

            </div>

        </div>
    </div>
