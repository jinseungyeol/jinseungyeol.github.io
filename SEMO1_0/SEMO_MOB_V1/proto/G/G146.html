<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">사업자 번호</div>
      <!-- //상단 타이틀 -->

      <div class="wrap setting">
        <div class="cancel_info_wrap">

          <div class="cancel_info_tit">
            <span>가나상사</span><br>고객님은 <em>IBK 기업은행 가입</em><br>고객입니다.
          </div>

          <div class="cancel_info_txt">
            가까운 IBK기업은행 영업점을 방문<br>하여 해지 신청을 해주시기 바랍니다.
          </div>

          <div class="cancel_info_box">
            <p class="ci_width">
              <span class="ci_tit">상호</span>
              <span class="ci_txt">가나상사</span>
            </p>
            <p class="ci_width">
              <span class="ci_tit">사업자 번호</span>
              <span class="ci_txt">123-45-67890</span>
            </p>
            <p class="ci_width">
              <span class="ci_tit">가입일</span>
              <span class="ci_txt">2020. 3. 24</span>
            </p>
            <p class="ci_width">
              <span class="ci_tit">가입영업점</span>
              <span class="ci_txt">당산동(123456)</span>
            </p>
          </div>

          <p class="nomal_noti">
            <i class="character"></i> 
            <span>IBK기업은행 고객센터(1566-2566)로 연락하시면 가까운 영업점을 안내 받을 수 있습니다.</span>
          </p>
        </div>
      </div>
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>취소</span> <!--클래스 bgc_green 배경색-->
      <span class="bgc_green">고객센터 연결</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
