<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!--뒤로가기-->
    <div class="header">
      <div class="process_bar_box">
        <p class="process_bar" style="width:50%;"></p> <!--진행 상태 width %값으로 최소 0 ~ 최대 100%-->
      </div>
      <a class="btn_back"><i class="ico_back"></i><em class="new_blind">뒤로가기</em></a>
    </div>
    <!--//뒤로가기-->

    <div class="cont_bg cont_pd_hd"> <!-- 클래스 cont_pd_hd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">사업자 검증하기</div> <!--2020-02-03 문구수정-->
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">

        <div class="join_box">
          <div class="title_sub">대표자 휴대폰 본인 인증해 주세요.</div>
          
          <div class="join_auth">
            
            <div class="join_block">
              <!-- 사업자 번호-->
              <input type="number" name="busi_number" class="join_input" placeholder="'-'를 빼고 입력해 주세요." value="1234567890">
              <!-- //사업자 번호--> 
            </div>

            <div class="join_block"> 
              <!-- 상호명-->
              <input type="text" name="busi_number" class="join_input" placeholder="상호명을 입력해 주세요"  value="가나상사">
              <!-- //상호명-->
            </div>

            <!-- 약관동의 -->
            <div class="terms_box on"> <!--활성 클래스 on 전체 약관 표시-->
              <!-- 전체 동의 -->
              <div class="terms_li type2">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>약관 전체 동의</span>
                <a class="btn_term_open"><i class="ico_arr"></i><em class="new_blind">약관열기</em></a>
              </div>
              <!-- //전체 동의 -->

              <!-- 약관 -->
              <ul>
                <li class="terms_li">
                  <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                  <span>세모 이용약관</span>
                  <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
                </li>
                <li class="terms_li">
                  <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                  <span>개인정보 수집 및 취급 방침 동의</span>
                  <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
                </li>
                <li class="terms_li">
                  <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                  <span>개인(신용)정보 제3자 제공 동의</span>
                  <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
                </li>
                <li class="terms_li">
                  <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                  <span>거래정보 조회 위임 동의</span>
                  <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
                </li>
                <li class="terms_li">
                  <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                  <span>마케팅 활용 동의</span> 
                  <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
                </li>
              </ul>
              <!-- //약관 -->
            </div>
            <!-- //약관동의 -->
    
            <div class="join_block type2">
              <!-- 대표자명 -->
              <input type="text" name="name" class="join_input type3" placeholder="대표자명 입력(홍길동)" value="홍길동">
              <!-- //대표자명 -->

              <!-- 국적 -->
              <p class="join_select">
                <input type="text" name="nation" class="join_input type6" value="내국인">
                <a class="join_slct_nation"><i class="join_slct_i"><em class="new_blind">선택</em></i></a>
              </p>
              <!-- //국적 -->
            </div>
    
            <div class="join_block type2">
              <!-- 생년월일 -->
              <input type="number" name="birth" class="join_input type3" placeholder="생년월일 입력(19801231)" value="19801231">
              <!-- //생년월일 -->

              <!-- 성별 -->
              <p class="join_select">
                <input type="text" name="sex" class="join_input type6" value="남자">
                <a class="join_slct_sex"><i class="join_slct_i"><em class="new_blind">선택</em></i></a>
              </p>
              <!-- //성별 -->
            </div>
    
            <!-- 통신사 -->
            <div class="join_radio">
              <input type="radio" id="auth_agent1" class="agent" name="agent" value="SKT" checked>
              <label for="auth_agent1">SKT</label>
            
              <input type="radio" id="auth_agent2" class="agent" name="agent" value="KT">
              <label for="auth_agent2">KT</label>
            
              <input type="radio" id="auth_agent3" class="agent" name="agent" value="LG">
              <label for="auth_agent3">LG U+</label>

            </div>
            <!-- //통신사 -->

            <div class="join_block type2">
              <!-- 휴대폰 번호 -->
              <input type="number" name="mobile" class="join_input type4" placeholder="휴대폰번호입력" value="12345678">
              <button class="btn_auth bgc_green">인증번호 요청</button>
               <!-- //휴대폰 번호 -->
            </div>
    
            <div class="join_block set_mgb50">
              <!-- 2020-11-23 set_mgb50 클래스 추가 -->
              <!-- 인증번호 입력 -->
              <input type="number" name="auth" class="join_input type5" placeholder="인증번호 입력(숫자6자리)" maxlength="6">
              <!-- //인증번호 입력 -->

              <!-- 타이머 -->
              <p class="auth_timer">
                <i class="ico_timer"></i>
                <span><em class="min">03</em> : <em class="sec">00</em></span>
              </p>
               <!-- //타이머 -->
            </div>
          </div>
        </div>

      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>다음</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
