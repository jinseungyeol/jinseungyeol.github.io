<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">
    <div class="cont_bg cont_pd">
      <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 상단 타이틀 -->
      <div class="title"></div>
      <!-- //상단 타이틀 -->
      <div class="wrap setting">
        <div class="origin_top">
          <div class="origin_title">
            <span>배달앱 등록</span></div>
          <div class="origin_text">
            <span>
              <p>요기요</p>&nbsp;아이디와 비밀번호를 입력해주세요.
            </span></div>
        </div>
        <div class="deli_log">
          <div class="deli_id">
            <input type="text" placeholder="아이디 입력">
          </div>
          <div class="deli_pass">
            <input type="password" placeholder="비밀번호 입력">
          </div>
        </div>
        <div class="app_list_change">
          <p>🔖</p>
          &nbsp;<span>
            <p>요기요</p>사장님 사이트 가기
          </span>
        </div>
      </div>
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="btm_button on">
      <span class="bgc_gray">취소</span>
      <span class="bgc_d_gray">저장</span>
      <!--
        버튼 색
        bgc_green
        bgc_blue
        bgc_gray
        bgc_orange
        bgc_d_gray
      -->
      <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="toast">
      <!-- hide 클래스로 제어 -->
      <span>비밀번호를 입력해 주세요.</span>
    </div>
  </div>
</body>

</html>
