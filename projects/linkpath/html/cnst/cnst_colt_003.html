<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  <!-- container -->
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_linkpath.svg" alt="로고">
            </a>
          </h1>
        </div>
      </div>
    </header>
    <!-- //header -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult fixB">
        <div class="inner">
          <div class="certiTitArea">
            <img src="../../img/wp/ico/ico_gvo.svg" alt="정부24 아이콘">
            <strong class="certiTit">
              주민등록등본
              <span class="progress">(1/2)</span>
            </strong>
          </div>
          <div class="infoMsgBox">
            <p class="infoMsg">
              주민등록등본을 발급하기 위한 주민등록상 주소를 선택해주세요.
            </p>
          </div>
          <div class="userInfoSection">
            <div class="InfoPanel">
              <p class="pannelTit">주민등록상 주소 확인</p>
            </div>
            <div class="selectWrap">
              <div class="userInfoBox">
                <div class="item">
                  <div class="addrWrap">
                    <div class="selectBox consultCnt">
                      <select>
                        <option value="시도선택">시도선택</option>
                        <option value="서울특별시">서울특별시</option>
                        <option value="강원특별자치도">강원특별자치도</option>
                        <option value="전북특별자치도">전북특별자치도</option>
                        <option value="제주특별자치도">제주특별자치도</option>
                        <option value="세종특별자치시">세종특별자치시</option>
                      </select>
                    </div>
                    
                    <div class="selectBox consultCnt">
                      <select>
                        <option value="시군구선택">시군구선택</option>
                        <option value="강남구">강남구</option>
                        <option value="강동구">강동구</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="areaFixedBottom">
            <div class="fixedBottomInner">
              <div class="cell">
                <button class="activeBodyBtn inActiveBodyBtn"><span>다음</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->

</html>
