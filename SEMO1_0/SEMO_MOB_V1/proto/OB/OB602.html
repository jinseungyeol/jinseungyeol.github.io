<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">대출약정상세 조회</div>
      <!-- //상단 타이틀 -->

      <div class="wrap account"> 
        <div class="info_box_g set_fd">
          <p class="loan_detail_tit">중소기업자금대출</p>
          <p class="loan_detail_charge set_cen_cen">잔액:<em>999,999,999</em>원</p>
        </div>
      
        <div class="loan_detail_box">
          <p>
            <strong class="ld_tit">계좌번호</strong>
            <strong class="ld_txt">1234-56789-1234</strong>
          </p>
          <p>
            <span class="ld_tit">여신실행일</span>
            <span class="ld_txt">2020-07-01</span>
          </p>
          <p>
            <span class="ld_tit">여신만료일</span>
            <span class="ld_txt">2021-07-01</span>
          </p>
          <p>
            <span class="ld_tit">여신금액</span>
            <span class="ld_txt">99,999,999 원</span>
          </p>
          <p>
            <span class="ld_tit">여신이자율</span>
            <span class="ld_txt">2.15000%</span>
          </p>
          <p>
            <span class="ld_tit">한도약정수수료</span>
            <span class="ld_txt">999,999 원</span>
          </p>
          <p>
            <span class="ld_tit">인지세금액</span>
            <span class="ld_txt">999,999 원</span>
          </p>
          <p>
            <span class="ld_tit">영업점</span>
            <span class="ld_txt">당산역(01234)</span>
          </p>
        </div>
      </div>
      <!-- 안내 -->
      <div class="noti_box">
        <p class="noti_comm set_top_le">
          <i class="ico_cen"></i>
          <span>약정신청과 관련한 자세한 문의사항은 거래 영업점으로 문의하여 자세히 안내 받으시기 바랍니다.</span>
        </p>
      </div>
      <!-- 안내 -->
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">약정 신청하기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
