<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_kt.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg cont_pd">

      <div class="wrap setting">
        <div class="input_info_box">
          <span class="info_tit">사업자번호를 입력해주세요.</span>
          <input class="info_input" placeholder="사업자번호를 입력해주세요.('-'제외)"> 
          <p class="nomal_noti kt_start"> <!-- 회원이 아닐때 -->
            <i class="ico_cen info_01"></i> 
            <span><b class="c_b1">[정지된 회원]</b> 고객센터에 문의해 주세요.</span>
          </p>
          <p class="nomal_noti kt_start" style="display: none;"> <!-- 회원일때 -->
            <i class="ico_cen check_04 set_mgr5"></i> 
            <span>사장님 장부비서 회원이시네요!</span>
          </p>
        </div>
      </div>
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix" style="display: none;">
      <span class="bgc_navy01">KT 고객센터 <em class="notosans">☎</em> 100번</span> 
      <!-- 비활성화 bgc_navy01 클래스 제거 -->
    </div>
    <div class="btm_fix">
      <span class="bgc_navy01">확인</span> 
      <!-- 비활성화 bgc_navy01 클래스 제거 -->
    </div>
    <!-- 하단 fix 버튼 -->
    

  </div>
