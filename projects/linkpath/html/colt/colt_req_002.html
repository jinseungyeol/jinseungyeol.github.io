<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  <!-- container -->
  <div class="container">
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult">
        <div class="submitDoc">
          <div class="inner">
            <div class="submitDocVisual">
              <div class="submitDocVisualTop">
                <p>1분이면 서류제출 완료 !</p>
              </div>
              <div class="submitDocVisualCnt">
                <div class="txtArea">
                  <strong>
                    <p>서류제출</p>
                    <p>이제 간편하게</p>
                    <p><span class="pointColor">링크패스</span> 하세요!</p>
                  </strong>
                </div>
                <div class="imgArea">
                  <img src="../../img/wp/ico/ico_hometax_docu.svg" alt="홈택스 서류">
                </div>
              </div>
              <div class="lpfiAlert">
              <div class="grayBox">
                <div class="desc">
                  <strong class="tit">문서 수집요청 안내</strong>
                  <p>
                    <span>안녕하세요, 로움세무회계입니다.</span>
                  </p>
                  <p>
                    <span>컨설팅을 신청해주셔서 감사합니다.</span>
                    <span>아래 <em class="pointColor">[수집하기]</em> 버튼을 클릭하여 <em class="pointColor">사업장공동인증서를 제출해주세요.</em></span>
                  </p>
                </div>
                <div class="desc">
                  <strong class="tit">소요시간 1분 이내</strong>
                  <p>
                    <span>도움이 필요하시면 <em class="pointColor">[도움말 보기]</em>에서 ‘법인사업자 진행방법’을 참고해주세요!</span>
                  </p>
                </div>
              </div>
            </div>
            </div>
            <div class="areaBtn flex1">
              <div class="cell">
                <button class="activeBodyBtn"><span>수집하기</span></button>
              </div>
              <div class="cell">
                <button class="bdGrayBodyBtn"><span>도움말 보기</span></button>
              </div>
            </div>
            <div class="lpfiAlert">
              <div class="grayBox">
                <div class="desc">
                  <p class="tit">
                    <span>담당자 정보</span>
                  </p>
                </div>
                <table class="tblInfoManager">
                  <colgroup>
                    <col width="88px">
                    <col>
                  </colgroup>
                  <tbody>
                    <tr>
                      <th>이름</th>
                      <td>김링크</td>
                    </tr>
                    <tr>
                      <th>연락처</th>
                      <td>010-1234-5678</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
