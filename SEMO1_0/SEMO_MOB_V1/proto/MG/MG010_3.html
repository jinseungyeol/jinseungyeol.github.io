<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->
            
      <!-- 간편송금 -->
      <div class="wrap account">
        <div class="account_box">
          <div class="transfer_result">
            <i class="ico_tr fail"><em class="new_blind">지급완료아이콘</em></i> <!--fail-->
            <strong>
              영업점 방문이<br/>필요합니다.
            </strong>
          </div>
 
          <p class="normal_sentence set_mgt16">
            <strong>고객센터 > 1:1문의 > 서비스 해지에서</strong><br>
            필수서류를 제출해 주세요<br>
            1개월 내에 재가입이 불가하며,<br>
            1~3일 내에 해지처리 됩니다.
          </p>

          <p class="alert_q2 color set_mgt13"> 
            <span>
              (필수서류) 사업자등록증 이미지
            </span>
          </p> 

          <div class="contact_box set_pdtd10">
            <button class="contact">
              <i class="ico_cen service"></i> 고객센터
            </button> 
          </div>

          <div class="branch_select_wrap">  

            <div class="branch_select_box">
              <span class="bsb_tit">상호</span>
              <div class="bsb_txt">
                가나상사
              </div>
            </div>
  
            <div class="branch_select_box">
              <span class="bsb_tit">사업자 번호</span>
              <div class="bsb_txt">
                123-45-67890
              </div>
            </div>

            <div class="branch_select_box">
              <span class="bsb_tit">가입일</span>
              <div class="bsb_txt ">
                2020.03.24
              </div>
            </div>  
          </div>   
        </div>
      </div>
      <!-- //간편송금 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">닫기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
