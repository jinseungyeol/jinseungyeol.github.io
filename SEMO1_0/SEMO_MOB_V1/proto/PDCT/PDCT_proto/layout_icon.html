<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../proto/css/nh_cont.css">
  <link rel="stylesheet" href="../../../css/semo_cont.css">
  <link rel="stylesheet" href="../../../css/PDCT.css" />
  <script src="../../../js/jquery-3.5.1.min.js"></script>
  <script src="../../../js/PDCT.js"></script>

</head>

<body>
  <div class="container">
    <div class="data_popup"
      style="width: 100vw; height: 100vh; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background-color: rgba(0, 0, 0, 0.25); z-index: 999999999; display: none;">
      <div class="textarea" style="box-shadow:5px 10px 15px 5px #888888;">
        <div class="delete">X</div>
        <div class="htmlContent"></div>
      </div>
    </div>
    <section>
      <div class="p_right_box">
        <div class="p_right_box_title">Icon</div>
        <div class="p_right_container">
          <ul class="p_right_box">
            <li style="display: flex; align-items: center;">
              <div class="pay_zero_con" style="align-items: center;">
                <span class="p_con_title">.pay_zero_no_data</span>
                <div class="p_contents" style="display: flex;">
                  <div class="pay_zero_no_data" style="cursor: pointer;">
                    <i class="ico_cen data"></i>
                    <span class="p_con_title">.data</span>
                  </div>
                  <div class="pay_zero_no_data" style="cursor: pointer;">
                    <i class="ico_cen update"></i>
                    <span class="p_con_title">.update</span>
                  </div>
                </div>
              </div>
            </li>
          </ul>
          <ul class="p_right_box">
 
            <li>
              <span class="p_con_title">.send_display_wrap (성공 아이콘)</span>
              <div class="send_display_wrap">
                <div class="checkmark-circle complete">
                  <div class="background"></div>
                  <div class="checkmark draw"></div>
                </div>
              </div>
            </li>
            <li>
              <span class="p_con_title">.send_display_wrap (실패 아이콘)</span>

              <div class="send_display_wrap">
                <div class="checkmark-circle fail">
                  <div class="background"></div>
                  <div class="ex_mark "></div>
                  <div class="dot "></div>
                </div>
    
          
              </div>
         
              </div>
            </li>
          </ul>
        </div>
      </div>
    </section>
    <footer></footer>
  </div>
</body>

</html>
