<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">쇼핑몰 등록</div>
      <!-- //상단 타이틀 -->

      <div class="wrap setting">
        <div class="input_info_box">
          <span class="info_tit"><em class="app_name">CJ몰</em> 아이디/비밀번호/협력사코드</span>
          <p class="info_input">semojangbu</p>
          <p class="info_input">
            <span class="pwd_dot_box">
              <em class="dot"></em>
              <em class="dot"></em>
              <em class="dot"></em>
              <em class="dot"></em>
              <em class="dot"></em>
            </span>
            <a class="btn_change_pwd"><i></i><em class="new_blind">비밀번호 변경</em></a>
          </p>
          <input class="info_input" placeholder="협력사코드 입력" value="123456"/>
          <p class="nomal_noti wd_reset">
            <i class="character"></i> 
            <span>비밀번호가 변경된 경우 변경할 수 있습니다.</span>
          </p>
        </div>

        <!-- 안내 -->
        <div class="noti_box posi_defalt">
          <div class="nb_txt"><em class="app_name">CJ몰</em> 판매자 사이트 로그인 아이디와 비밀번호를 입력해 주세요.</div>
          <p class="nomal_noti nb_mgset">
            <i class="character">-</i> 
            <u><em class="app_name">CJ몰</em> 판매자 사이트 가기</u>
          </p>
        </div>
        <!-- 안내 -->
      </div>
      
    </div>


    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>삭제</span>
      <span class="bgc_green">확인</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
