<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!--뒤로가기-->
    <div class="header">
      <div class="process_bar_box">
        <p class="process_bar" style="width:50%;"></p> <!--진행 상태 width %값으로 최소 0 ~ 최대 100%-->
      </div>
      <a class="btn_back"><i class="ico_back"></i><em class="new_blind">뒤로가기</em></a>
    </div>
    <!--//뒤로가기-->

    <div class="cont_bg cont_hd"> <!-- 클래스 cont_pd_hd header 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">회원가입</div> 
      <!-- //상단 타이틀 -->
 
      <div class="wrap setting">

        <div class="join_box">
          <div class="title_sub">휴대폰 번호를 인증해 주세요.</div>
          <div class="join_block type2">
            <!-- 휴대폰 번호 -->
            <input type="number" name="mobile" class="join_input type4" placeholder="휴대폰번호입력" value="01012345678">
            <button class="btn_auth">인증번호 요청</button>
              <!-- //휴대폰 번호 -->
          </div>
  
          <div class="join_block">
            <!-- 인증번호 입력 -->
            <input type="number" name="auth" class="join_input type5" placeholder="인증번호 입력(숫자6자리)" maxlength="6" value="123456">
            <!-- //인증번호 입력 -->

            <!-- 타이머 -->
            <p class="auth_timer">
              <i class="ico_timer"></i>
              <span><em class="min">03</em> : <em class="sec">00</em></span>
            </p>
              <!-- //타이머 -->
          </div>

          <span class="check_result_txt fail">인증번호가 일치하지않습니다.</span> <!--인증번호 불일치 활성 클래스 fail-->
        </div>
      </div> 
      
    </div>
  </div>
</body>
</html>
