<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!--뒤로가기-->
    <div class="header">
      <div class="process_bar_box">
        <p class="process_bar" style="width:50%;"></p> <!--진행 상태 width %값으로 최소 0 ~ 최대 100%-->
      </div>
      <a class="btn_back"><i class="ico_back"></i><em class="new_blind">뒤로가기</em></a>
    </div>
    <!--//뒤로가기-->

    <div class="cont_bg cont_pd_hd"> <!-- 클래스 cont_pd_hd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">회원가입</div> <!--2020-02-03 문구수정-->
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">

        <div class="join_box">
          <div class="title_sub">i-ONE 소상공인을 이용하기 위해서는 약관 동의가 필요합니다.</div>    

          <!-- 약관동의 -->
          <div class="terms_box">
            <!-- 전체 동의 -->
            <div class="terms_li type2">
              <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
              <span>약관 전체 동의</span>
              <a class="btn_term_open"><i class="ico_arr"></i><em class="new_blind">약관열기</em></a>
            </div>
            <!-- //전체 동의 -->

            <!-- 약관 -->
            <ul>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>세모 이용약관</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>개인정보 수집 및 취급 방침 동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
               <!--2020-08-13 개인(신용)정보 제3자 제공 동의 삭제-->
              <!-- <li class="terms_li">
                <input type="checkbox" class="check_terms"> 
                <span>개인(신용)정보 제3자 제공 동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li> -->
              <!--2020-08-13 개인(신용)정보 제3자 제공 동의 삭제-->
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>거래정보 조회 위임 동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>마케팅 활용 동의</span> 
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
            </ul>
            <!-- //약관 -->
          </div>
          <!-- //약관동의 --> 
        </div>

      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>약관에 동의해 주세요.</span>
    </div>
    <!-- 토스트 팝업 -->

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>다음</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
