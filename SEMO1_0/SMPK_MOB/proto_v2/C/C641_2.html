<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../css_v2/semo_style.css">

  <script src="/js_v2/jquery-3.5.1.min.js"></script>
    <title>Document</title>

    <script>
        $(document).ready(function () {
            $(".section_nation").click(function () {
                $("#slide_popup").fadeIn(500);
                $("#slide_popup > .popup.bottom").css("bottom", "0");

            });
            // 팝업 배경터치하면 사라짐
            $(document).click(function (e) {
                if ($(".popup_bg").is(e.target)) {
                    $(".popup_bg").fadeOut(200);
                    $(".popup.bottom").show().animate({
                        bottom: "-100%"
                    }, 200);
                }
            });
            $(".section_content").click(function () {
                $(this).addClass("active");
                $(this).siblings().removeClass("active");
            });

            // if($(".section_content input").attr("readyonly",true)){
            //     $(this).find("label").css("bottom","70%");
            // }

        });
    </script>
</head>
