<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
    <title>SEMO</title>
    <style>
        .application_table * {padding-left: 17px;}
    </style>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg ">
            <!-- 상단 타이틀 -->
            <!-- <div class="title">소액간편보험</div> -->
            <!-- //상단 타이틀 -->
            <div class="ione_insurance_wrap">
                <div class="insurance_banner">
                    <div class="insurance_con">
                        <div class="insurance_con_wrap">
                            <i class="ico_cen insurance_change_img_1"></i>
                            <span>
                                <i class="ico_cen insurance_info_text"></i>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="insurance_section">
                    
                </div>
                <div class="change_up_btn set_mgt21">
                    <div class="change_up_btn_top">
                        <span>신청하기</span>
                        <span>진행현황 보기</span>
                    </div>
                </div>

                <div class="change_up_title set_mgt36">○ 지원절차</div>
                <div class="insurance_change_pro">

                    <div>
                        <i class="ico_cen insurance_process_img_1"></i>
                        <p>신청서 작성</p>
                    </div>
                    <i class="ico_arrow_small_n_right"></i>
                    <div>
                        <i class="ico_cen insurance_process_img_2"></i>
                        <p>심사진행</p>
                    </div>
                    <i class="ico_arrow_small_n_right"></i>
                    <div>
                        <i class="ico_cen insurance_process_img_3"></i>
                        <p>약정체결</p>
                    </div>
                </div>
                <div class="change_up_title set_mgt36">○ 주요내용</div>
                <table class="application_table set_mgt15 set_mgb30">
                    <tr>
                        <th>지원대상</th>
                        <td colspan="2" class="text_a_l">기업은행 사업자 대출을 보유중인 개인사업자</td>
                    </tr>
                    <tr>
                        <th>신청요건</th>
                        <td colspan="2" class="text_a_l">
                            1) 총 대출금액 10억원 미만 <br>
                            2) 평균 대출금리 4.0% 이상 <br>
                            3) 신청일 현재 연체가 아님
                        </td>
                    </tr>
                    <tr>
                        <th>지원내용</th>
                        <td colspan="2" class="text_a_l">대출만기연장 및 금리 인하</td>
                    </tr>
                    <tr>
                        <th>지원기간</th>
                        <td colspan="2" class="text_a_l">1~2년(심사결과에 따라 상이)</td>
                    </tr>
                </table>
            </div>
        </div>

    </div>
</body>

</html>
