<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../css_v2/semo_style.css">
  <link rel="stylesheet" href="../../css_v2/kt_style.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
  <title>S_회원가입03</title>
</head>
<body>

  <!-- ## 헤더타이틀 ## -->
  <div class="title b_white">
    <div class="title_left">
      <i class="ico_cen left_arrow"></i>
    </div>
    <span class="title_text">회원가입</span>
  </div>

  <div class="basic_wrapper">
    <div class="wrap_pd20">

      <!-- ## 회원가입 진행순서 ## -->
      <section class="join_process_wrap">
        <span class="join_process c_sig">●</span>
        <span class="join_process c_sig">●</span>
        <span class="join_process bgc_sig">3</span>
      </section>

      <!-- ## 필수 정보 입력 ## -->
      <section class="ness_info">
        <div class="cnt">
          <article class="tit">
            <h1 class="c_b2">상세 정보를 입력해 주세요</h1>
          </article>

          <!-- 1. 상호명 -->
          <article class="info_box_wrap busi">
            <label for="ness01" class="info_box">
              <div class="left">
                <input type="text" id="ness01" required="required">
                <p>상호명<i>*</i></p>
              </div>
              <div class="right">
                <button type="button" class="ico_cen close_bg_gray"></button>
              </div>
            </label>
          </article>

          <!-- 2. 사업장주소 -->
          <article class="info_box_wrap adress">
            <label for="ness02" class="info_box">
              <div class="left">
                <textarea id="ness02" required="required" readonly="readonly" rows="2">서울특별시 영등포구 영신로 220 (KnK디지털타워)</textarea>
                <p>사업장주소<i>*</i></p>
              </div>
            </label>
          </article>

          <!-- 3. 상세주소 // 220812 삭제 -->

          <!-- 4. 업태 -->
          <article class="info_box_wrap sector">
            <label for="ness04" class="info_box">
              <div class="left">
                <textarea id="ness04" required="required" readonly="readonly" rows="2">기타/부동산/임대/인테리어/문화/체육/디자인/인쇄/여행/숙박/기업/기관</textarea>
                <p>업태<i>*</i></p>
              </div>
            </label>
          </article>

          <!-- 5. 업종 -->
          <article class="info_box_wrap sector">
            <label for="ness05" class="info_box">
              <div class="left">
                <input type="text" id="ness05" value="A05 패스트푸드" required="required" readonly="readonly">
                <p>업종<i>*</i></p>
              </div>
            </label>
          </article>

          <!-- 6. 직원번호 -->
          <article class="info_box_wrap staff-num">
            <label for="ness07" class="info_box">
              <div class="left">
                <input type="text" id="ness07" required="required">
                <p>직원번호</p>
              </div>
              <div class="right">
                <button type="button" class="ico_cen close_bg_gray"></button>
              </div>
            </label>
          </article>

          <!-- 7. 추천코드 -->
          <!-- desc / error 클래스 분기처리 -->
          <article class="info_box_wrap code desc">
            <label for="ness06" class="info_box">
              <div class="left">
                <input type="text" id="ness06" required="required">
                <p>추천코드</p>
              </div>
              <div class="right">
                <button type="button" class="ico_cen close_bg_gray"></button>
                <button type="button" class="mini typeB active">적용하기</button>
              </div>
            </label>
            <em>유효하지 않은 추천코드입니다.</em>
            <div class="confirm">
              <b>노란우산공제프로모션 (6개월)</b>
              <!-- free_benefit 클래스 kt 회원가입에서만 나타난대요~! -->
              <p class="free_benefit">* 프리미엄 서비스 무료 체험 혜택이 적용됩니다.</p>
            </div>
          </article>
        </div>
      </section>

      <!-- ## 버튼 ## -->
      <div class="bot_fix">
        <!-- bgc_sig 클래스로 제어 -->
        <button type="button" class="type_A">
          <span>확인</span>
        </button>
      </div>

      <!-- 업태 선택 팝업 -->
      <div class="popup_bg" style="display: none;">
        <div class="popup bottom" style="bottom:0">
          <div class="popup_title">
            <b>업태 선택</b>
            <i class="ico_cen del"></i>
          </div>
          <div class="popup_bottom_con set_mgt17">
            <span>
              <b>음식점/주점/카페/디저트</b>
            </span>
            <span>
              <b>
                식자재/유통/편의점/마트/의류/잡화/전통시장/건축/철물/가구
              </b>
            </span>
            <span>
              <b>보건/복지/생활/교육/가전/통신</b>
            </span>
            <span>
              <b>
                기타/부동산/임대/인테리어/문화/체육/디자인/인쇄/여행/숙박/기업/기관</b>
            </span>
          </div>
        </div>
      </div>

      <!-- 업종 선택 팝업 -->
      <div class="popup_bg" style="display: none;">
        <div class="popup bottom" style="bottom:0">
          <div class="popup_title">
            <b>업태 선택</b>
            <i class="ico_cen del"></i>
          </div>
          <div class="popup_bottom_con set_mgt17">
            <span>
              <b>A01 한식</b>
            </span>
            <span>
              <b>A02 치킨</b>
            </span>
            <span>
              <b>A03 기타 외식</b>
            </span>
            <span>
              <b>A04 제과제빵</b>
            </span>
            <span>
              <b>A05 패스트푸드</b>
            </span>
            <span>
              <b>A06 분식</b>
            </span>
          </div>
        </div>
      </div>

    </div>
  </div>





  <script>

    $('.ness_info .info_box_wrap').click(function(){
      $(this).addClass('active').siblings('.busi, .detail, .code, .staff-num').removeClass('active');
    })


  </script>
  
</body>
</html>
