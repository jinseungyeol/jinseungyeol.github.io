<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <!-- <link rel="stylesheet" href="../../css/semo_cont_kt.css"> -->
    <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
    <title>SEMO</title>

</head>

<body>
    <div class="new_content">
        <div class="cont_bg">

            <div class="wrap phy" style="display: flex;
            align-items: center; justify-content: center;">
                <div class="wrap_container" style="margin-bottom: 50px;">
                    <div class="send_display_wrap">
                        <div class="checkmark-circle complete">
                            <div class="background"></div>
                            <div class="checkmark draw"></div>
                        </div>
                        <span class="phy_success_title">
                            <p>세모주치의 신청이 <br>
                                완료되었습니다.</p>
                        </span>
                        <div class="phy_complete_info">
                            <span>
                                <i class="ico_cen"></i>
                                <p>사장님의 사업장과 멀지 않은 곳에 있는 
                                    세모주치의를 배정해 드릴게요.</p>
                            </span>
                            <span>
                                <i class="ico_cen"></i>
                                <p>세모주치의 배정은 최대 7일이 소요되며, 
                                    완료되면 알림톡으로 알려드릴게요.</p>
                            </span>
                            <span class="orange">
                                <i class="ico_cen"></i>
                                <p>세모주치의가 보내는 ‘정보연결’ 푸시알림을
                                    수락하면 세모주치의 서비스를 이용할 수 
                                    있어요. .</p>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="btm_button">
                <span class="bgc_green">메인으로 가기</span>
                <!--클래스 bgc_green 배경색-->
            </div>

        </div>
    </div>
</body>

</html>
