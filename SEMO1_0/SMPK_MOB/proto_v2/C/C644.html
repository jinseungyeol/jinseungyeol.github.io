<!DOCTYPE html>
<html lang="en">

<head>

<body>
    <div class="title b_gray">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>

        <div class="title_right">

    </div>
    <div class="basic_wrapper b_gray">
        <div class="padding_wrapper25 pb_btm_button">
            <div class="section_input_wrap set_mgt18">
                <div class="section_input_title">
                    <i class="ico_cen section_num5 on"></i>
                    <p>휴직정보 입력</p>
                </div>
                <div class="section_content_wrap" style="margin-top: 20px; ">
                    <div class="section_content">
                        <input type="text" id="text22" required="required">
                        <label for="text22">근무상태</label>
                        <i class="ico_cen down"></i>
                    </div>
                    <div class="section_calendar_wrap">
                        <div class="section_content not_round">
                            <input type="text" readonly id="text20" required="required" value="">
                            <label for="text20" class="dot">휴직시작</label>
                            <i class="ico_cen down"></i>
                        </div>
                        <div class="section_content not_round">
                            <input type="text" readonly id="text21" required="required" value="">

                            <i class="ico_cen down"></i>
                        </div>
                    </div>
                    <div class="section_content">
                        <input type="text" id="text22" required="required">
                        <label for="text22">급여처리</label>
                        <i class="ico_cen down"></i>
                    </div>
                    <div class="section_content">
                        <input type="text" id="text23" required="required">
                        <label for="text23" class="dot">휴직사유</label>
                        <i class="ico_cen down"></i>
                    </div>
                </div>

            </div>
            <div class="section_absence_info set_mgt13">
                <div>
                    <i class="ico_cen info_gray"></i>
                    <p>휴직 사유를 입력해 주세요</p>
                </div>
                <textarea ></textarea>
            </div>
            <div class="section_absence_info set_mgt13 readonly">
                <div>
                    <i class="ico_cen info_gray"></i>
                    <p>휴직 사유 별 안내 문구</p>
                </div>
                <textarea readonly></textarea>
            </div>
            <span class="accountant_share set_mgt21 ">
                <input type="checkbox" id="accountant">
                <label for="accountant">세무사에게 공유하기</label>
            </span>
        </div>
        
        <div class="btm_button bottom_fix">
            <span>저장하기</span>
        </div>
    </div>
