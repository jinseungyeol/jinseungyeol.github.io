<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg">

      <!-- 상단 타이틀 -->
      <div class="title">알림</div>
      <!-- //상단 타이틀 -->

      <div class="wrap notice"> 
        <div class="common_message">
          <i></i>
          <div>
            <p>세모주치의 <span>“<em>세무법인 한결멘토</em>”</span> 에서 발송한 메시지입니다.</p>
          </div>
        </div> 
        <div class="notice_wrap">
          <p class="notice_detail_tit">
            <i class="ico_ndt info"></i> <!--부가세 아이콘 클래스 info-->
            <span class="ndt_class">정보</span>
            <span class="ndt_date">20.06.05 09:15</span>
          </p> 
          <div class="notice_detail_wrap">
            <p class="ndw_tit">
              i-ONE 소상공인이 알려드리는
              부가세 대비 절세정보입니다.
            </p>
            <div class="ndw_list">  
              <div class="ndw_list_noti_tit">
                2020년 1월 25일은 부가세 확정 신고 납부일 입니다. 
              </div><br>
              <div class="ndw_list_noti_txt"> 
                부가세 납부 방법으로는 <br>
                1) 고지서를 받았을 경우<br>
                2) 국세청 홈택스를 이용할 경우<br>
                3) ATM기 납부<br>
                4) ARS 납부 <br>
                5) 신용카드 납부<br>
                5가지 방법으로 나누어 집니다.
              </div>
            </div> 
            <button class="btn_info_detail">자세히 보기</button>
        </div>
      </div>
       
    </div>

  </div> 
  </div>
</body>
</html>
