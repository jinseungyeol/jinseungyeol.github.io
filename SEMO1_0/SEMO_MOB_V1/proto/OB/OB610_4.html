<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg cont_pd">
            <div class="wrap account">
                <div class="change_up_error set_mgt30">
                    <div class="send_display_wrap">
                        <div class="checkmark-circle fail">
                            <div class="background"></div>
                            <div class="ex_mark "></div>
                            <div class="dot"></div>
                        </div>
                        <span class="c_ff3d3d">신청불가</span>
                    </div>
                </div>
                <span class="change_up_error_text set_mgt13"> 자영업자 체인지업 신청이 불가합니다.</span>
                <div class="loan_noti_box set_mgt38">
                    <span class="title_sub">안내사항</span>
                    <p class="loan_notice_text">
                        <i>·</i>
                        <span>고객님은 i-ONE 소상공인앱을 통한 자영업자 체인지업 대상이 아닙니다.
                        </span>
                    </p> 
                    <p class="loan_notice_text">
                        <i>·</i>
                        <span>고객님께서 거래하시는 대출 영업점에 방문하여 상담하시기 바랍니다.
                        </span>
                    </p> 
                    <p class="loan_notice_text">
                        <i>·</i>
                        <span>자세한 사항은 IBK고객센터(1588-2588)로 문의하시기 바랍니다.
                        </span>
                    </p> 
                </div>
                <div class="title_sub set_mgt20">불가사유</div>
                <table class="application_table ">
                    <tr>
                        <th>연체여부</th>
                        <td>N</td>
                    </tr>
                    <tr>
                        <th>총대출금액</th>
                        <td class="c_ff3d3d">716백만원</td>
                    </tr>
                    <tr>
                        <th>대출평균금리</th>
                        <td>5.0%</td>
                    </tr>
                </table>
                <div style="height: 20px;"></div>
            </div>
        </div>
        <!-- 하단 fix 버튼 -->
        <div class="btm_button ">
            <span class="bgc_green">확인</span>
            <!--클래스 bgc_green 배경색-->
        </div>
        <!-- 하단 fix 버튼 -->
    </div>
</body>

</html>
