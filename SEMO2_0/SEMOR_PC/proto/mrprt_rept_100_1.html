	<script>
		$(function() {
			$(".item_set .btn_style1_gray_bd").click(function() {
				var device = $(this).data('device');

				$(this).addClass('active').siblings().removeClass('active');
				$('.mockup').attr('data-device', device);
			});

			$(".item_rept_st .btn_style1_gray_bd").click(function() {
				if($(this).hasClass('disabled')) {
					return;
				}
				$(this).addClass('active').siblings().removeClass('active');
			});

			setupTooltip(".btn_style1_gray_bd.disabled")
	});

	function setupTooltip(buttonSelector) {
			$(buttonSelector).mouseenter(function() {
				var buttonOffset = $(this).offset();
				var posL = buttonOffset.left + $(this).width();
				var posT = buttonOffset.top;

				// 툴팁 위치 업데이트
				$(".tooltip .tit").text('생성완료된 보고서만 미리보기 가능');

				// 툴팁의 위치를 마우스 위치로 설정
				$(".tooltip").css({
					top: posT + "px",
					left: posL + "px",
					display: "block",
					position: 'fixed',
					zIndex: 999
				});
			});

			$(buttonSelector).mouseleave(function() {
				// 마우스가 벗어나면 툴팁 숨기기
				$(".tooltip").css("display", "none");
			});
	}
	</script>
