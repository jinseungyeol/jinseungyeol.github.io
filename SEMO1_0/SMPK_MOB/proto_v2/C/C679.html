<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <!-- <link rel="stylesheet" href="../../css_v2/nh_style.css"> -->
    <title>Document</title>
</head>

<body>
    <div class="title b_gray">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">급여 작성하기</span>
        <div class="title_right">
            <i class="ico_cen info"></i>
        </div>
    </div>
    <div class="basic_wrapper b_gray pay">
        <div class="padding_wrapper20 set_pdb150 set_mgt10 nh_pdb175">
        <!-- nh에서만 버튼이 달라 높이값 변경으로 인해 nh_pdb175 클래스 적용 -->
            <div class="pay_content_wrap">
                <div class="pay_write_store_payroll">
                    <span>세모식당</span>
                    <b class="set_mgt4">2021년 5월 급여대장</b>
                </div>
                <!-- <span class="pay_write_payroll_success set_mgt18">
                    <i class="ico_cen"></i>
                    <p>급여대장이 등록되었습니다.</p>
                </span> -->
                <span class="popup_tax_send_alert set_mgt10">
                    <i class="ico_cen y_bell set_mgr8"></i>
                    세무사가 급여대장 등록시 알림으로 알려드려요.</span>
                <div></div>

                <div class="pay_write_result set_mgt13">
                    <div class="pay_write_result_cell">
                        <span>
                            <em>일반 1</em>
                            <em>일용 1</em>
                        </span>
                        <span>
                            <em>총 2명</em>
                        </span>
                    </div>
                    <div class="pay_write_sum_total double">
                        <span>
                            <p>세전 합계</p>
                            <b>2,297,500원</b>
                        </span>
                        <span>
                            <p>세후 합계</p>
                            <b>2,093,455원</b>
                        </span>
                    </div>
                    <div class="pay_write_employee payroll">
                        <span class="omission">
                            <div>
                                <p>일반</p>
                                <em class="elipsis">김세모네모모모</em>
                                <p class="pay_write_preview ">급여명세서 미리보기</p>
                            </div>
                            <div>
                                <span class="pay_write_payroll_form f_d_gray">
                                    <em>세전 급여</em>
                                    <!-- <em>2,000,000원</em> -->
                                    <div class="pay_input_btn">입력해 주세요</div>
                                </span>
                                <span class="pay_write_payroll_form">
                                    <em>세후 급여</em>
                                    <em>2,000,000원</em>
                                </span>
                                <i class="ico_cen right"></i>
                            </div>
                        </span>
                        <span>
                            <div>
                                <p>일반</p>
                                <em>김세모</em>
                                <p class="pay_write_preview">급여명세서 미리보기</p>
                            </div>
                            <div>
                                <span class="pay_write_payroll_form f_d_gray">
                                    <em>세전 급여</em>
                                    <em>2,000,000원</em>
                                </span>
                                <span class="pay_write_payroll_form">
                                    <em>세후 급여</em>
                                    <em>2,000,000원</em>
                                </span>
                                <i class="ico_cen right"></i>
                            </div>
                        </span>
                    </div>
                    <div class="active_button set_mgt14">
                        <i class="ico_cen plus_gray"></i>
                        <span>직원추가</span>
                    </div>
                </div>
                <div class="pay_write_req_con set_mgt31">
                    <span class="pay_write_req_title">세무사에게 급여 작업 요청 내용</span>
                    <textarea>세무사님 안녕하세요
이달 급여 내역 전송 드립니다.
수고하세요!</textarea>
                </div>
            </div>
        </div>

        <!-- bottom fix 버튼 -->
        <div class="btn_bottom_fix">
            <div class="btn_sample">
                <i class="ico_cont info_02"></i>
                <u>급여명세서 샘플 보기</u>
            </div>

            <!-- nh.css 덮어씌울때만 보임, nh_show로 제어 -->
            <div class="btm_button half_btn nh_show">

                <span class="left">급여명세서 발송</span>
                <!-- c_sig 클래스로 제휴사별 컬러 제어, active랑 같은 역할이라 보심돼요 -->

                <span class="half_right">급여 이체</span>
            </div>

        </div>
        
    </div>
</body>

</html>
