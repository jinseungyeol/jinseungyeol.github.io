<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">

    <div class="cont_bg">
      <!-- 상단 타이틀 -->
      <div class="title">계좌 증빙</div>
      <!-- //상단 타이틀 -->

      <div class="wrap document">
        <div>
          <div class="condition_head_wrap">
            <div class="tab_box">
              <span>전체</span>
              <span>입금</span>
              <span class="on">출금</span>
              <!--활성 클래스 on-->
            </div>
            <div class="condition_date_wrap">
              <!--날짜설정 박스 보이기 활성클래스 on-->
              <div class="condition_date_border">
                <div class="condition_date_box">
                  <span>오늘</span>
                  <span>어제</span>
                  <span>이번달</span>
                  <!-- 2020-11-03 내용수정 -->
                  <span>지난달</span>
                  <!-- 2020-11-03 내용수정 -->
                  <span class="on down">검색</span>
                  <!--활성클래스 on-->
                  <!-- 2020-11-17 ▼ down 클래스 추가 -->
                </div>
              </div>
              <div class="condition_search_detail_box">
                <div class="condition_search_detail">
                  <div class="csd_input_box">
                    <input type="text" placeholder="내용 또는 금액 입력 (최근 30일)">
                    <button class="csd_input_btn">조회</button>
                  </div>
                  <div class="csd_calendar_box set_mgt10">
                    <p>2020-06-09</p>
                    <span>-</span>
                    <p>2020-07-09</p>
                  </div>
                  <div class="csd_select_date_box set_mgt10">
                    <input type="radio" id="date_week" class="search_date" name="search_date" value="7일">
                    <label for="date_week">7일</label>
                    <input type="radio" id="date_month" class="search_date" name="search_date" value="1개월">
                    <label for="date_month">1개월</label>
                    <input type="radio" id="date_qmonth" class="search_date" name="search_date" value="3개월">
                    <label for="date_qmonth">3개월</label>
                    <input type="radio" id="date_hyear" class="search_date" name="search_date" value="6개월">
                    <label for="date_hyear">6개월</label>
                  </div>
                  <div class="csd_select_acc_box set_mgt10">
                    <div class="csd_selected_acc">
                      <p>
                        <i class="logo_bank"></i>
                        <span>전체계좌</span>
                      </p>
                      <a class="csd_arr"><i class="ico_cen"></i><em class="new_blind">선택</em></a>
                    </div>
                    <div class="csd_select_acc">
                      <ul>
                        <li>
                          <i class="logo_bank"></i>
                          <p>
                            <span>전체계좌</span>
                            <span>47900932341222</span>
                          </p>
                        </li>
                        <li>
                          <i class="logo_bank ico_lb003"></i>
                          <p>
                            <span>IBK기업은행 (두드림 성공통장)</span>
                            <span>47900932341222</span>
                          </p>
                        </li>
                        <li>
                          <i class="logo_bank ico_lb003"></i>
                          <p>
                            <span>IBK기업은행 (두드림 성공통장)</span>
                            <span>47900932341222</span>
                          </p>
                        </li>
                        <li>
                          <i class="logo_bank ico_lb003"></i>
                          <p>
                            <span>IBK기업은행 (두드림 성공통장)</span>
                            <span>47900932341222</span>
                          </p>
                        </li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div>
            <!-- 2020-11-09 내용수정 -->
            <div class="pay_detail_list_wrap set_mgt16 set_mgb17 set_pdb16 noborder_line">
              <div class="pay_detail_list_cell pay_detail_list_cell1">
                <span class="pay_cell1">20.03. 20(토) ~ 20.06.19(금)</span>
                <p class="pay_balance">총 0건의 검색결과</p>
              </div>
              <div class="pay_detail_list_cell pay_detail_list_cell2">
                <div class="pay_detail_account">
                  <div class="ico_cen pay_detail_list_cell2_img"></div>
                  <span class="set_font13">계좌99개</span>
                </div>
              </div>
            </div>
            <!--// 2020-11-09 내용수정 -->
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
