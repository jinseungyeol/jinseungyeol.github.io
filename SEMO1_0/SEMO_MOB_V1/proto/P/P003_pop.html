<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!-- 팝업 베경 -->
    <div class="popup_bg">
      <!-- 팝업 내용 -->
      <div class="popup">
        <div class="popup_txt">
          <span class="popup_tit">
            많이 벌고 적게 내세요.💰<br>
            세모장부 업그레이드가 완료되었습니다. 
          </span>
          <span class="popup_sub pt_pd5 ta_left">
            안녕하세요.<br> 
            좋은세무서비스 세모장부입니다.<br>
            공지 드린 대로 금일부터 업그레이드 된 버전의<br> 
            새로운 세모장부를 만나보실 수 있습니다.<br> 
            <br>
            ◇ <strong>기존버전 메뉴명</strong> :<br> 
            내계좌, 증빙자료, 세모톡, 알림<br> 
            ◇ <strong>업그레이드버전 메뉴명</strong>  :<br>
             My, 증빙, 알림, 세모톡, 더보기<br> 
            ◇ <strong>업그레이드 세부 내용</strong> :<br> 
            전체적인 UI변경, 고객 의견반영 기능개선,<br> 
            버그수정 등<br> 
            <br>
            세모장부는 매월 새로운 기능 업데이트를<br> 
            열심히 준비 중입니다.<br> 
            앞으로도 많은 기대와 관심 부탁 드립니다.🤩
          </span>
        </div>
        <div class="popup_btn on">
          <span>일주일 보지않기</span> <!--클래스 bgc_green 배경색-->
          <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
        </div>
      </div>
      <!-- //팝업 내용 -->
    </div>
    <!-- //팝업 베경 -->
  </div>
</body>
</html>
