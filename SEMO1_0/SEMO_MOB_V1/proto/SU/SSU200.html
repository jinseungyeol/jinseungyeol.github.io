<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/test.css">
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <title>S_회원가입02</title>
</head>
<body>

    <div class="new_content pretendard join">
        <div class="cont_bg padding20">

          <!-- 회원가입 진행순서 ======================================================= -->
          <div class="join_process">

            <span class="one c_sig">●</span>

            <span class="two now">●</span>
            <!-- now 클래스로 활성화 -->
            <em class="active">2</em>

            <span class="three set_mgr0">●</span>
          </div>

          <!-- 필수 정보 입력 ======================================================= -->
          <div class="ness_info">
            <div class="cnt">
              <div class="tit">
                <h1 class="c_b2">필수 정보를 입력해 주세요</h1>
              </div>

              <!-- 사업자번호 -->
              <div class="info_box_wrap num loading">
                <label for="info01" class="info_box">
                  <div class="left">
                    <input type="text"  id="info01" maxlength="10" required="required" oninput="autoHyphen(this)" readonly="readonly">
                    <span class="ico_cen check_03"></span>
                    <p>사업자번호</p>
                  </div>
                  <div class="right">
                    <span class="ico_cen close_03"></span>
                  </div>
                </label>

                <em>사업자번호를 입력해 주세요</em>
                <!-- info_box_wrap 클래스에 error 클래스 추가해주시면 보입니다.
                유효하지 않은 사업자 문구는 텍스트 변경만 부탁드려요 -->

                <div class="confirm">
                  <span class="ico_cen loading_01"></span>
                  <b class="c_b1">확인중 입니다.</b>
                </div>
                <!-- info_box_wrap 클래스에 loading 클래스 추가해주시면 보입니다. -->

              </div>

              <!-- 대표자명 -->
              <div class="info_box_wrap ceo">
                <label for="info02" class="info_box">
                  <div class="left">
                    <input type="text"  id="info02" required="required">
                    <span class="ico_cen check_03"></span>
                    <p>대표자명</p>
                  </div>
                  <div class="right">
                    <span class="ico_cen close_03"></span>
                  </div>
                </label>

                <em>대표자명을 입력해 주세요</em>
                <!-- info_box_wrap 클래스에 error 클래스 추가해주시면 보입니다. -->

              </div>

              <!-- 주민등록번호 -->
              <div class="info_box_wrap social">
                <label for="info03" class="info_box">
                  <div class="left">
                    <input type="text" id="info03" required="required" maxlength="6">
                    <b>-</b>
                    <input type="text" required="required" class="back_number" maxlength="1">
                    <div class="dot">
                      <span>●</span>
                      <span>●</span>
                      <span>●</span>
                      <span>●</span>
                      <span>●</span>
                      <span style="margin-right: 0;">●</span>
                    </div>
                    <span class="ico_cen check_03"></span>
                    <p>주민등록번호</p>
                  </div>
                  <div class="right">
                    <span class="ico_cen close_03"></span>
                  </div>
                </label>

                <em>주민등록번호를 입력해 주세요</em>
                <!-- info_box_wrap 클래스에 error 클래스 추가해주시면 보입니다. -->

              </div>

              <!-- 휴대폰번호 -->
              <div class="info_box_wrap phone error">
                <!-- input에 포커스 안가게 하려고 id 값과 다르게 for 값을 줬어요 -->
                <label for="info0444" class="info_box">
                  <div class="left">
                    <div class="service commu">
                      <b class="c_b2">통신사</b>
                      <span class="ico_cen down_01"></span>
                    </div>
                    <input type="text" id="info04" required="required" maxlength="11" oninput="autoHyphen2(this)">
                    <p>휴대폰번호</p>
                  </div>

                  <div class="right">
                    <span>인증요청</span>
                  </div>
                  <!-- active 클래스로 활성화 -->

                </label>

                <label for="info05" class="info_box">
                  <div class="left">
                    <div class="service">
                      <b>인증번호</b>
                    </div>
                    <input type="text" id="info05" required="required" maxlength="6">
                  </div>

                  <div class="right">
                    <span class="c_b2">02:22</span>
                  </div>

                </label>

                <em>휴대폰번호를 입력해 주세요</em>
                <!-- info_box_wrap 클래스에 error 클래스 추가해주시면 보입니다. -->

              </div>

            </div>
          </div>

        </div>



        
        <!-- 버튼 -->
        <div class="bot_fix">
          <button type="button" class="tybe_A">
            <span>확인</span>
          </button>
        </div>





        <!-- 토스트 팝업 -->
        <div class="toast text_a_l" style="display: none;">
          <span>
            인증요청 제한 횟수를 초과했습니다.<br>
            <!-- 텍스트 한줄일땐 br태그 제거해주세요 -->
            종료 후 다시 시도해주세요.
          </span>
        </div>



        <!-- 통신사 팝업-->
        <div class="popup_toast_bg v2">
          <!-- 토스트 팝업 내용 -->
          <div class="popup_toast">
            <div class="btn_close">
              <div class="inner"><span class="ico_cen close_02"></span></div>
            </div>
            <div class="popup_toast_tit">통신사 선택</div>
            <div class="popup_toast_list_box dis_gray">
              <p class="popup_toast_list">KT</p>
              <p class="popup_toast_list">SKT</p>
              <p class="popup_toast_list">LG U+</p>
              <p class="popup_toast_list">알뜰폰</p>
            </div>
          </div>
          <!-- 토스트 팝업 내용 -->
        </div>
        <!-- //팝업 배경 -->

    </div>

    <script>

      $('.ness_info .info_box_wrap').click(function(){
        $(this).addClass('active').siblings('.ceo, .phone, social').removeClass('active');
      })

      $('.info_box_wrap.phone .info_box .right').click(function(){
        $(this).addClass('active');
        $('label[for=info05]').css("display", "flex");
      })

      $('.info_box_wrap.phone .info_box .left .service.commu').click(function(){
        $('.popup_toast_bg.v2').addClass('active');
        $('body').css("overflow", "hidden");
      })

      $('.popup_toast .btn_close .inner, .popup_toast_bg.v2 .popup_toast_list').click(function(){
        $('.popup_toast_bg.v2').removeClass('active');
      })

      




      // input[id="info01"] 사업자번호 하이픈
      const autoHyphen = (target) => {
        target.value = target.value
        .replace(/[^0-9]/, '')
        .replace(/^(\d{3})(\d{2})(\d{5})$/, `$1-$2-$3`);
      }

      // input[id="info04"] 휴대폰번호 하이픈
      const autoHyphen2 = (target) => {
        target.value = target.value
        .replace(/[^0-9]/, '')
        .replace(/^(\d{3})(\d{4})(\d{4})$/, `$1-$2-$3`);
      }
    </script>

</body>

</html>
