<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css_v2/common.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- JS -->
    <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <script src="../../js_v2/wow.min.js"></script>
    <script src="../../js_v2/chart-3.5.1.min.js"></script>
    <title>카드매출 연결하기</title>
</head>
<body>
    <div class="title b_white">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">카드매출 연결하기</span>
    </div>
    <div class="basic_wrapper">
        <div class="card_connect_wrap">
            <!-- ############ 아이디입력 ############  -->
            <section class="ys_connect" style="display: none;">
                <article class="text">
                    <h1 class="tit">여신금융협회 연결하고<br>
                        카드매출을 쉽게 관리하세요
                    </h1>
                    <h2 class="sub_tit"><span>아이디</span>로 빠르게 연결!</h2>
                </article>
                <article class="name_input_wrap">
                    <!-- input 한글자 입력시 시 active 클래스 추가 닫힘 버튼 및 보더색 변경 -->
                    <div class="name_input">
                        <div class="entry">
                            <p>아이디</p>
                            <input type="text" placeholder="영문+숫자 6자리 이상">
                        </div>
                        <div class="btn">
                            <i class="del_gray"></i>
                        </div>
                    </div>
                </article>
                <article class="solve">
                    <div class="entry_btn_wrap">
                        <button type="button" class="entry_btn">
                            <span class="c_purple">신규가입이 필요해요</span>
                        </button>
                    </div>
                    <div class="entry_btn_wrap">
                        <button type="button" class="entry_btn">
                            <span>아이디를 모르겠어요</span>
                        </button>
                    </div>
                    <div class="entry_btn_wrap">
                        <button type="button" class="entry_btn">
                            <span>1:1 문의하기</span>
                        </button>
                    </div>
                </article>
                <!-- add Class active 활성화  -->
                <div class="bot_fix">
                    <button type="button" class="type_A"><span>다음</span></button>
                </div>
            </section>
            <!-- ############ 비밀번호 입력 ############  -->
            <section class="ys_connect">
                <article class="text">
                    <h1 class="tit">
                        여신금융협회 비밀번호를<br>
                        입력해 주세요
                    </h1>
                    <h2 class="sub_tit"><span>영문+숫자+특수문자</span>조합</h2>
                </article>
                <!-- input click 시 active 클래스 추가 닫힘 버튼 및 보더색 변경 -->
                <article class="name_input_wrap">
                    <div class="name_input">
                        <div class="entry">
                            <p>비밀번호</p>
                            <input type="text" placeholder="8자 이상 20자 이내">
                        </div>
                        <div class="btn">
                            <i class="del_gray"></i>
                        </div>
                    </div>
                </article>
                <article class="solve">
                    <div class="entry_btn_wrap">
                        <button type="button" class="entry_btn">
                            <span>비밀번호를 모르겠어요</span>
                        </button>
                    </div>
                </article>
                <!-- add Class active 활성화  -->
                <div class="bot_fix">
                    <button class="type_A" type="button"><span>다음</span></button>
                </div>
            </section>
        </div>
    </div>
    <script>
        // 아이디 입력란 누를시 X 버튼 및 보더 색 변경
        $(document).ready(function () {
            $(".entry input").click(function () {
                $('.name_input').addClass('active');
            })
        });
        // 신규가입이 필요해요 버튼 누를시 약간동의 팝업생성
        $(document).ready(function () {
            $(".entry_btn").click(function () {
                $("#slide_popup").fadeIn(500);
                $("#slide_popup > .popup.bottom").css("bottom", "0");
                $("html, body").css("overflow", "hidden");
                $("html, body").css("height", "100%");
            });
            // 팝업 배경터치하면 사라짐
            $(document).click(function (e) {
                if ($(".popup_bg, .del").is(e.target)) {
                    $(".popup_bg").hide();
                    $(".popup.bottom").show().animate({
                        bottom: "-100%"
                    }, 100);
                }
            });
        });
        // 전체 화면 팝업
        $(document).ready(function () {
            $(".detail").click(function () {
                $(".terms_01").css("bottom", "0");
                $(".popup_bg").hide();
                $(".popup.bottom").css("bottom", "-100%");
                $(".terms_01").css("display", "block");

            });
            $("button.close").click(function () {
                $(".terms_01").css("bottom", "-100%");
                $(".terms_01").css("display", "none");
            });
            $(".clause .type_B.active").click(function () {
                $(".terms_01").css("bottom", "-100%");
                $(".terms_01").css("display", "none");
            });
        });
        // 체크박스 토글
        $('.check_wrap .all').click(function () {
            $(this).toggleClass('active');
            $('.list .agree').toggleClass('active');
        })
        $('.list .agree').click(function () {
            $(this).toggleClass('active');
        })
    </script>
</body>
</html>
