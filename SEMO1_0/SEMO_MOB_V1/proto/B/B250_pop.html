<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function () {
            $(".popup_bottom_con > span").click(function () {
                $(this).addClass("active");
                $(this).siblings().removeClass("active");
                if($(this).hasClass("disabled")){
                    $(this).removeClass("active")
                }
            });
        });
    </script>
    <title>Document</title>
</head>
<body>
    <div class="new_content">
        <div class="cont_bg">
         
            <div class="popup_bg agree" >
                <div class="yellow_toast">
                    <i class="ico_cen black_info"></i>
                    <span>현재 접속하신 사업장입니다.</span>
                </div>
                <div class="popup bottom" style="bottom: 0;">
                    <div class="popup_title">
                        <b>다중사업장 전환하기</b>
                        <em>나의사업장
                            <span>관리</span>
                        </em>
                        <i class="ico_cen del"></i>
                    </div>
                    <div class="popup_bottom_con over">
                        <span>
                            <input type="radio" name="agree" id="agree" >
                            <label for="agree" class="popup_phy_info">
                                <span class="elipsis">가나치킨 광화문점</span>
                                <p>
                                    <em>김길동</em>
                                    123-45-67890</p>
                            </label>
                            <div class="popup_store_label">
                                마스터
                            </div>
                        </span>
                        <span>
                            <input type="radio" name="agree" id="agree2">
                            <label for="agree2" class="popup_phy_info ">
                                <span>가나치킨 광화문점</span>
                                <p>
                                    <em>김길동</em>
                                    123-45-67890</p>
                            </label>

                            <div class="popup_store_label fail">
                                인증실패
                            </div>
                        </span>
                        <span class="disabled">
                            <input type="radio" name="agree" id="agree3">
                            <label for="agree3" class="popup_phy_info gray">
                                <span>하나코퍼레이션</span>
                                <p>
                                    <em>김길동</em>
                                    123-45-67890</p>
                            </label>
                            <div class="popup_store_label uncert ">
                                미인증
                            </div>
                        </span>
                    </div>
       
                    <div class="btm_button single active set_mgt14">
                        <span class="c_green">사업장 전환하기</span>
                    </div>
                    <!-- <div class="select_button set_mgt14 active">
                        <span>사업장 전환하기</span>
                    </div> -->
                </div>
            </div>
            <div class="popup_bg agree" style="display: none;" >
                <div class="popup bottom" style="bottom: 0;">
                    <div class="popup_title">
                        <div class="popup_title_store_name_wrap">
                            <b class="popup_store_name elipsis">
                                가나물산
                            </b>
                            <div class="popup_store_label fail">
                                인증실패
                            </div>
                        </div>
                        <p class="set_mgt7">
                            사업자 번호
                            <b>123-45-67890</b>
                        </p>
                        <i class="ico_cen del"></i>
                    </div>
                    <div class="popup_bottom_con set_mgt5 ">
                        <div class="select_button active">
                            <span>사업장 재인증</span>
                        </div>
                        <div class="select_button set_mgt8 active">
                            <span>사업장 삭제</span>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </div>

</body>

</html>
