<html lang="ko">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../css/semo_cont.css">

<body>
    <!-- 2020-11-02 내용수정 -->

    <div class="new_content">
        <!--2020-11-04-->

        <div class="cont_bg" style="background-color: #fafafa;">

            <!-- 상단 타이틀 -->
            <!-- <div class="title">직원관리</div> -->
            <!-- //상단 타이틀 -->

            <div class="wrap staff">
                <div class="staff_wrapper" >
                    <div class="staff_em_info absence">
                        <div class="staff_em_info_title">
                            <b style="font-size:18px;">퇴사등록</b>
                        </div>
                        <div class="staff_etc_info show">
                            <div class="staff_info_cell">
                                <p>이름</p>
                                <div>
                                    <div class="staff_info_number disable">
                                        <input type="text" placeholder="김세모">
                                    </div>
                                </div>
                            </div>
                            <div class="staff_info_cell">
                                <p class="dot">퇴사사유</p>
                    
                                <div class="salary_select_wrap">
                                    <select class="date_select" required="">
                                        <option value="" hidden="" disabled="" selected="">육아휴직</option>
                                    </select>
                                    <i class="ico_cen"></i><!-- up클래스로 활성화 -->
                                </div>
                                
                            </div>
                            <div class="staff_info_cell">
                                <span class="staff_leave">
                                    <p class="dot">퇴사일자</p>
                                    <div class="csd_calendar_box">
                                        <p>2020-07-09</p>
                                    </div>

                                </span>
                            </div>
                            <div class="staff_info_cell">
                                <p class="dot">비고</p>
                                <div class="salary_write_req">
                                    <textarea placeholder="메모를 입력해 주세요."></textarea>
                                </div>
                            </div>
                            <div class="staff_info_cell">
                                <p>첨부 <em>(사직서 등)</em></p>
                                <div class="staff_em_detail_info">
                                    <div>
                                        <i class="ico_cen staff_del"></i>
                                        <i class="ico_cen"></i>
                                
                                    </div>
        
                                </div>
                            </div>
                            <div class="salary_name_list_con " style="margin-top: 26px;">
                                    <input type="checkbox" checked>
                                    <p>세무사에게 공유하기</p>
                          
                            </div>
                        </div>
                    </div>
                </div>
                <div class="btm_button disable">
                    <span class="bgc_green">저장하기</span>
                </div>
            </div>
        </div>
    </div>
    </div>
    </div>
