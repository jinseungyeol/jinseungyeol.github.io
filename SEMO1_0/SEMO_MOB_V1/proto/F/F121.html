<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd_hd fix_button 포함 패딩--> 

      <!-- 상단 타이틀 -->
      <div class="title">공인(공동)인증서 교체</div>
      <!-- //상단 타이틀 -->  
       
      <div class="wrap setting">
        <div class="title_sub">기존 공인(공동)인증서와 연동된 다른 기관도<br>같이 교체됩니다.</div>

        <!-- 인증서 -->
        <div class="cbi_box">
          <div class="certi_info_box close"> <!--만료 1달 이내 활성화 클래스 close-->
            <i class="ico_certi_m"></i>
            <div class="certi_info">
              <p>
                <span class="certi_cmp_name">웹케시글로벌(webcashglobal)112233445566778899112233</span>
              </p>
              <p>  
                <span class="certi_class">기업</span><i>,</i>
                <span class="certi_use">용도제한용</span><i>/</i>
                <span class="certi_issue">금융결제원</span>
              </p>
              <p>
                <span class="certi_end">만료일</span>
                <span><em class="certi_end_data">2020.10.31</em><i class="certi_end_txt">(만료)</i></span>
              </p> 
            </div>
          </div>
        </div>
        <!-- //인증서 -->
        <p class="noti_star mgb_set mgl_set color">
          <i class="character"></i>
          <span>교체 기관 홈페이지에 꼭 공인(공동)인증서가 먼저 등록되어 있어야 합니다.</span>
        </p>

        <div class="certi_list_wrap">
          <div class="certi_list">
            <span>은행</span>
            <ul>
              <li><i class="logo_bank ico_lb003"></i>IBK기업은행</li>
              <li><i class="logo_bank ico_lb011"></i>NH농협은행</li>
              <li><i class="logo_bank ico_lb004"></i>KB국민은행</li>
              <li><i class="logo_bank ico_lb088"></i>신한은행</li>
            </ul>
          </div>
  
          <div  class="certi_list">
            <span>카드</span>
            <ul>
              <li><i class="logo_card ico_lc001"></i>IBK기업(BC)</li>
              <li><i class="logo_card ico_lc002"></i>KB국민은행</li>
              <li><i class="logo_card ico_lc007"></i>현대카드</li> 
            </ul>
          </div>
  
          <div  class="certi_list">
            <span>홈택스</span>
            <ul>
              <li>국세청 홈택스</li> 
            </ul>
          </div>
        </div>

      </div> 
    </div>
    
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>삭제</span>
      <span class="bgc_green">확인</span>
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
