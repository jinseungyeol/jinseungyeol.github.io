<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">


    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">회원 가입</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">

        <!-- 로그인 비밀번호 입력 -->
        <div class="join_box">
          
          <div class="title_sub">핀번번호를 입력해 주세요.</div>

          <div class="join_block">
            <input type="password" class="join_input" placeholder="핀번호 입력(숫자 6자리)" maxlength="6" value="123456">
          </div>

          <div class="join_noti">
            <i class="character"></i>
            <span>3자 이상 연속된 숫자, 동일한 숫자는 사용할 수 없습니다.</span>
          </div>
        </div>
        <!-- //로그인 비밀번호 입력 -->

        <!-- 영업점 선택 -->
        <div class="join_box2">
          <div class="title_sub">IBK 기업은행 권유영업점을 선택해 주세요. (선택사항)</div>

          <div class="join_block">
            <input type="text" class="join_input" placeholder="영업점을 선택헤주세요." value="당산동">
          </div>
        </div>
        <!-- //영업점 선택 -->

      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">회원가입</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
