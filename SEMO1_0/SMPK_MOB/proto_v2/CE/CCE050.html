<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <!-- <link rel="stylesheet" href="../../css_v2/ione_style.css"> -->
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>인증서 하이패스</title>
</head>
<body>
    <div class="title b_white">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
    </div>
    <div class="basic_wrapper">
        <div class="highpass_wrap">
            <section class="cce050">
                <!-- 수집중 화면 -->
                <article class="content-wrap"  style="display: none;">
                    <div class="sign-toast_info">
                        <div class="icon">
                            <i class="ico_cont"></i>
                        </div>
                        <div class="text">
                            <span class="name elipsis">
                                수집이 완료되면 PUSH가 도착해요
                            </span>
                        </div>        
                    </div>
                    <div class="cover">
                        <i class="ico_cont"></i>
                    </div>
                    <div class="desc">
                        <div class="main-text">
                            <span class="txt01">인증서로 수집중...</span>
                        </div>
                        <div class="sub-text">
                            <span class="txt01">예상 소요시간 :</span>
                            <span class="txt02">1분이내</span>
                        </div>
                    </div>

                </article>
                <article class="result-wrap" >

                    <div class="result-top">
                        <div class="checkmark-circle complete" >
                            <div class="background "></div>
                            <div class="checkmark draw"></div>
                        </div>
                    </div>
                    <div class="desc">
                        <div class="main-text">
                            <span class="txt01">
                                수집완료
                            </span>
                        </div>
                        <div class="sub-text">
                            <span class="txt02">
                                하이패스 조회결과를 확인하세요!
                            </span>
                        </div>
                    </div>
                </article>
                <article class="info-common">
                    <div class="box">
                        <h1>안내사항</h1>
                        <p class="txt01">
                            - 개인용, 사업용 인증서가 다른 경우 각각
                            연결해 주세요.
                        </p>
                        <p class="txt02">
                            - 공동인증서에 연결되어 있지 않은 자산은 수집이 불가해요
                        </p>
                    </div>
                </article>    
            </section>
            <!-- add Class bgc_sig 활성화  -->
            <div class="bot_fix_pd20">
                <button type="button" class="type_B active_blue"><span>하이패스 결과 바로가기</span></button>
            </div>  
           
        </div>
   
    </div>

</body>
</html>
