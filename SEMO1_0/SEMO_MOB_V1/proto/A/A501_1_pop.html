<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_kt.css">
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <title>SEMO</title>

    <script>
        $(document).ready(function () {
            $(".popup_change_sel_cell.free").children().hide();
            $("#freechk").click(function () {
                $('.popup_change_sel_cell.preminum').css({
                    padding: "0",
                    zIndex: "1",
                    left: "60%",
                })
                $(".popup_change_sel_cell.preminum").children().fadeOut();
                $('.popup_change_sel_cell.free').css({
                    padding: "22px 16px",
                    zIndex: "2",
                    left: "50%"
                }).addClass("free_bg");
                $(".popup_change_sel_cell.free").children().fadeIn();
                $(".popup_change_sel_cell.preminum").addClass('active');
                $(".popup_change_sel_cell.free").removeClass('active');
            });
            $("#preminumchk").click(function () {
                $('.popup_change_sel_cell.free').css({
                    padding: "0",
                    zIndex: "1",
                    left: "60%"
                })
                $(".popup_change_sel_cell.free").children().fadeOut();
                $('.popup_change_sel_cell.preminum').css({
                    padding: "22px 16px",
                    zIndex: "2",
                    left: "50%"
                }).addClass("pre_bg");
                $(".popup_change_sel_cell.preminum").children().fadeIn();
                $(".popup_change_sel_cell.preminum").removeClass('active');
                $(".popup_change_sel_cell.free").addClass('active');
            });
        });
    </script>
</head>

<body>
    <div class="new_content pretendard">
        <div class="cont_bg b_gray">
            <div class="popup_bg changeup">
                <div class="yellow_toast">
                    <i class="ico_cen black_info"></i>
                    <span>무료혜택기간이 곧 종료됩니다. <br>
                        <b>2021년 10월 21일</b></span>
                </div>
                <div class="popup">
                    <b class="popup_change_title">
                        프리미엄 서비스 유지안내
                    </b>
                    <div class="popup_change_sel">
                        <label class="popup_change_sel_cell preminum">
                            <span>
                                <b>프리미엄</b>
                                <p>월 4,950원</p>
                            </span>
                            <span>
                                <em>기본서비스</em>
                                <em>아침보고서</em>
                                <em>무료송금 10회</em>
                                <em>프리미엄보고서</em>
                                <em>직원 · 급여관리</em>
                                <em>세무사와 정보연결</em>
                            </span>
                        </label>
                        <label class="popup_change_sel_cell free active">
                            <span>
                                <b>무료</b>
                                <p>월 0원</p>
                            </span>
                            <span>
                                <em>기본서비스</em>
                                <em>아침보고서</em>
                                <em>무료송금 5회</em>
                            </span>
                        </label>
                    </div>
                    <div class="change_radio_btn_wrap">
                        <div class="change_radio_btn">
                            <input type="radio" name="changesel" id="freechk">
                            <label for="freechk">무료</label>
                        </div>
                        <div class="change_radio_btn">
                            <input type="radio" name="changesel" id="preminumchk" checked>
                            <label for="preminumchk">프리미엄</label>
                        </div>

                    </div>
                    <span class="chagne_swich_text">
                        <i class="ico_cen info_bg_gray"></i>
                        <p>설정 > 프리미엄 서비스 가입관리에서 변경가능</p>
                    </span>
                    <div class="btm_button">
                        <span class="bgc_green">확인</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
