<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/INTRO/img/favicon.ico">
    <link rel="stylesheet" href="INTRO/css/intro.css">
    <script src="https://publ.roumit.com/js/firebase_include.js"></script>
    <script src="INTRO/js/jquery-3.5.1.min.js"></script>
    <script src="INTRO/js/intro.js"></script>
    <title>Jinseungyeol's Portfolio</title>
    <style>
        body {height: 100vh; overflow: hidden}
    </style>
</head>

<body>
    <!-- header -->
    <div class="headerFrameWrap">
        <button type="button" class="trigger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <iframe src="INTRO/prducts/index_top.html" class="headerFrame" frameborder="0"></iframe>
    </div>
    <!-- //header -->
    <!-- snb -->
    <iframe src="INTRO/prducts/index_left.html" class="snbFrame" frameborder="0"></iframe>
    <!-- //snb -->
    <!-- content -->
    <iframe src="INTRO/prducts/index_content.html" class="contentFrame" name="introProduct" frameborder="0"></iframe>
    <!-- //content -->

    <script>

        $('.trigger').on('click', function() {
            $(this).parent().toggleClass('active');
        })

        $(window).on('resize', function() {
            if(window.innerWidth > 767) {
                $(".headerFrameWrap").removeClass('active');
            }
        })
    </script>
</body>

</html>
