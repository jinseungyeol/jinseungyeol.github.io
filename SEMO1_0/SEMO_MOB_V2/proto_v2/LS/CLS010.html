<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <!-- <link rel="stylesheet" href="../../css_v2/nh_style.css"> -->
    <!-- <link rel="stylesheet" href="../../css_v2/ione_style.css"> -->
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>SB089_세모장부 리뉴얼_네이티브 개발_CLS010</title>
</head>
<body>
    <div class="title">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">로그인 설정</span>
    </div>

    <div class="report_wrap report_pd20 set-login">
        <div class="noti_set_wrap">
            <div class="noti_set">
                <div class="noti_set_tit">
                    <span>자동로그인</span>
                </div>
                <article class="set_list">
                    <ul>
                        <li>
                            <div class="set_list_cnt">
                                <div class="list_kind">
                                    <p>자동 로그인</p>
                                    <span>인증절차 없이 바로 로그인</span>
                                </div>
                                <div class="onoff_input_wrap">
                                    <div class="onoff_input">
                                        <input type="checkbox" id="slideOne1" name="check" checked>
                                        <label for="slideOne1"></label>
                                        <div class="onoff_input_bg"></div>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </ul>
                </article>
            </div>
        </div>
        <div class="noti_set_wrap">
            <div class="noti_set">
                <div class="noti_set_tit">
                    <span>로그인/송금 인증</span>
                    <div class="content_info_date">
                        <i class="ico_cen info_gray"></i>
                        <span>
                            비밀번호와 생체인증 중 하나만 사용가능합니다.
                        </span>
                    </div>
                </div>
                <article class="set_list">
                    <ul>
                        <li>
                            <div class="set_list_cnt">
                                <div class="list_kind">
                                    <p>비밀번호</p>
                                    <span>여섯 자리 숫자로 인증</span>
                                </div>
                                <div class="onoff_input_wrap">
                                    <div class="onoff_input">
                                        <input type="radio" id="slideOne2" name="check" checked>
                                        <label for="slideOne2"></label>
                                        <div class="onoff_input_bg"></div>
                                    </div>
                                </div>
                            </div>
                            <button class="underline" type="button">
                                <span class="c_sig">비밀번호 변경하기</span>
                            </button>
                        </li>
                        <li>
                            <div class="set_list_cnt">
                                <div class="list_kind">
                                    <p>생체인증</p>
                                    <span>지문/얼굴로 안전하게 인증</span>
                                </div>
                                <div class="onoff_input_wrap">
                                    <div class="onoff_input">
                                        <input type="radio" id="slideOne3" name="check" checked>
                                        <label for="slideOne3"></label>
                                        <div class="onoff_input_bg"></div>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </ul>
                </article>
            </div>
        </div>
    </div>
    <script>

    </script>
</body>

</html>
