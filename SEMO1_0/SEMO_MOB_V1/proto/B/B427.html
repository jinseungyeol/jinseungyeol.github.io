<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->
            
      <!-- 간편송금 -->
      <div class="wrap account">
        <div class="account_box">
          <div class="transfer_result">
            <i class="ico_tr fail"><em class="new_blind">지급실패아이콘</em></i> <!--fail-->
            <span>
              <em class="tr_name">홍길동</em>님께<br>
              지급이 실패하였습니다.
            </span>
          </div>

          <div class="transfer_result_info">
            <p>
              <span class="tri_banck">IBK기업</span>
              <span class="tri_account">123-45-67890</span>
            </p>
            <p>
              <span class="tri_name">홍길동</span>
              <span class="tri_won"><em>2,500,000</em>원</span>
            </p>
          </div>

          <div class="nomal_noti nt_pd">
            <span class="c_orange">입금이 거부된 계좌입니다. 다시 한번 실행하시기 바랍니다. [000000]</span>
          </div>
        </div>
      </div>
      <!-- //간편송금 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
