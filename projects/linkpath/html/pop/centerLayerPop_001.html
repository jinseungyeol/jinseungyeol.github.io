<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
  <script>
    $(function() {
      popCenter('.popWrap')
    })
  </script>
</head>
<body>
  <div class="popWrap">
    <div class="dim" onclick="popdimClose(this)"></div>
    <div class="popInner">
      <div class="popTit">
        <div class="titleWrapCenter">
          <h1>사용자 서류 만들기</h1>
          <button type="button" class="popCloseBtn" title="닫기" onclick="popClose(this)"></button>
        </div>
        <div class="selectWrap">
          <div class="item">
            <p class="title">서류 요청</p>
            <div class="selectBox">
              <input type="text" placeholder="유형 제목을 입력해주세요.">
            </div>
          </div>
        </div>
      </div>
      <div class="popCont">
        <div class="gridArea addToggle">
          <div class="showGrid">
            <div class="gridTable" style="border: 1px solid red;">여기에 그리드</div>
          </div>
          <div class="divideArea">
            <button class="activeBodyBtn">
              <span>추가</span>
              <img src="../../img/wp/ico/ico_ts_right_white.svg" alt="추가">
            </button>
            <button class="bdGrayBodyBtn">
              <img class="leftIcon" src="../../img/wp/ico/ico_ts_left_gray.svg" alt="제거">
              <span>제거</span>
            </button>
          </div>
          <div class="selectGrid">
            <div class="gridTable" style="border: 1px solid red;">여기에 그리드</div>
          </div>
        </div>
      </div>
      <div class="confirmPopBtnWrap">
        <div class="areaBtn">
          <button class="cancelBodyBtn">취소</button>
          <button class="activeBodyBtn">저장</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
