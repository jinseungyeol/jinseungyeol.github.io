<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>홈택스 관리</title>
</head>
<body>

    <!-- 헤더 타이틀 -->
    <div class="title bgc_gray01">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">홈택스 계정 관리</span>
    </div>

    <div class="basic_wrapper bgc_gray01">
        <div class="card_connect_wrap">
            <section class="ys_connect hometax">
                <!-- '홈택스에 연결하면?' 텍스트 -->
                <article class="intro text">
                    <h1 class="tit">
                        홈택스에 연결하면?
                    </h1>
                    <h2 class="sub_tit">
                        자동으로 매출과 지출을 수집하고<br>
                        세금에 미리 대비할 수 있어요
                    </h2>
                </article>

                <!-- 깃발 이미지 -->
                <article class="img">
                    <span class="ico_cen hometax_01"></span>
                </article>

                <!-- 하단고정 -->
                <article class="bot_fix_pd20 bgc_gray01 set_pdb27">
                    <!-- 디스크립션 -->
                    <div class="desc">
                        <i class="ico_cont info_gray"></i>
                        <span>수집이 완료되면 사장님 맞춤 보고서에 반영되어요</span>
                    </div>
                    
                    <!-- 버튼 / bgc_sig 클래스로 제휴별 배경색상 제어 -->
                    <button type="button" class="type_B bgc_sig shadow"><span>홈택스 바로 연결하기</span></button>
                </article>

            </section>
        </div>
    </div>
    
</body>
</html>
