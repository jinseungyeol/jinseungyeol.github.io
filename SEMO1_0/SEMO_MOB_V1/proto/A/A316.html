<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">


    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">회원 가입</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">
        <div class="join_box">

          <div class="terms_tit">IBK 모바일자금관리를 이용하기 위해서<br/>약관 동의가 필요합니다.</div>
          
           <!-- 약관동의 -->
           <div class="terms_box terms_pd open on"> <!--활성 클래스 on 전체 약관 표시-->
            <!-- 전체 동의 -->
            <div class="terms_li">
              <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
              <span>약관 전체 동의</span>
            </div>
            <!-- //전체 동의 -->
  
            <!-- 약관 -->
            <ul>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>모바일자금관리 이용약관</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>개인정보 수집 및 취급 방침 동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
               <!--2020-08-13 개인(신용)정보 제3자 제공 동의 삭제-->
              <!-- <li class="terms_li">
                <input type="checkbox" class="check_terms"> 
                <span>개인(신용)정보 제3자 제공 동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li> -->
              <!--2020-08-13 개인(신용)정보 제3자 제공 동의 삭제-->
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>거래정보 조회 위임 동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>세모주치의 컨설팅 동의 (선택)</span> 
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
            </ul>
            <!-- //약관 -->
          </div>
          <!-- //약관동의 -->
          
        </div>
      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
