<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">


    <div class="cont_bg cont_hd"> <!-- 클래스 cont_hd header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">회원 가입</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">
        <div class="join_box">
          
          <div class="join_pin">
            <div class="title_sub">로그인 핀번호를 입력해 주세요.</div>
            
            <div class="join_noti center"> 3자리이상 연속되거나 동일하지<br/>않은 숫자 6자리</div>

            <!-- 핀번호 입력 -->
            <div class="pin_wrap">
              <div class="pin_box on"></div> <!--활성화 클래스 on 번호입력 표시-->
              <div class="pin_box on"></div>
              <div class="pin_box on"></div>
              <div class="pin_box on"></div>
              <div class="pin_box on"></div>
              <div class="pin_box on"></div>
            </div>
              <!-- //핀번호 입력 -->
          </div>

        </div>
      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>핀번호가 일치하지 않습니다.</span>
    </div>
    <!-- 토스트 팝업 -->

  </div>
</body>
</html>
