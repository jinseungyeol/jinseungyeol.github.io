<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">거래처 등록</div>
      <!-- //상단 타이틀 -->
            
      <!-- 거래처 검색 -->
      <div class="branch_search_wrap">
        <div class="branch_search_box">
          <input type="text" placeholder="내용을 입력하세요">
          <a class="btn_bsb">검색<i></i></a> 
        </div>
        <!-- 겁색 팝업 -->
        <div class="popup_layer">
          <div class="pl_tit">내계좌 계좌 정보</div>
          <a class="btn_pl_close"><i></i><em class="new_blind">닫기</em></a>
          <div class="pl_list_box">
            <div class="pl_account_list">
              <ul>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
                <li class="pla_list">
                  <span>가나다 거래</span> <span>홍길동</span>
                </li>
              </ul>
            </div>
          </div>
        </div>
        <!-- //겁색 팝업 -->
      </div>
      <!-- //거래처 검색 -->

      <!-- 거래처 -->
      <div class="wrap document">
        <div class="document_box">

          <!-- 거래처 등록 -->
          <div class="branch_add_wrap">
            <div class="branch_add_box">
              <span class="bab_tit">거래처명</span>
              <div>
                <input class="bab_input">
              </div> 
            </div>

            <div class="branch_add_box bab_bank_pop">
              <span class="bab_tit">계좌 정보</span>
              <div class="bab_box_wrap">
                <p class="bab_bank_box">
                  <span class="bab_bank"><i class="logo_bank ico_lb003"><em class="new_blind">은행 로고</em></i>IBK기업</span>
                  <a class="btn_bank_list"><i class="ico_arr"></i><em class="new_blind">은행 리스트</em></a>
                </p>
                <input class="bab_input" type="text" placeholder="계좌번호 입력 (‘-’ 제외)" value="14111011111117">
              </div>
            </div>
            
            <div class="branch_add_box">
              <span class="bab_tit"></span>
              <div class="bab_owner_wrap">
                <span class="bab_input">홍길동</span>
                <button >예금주 조회</button>
              </div>
            </div>

            <div class="branch_add_box">
              <span class="bab_tit">사업자 번호</span>
              <div>
                <input class="bab_input">
              </div>
            </div>

            <div class="branch_add_box">
              <span class="bab_tit">대표자</span>
              <div>
                <input class="bab_input">
              </div>
            </div>

            <div class="branch_add_box">
              <span class="bab_tit">연락처</span>
              <div>
                <input class="bab_input">
              </div>
            </div>

            <div class="branch_add_box al_base bab_code_pop">
              <span class="bab_tit">주소</span>
              <div class="bab_adress_box">
                <button class="btn_zip_code">우편번호</button>
                <textarea class="bab_input"></textarea>
                <textarea class="bab_input" placeholder="한글 25자까지 입력 가능"></textarea>
              </div>
            </div>

            <div class="branch_add_box al_start">
              <span class="bab_tit">메모</span>
              <div>
                <textarea class="bab_input" placeholder="거래처관련 메모를 작성하실 수 있습니다."></textarea>
              </div>
            </div>
          </div>
          <!-- //거래처 등록 -->

        </div>
      </div>
      <!-- //거래처 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">거래처 등록하기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
