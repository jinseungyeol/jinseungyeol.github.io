<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  <!-- container -->
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_linkpath.svg" alt="로고">
            </a>
          </h1>
        </div>
      </div>
    </header>
    <!-- //header -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult fixB">
        <div class="inner">
          <div class="certiTitArea">
            <img src="../../img/wp/ico/ico_bank.svg" alt="은행 아이콘">
            <strong class="certiTit">
              이자소득 원천징수증
              <span class="progress">(3/3)</span>
            </strong>
          </div>
          <div class="infoMsgBox">
            <p class="infoMsg">
              대출 이자비용 납입을 증명할 계좌 정보를 입력해주세요.
            </p>
            <ul class="dotListMsg">
              <li class="gray500">계좌가 여러개인경우 [추가하기] 버튼을 통해 입력이 가능합니다.</li>
            </ul>
          </div>
          <div class="userInfoSection">
            <div class="InfoPanel">
              <p class="pannelTit">은행 리스트</p>
            </div>
            <div class="selectWrap">
              <div class="userInfoBox">
                <div class="item">
                  <p class="title">은행</p>
                  <div class="bankSelectWrap">
                    <div class="selectBox showPop">
                      <button type="button" class="optionBtn selectTaget notSelected">은행 선택</button>
                    </div>
                    <div class="rCont">
                      <span class="basic">기본</span>
                    </div>
                  </div>
                </div>
                <div class="item">
                  <p class="title">계좌번호</p>
                  <div class="bankSelectWrap">
                    <div class="selectBox showPop">
                      <input type="tel" placeholder="계좌번호 입력(-없이 입력)">
                    </div>
                  </div>
                </div>
              </div>
              <div class="userInfoBox">
                <div class="item">
                  <p class="title">은행</p>
                  <div class="bankSelectWrap">
                    <div class="selectBox showPop">
                      <button type="button" class="optionBtn selectTaget">신한은행</button>
                    </div>
                    <div class="rCont">
                      <button type='button' class="deleteBtnType02"></button>
                    </div>
                  </div>
                </div>
                <div class="item">
                  <p class="title">계좌번호</p>
                  <div class="bankSelectWrap">
                    <div class="selectBox showPop">
                      <input type="tel" placeholder="계좌번호 입력(-없이 입력)" value="110000000000">
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <button type="button" class="addBodyBtn">
              <img src="../../img/wp/ico/ico_plus_circle_primary.svg" alt="추가 아이콘" class="leftIcon">
              <span>은행계좌 추가하기</span>
            </button>
          </div>
          <div class="areaFixedBottom">
            <div class="fixedBottomInner">
              <div class="cell">
                <button class="bdGrayBodyBtn"><span>계좌가 없어요</span></button>
              </div>
              <div class="cell">
                <button class="activeBodyBtn"><span>다음</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
