<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <title>하루씀씀 아침알림톡</title>
</head>
<body>
    <main class="cdr030">
            <header class="cdr030-header">
                <div class="main_tit">
                    <h1>
                        제로파스타 1호점의<br>
                        하루씀씀
                    </h1>    
                </div>
                <div class="sub_tit">
                    <div class="date">
                        <span>02월 06일 수요일</span>
                    </div>
                    <div class="state">
                        <span>자정기준</span>
                    </div>
                </div>
            </header>
            <section class="cdr030-content">
                <!-- Article 별 item0N으로 분기 처리 -->
                <!-- 현금 -->
                <!-- 연결 안됬을 시 article is-unconnect -->
                <article class="cdr030-item item01 is-unconnect">
                    <div class="desc_wrap">
                        <div class="tit">
                            <h2>통장에 있어요</h2>
                        </div>
                        <div class="count">
                            <span>11,594,000원</span>
                        </div>
                        <div class="state_wrap">
                            <div class="info">
                                <span>어제보다</span>
                            </div>
                            <!-- class up / down 으로 분기처리 -->
                            <div class="state up">
                                <i class="ico_cont"></i>
                                <span>-%</span>
                            </div>
                        </div>
                    </div>
                    <div class="cover_wrap">
                        <div class="cover">
                            <i class="ico_cont"></i>
                        </div>
                        <div class="cover_tit">
                            <span>현금</span>
                        </div>
                    </div>
                </article>
                <!-- 매출 -->
                <article class="cdr030-item item02">
                    <div class="desc_wrap">
                        <div class="tit">
                            <h2>이만큼 팔았어요</h2>
                        </div>
                        <div class="count">
                            <span>2,345,670원</span>
                        </div>
                        <div class="state_wrap">
                            <div class="info">
                                <span>어제보다</span>
                            </div>
                            <!-- class up / down 으로 분기처리 -->
                            <div class="state down">
                                <i class="ico_cont"></i>
                                <span>18%</span>
                            </div>
                        </div>
                    </div>
                    <div class="cover_wrap">
                        <div class="cover">
                            <i class="ico_cont"></i>
                        </div>
                        <div class="cover_tit">
                            <span>매출</span>
                        </div>
                    </div>
                </article>
                <!-- 지출 -->
                <article class="cdr030-item item03">
                    <div class="desc_wrap">
                        <div class="tit">
                            <h2>이만큼 썼어요</h2>
                        </div>
                        <div class="count">
                            <span>4,845,690원</span>
                        </div>
                        <div class="state_wrap">
                            <div class="info">
                                <span>어제보다</span>
                            </div>
                            <!-- class up / down 으로 분기처리 -->
                            <div class="state down">
                                <i class="ico_cont"></i>
                                <span>15%</span>
                            </div>
                        </div>
                    </div>
                    <div class="cover_wrap">
                        <div class="cover">
                            <i class="ico_cont"></i>
                        </div>
                        <div class="cover_tit">
                            <span>지출</span>
                        </div>
                    </div>
                </article>
                <!-- 카드 -->
                <article class="cdr030-item item04">
                    <div class="desc_wrap">
                        <div class="tit">
                            <h2>카드매출 현황은</h2>
                        </div>
                        <div class="count">
                            <span>111,690원</span>
                        </div>
                        <div class="state_wrap">
                            <div class="info">
                                <span>오늘 입금예정</span>
                                <span>211,890원</span>
                            </div> 
                        </div>
                    </div>
                    <div class="cover_wrap">
                        <div class="cover">
                            <i class="ico_cont"></i>
                        </div>
                        <div class="cover_tit">
                            <span>카드</span>
                        </div>
                    </div>
                </article>
                <!-- 배달 -->
                <article class="cdr030-item item05">
                    <div class="desc_wrap">
                        <div class="tit">
                            <h2>배달매출 현황은</h2>
                        </div>
                        <div class="count">
                            <span>234,500원</span>
                        </div>
                        <div class="state_wrap">
                            <div class="info">
                                <span>오늘 입금예정</span>
                                <span>58,990원</span>
                            </div>
                        </div>
                    </div>
                    <div class="cover_wrap">
                        <div class="cover">
                            <i class="ico_cont"></i>
                        </div>
                        <div class="cover_tit">
                            <span>배달</span>
                        </div>
                    </div>
                </article>
            </section>
    </main>

  
</body>
<script>

</script>
</html>
