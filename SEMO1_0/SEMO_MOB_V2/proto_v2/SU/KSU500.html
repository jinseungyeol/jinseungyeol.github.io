<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>S_회원가입05</title>
</head>
<body>
  
  <!-- ## 헤더타이틀 ## -->
  <div class="title b_white">
    <div class="title_left">
      <i class="ico_cen left_arrow"></i>
    </div>
    <span class="title_text">회원가입</span>
  </div>

  <div class="basic_wrapper">
    <div class="wrap_pd20">

      <!-- ## 회원가입 진행순서 ## -->
      <div class="join_process_wrap">
        <span class="join_process c_sig">●</span>
        <span class="join_process c_sig">●</span>
        <span class="join_process bgc_sig">3</span>
        <span class="join_process">●</span>
      </div>

      <section class="join_header_txt">
        <h1>이용하실 서비스를 선택해주세요.</h1>
      </section>

      <!-- ## 서비스 선택 ## -->
      <section class="service_card_wrap">
        <!-- 무료 -->
        <article class="service_card active">
          <div class="service_card_content">
            <div class="service_card_header">
              <i class="ico_cont"></i>
              <h2>무료</h2>
              <p class="service_card_type">FREE</p>
            </div>
            <div class="service_card_info">
              <p>
                <span class="service_card_basic">기본서비스</span>
                <span class="service_card_basic">아침보고서</span>
              </p>
            </div>
            <div class="service_card_price">
              <span>월 0원</span>
            </div>
          </div>
        </article>

        <!-- 프리미엄 -->
        <article class="service_card premium ">
          <div class="service_card_content">
            <div class="service_card_header">
              <i class="ico_cont"></i>
              <h2>프리미엄</h2>
              <p class="service_card_type">PREMIUM</p>
            </div>
            <div class="service_card_info">
              <p>
                <span class="service_card_basic">아침보고서</span>
                <span>프리미엄보고서</span>
                <span>송금 10회</span>
              </p>
              <p>
                <span>엑셀다운로드</span>
                <span>근로계약서</span>
                <span>직원 · 근태관리</span>
              </p>
              <p>
                <span>급여명세서</span>
                <span>세무사 정보연결</span>
              </p>
            </div>
            <div class="service_card_price">
              <span>월 4,950원</span>
            </div>
          </div>
          <p class="service_card_free">~ 2022.12.31까지 무료</p>
        </article>
      </section>

      <!-- ## 디스크립션 ## -->
      <section class="join_desc">
        <div class="join_desc_content">
          <p>- 프리미엄 해지 시 일할 계산되어 청구됩니다.</p>
          <p>- 무료회원으로 전환은 언제든 가능합니다.</p>
        </div>
      </section>
      
    </div>


    <!-- ## 버튼 ## -->
    <div class="bot_fix">
      <!-- bgc_sig 클래스로 제어 -->
      <button type="button" class="type_A bgc_sig">
        <span>확인</span>
      </button>
    </div>

  </div>

  <script>
    $(".service_card").click( function() {
      $(this).addClass("active").siblings().removeClass("active");
    });
  </script>

</body>

</html>
