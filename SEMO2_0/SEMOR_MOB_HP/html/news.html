    <script>
        var scrollodometer;
        var TOT_TXOF_CNT;
        var R_BZAQ_CNT;

        $(function() {
            scrollodometer = $(".secCount").offset().top - 400;

        // 금액 한글 변환 함수
        function numberToKorean(number) {
            var intNumber = +number;
            var inputNumber = intNumber < 0 ? false : intNumber;
            var unitWords = ['', '만', '억', '조', '경'];
            var splitUnit = 10000;
            var splitCount = unitWords.length;
            var resultArray = [];
            var resultString = '';
    
            for (var i = 0; i < splitCount; i++) {
                var unitResult = (inputNumber % Math.pow(splitUnit, i + 1)) / Math.pow(splitUnit, i);
                unitResult = Math.floor(unitResult);
                if (unitResult > 0) {
                    resultArray[i] = unitResult;
                }
            }
            for (var i = 0; i < resultArray.length; i++) {
                if (!resultArray[i]) continue;
                resultString = String(resultArray[i]) + unitWords[i] + resultString;
            }
            return resultString;
        }   // End numberToKorean
    
        //우수 세무사 , 리포트 고객수 조회
        function fn_taxCnt(){
            var param = {};
            // 공통부

            // 개별부 REQ_DATA
            param.REQ_DATA              = {};
            semorprtApi.rprtcallAjax(param, function(data){   
                if (data.RSLT_CD == '0000') {

                    $(window).on('scroll', function () {
                        if (scrollodometer < $(window).scrollTop()) {
                            $('.odometer2').html(numberToKorean(R_BZAQ_CNT));       // 수입처 가입수
                        }
                    });
                }
            });
        }   // End fn_taxCnt
