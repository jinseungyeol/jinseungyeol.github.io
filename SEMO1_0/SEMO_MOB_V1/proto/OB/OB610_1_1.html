<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg cont_pd">
            <div class="wrap account">
                <div class="progress_state_box">
                    <p>
                        <i>①</i>
                        <em class="progress_on_title">1. 체크리스트</em>
                    </p>
                    <p class="on">
                        <i>②</i>
                        <em class="progress_on_title">2. 정보입력</em>
                    </p>
                    <p>
                        <i>③</i>
                        <em class="progress_on_title">3. 최종확인</em>
                    </p>
                </div>
                <div class="title_sub set_mgt26">2. 경영정상화방안</div>
                <table class="change_table">
                    <tr>
                        <th colspan="2">매출목표</td>
                    </tr>
                    <tr>
                        <td class="bg_white">2021년</td>
                        <td>
                            <input type="number" value="7">
                            <p>백만원</p>
                        </td>
                    </tr>
                    <tr style="border-bottom:1px solid #b1b1b1;">
                        <td class="bg_white">2022년</td>
                        <td>
                            <input type="number" value="8">
                            <p>백만원</p>
                        </td>                   
                    </tr>
                </table>
                <table class="change_table set_mgt40">
                    <tr>
                        <th colspan="2">향후계획</td>
                    </tr>
                </table>
                <div class="change_input_wrap">
                    <div class="change_input_con">
                        <span>
                            <input type="checkbox" id="">
                            <label for="changeUp">고정비 절감</label>
                        </span>
                        <span>
                            <input type="checkbox" id="">
                            <label for="changeUp2">부동산 매각</label>
                        </span>

                    </div>
                    <div class="change_input_con">
                        <span>
                            <input type="checkbox" id="">
                            <label for="changeUp">대출금 상환</label>
                        </span>
                        <span>
                            <input type="checkbox" id="">
                            <label for="changeUp2">기타(추후상담)</label>
                        </span>
                    </div>
                </div>
                <div class="duplicate_wrap set_mgt15">
                    <i class="gray_info "></i>
                    <div class="change_text">
                        <span>(중복체크 가능) 회사의 매출목표와 실행 가능한 향후 계획을 체크하여 주시기 바랍니다.
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <!-- 하단 fix 버튼 -->
        <div class="btm_button ">
            <span class="bgc_green">다음</span>
            <!--클래스 bgc_green 배경색-->
        </div>
        <!-- 하단 fix 버튼 -->
    </div>
</body>

</html>
