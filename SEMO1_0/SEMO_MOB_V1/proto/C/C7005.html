<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">
    <div class="cont_bg cont_pd">
      <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 상단 타이틀 -->
      <!-- <div class="title">제로페이 매출관리</div> -->
      <!-- //상단 타이틀 -->
      <div class="wrap setting">
        <div class="origin_top">
          <div class="origin_text">
            <span>
              제로페이 결제 관리 PC사이트에 등록된 ID/PW를
              입력해 주세요.</span></div>
        </div>
        <div class="deli_log">
          <div class="deli_id">
            <input type="text" placeholder="6~15자리 영문/숫자(특수문자 불가)">
          </div>
          <div class="deli_pass">
            <input type="password" placeholder="10자리 이상 영문/숫자">
          </div>
        </div>
        <div class="zero_link_info">
          <span>제로페이에 가입하고 싶어요.</span>
          <span>ID/PW를 잊어버렸어요.</span>
        </div>
      </div>
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="btm_button on">
      <span class="bgc_gray">취소</span>
      <span class="bgc_green">저장</span>
      <!--
        버튼 색
        bgc_green
        bgc_blue
        bgc_gray
        bgc_orange
        bgc_d_gray
      -->
      <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="toast">
      <!-- hide 클래스로 제어 -->
      <span>비밀번호를 입력해 주세요.</span>
    </div>
  </div>
</body>

</html>
