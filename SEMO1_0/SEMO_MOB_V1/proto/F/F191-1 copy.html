<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <script src="../../../js/jquery-3.5.1.min.js"></script>
    <title>SEMO</title>
</head>

<body>
    <div class="new_content pretendard">
        <div class="cont_bg">


            <div class="popup_bg">
                <div class="popup_content hometax">
                    <div class="popup_connect">
                        <div class="popup_connect_title">홈택스에 연결이 안됐다면?</div>
                        <div class="connect_easy">
                            <div class="connect_easy_txt">
                                <p class="font_w_b set_mgb6">인증서 연결,</p>
                                <span>손쉽게 할 수 있어요!</span>
                            </div>
                            <div class="ico_cen"></div>
                        </div>
                        <div class="connect_case_wrap">
                            <div class="connect_case">
                                <!-- active 클래스로 제어 -->
                                <div class="connect_case_title font_w_b active">
                                <!-- /// active 클래스로 제어 -->    
                                    <p><span class="c_sig set_font21">01.</span>회원가입이 안 된 경우</p>
                                    <div class="ico_cen"></div>
                                </div>
                                <div class="connect_case_txt_wrap">
                                    <div class="connect_case_txt set_pdt0">
                                        <div class="ico_cen"></div>
                                        <p>홈택스(손택스) 회원가입</p>
                                    </div>
                                    <div class="connect_case_txt">
                                        <div class="ico_cen"></div>
                                        <p>공동인증서 등록</p>
                                    </div>
                                    <div class="connect_case_txt">
                                        <div class="ico_cen"></div>
                                        <p>세모장부 홈택스 연결</p>
                                    </div>
                                </div>
                            </div>
                            <div class="connect_case">
                                <div class="connect_case_title font_w_b">
                                    <p><span class="c_sig set_font21">02.</span>공동인증서가 없는 경우</p>
                                    <div class="ico_cen"></div>
                                </div>
                                <div class="connect_case_txt_wrap">
                                    <div class="connect_case_txt set_pdt0">
                                        <div class="ico_cen"></div>
                                        <p>홈택스 > 인증센터 > 공동인증서 등록</p>
                                    </div>
                                    <div class="connect_case_txt">
                                        <div class="ico_cen"></div>
                                        <p>세모장부 홈택스 연결</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="btm_button">
                        <span class="bg_sig">홈택스 바로가기</span>
                        <!-- css별 배경컬러 제어 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $('.connect_case_title').click(function () {
            $(this).addClass('active');
            $(this).parent().siblings('.connect_case').children('.connect_case_title').removeClass('active');
        })
    </script>

</body>

</html>
