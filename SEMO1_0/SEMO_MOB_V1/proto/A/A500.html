<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_nh.css">
    <title>SEMO</title>
</head>

<body>
    <div class="new_content pretendard service">
        <div class="cont_bg cont_pd">
            <div class="payment_wrap">
               
                <div class="payment_service">
                    <span class="payment_title">
                        이용하실 서비스를 선택해주세요.
                    </span>
                    <div class="payment_service_cell active">
                    <!-- Active 클래스로 제어  -->
                        <div>
                            <span>
                                <input type="radio" name="payment" id="payment_service_cell1" checked>
                                <label for="payment_service_cell1">무료</label>
                            </span>
                            <p>FREE</p>
                        </div>
                        <span>
                            <em>기본서비스</em>
                            <em>아침보고서</em>
                            <em class="kt_none">무료송금 5회</em>
                        </span>
                        <div class="payment_service_bottom free">
                            <b>월 0원</b>
                        </div>
                    </div>
                    <div class="payment_service_cell">
                    <!-- Active 클래스로 제어  -->
                        <div>
                            <span>
                                <input type="radio" name="payment" id="payment_service_cell2">
                                <label for="payment_service_cell2">프리미엄</label>
                            </span>
                            <p>PREMIUM</p>
                        </div>
                        <span>
                            <em class="c_gray">기본서비스</em>
                            <em class="c_gray">아침보고서</em>
                            <em>프리미엄보고서</em> <br>
                            <em class="kt_none">무료송금 10회</em>
                            <em>직원 · 급여관리</em>
                            <em>세무사 정보연결</em>
                        </span>
                        <div class="payment_service_bottom preminum">
                            <b>월 4,950원</b>
                        </div>

                        <div class="payment_free_date" style="display: none;">
                            ~ 2021. 12. 31 까지 무료
                        </div>
                        <!-- 프로모션 X 일때 display: none -->

                    </div>
                    
                </div>
                <div class="payment_service_info set_mgb20 kt_none">
                    - 혜택 종료 후 다음 달부터 월 4,950원이 출금됩니다.<br>
                    - 무료회원으로 전환은 언제든 가능합니다.
                </div>
                <div class="payment_service_info set_mgb20 kt_show">
                    - 프리미엄 해지 시 일할 계산되어 청구됩니다.<br>
                    - 무료회원으로 전환은 언제든 가능합니다.
                </div>
            </div>
            <div class="toast">
                <span>
                    이용하실 서비스를 선택해주세요.
                </span>
            </div>
        </div>
        <!-- 하단 fix 버튼 -->
        <div class="btm_button h65">
            <span class="bgc_green">다음</span>
            <!-- kt Active class 제어 -->
        </div>
        <!-- 하단 fix 버튼 -->
    </div>
</body>

</html>
