<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>

<body>
  <div class="new_content">
    <div class="cont_bg">
      <div class="title">배달앱 증빙 순서설정</div>

      <div class="my_favor">
        <div class="my_favor_top">
          <span>
            <i class="ico_cen"></i>
            <p>순서와 노출을 설정할 수 있습니다. 사장님 맞춤 경영 보드를 만들어 보세요.</p>
          </span>
        </div>
        <div class="my_favor_menu">
          <div class="my_meun">
            <div class="my_cont_list">
              <div class="my_cont_cell">
                <div class="ico_cen deli_report_img logo_al_1"></div>
                <div class="my_cont_text">
                  <span class="refresh">
                    <p></p>
                    <p></p>
                  </span>
                </div>
                <div class="ico_cen my_i_mark"></div><!-- on 클래스로 제어 -->
                <div class="my_up_down">
                  <i class="ico_cen"></i>
                  <i class="ico_cen"></i>
                </div>
              </div>
              <div class="my_alarm hide">
                <div class="ico_cen my_alarm_img mai_5"></div>
                <p>요청 5건</p>
                <!-- 
                  mai_1 직원 정보 등록하기
                  mai_2 카드 정보 등록하기
                  mai_3 건강보험 정보 등록하기
                  mai_4 배달앱 정보 등록하기
                  mai_5 요청 n건
               -->
              </div>
            </div>
          </div>
          <div class="my_meun">
            <div class="my_cont_list">
              <div class="my_cont_cell">
                <div class="ico_cen deli_report_img logo_al_2"></div>
                <div class="my_cont_text">
             
                  <span class="refresh">
                    <p></p>
                    <p></p>
                  </span>
                </div>
                <div class="ico_cen my_i_mark"></div><!-- on 클래스로 제어 -->
                <div class="my_up_down">
                  <i class="ico_cen"></i>
                  <i class="ico_cen"></i>
                </div>
                <!-- 
              my_chevy 기본값 아래 화살표
              my_chevy up 위 화살표
             -->
              </div>

              <div class="my_alarm hide">
                <!--
              hide 클래스로 삭제 
            -->
                <div class="ico_cen my_alarm_img mai_2"></div>
                <p>카드 정보 등록하기</p>
              </div>
            </div>
          </div>
          <div class="my_meun">
            <div class="my_cont_list">
              <div class="my_cont_cell">
                <div class="ico_cen deli_report_img logo_al_3"></div>
                <div class="my_cont_text">
                  <span class="refresh">
                    <p></p>
                    <p></p>
                  </span>
                </div>
                <div class="ico_cen my_i_mark"></div><!-- on 클래스로 제어 -->
                <div class="my_up_down">
                  <i class="ico_cen"></i>
                  <i class="ico_cen"></i>
                </div>
                <!-- 
              my_chevy 기본값 아래 화살표
              my_chevy up 위 화살표
             -->
              </div>
              <div class="my_alarm hide">
                <!-- 
              my_number, my_alarm hide클래스로 제어 
            -->
                <div class="ico_cen my_alarm_img mai_3"></div>
                <p>건강보험 정보 등록하기</p>
              </div>
            </div>
          </div>
          <div class="my_meun">
            <div class="my_cont_list">
              <div class="my_cont_cell">
                <div class="ico_cen deli_report_img logo_al_4"></div>
                <div class="my_cont_text">
                  <span class="refresh">
                    <p></p>
                    <p></p>
                  </span>
                </div>
                <div class="ico_cen my_i_mark"></div><!-- on 클래스로 제어 -->

                <!-- 
              my_chevy 기본값 아래 화살표

             -->

              <div class="my_alarm hide">

              <div class="my_alarm hide">

    <div class="btm_button on">
      <span>취소</span>
      <span class="bgc_green">확인</span>
      <!--클래스 bgc_green 배경색-->
    </div>
