<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->

      <div class="wrap document">
        <div>
          <div class="condition_head_wrap">
            <div class="tab_box set_cen_ev">
              <span class="on">계좌입력</span> <!--활성 클래스 on-->
              <span>거래처</span>
            </div>
            <div class="condition_account_wrap">
              <div class="condition_account_border">
                <div class="condition_account_box">
                  <span>최근입금</span> 
                  <span>직접입력</span>
                  <span class="on">내계좌</span><!--활성클래스 on-->
                </div>
              </div>
            </div>
          </div> 
          <div>
            <div class="send_wrap">
              <div class="send_box">
                <p class="noti_comm set_pdr50p set_top_cen">
                  <i class="ico_cen"></i>
                  <span>최근 입금내역이 없습니다.</span>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>다음</span>
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
