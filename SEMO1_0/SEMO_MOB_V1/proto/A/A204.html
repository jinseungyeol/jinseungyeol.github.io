<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">


    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">회원 가입</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">

        <!-- 로그인 비밀번호 입력 -->
        <div class="join_box">
          
          <div class="title_sub">로그인 비밀번호를 입력해 주세요.</div>

          <div class="join_block">
            <input type="password" class="join_input" placeholder="비밀번호 입력(숫자 6자리)" maxlength="6" value="123456">
          </div>
        </div>
        <!-- //로그인 비밀번호 입력 -->

        <!-- 영업점 선택 -->
        <div class="join_box3">
          <div class="title_sub">(선택) 추천코드를 입력해 주세요.</div>

          <div class="join_block">
            <input type="text" class="join_input" placeholder="추천코드를 입력해 주세요" value="FOODCON0001">
          </div>
        </div>
        <!-- //영업점 선택 -->

      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
