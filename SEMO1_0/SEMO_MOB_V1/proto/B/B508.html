<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->

      <div class="wrap document">
        <div>
          <div class="condition_head_wrap">
            <div class="tab_box set_cen_ev">
              <span>계좌입력</span> 
              <span  class="on">거래처</span> <!--활성 클래스 on-->
            </div>
            <div class="condition_account_border">
            </div>
          </div> 
          <div>
            <div class="send_wrap">

                <div class="sc_input_box">
                  <input class="sc_input" type="text" placeholder="거래처를 입력해 주세요">
                  <!-- 2020-08-05 검색 버튼 추가 -->
                  <a class="sc_button"><i class="ico_cen"></i><em class="new_blind">검색버튼</em></a>
                  <!-- 2020-08-05 검색 버튼 추가 -->
                </div>
                <div class="logo_text_list_box">
                  <ul>
                    <li class="lt_list">
                      <i class="ico_cen index on"></i> <!--즐겨찾기 설정 활성화 클래스 on-->
                      <p>
                        <strong class="lt_tit">거래처명 (대표자명)</strong>
                        <span class="lt_txt">IBK기업은행 47900932341222</span>
                      </p>
                    </li>
                    <li class="lt_list">
                      <i class="ico_cen index"></i>
                      <p>
                        <strong class="lt_tit">가나상사 (홍길순)</strong>
                        <span class="lt_txt">우체국 47900932341222</span>
                      </p>
                    </li>
                    <li class="lt_list">
                      <i class="ico_cen index"></i>
                      <p>
                        <strong class="lt_tit">가나상사 (홍길순)</strong>
                        <span class="lt_txt">시티은행 47900932341222</span>
                      </p>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span>
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
