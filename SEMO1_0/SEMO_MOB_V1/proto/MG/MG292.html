<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!-- 2020-06-11 뒤로가기 삭제 -->
    <div class="cont_bg cont_pd"> <!--2020-06-11 클래스 cont_pd_hd -> cont_pd로 수정-->
      
      <!-- 상단 타이틀 -->
      <div class="title">권유 영업점 및 담당자 입력</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      
      <div class="wrap join">

        <!-- 영업점 선택 -->
        <div class="join_box">
          
          <div class="title_sub">IBK 기업은행 권유영업점을 선택해 주세요.</div>

          <div class="branch_wrap on"> <!--2020-06-12 검색목록 보여주기 활성 클래스 on-->
            <div class="join_block type2 set_mgb20">
              <input type="text" class="join_input type2" placeholder="영업점 입력">
              <button class="btn_branch">검색</button>
            </div>

            <!-- 영업점 리스트 .join_block.type2 클릭시 보임 -->
            <div class="branch_box" style="display: none;">
              <div>영업점</div>
              <ul>
                <li class="branch_list on">당산동 IBK지점</li> <!--2020-06-12 선택 활성 클래스 on-->
                <li class="branch_list">당산역 IBK지점</li>
              </ul>
            </div>
            <!-- //영업점 리스트 -->

            <!-- 영업점 담당자 직원번호 -->
            <div class="input_info_box">
              <span class="info_tit">권유 받은 영업점 담당자 직원번호를 입력해 주세요.</span>
              <input type="number" class="info_input" placeholder="영업점 담당자 직원번호 입력">
            </div>

          </div> 

          <p class="alert_q2 set_top_le color set_mgt12"> <!--2020-06-12 클래스 set_cent_le -> set_top_le로 변경-->
            <i class="ico_cen"></i>
            <span>
              등록하신 권유 영업점 직원중 'i-ONE 소상공인' 가입에 가장 도움이 된 담당자 직원번호를 입력해 주세요.
            </span>
          </p> 
          <p class="alert_q2 set_cent_le color set_mgt12">
            <i class="ico_cen"></i>
            <span>
              권유 영업점은 등록 이후 수정이 불가합니다.
            </span>
          </p> 
        </div>
        <!-- //영업점 선택 -->

      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">

      <span class="">저장</span>
      <!-- bg_sig 클래스로 활성화 -->

    </div>
    <!-- 하단 fix 버튼 -->

    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>권유 영업점 입력 후 등록이 가능합니다.</span>
    </div>
    <!-- 토스트 팝업 -->

  </div>

  <script>
    $('.join_input.type2').click(function(){
      $('.branch_box').css("display", "block");
    })
  </script>

</body>
</html>
