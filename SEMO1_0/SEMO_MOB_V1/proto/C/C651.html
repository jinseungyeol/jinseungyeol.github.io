<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/test.css">
  <script src="../../js/design.js"></script>
    <!-- <link rel="stylesheet" href="../../css/semo_cont_nh.css"> -->


    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg">
            <!-- 상단 타이틀 -->
            <!-- <div class="title">급여관리</div> -->
            <!-- //상단 타이틀 -->

            <div class="wrap salary">
                
                <div class="salary_wrapper">
                    <div class="salary_pay_day_title">
                        <b>급여일 설정</b>
                        <span>급여 지급일을 설정해 주세요</span>
                    </div>
                    <div class="salary_month_check">
                        <div class="salary_month_check_title">지급 시기</div>
                        <!-- <div class="month_select">
                            <span class="select">당월</span>
                            <span>익월</span>
                        </div> -->
                        <div class="month_select_con">
                            <div>
                                <input type="radio" id="huey" name="drone" value="huey"
                                       checked>
                                <label for="huey">당월</label>
                              </div>
                              <div>
                                <input type="radio" id="dewey" name="drone" value="dewey">
                                <label for="dewey">익월</label>
                              </div>
                              
                        </div>
                    </div>

                    <div class="salary_date_select">
                        <div class="salary_date_select_title">
                            지급 날짜
                        </div>
                        <div class="salary_select_wrap">
                            <select class="date_select" required>
                                <option value="" hidden disabled selected>급여 지급일을 선택해주세요</option>
                                <option value="1">2020</option>
                                <option value="2">2019</option>
                                <option value="3">2018</option>
                            </select>
                            <i class="ico_cen up"></i><!-- up클래스로 활성화 -->
                        </div>
                    </div>


                </div>
                <div class="btm_button">
                    <span class="bgc_green">저장하기</span>
                </div>
            </div>
            <div class="salary_alret">
                <div class="salary_alret_title">
                    <i class="ico_cen"></i>
                    <b>당월 지급</b>

                </div>
                <p>월 1일 ~ 마지막 날까지의 급여를 <br>
                    <b>해당 달</b>의 21일에 지급합니다.</p>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
