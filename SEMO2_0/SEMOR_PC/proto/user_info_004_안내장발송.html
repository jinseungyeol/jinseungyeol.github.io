<script>
$(function(){
  // Invoke the plugin
  $('input, textarea').placeholder({customClass:'my-placeholder'});
  
  
  
  // 보기설정 보기
    $('#btn_showhide').on("click", function(event){
    	if($(this).hasClass("down")){
    		$("#tbl_area").show();
    		$(this).removeClass("down");/SEMO2_0/SEMOR_MOB/index.html
    	}else{
    		$("#tbl_area").hide();
    		$(this).addClass("down");
    	}
    });
    
});
