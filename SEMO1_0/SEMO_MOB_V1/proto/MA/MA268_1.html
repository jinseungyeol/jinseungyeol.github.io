<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
 
      <div class="wrap join">
        <div class="pay_box">
          <div class="pay_result_wrap">
            <div class="pr_result_box">
              <i class="ico_pr_result success"></i> 
              <span class="pr_result">가상계좌 등록완료</span> 
            </div> 

            <div class="branch_select_wrap type2">  
              <div class="branch_select_box">
                <span class="bsb_tit">은행명</span>
                <div class="bsb_txt">
                  기업은행
                </div>
              </div>
   
              <div class="branch_select_box">
                <span class="bsb_tit">납부방법</span>
                <div class="bsb_txt">
                  가상계좌
                </div>
              </div>
  
              <div class="branch_select_box">
                <span class="bsb_tit">출금 동의일</span>
                <div class="bsb_txt c_gray">
                  2020. 02. 21
                </div>
              </div>
  
              <div class="branch_select_box">
                <span class="bsb_tit">출금 예정일</span>
                <div class="bsb_txt c_gray">
                  2020. 02. 21
                </div> 
              </div>
            </div> 
          </div>
        </div>
      </div>
      <!-- //납부계좌 등록결과 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
