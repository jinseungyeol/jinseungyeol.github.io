<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!-- 2020-06-11 뒤로가기 삭제 -->
    <div class="cont_bg cont_pd"> <!--2020-06-11 클래스 cont_pd_hd -> cont_pd로 수정-->
      
      <!-- 상단 타이틀 -->
      <div class="title">권유 영업점 입력</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      
      <div class="wrap join">

        <!-- 영업점 선택 -->
        <div class="join_box">
          
          <div class="title_sub">IBK 기업은행 권유영업점을 선택해 주세요.</div>

          <div class="join_block type2">
            <input type="text" class="join_input type2" placeholder="영업점 입력">
            <button class="btn_branch">검색</button>
          </div> 

          <p class="alert_q2 set_cent_le color set_mgt12">
            <i class="ico_cen"></i>
            <span>
              ‘IBK 세모장부’ 가입에 가장 도움이 된 기업은행 영업점을 선택해 주세요.
            </span>
          </p> 
          <p class="alert_q2 set_cent_le color set_mgt12">
            <i class="ico_cen"></i>
            <span>
              권유 영업점은 등록 이후 수정이 불가합니다.
            </span>
          </p> 
        </div>
        <!-- //영업점 선택 -->

      </div>
      <!-- //회원가입 -->
      
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>다음</span>
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
