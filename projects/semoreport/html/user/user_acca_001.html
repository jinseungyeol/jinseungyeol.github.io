<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>user_acca_001</title>
    <!-- css -->
    <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css/semoR_base.css">
    <link rel="stylesheet" href="../../css/semoR_common.css">
    <link rel="stylesheet" href="../../css/semoR_style.css">
    <link rel="stylesheet" href="../../css/semoR_rept.css">
    <!-- js -->
    <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/jquery-ui.min.js"></script>
    <script src="../../js/swiper-bundle.min.js"></script>
    <script src="../../js/mobiscroll.jquery.min.js"></script>
    <script src="../../js/semoR_ui.js"></script>
</head>

<body>
    <!-- wrapper -->
    <div class="wrapper">
        <!-- header -->
        <div class="header">
            <h1 class="subTit pdl20">계정 삭제 요청</h1>
        </div>
        <!-- //header -->

        <!-- container -->
        <div class="container">
            <div class="accaWrap">
                <h3 class="defTit">
                    <span>세모리포트</span><br>
                    계정을 삭제합니다.
                </h3>
                <ul class="listTypeInput">
                    <li>
                        <div class="formHolder">
                            <div class="inputList type02">
                                <strong class="formTit">사업자번호</strong>
                                <input type="number" placeholder="사업자번호 입력">
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="formHolder">
                            <div class="inputList type02">
                                <strong class="formTit">대표자명</strong>
                                <input type="text" placeholder="대표자명 입력">
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="formHolder">
                            <div class="inputList type02">
                                <strong class="formTit">주민등록번호</strong>
                                <div class="fieldGroup">
                                    <div class="col">
                                        <input type="number" placeholder="생년월일 6자리" maxlength="6">
                                    </div>
                                    <span class="divider">-</span>
                                    <div class="col backNum">
                                        <input type="text" maxlength="1">
                                        <span class="dot">● ● ● ● ● ● ●</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="formHolder">
                            <div class="fieldGroup bdNone">
                                <div class="inputList type02">
                                    <strong class="formTit">휴대폰번호</strong>
                                </div>
                                <ul class="selectDivision3_7">
                                    <li>
                                        <div class="stList col">
                                            <a href="javascript:;">SKT</a>
                                        </div>
                                    </li>
                                    <li>
                                        <!-- 인증요청 버튼 활성화시 active -->
                                        <div class="inputWrap">
                                            <input type="text" placeholder="휴대폰번호 입력">
                                            <a href="javascript:;" class="btnLookup" role="button">인증요청</a>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="formHolder">
                            <div class="inputList type02">
                                <strong class="formTit">인증번호</strong>
                                <input type="text" placeholder="인증번호 입력">
                                <span class="countDown">03:00</span>
                            </div>
                        </div>
                    </li>
                </ul>
                <hr class="grayLine02">
                <div class="infoRept">
                    <h4 class="defTit">안내사항</h4>
                    <p class="defTxt02">계정 삭제 전에 읽어보세요</p>
                </div>
                <div class="accaTerms">
                    <a href="javascript:;" class="moveLink">
                        <span class="state">개인정보 처리방침</span>
                        <div class="rCont">
                            <img class="tsRight" src="../../img/ico_ts_right_gray.png" alt="오른쪽화살표">
                        </div>
                    </a>
                    <div class="formWrap">
                        <div class="total">
                            <div class="formHolder">
                                <input type="checkbox" id="typeAll01">
                                <label class="check" for="typeAll01">위 내용을 모두 확인하였으며, 동의합니다.</label>
                            </div>
                            
                        </div>
                    </div>
                </div>
                <div class="areaBodyBtn">
                    <button type="button" class="btnPointBg pointBgColor">확인</button>
                </div>
            </div>
        </div>
        <!-- //container -->
    </div>
    <!-- //wrapper -->
</body>
</html>
