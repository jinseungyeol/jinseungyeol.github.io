<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">


    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">지문 설정</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">
        <div class="join_box">
          
          <div class="join_fingerprint_result">
            <p class="fp_tit1">지문인증 사용중</p>
            <p class="fp_ico"><i class="ico_finger_b"></i><em class="new_blind">지문</em></p>
            <p class="fp_tit2">지문인증이 완료 되었습니다!</p>
            <p class="fp_txt">다음 로그인부터 고객님 휴대폰에 등록된 지문을 통해 로그인할 수 있습니다.</p>
          </div>
        </div>

        <p class="join_noti nt_btm">
          <i class="character"></i>
          <span>지문인증 변경을 원하시면 설정에서 지문 지문인증 사용해제 가능합니다.</span>
        </p>
      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">로그인</span>  <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
