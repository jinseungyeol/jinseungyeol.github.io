<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/partner.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>계좌 관리</title>
</head>
<body>

  <!-- 헤더 타이틀 -->
  <div class="title">
    <div class="title_left">
      <i class="ico_cen left_arrow"></i>
    </div>
    <span class="title_text">계좌 관리</span>
    <div class="title_share">
      <button class="btn_edit">
        <i class="ico_cont"></i>
      </button>
    </div>
  </div>

  <div class="basic_wrapper">
    <div class="account_manage_wrap">
      <div class="account_manage">
        <article class="account_count_wrap">
          <div class="account_count">
            <span class="account_count_val">은행 <em class="num">3</em>개</span>
            <span class="bar"></span>
            <span class="account_count_val">계좌 <em class="num">7</em>개</span>
            <span class="bar"></span>
            <!-- error 클래스 추가 시 텍스트 빨강 -->
            <span class="account_count_val c_gray">오류 <em class="num">0</em>개</span>
          </div>
          <button type="button" class="btn_add_account">계좌 추가</button>
        </article>
  
        <!-- 계좌 리스트 -->
        <article class="assert_list">
          <div class="assert_content set_mgt10">
            <ul class="item_wrap">
              <li class="item_box set_pdt0">
                <div class="item_tit">
                  <div class="account_name">
                    <div class="logo">
                      <i class="ico_cont bank bk_089"></i>
                    </div>
                    <div class="name">
                      <p>케이뱅크</p>
                    </div>
                  </div>
                  <span class="ico_cen right_02"></span>
                </div>
                <ul class="item">
                  <li class="item_list">
                    <div class="info">
                      <div class="number_wrap">
                        <p class="number">
                          1223-141412-425255
                        </p>
                        <span class="ico_cen right_02"></span>
                      </div>
                      <p class="txt elipsis">
                        기업소상공인파트너힘이 되는
                      </p>
                    </div>
                    <div class="assert_state">
  
                      <!-- <div class="register">
                        <p class="success">정상</p>
                      </div> -->
                      <div class="check">
                        <input type="checkbox">
                      </div>
                      <!-- 상황에따라 register 클래스랑 check 클래스 주석풀고 사용하심 됩니다! -->
                    </div>
                  </li>
                  <li class="item_list">
                    <div class="info">
                      <div class="number_wrap">
                        <p class="number">
                          1223-141412-425255
                        </p>
                        <span class="ico_cen right_02"></span>
                      </div>
                      <p class="txt elipsis">
                        기업소상공인파트너힘이 되는 세모
                      </p>
                    </div>
                    <div class="assert_state">
  
                      <!-- <div class="register">
                        <p class="success">정상</p>
                      </div> -->
                      <div class="check">
                        <input type="checkbox">
                      </div>
                      <!-- 상황에따라 register 클래스랑 check 클래스 주석풀고 사용하심 됩니다! -->
                    </div>
                  </li>
                </ul>
              </li>
            </ul>
            <ul class="item_wrap">
              <li class="item_box">
                <div class="item_tit">
                  <div class="account_name">
                    <div class="logo">
                      <i class="ico_cont bank bk_004"></i>
                    </div>
                    <div class="name">
                      <p>KB국민은행</p>
                    </div>
                  </div>
                  <span class="ico_cen right_02"></span>
                </div>
                <ul class="item">
                  <li class="item_list">
                    <div class="info">
                      <div class="number_wrap">
                        <p class="number">
                          3333-05-7123485
                        </p>
                        <span class="ico_cen right_02"></span>
                      </div>
                      <p class="txt elipsis">
                        비상금통장
                      </p>
                    </div>
                    <div class="assert_state">
  
                      <div class="register">
                        <p class="success">정상</p>
                      </div>
                      <!-- <div class="check">
                        <input type="checkbox">
                      </div> -->
                      <!-- 상황에따라 register 클래스랑 check 클래스 주석풀고 사용하심 됩니다! -->
                    </div>
                  </li>
                </ul>
              </li>
            </ul>
            <ul class="item_wrap">
              <li class="item_box set_mgb0">
                <div class="item_tit">
                  <div class="account_name">
                    <div class="logo">
                      <i class="ico_cont bank bk_081"></i>
                    </div>
                    <div class="name">
                      <p>하나은행</p>
                    </div>
                  </div>
                  <span class="ico_cen right_02"></span>
                </div>
                <ul class="item">
                  <li class="item_list">
                    <div class="info">
                      <div class="number_wrap">
                        <p class="number">
                          3333-05-7123485
                        </p>
                        <span class="ico_cen right_02"></span>
                      </div>
                      <p class="txt elipsis">
                        부가세 10% 통장
                      </p>
                    </div>
                    <div class="assert_state">
  
                      <div class="register">
                        <p class="success">정상</p>
                      </div>
                      <!-- <div class="check">
                        <input type="checkbox">
                      </div> -->
                      <!-- 상황에따라 register 클래스랑 check 클래스 주석풀고 사용하심 됩니다! -->
                    </div>
                  </li>
                </ul>
              </li>
            </ul>
          </div>
        </article>
      </div>
      
      <!-- 편집버튼 -->
      <div class="bot_fix_pd20 pos_static">
        <div class="desc">
          <i class="info_gray"></i>
          <p>수집이 완료되면 사장님 맞춤 보고서에 반영되어요</p>
      </div>
        <div class="btn_wrap">
          <button class="double_rd">취소</button>
          <button class="double_rd bgc_sig">삭제하기</button> <!-- bgc_sig 클래스로 제휴사별 컬러적용  -->
        </div>
      </div>
    </div>
  </div>
</body>
</html>
