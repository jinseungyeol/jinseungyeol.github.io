<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!-- 팝업 배경-->
    <div class="popup_toast_bg">

      
      <!-- 토스트 팝업 내용 -->
      <div class="popup_toast set_pd_aus">
        <div class="toast content_bottom">
          <span>토스트팝업테스트</span>
        </div>
        <div class="popup_toast_head set_pdb15"><!-- 2020-11-19 set_pdb15 추가 -->
          <div class="popup_toast_tit">지출용도 전체보기</div>
          <div>
            <div class="popup_toast_save">
              <div class="popup_check_img ico_cen"></div>
            </div><!-- 2020-11-17 popup_check_img클래스 추가 -->
            <div class="popup_toast_close"></div>
          </div>
        </div>
      <div> <!-- 2020-11-19 div 추가 -->
        <p class="memo_input set_mgb16"><!-- 2020-11-19 set_mgt20클래스 삭제 -->
          <input class="sri_input" type="text" placeholder="추가 메모(최대 20자 입력)">
          <a><i class="ico_cen"></i><em class="new_blind">삭제</em></a>
        </p>
        <div class="account_use_check set_cent_le set_mgb20">
          <input id="arc_check" type="checkbox" class="check_terms" value="네이버 스토어팜" checked> <!--클릭하면 checked true-->
          <label for="arc_check">
            <span>㈜알파문구로지스</span> 내역에 동일하게 적용
          </label>
        </div>
        <div class="account_use_menu">
          <div> <!-- 2020-11-19 div태그 한개로 묶음 -->
            <p>
              <i class="ico_cen dtl_out_1 on"></i><!--활성클래스 on-->
              <span>구입</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_2 on"></i><!--활성클래스 on-->
              <span>세금계산서 발행매입</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_3 on"></i><!--활성클래스 on-->
              <span>급여</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_4 on"></i><!--활성클래스 on-->
              <span>임대료</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_5 on"></i><!--활성클래스 on-->
              <span>관리비</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_6 on"></i><!--활성클래스 on-->
              <span>세금</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_7 on"></i><!--활성클래스 on-->
              <span>접대비</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_8 on"></i><!--활성클래스 on-->
              <span>교통 출장비</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_9 on"></i><!--활성클래스 on-->
              <span>차량 유지비</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_10 on"></i><!--활성클래스 on-->
              <span>복리 후생비</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_11 on"></i><!--활성클래스 on-->
              <span>일반이체</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_12 on"></i><!--활성클래스 on-->
              <span>카드대금 이체</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_13 on"></i><!--활성클래스 on-->
              <span>기타</span>
            </p>
            <p>
              <i class="ico_cen dtl_out_14 on"></i><!--활성클래스 on-->
              <span>개인용도 (신고제외)</span>
            </p>
            <p>
              <i class="ico_cen dtl_def on"></i><!--활성클래스 on-->
              <span>미분류</span>
            </p>
            <p>
              <i class="ico_cen dtl_set"></i>
              <span>용도설정 바로가기</span>
            </p>
          </div>
         <!-- 2020-11-19 div태그 한개로 묶음 -->
        </div>
      </div>
    </div>
      <!-- 토스트 팝업 내용 -->
    </div>
    <!-- //팝업 배경 -->
  </div>
</body>
</html>
