<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css_v2/common.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- JS -->
    <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <script src="../../js_v2/wow.min.js"></script>
    <script src="../../js_v2/chart-3.5.1.min.js"></script>
    <script>
        $(document).ready(function () {


            function resizeInput() {
                $(this).attr('size', $(this).val().length);
            }
            $('#pay_month')
                .change(resizeInput)
                .each(resizeInput);
            mobiscroll.setOptions({
                theme: 'ios',
                themeVariant: 'light'

            });
            $(function () {
                $('#pay_month').mobiscroll().datepicker({
                    locale: mobiscroll.localeKo,
                    controls: ['date'],
                    dateFormat: 'YYYY년 MM월',
                    dateWheels: '|YYYY MMMM|',
                    touchUi: true,
                    buttons: [{
                        text: '확인',
                        handler: 'cancel'
                    }],
                });
            });
        });
    </script>
    <title>C657</title>
</head>
<body>
    <div class="title">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">급여관리</span>
        <div class="title_right">
            <i class="ico_cen info"></i>
        </div>
    </div>
    <div class="basic_wrapper ">
        <div class="pca_content ">
            <div class="pca_con_pop">
                <div class="pca_pop_img"></div>
                <div class="pca_pop_ment">
                    급여내역이 없습니다.
                </div>
            </div>
        </div>
        <div class="btm_button bottom_fix active">
            <span>가져오기</span>
        </div>
    </div>
</body>
</html>
