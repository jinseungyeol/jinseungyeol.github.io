   <script>
        var memberCountConTxt = 4341;
        $({ val : 0 }).animate({ val : memberCountConTxt }, {
        duration:1000, // 속도
        step: function() {
            var num = numberWithCommas(Math.floor(this.val));
            $("#number2").text(num);
        },
        complete: function() {
            var num = numberWithCommas(Math.floor(this.val));
            $("#number2").text(num);
        } 
        });

        function numberWithCommas(x) {
            return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }
   </script>
