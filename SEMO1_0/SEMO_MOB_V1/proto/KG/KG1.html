<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_kt.css">
    <title>KG_1</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg" >
            <!-- <div class="title">절세AI분석</div> -->
            <div class="wrap staff none"style="padding-bottom:85px;" >
                <div class="reduce_ai" >
                    <div class="redu_ai_top">
                        <span class="pass_1">통신사 PASS 인증</span>
                        <span class="pass_2">통신사 PASS 인증을 진행해주세요.</span>
                    </div>
                    <div class="ai_section01">
                        <div class="ai_title green">
                            1. PASS 앱 푸시 도착
                        </div>
                        <div class="ai_content">
                            <div class="ico_cen ai_img"></div>
                        </div>
                    </div>
                    <div class="ai_section02">
                        <div class="ai_title green">
                            2. PASS 앱 홈택스 로그인 서명하기
                        </div>
                        <div class="ai_content">
                            <div class="ico_cen ai_img"></div>
                        </div>
                    </div>
                    <div class="ai_section03">
                        <div class="ai_title green">
                            3. PASS 앱 홈택스 인증완료
                        </div>
                        <div class="ai_content">
                            <div class="con_txt_01">
                                <i></i>
                                <span>PASS 앱에서<em> 서명하기</em>를 눌러주세요</span>
                            </div>
                            <div class="con_txt_02">
                                <i></i>
                                <span>서명 완료하신 후<em> 다음</em> 버튼을 눌러주세요.</span>
                            </div>
                        </div>
                    </div>
                    <div class="ai_section04"> 
                      <div class="ai_input_title">
                        <i class="ico_cen"></i>
                        <span>PASS 앱 푸시-가 오지 않는다면 통신사 PASS 앱 설치</span>
                      </div>
                      <div class="ai_input_wrap">
                          <input type="radio" id="auth_agent2" class="agent" name="agent" value="KT">
                          <label for="auth_agent2">KT</label>
            
                          <input type="radio" id="auth_agent1" class="agent" name="agent" value="SKT" checked="">
                          <label for="auth_agent1">SK</label>
            
                        
                          <input type="radio" id="auth_agent3" class="agent" name="agent" value="LG">
                          <label for="auth_agent3">LG</label>
                      </div>
                    </div>
                    <div class="pass_ins_btn">
                        <span>통신사 PASS 설치하기</span>
                    </div>
                </div>
                <div class="btm_button">
                    <span class="bgc_green">다음</span>
                </div>
            </div>
          
        </div>
      
    </div>
</body>

</html>
