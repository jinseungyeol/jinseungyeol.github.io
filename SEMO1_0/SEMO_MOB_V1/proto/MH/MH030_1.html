<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg">

      <!-- 상단 타이틀 -->
      <div class="title">알림</div>
      <!-- //상단 타이틀 -->

      <div class="wrap notice">
        <div class="common_search_box">
          <input type="text" class="search_input" placeholder="내용을 입력해 주세요.">
          <a class="search_btn"><i></i></a>
        </div>
        <!-- 아이콘 분류 -->
        <!-- 1. 클래스: card / 카테고리명: 카드 / 알림명: 카드 부가세환급, 카드 입금 보류, 카드 입금 확인, 카드 매입 보류 -->
        <!-- 2. 클래스: hospital / 카테고리명: 건강보험 / 알림명: 요양급여, 의료급여 -->
        <!-- 3. 클래스: certi / 카테고리명: 무료체험 종료, 전일 입출내역 / 알림명: 무료체험 종료, 전일 입출내역 -->
        <!-- 4. 클래스: enquiry / 카테고리명: 1:1문의 / 알림명: 1:1문의 -->
        <!-- 5. 클래스: info / 카테고리명: 정보 / 알림명: 정보, 수임동의 -->
        <!-- 6. 클래스: tax / 카테고리명: 세금 / 알림명: 원천세, 부가세 예상(개인), 부가세 예상(법인) -->
        <!-- 7. 클래스: salary / 카테고리명: 급여 / 알림명: 가맹점 청구 --> 
        <div class="notice_list_wrap">
          <ul>
            <li class="ntlw_list">
              <div>
                <p>
                  <i class="ico_ntlw card"></i>
                  <span class="ntlw_class">카드 매출 입금예정</span>
                  <span class="ntlw_date">20.06.05 09:15</span>
                </p>
                <p class="ntlw_new">NEW <i></i></p>
              </div>
              <p class="ntlw_txt">8월 27일(월) 기준 카드 매출 입금예정입니다.</p> 
              <p class="ntlw_won">입금예정금액 <em class="c_blue_i">153,000</em>원</p>
            </li>
            <li class="ntlw_list sample"> <!--샘플 활성화 클래스 sample -->
              <div>
                <p>
                  <i class="ico_ntlw card"></i>
                  <span class="ntlw_class">카드 매출 입금예정</span>
                  <span class="ntlw_date">20.06.05 09:15</span>
                </p>
                <p class="ntlw_new">NEW <i></i></p>
              </div>
              <p class="ntlw_txt">8월 27일(월) 매입세금계산서 발행내역입니다.</p> 
              <p class="ntlw_won">입금예정금액 <em class="c_blue_i">153,000</em>원</p>
            </li>
          </ul>
        </div>
      </div>
      
    </div>

  </div>
</body>
</html>
