<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  
  <!-- container -->
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_primary.svg" alt="로고">
            </a>
          </h1>
        </div>
        <div class="right">
          <div class="rContBtnCol">
            <div class="btnBox">
              <button class="bdGrayBodyBtn">
                <span>문의하기</span>
              </button>
            </div>
            <div class="btnBox">
              <button class="bdGrayBodyBtn">
                <img class="leftIcon" src="../../img/wp/ico/ico_link_gray.svg" alt="링크">
                <span>공유하기</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- //header -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap full fixB">
        <div class="inner vatSave">
          <img src="../../img/wp/bg/bg_highfive.svg" alt="세금신고완료" class="visualImg">
          <div class="headingTxt">
            <p>
              <span>사장님, 훌륭하십니다!</span>
            </p>
            <strong>
              <span>지금까지의 세금 신고는</span>
              <span>이상없이 진행되었습니다.</span>
            </strong>
          </div>
          <p class="infoTxt">
            <span>‘세모리포트’로 <em class="pointColor">매 월 절세 진단 하실 수 있도록</em></span>
            <span><em class="fwBold">전문세무사님이</em> 순차적으로 연락드릴 예정입니다.</span>
          </p>
          <div class="areaFixedBottom">
            <div class="fixedBottomInner">
              <div class="cell">
                <button class="activeBodyBtn"><span>확인</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
