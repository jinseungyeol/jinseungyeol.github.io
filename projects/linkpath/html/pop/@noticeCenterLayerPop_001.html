<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
  <script>
    $(function() {
      popCenter('.popWrap');
    })
  </script>
</head>
<body>
  <div class="popWrap confirm">
    <div class="dim" onclick="popdimClose(this)"></div>
    <div class="popInner small">
      <div class="popCont">
        <div class="noticeWrap">
          <div class="noticeInner">
            <img src="../../img/wp/ico/ico_hometax02.svg" alt="홈택스 시스템 점검 안내" >
            <div class="noticeCnt">
              <strong class="noticeTit">홈택스 시스템 점검 안내</strong>
            </div>
            <div class="bdMsgBox">
              <p>
                안녕하세요. 세모리포트팀입니다.<br>
                현재 홈택스 수집 서비스가 정상화되어 다시 이용이<br>
                가능하오니 참고 부탁드립니다.
              </p>
              <p>
                더욱 안정적인 서비스 제공을 위해 최선을 다하겠습니다.<br>
                감사합니다.
              </p>
            </div>
            <div class="noticeBox">
              <div class="txt type02">
                <p>점검시간</p>
                <p class="pointColor">11월 16일(토) 19:00 ~ 17일(일) 01:00</p>
              </div>
              <div class="txt type02">
                <p>점검내용</p>
                <p class="gray">내부 시스템 DB 작업</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="noticePopBtnWrap">
        <div class="lCont">
          <button type="button">오늘하루그만보기</button>
        </div>
        <div class="rCont">
          <button type="button" onclick="popdimClose(this)">확인</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
