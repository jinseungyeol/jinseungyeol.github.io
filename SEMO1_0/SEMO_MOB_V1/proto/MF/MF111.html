<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg">

      <!-- 상단 타이틀 -->
      <div class="title">계좌관리</div>
      <!-- //상단 타이틀 -->  
       
      <div class="wrap setting">

        <!-- 리스트 -->
        <div> 
          <!-- 카드 목록 -->
          <div class="account_list_wrap">
            <!-- 카드 목록 총계-->
            <div class="account_total_box">
              <p>
                <i class="ico_account"></i>
                <span>계좌 <em class="account_number">5</em><span>개</span> (<em class="bank_number">4</em>개 은행)</span> <!--문수수정, ui수정-->
              </p>
            </div>
            <!-- //카드 목록 총계-->

            <!-- 카드-->
            <div class="account_list_box alb_posi">
              <ul>
                <li class="atlb_list3">
                  <div>
                    <span class="bk_class_busi">기업</span>
                    <span class="bk_class_trans">송금</span>
                  </div>
                  <div>
                    <span class="bk_name">IBK 사업은행</span>
                    <span class="bk_acnt_class">늘푸른하늘통장</span>
                    <span class="bk_acnt">1234-5678-12345-52</span>
                  </div>
                  <a class="bk_arr"><i></i><span class="new_blind">화살표</span></a>
                </li>
                <li class="atlb_list3"> <!--비활성화 클래스 off-->
                  <div>
                    <span class="bk_class_pers">개인</span>
                  </div>
                  <div>
                    <span class="bk_name">KB국민</span>
                    <span class="bk_acnt_class">사업자전용 계좌</span>
                    <span class="bk_acnt">12345-678-1234511</span>
                  </div>
                  <a class="bk_arr"><i></i><span class="new_blind">화살표</span></a>
                </li>
                <li class="atlb_list3">
                  <div>
                    <span class="bk_class_busi">기업</span>
                  </div>
                  <div>
                    <span class="bk_name">IBK 사업은행</span>
                    <span class="bk_acnt_class">BLISS.7</span>
                    <span class="bk_acnt">12345-678-1234511</span>
                  </div>
                  <a class="bk_arr"><i></i><span class="new_blind">화살표</span></a>
                </li>
              </ul>
            </div>
            <!-- //카드-->
          </div>
          <!-- //카드 목록 -->           
        </div>
        <!-- //리스트 -->
           
      </div> 

      <!-- 플로팅 버튼 -->
      <div class="flt_add_account">
        <i></i><span class="new_blind">카드 등록 플로팅 버튼</span>
      </div>
      <!-- //플로팅 버튼 -->
    </div>
  </div>
</body>
</html>
