<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- <link rel="stylesheet" href="../../css_v2/kt_style.css"> -->
  <script src="/js_v2/jquery-3.5.1.min.js"></script>
    <title>C603담당세무사정보</title>
</head>

<body>
    <div class="title">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">담당세무사정보</span>
    </div>
    <div class="basic_wrapper ">
        <div class="padding_wrapper20">
            <div class="content_info_reg">
                <div>
                    <b>정보등록</b>
                    <em>
                        아래 저장한 세무사님과 <br>
                        공유하실 수 있습니다.
                    </em>
                </div>
                <i class="ico_cen info_reg"></i>
            </div>
        </div>
        <div class="tax_info_input_wrap">
            <b>세무사 정보 입력</b>
            <div class="section_content_wrap set_mgt14">
                <div class="section_content">
                    <input type="text" id="text1" required="required">
                    <label for="text1" class="dot">이름</label>
                    <div class="section_nation">
                        <input type="text" required="required" placeholder="내국인" readonly="">
                        <i class="ico_cen down"></i>
                    </div>
                </div>
                <div class="section_content active">
                    <input type="number" class="active" id="text2" required="required">
                    <label for="text2" class="dot">휴대폰 번호</label>
                </div>
            </div>
        </div>
        <div class="btm_button bottom_fix active">
            <span>저장하기</span>
        </div>
    </div>

</body>

</html>
