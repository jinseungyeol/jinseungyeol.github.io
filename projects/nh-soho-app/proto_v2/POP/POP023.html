<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css_v2/common.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- JS -->
    <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <script src="../../js_v2/wow.min.js"></script>
    <script src="../../js_v2/chart-3.5.1.min.js"></script>
    <title>C656</title>
</head>
<body>
    <!-- 보안문자 입력팝업 & 인증번호 입력팝업 -->
    <div class="popup_bg" id="slide_popup">
        <div class="popup bottom fix_type" style="bottom:0;">
            <div class="popup_title hung">
                <i class="ico_cen del"></i>
            </div>
            <div class="secury_pop_wrap" style="display: none;">
                <div class="tit">
                    <h1>
                        아래의 보안문자를<br>
                        입력해주세요
                    </h1>
                </div>
                <article class="secury center">
                    <div class="img">
                        <img src="">
                    </div>
                    <div class="mini_btn_wrap">
                        <button type="button" class="mini typeA">
                            <span>다른 숫자로 변경할게요</span>
                        </button>
                    </div>
                    <!-- 잘못입력시 addClass error -->
                    <div class="input_wrap error">
                        <div class="entry_wrap">
                            <div class="entry">
                                <input type="number" placeholder="숫자 그대로 입력">
                            </div>
                        </div>
                        <div class="warn">
                            <span class="txt01">보안문자가 일치하지 않아요</span>
                        </div>
                    </div>
                </article>
                <div class="pop_btn_fix">
                    <!-- 입력후 addClass bgc_sig -->
                    <button class="type_A  bgc_sig"><span>다음</span></button>
                </div>
            </div>
            <div class="secury_pop_wrap">
                <div class="tit">
                    <h1>
                        문자로 발송된 인증번호를<br>
                        입력해 주세요
                    </h1>
                    <p>
                        인증번호가 오지 않는 경우 앞에 입력한<br>
                        정보를 다시 확인해 주세요
                    </p>
                </div>
                <article class="secury ">
                    <!-- 잘못입력시 addClass error -->
                    <div class="input_wrap error">
                        <div class="entry_wrap">
                            <div class="txt">
                                <span class="txt01">인증번호</span>
                            </div>
                            <div class="entry">
                                <input type="number" placeholder="숫자6자리 입력">
                            </div>
                            <div class="time">
                                <span class="txt02">02:22</span>
                            </div>
                        </div>
                        <div class="warn">
                            <span class="txt01">휴대폰번호를 입력해 주세요</span>
                        </div>
                    </div>
                    <div class="mini_btn_wrap">
                        <button type="button" class="mini typeA">
                            <span>다시 요청할게요</span>
                        </button>
                    </div>
                </article>
                <div class="pop_btn_fix">
                    <!-- 입력후 addClass bgc_sig -->
                    <button class="type_A"><span>본인확인</span></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
