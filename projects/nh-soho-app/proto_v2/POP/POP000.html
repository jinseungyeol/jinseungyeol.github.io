<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css_v2/common.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- JS -->
    <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <script src="../../js_v2/wow.min.js"></script>
    <script src="../../js_v2/chart-3.5.1.min.js"></script>
    <title>C602직원관리</title>
</head>
<body>
    <div class="popup_bg req">
        <div class="popup bottom" style="bottom: 0;">
            <div class="popup_title">
                <b>직원서류 요청하기</b>
                <i class="ico_cen del"></i>
            </div>
            <div class="popup_document_con" style="max-height:61vh; padding:0 5.937vw 22vw;">
                <div class="popup_document sec1">
                    <span>
                        <em>이름</em>
                        <p>김세모</p>
                    </span>
                    <span>
                        <em>휴대폰번호</em>
                        <p>010-1234-5678</p>
                    </span>
                </div>
                <div class="popup_document sec2">
                    <em>
                        개인정보는 급여명세서 발송을 위해 필요한 정보입니다.
                    </em>
                    <span>
                        <i class="ico_cen check_sig"></i>
                        <b>생년월일</b>
                    </span>
                    <span>
                        <i class="ico_cen check_sig"></i>
                        <b>급여계좌</b>
                    </span>
                    <span>
                        <i class="ico_cen check_sig"></i>
                        <b>이메일</b>
                    </span>
                    <span>
                        <i class="ico_cen check_sig"></i>
                        <b>주소</b>
                    </span>
                </div>
                <div class="popup_document sec3">
                    <b class="popup_content_title">입사서류</b>
                    <em>입사시 필요한 항목을 체크해 주세요</em>
                    <span>
                        <input type="checkbox" id="document1">
                        <label for="document1">주민등록등본 </label>
                    </span>
                    <span>
                        <input type="checkbox" id="document2">
                        <label for="document2">보건증 (만료일자 기재)</label>
                    </span>
                    <span>
                        <input type="checkbox" id="document3">
                        <label for="document3">가족관계증명서 (부양가족 별도 거주시)</label>
                    </span>
                    <span>
                        <input type="checkbox" id="document4">
                        <label for="document4">차량등록증(본인명의차량, 비과세 공제시)</label>
                    </span>
                    <span>
                        <input type="checkbox" id="document5">
                        <label for="document5">신분증 사본 (주민증, 운전면허증, 여권) </label>
                    </span>
                    <span>
                        <input type="checkbox" id="document6">
                        <label for="document6">자격증 사본</label>
                    </span>
                    <span>
                        <input type="checkbox" id="document7">
                        <label for="document7">직접입력하기</label>
                    </span>
                </div>
                <div class="popup_document_send">
                    <input type="checkbox" id="send">
                    <label for="send">세모근태관리 앱 설치 안내도 함께 발송하기 </label>
                </div>
              
            </div>
            <div class="btm_button bottom_fix active">
                <span>직원에게 요청하기</span>
            </div>
        </div>
    </div>
</body>
</html>
