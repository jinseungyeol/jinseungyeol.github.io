<!DOCTYPE html>
<html lang="ko" xml:lang="ko">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
<title>SC105 필수팝업</title>
<link rel="stylesheet" href="../css/reset_taxp.css">
<link rel="stylesheet" href="../css/content_taxp.css"><!-- [D] 세무대리인용 -->

<!-- custom scrollbar plugin css -->
<link rel="stylesheet" href="../css/jquery.mCustomScrollbar.css">
  <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
<script src="http://ajax.googleapis.com/ajax/libs/jqueryui/1.10.4/jquery-ui.min.js"></script>
<!-- custom scrollbar plugin -->
<script src="../js/jquery.mCustomScrollbar.concat.min.js"></script>
<script src="../js/jquery.placeholder.min.js"></script>
<script>
$(function(){
	// Invoke the plugin
	$('input, textarea').placeholder({customClass:'my-placeholder'});
	
});
</script>
</head>
<body>
	<div class="pop_wrap" style="width: 570px">
		<!-- 팝업 헤더 -->
		<div class="pop_header">
			<h1 style="position: relative;">실시간 정보수집 안내</h1>
			<a href="#none" class="btn_popclose"><img src="../img/txof/btn/btn_popClose_white.gif" alt="팝업닫기"></a>
		</div>
		<!-- //팝업 헤더 -->
		
		<!-- 팝업 컨텐츠 -->
        <div class="pop_container">
            <div class="alert_pop">
                <div class="top">
                    <!-- 에러 코드 이미지 -->
                    <img src="../img/txof/ico/ico_pc_down_40px.png" alt="">
                    <h1>
                        2022년 연말정산 원천세 신고내역<br>
                        업데이트 필요
                    </h1>
                    <h2>대상 거래처 수 : 45개</h2>
                </div>
                <div class="middle">
                    <p>2023년 02월 원천징수이행상황신고서 내역에서</p>
                    <p><strong class="txt_red">연말정산분을 제외하여</strong>사업분석 보고서를 업데이트 합니다.</p>
                </div>
                <div class="bottom">
                    <div class="btn">
                        <a class="btn_style_big">
                            <span>지금 업데이트하기</span>
                        </a>
                    </div>
                    <div class="close_btn">
                        <input type="checkbox" name="" id="">
                        <label for="">오늘 하루보지 않기</label>
                    </div>
                    
                </div>
            </div>
            
        </div>
	</div>

</body>
</html>
