<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_nh.css">
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function () {
            $(".section_content").click(function () {
                $(this).addClass("active");
                $(this).siblings().removeClass("active")
            });
        });
    </script>

    <title>Document</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg b_gray">
            <div class="title_v2">
                <div class="title_left_v2">
                    <i class="ico_cen left_arrow"></i>
                </div>
                <span class="title_text_v2">나의 사업장 관리</span>
                <div class="title_right_v2">
                    <i class="ico_cen search "></i>
                </div>
            </div>
            <div class="section_input_wrap store_manage set_mgt80">
                <div class="section_input_title">
                    <i class="ico_cen section_num5 on"></i>
                    <b>사엄장 로그인 정보를 입력해주세요.</b>
                </div>
                <div class="section_content_wrap" style="margin-top: 20px; ">
                    <div class="section_content" style="display:none;">
                        <input type="text" id="text22" required="required">
                        <label for="text22">상호명 입력</label>
                        <i class="ico_cen down"></i>
                    </div>
                    <div class="section_content round_top readonly disabled">
                        <input type="text" id="text22" required="required" value="123-45-7890">
                        <label for="text22" class="dot">사업자번호 입력</label>
                        <i class="ico_cen down"></i>
                    </div>
                    <div class="section_content">
                        <input type="text" id="text22" required="required" value="● ● ● ● ● ●" maxlength="6">
                        <label for="text22" class="dot">비밀번호</label>
                        <i class="ico_cen down"></i>
                    </div>
                </div>
            </div>
            <div class="btm_button bottom_fix active">
                <span>사업장 인증</span>
            </div>
        </div>
      
    </div>

</body>

</html>
