<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->
            
      <!-- 간편송금 -->
      <div class="wrap account">
        <div class="account_box">
          <div class="transfer_result">
            <i class="ico_tr success"><em class="new_blind">지급완료아이콘</em></i> <!--success-->
            <strong>
              송금이<br>성공하였습니다.
            </strong>
          </div>
 
          <div class="branch_select_wrap"> 
            <div class="branch_select_box">
              <span class="bsb_date">2020년 01월 누적</span> 
            </div>

            <div class="branch_select_box">
              <span class="bsb_tit">이용상품명</span>
              <div class="bsb_txt">
                LITE
              </div>
            </div>
  
            <div class="branch_select_box">
              <span class="bsb_tit">누적건수</span>
              <div class="bsb_txt">
                <em>10</em>건
              </div>
            </div>

            <div class="branch_select_box">
              <span class="bsb_tit">누적 송금 수수료</span>
              <div class="bsb_txt ">
                <em>5000</em>원
              </div>
            </div>  
          </div>  

          <p class="alert_q2 color set_mgt10">
            <i class="ico_cen"></i>
            <span>
              LITE 월 5건/ PRO 월 20건 무료, 초과 시 건당 300원
            </span>
          </p>

          <button class="btn_plus">  
            <i class="plus"></i>거래처 등록하기
          </button>

          <div class="nomal_noti center">
            <span class="tr_branch_name">'홍길동' 님</span>
            <span>거래처로 등록하시겠습니까?</span>
          </div>
        </div>
      </div>
      <!-- //간편송금 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
