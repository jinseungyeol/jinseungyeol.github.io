<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../../css/semo_cont.css" />
    <title>SEMO</title>
  </head>
  <body>
    <div class="new_content">
      <div class="cont_bg bg_top">
        <!-- 메인 헤더(타이틀) -->
        <div class="my_hd">
          <span class="my_tit"> <!--2020-08-03 문구 수정-->
            많이 벌고 적게 내세요 💰
          </span><br/>
          <span class="my_user">
            <strong class="my_name">세모치킨 압구정점</strong>
            님 <!--2020-08-03 문구 수정-->
          </span>
          <button class="btn_my_doc on"> <!--활성 클래스 on--> <!--2020-08-03 button 추가-->
            <p>
              <span>나의 세모주치의:</span>&nbsp;&nbsp;
              <strong class="ellipsis">세무법인 한결세무회계</strong>
            </p>
            <a><i class="ico_cen"></i><em class="new_blind">이동 버튼</em></a>
          </button><!--2020-08-03 추가-->
        </div>
        <!-- //메인 헤더(타이틀) -->

        <!-- 메인 컨텐츠 -->
        <div class="my_cont">
          <!-- 메인 총 잔액 -->
          <div class="my_list ml_total">
            <div class="mtt_h">
              <p>
                <span class="tth_tit">전체계좌 <em>4</em>개</span>
                <span>
                  <span class="date">19.12.30 13:55:46</span>
                  <span class="ico_re"
                    ><i></i><em class="new_blind">갱신</em></span
                  >
                </span>
              </p>
            </div>
            <div class="mtt_tt">
              <p>
                <span class="mtt_tit">총 잔액</span>
                <span class="mtt_won"><em class="won">300,000,000</em>원</span>
              </p>
            </div>
            <div class="mli_dt s_width">
              <p>
                <span
                  >입급<i class="number n_in"><em>3</em></i></span
                >
                <!-- 클래스 n_in 빨간색  -->
                <span><em class="won ellipsis">300,000,000</em>원</span>
              </p>
              <p>
                <span
                  >출금<i class="number n_out"><em>2</em></i></span
                >
                <!-- 클래스 n_out 파란색  -->
                <span><em class="won ellipsis">300,000,000</em>원</span>
              </p>
            </div>
          </div>
          <!-- //메인 총 잔액 -->

          <!-- 메인 상세내역 -->
          <div class="ml_detail">
            <ul>
              <li class="my_list fix_list">
                <div class="mdt_h">
                  <p>
                    <span class="dth_tit">카드 매출</span>
                    <span>
                      <span class="date">19.12.30 13:55:46</span>
                      <span class="ico_re"
                        ><i></i><em class="new_blind">갱신</em></span
                      >
                    </span>
                  </p>
                </div>
                <div class="mli_dt l_width">
                  <p>
                    <span
                      >오늘 입금 예정<i class="number n_in"><em>3</em></i></span
                    >
                    <span><em class="won ellipsis">300,000,000</em>원</span>
                  </p>
                  <p>
                    <span>이번달 매출</span>
                    <span><em class="won ellipsis">300,000,000</em>원</span>
                  </p>
                </div>
              </li>

              <li class="my_list">
                <div class="mdt_h set_flex">
                  <p>
                    <span class="dth_tit">
                      직원 관리
                      <a class="btn_popup"
                        ><i class="ico_popup"></i
                        ><em class="new_blind">팝업메뉴</em></a
                      >
                    </span>
                  </p>
                </div>
                <div class="mli_dt">
                  <p>
                    <span>직원 수</span>
                    <span><em class="unit ellipsis">13</em>명</span>
                  </p>
                  <p>
                    <span>총 급여 예상액</span>
                    <span><em class="won ellipsis">300,000,000</em>원</span>
                  </p>
                </div>
              </li>
            </ul>
          </div>
          <!-- //메인 상세내역 -->
        </div>
        <!-- //메인 컨텐츠 -->
      </div>
    </div>
  </body>
</html>
