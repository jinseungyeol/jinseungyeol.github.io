<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_kt.css">
    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg gray">
                        <!-- 안드로이드 -->

            <div class="popup_bg alert pretendard" style="display: none;">
                <div class="popup_content">
                    <div class="popup_title">
                        <span style="text-align: center;">
                            <b>매월 사장님의 KT이용요금 청구서에
                                해당 금액이 합산되어 결제됩니다.</b>
                        </span>
                    </div>
                    <div class="popup_center">
                        <b>4,950원</b>
                    </div>
                    <div class="popup_text">
                        <span style="text-align: center;">
                            <p>
                                더 자세한 내용은 설정 > 서비스 결제관리에서
                                확인하실 수 있습니다.
                            </p>
                        </span>
                    </div>
                    <div class="btm_button">
                        <span class="bgc_green">확인</span>
                        <!--클래스 bgc_green 배경색-->
                    </div>
                </div>
            </div>
            <!-- IOS -->
            <div class="popup_bg alert pretendard">
                <div class="popup_content">
                    <div class="popup_title">
                        <span style="text-align: center;">
                            <b>
                                프리미엄 서비스를<br>
                                해지하시겠습니까?
                            </b>
                        </span>
                    </div>
                    <div class="popup_text">
                        <span style="text-align: center;">
                            <p>
                                해지 시 일할 계산되어 청구됩니다.
                            </p>
                        </span>
                    </div>
                    <div class="btm_button h65">
                        <em>취소</em>
                        <span class="bgc_green">확인</span>
                        <!--클래스 bgc_green 배경색-->
                    </div>
                </div>
            </div>
        </div>
    </div>

    
</body>

</html>
