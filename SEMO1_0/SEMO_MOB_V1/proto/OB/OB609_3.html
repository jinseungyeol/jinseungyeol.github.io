<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd 포함 패딩-->
      
      <div class="wrap setting">
        <div class="title_sub set_pdtb20">전자서명을 위해 개인/기업 선택해주세요.</div> 
        <div class="Electro_signature_box">
          <div class="es_full_btn inidi on">개인실명번호로 전자서명하기</div> <!--활성 클래스 on-->
          <div class="es_input_box">
            <input type="text" class="name" value="홍길동" disabled>
            <div>
              <input type="text" class="birthday"  placeholder="생년월일" value="801231">
              <input type="password" class="registration"  placeholder="주민번호 뒤 7자리">
            </div>
          </div>
          <div class="es_full_btn busi">기업실명번호로 전자서명하기</div>
        </div>
      </div> 
      
    </div>

    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>숫자 6자리를 입력해주세요.</span>
    </div>
    <!-- 토스트 팝업 -->

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>취소</span>
      <span class="bgc_gray">다음</span> <!--클래스 bgc_gray 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
