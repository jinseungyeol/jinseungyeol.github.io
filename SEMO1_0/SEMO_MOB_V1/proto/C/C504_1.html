<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg"> 
      <!-- 상단 타이틀 -->
      <div class="title">계좌 증빙</div>
      <!-- //상단 타이틀 -->

      <div class="wrap document">
        <div class="account_info_box set_mgb89">
          <p>
            <span>거래일시</span>
            <span>20년 01월 23일(목) 14:22:33</span>
          </p>
          <p>
            <span>거래내용</span>
            <span>㈜알파문구로지스</span>
          </p>
          <p>
            <span>금액</span>
            <span>920,000</span>
          </p>
          <p>
            <span>구분</span>
            <span>출금</span>
          </p>
          <p>
            <span>거래계좌</span>
            <span>IBK기업 4790903243252342 </span>
          </p>
        </div>
        <div class="account_use_box">
          <div class="account_use_register set_mgb18">
            <p>
              <span class="aur_tit">용도</span>
              <span class="aur_txt c_orange">온라인매출</span> <!--색 활성화 클래스 c_orange-->
            </p>
            <button class="aur_btn"><i class="ico_cen"></i>용도입력</button>
          </div>
          <p class="memo_input  set_mgt15 set_mgb15">
            <input class="sri_input" type="text" placeholder="추가 메모(최대 20자 입력)">
            <a><i class="ico_cen"></i><em class="new_blind">삭제</em></a>
          </p>
          <div class="account_use_check set_mgb13">
            <input id="arc_check" type="checkbox" class="check_terms" checked> <!--클릭하면 checked true-->
            <label for="arc_check">동일 거래내용에 일괄적용</label>
          </div>
          <p class="noti_comm">
            <i class="ico_cen"></i>
            <span>동일 거래내용의 용도와 메모를 전부 변경하려면 체크해 주세요</span>
          </p>
        </div>
      </div>
    </div>
    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>저장되었습니다 </span>
    </div>
    <!-- 토스트 팝업 -->

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
