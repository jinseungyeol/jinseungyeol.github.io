<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <!-- <link rel="stylesheet" href="../../css_v2/ione_style.css"> -->
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>여신본인확인</title>
</head>
<body>
    <div class="title b_white">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">카드매출 연결하기</span>
    </div>
    <div class="basic_wrapper">      
            <div class="card_connect_wrap">
                <!-- 본인확인 -->
                <section class="identi_wrap" >
                    <header class="main_tit">
                        <h1 class="txt01">통신사 인증으로 본인 확인</h1>
                        <h2 class="txt01">
                            본인명의 휴대폰만 가능
                        </h2>
                    </header>
                    <div class="content">
                        <article class="name">
                            <div class="tit">
                                <h1>이름</h1>
                            </div>
                            <div class="input_wrap">
                                <input type="text" value="김세모">
                            </div>
                        </article>
                        <article class="birth">
                            <div class="tit">
                                <h1>생년월일</h1>
                            </div>
                            <div class="input_wrap">
                                <div class="num">
                                    <input type="number"  placeholder="주민등록 앞 6자리">
                                </div>
                                <span>-</span>
                                <div class="pass">
                                    <input type="number">
                                    <div class="secret">
                                        <span>●</span>
                                        <span>●</span>
                                        <span>●</span>
                                        <span>●</span>
                                        <span>●</span>
                                        <span>●</span>
                                    </div>
                                </div>
                            </div>
                        </article>
                        <article class="email">
                            <div class="tit">
                                <h1>이메일</h1>
                            </div>
                            <div class="input_wrap">
                                <input type="email" placeholder="이메일 주소 전체입력">
                            </div>
                        </article>
                        <article class="phone">
                            <div class="tit">
                                <h1>휴대폰번호</h1>
                            </div>
                            <div class="item">
                                <div class="select">
                                    <span>통신사</span>
                                    <i class="ico_cont"></i>
                                </div>
                                <div class="input_wrap">
                                    <input type="number" value="010-3258-0000">
                                </div>
                            </div>
                        </article>
                    </div>
                    <!-- 활성화상태 addClass bgc_sig -->
                    <div class="bot_fix">
                        <button type="button" class="type_A bgc_sig">
                            <span>다음</span>
                        </button>
                    </div> 
                    <!-- 통신사선택 팝업  -->
                    <div class="popup_bg" id="slide_popup" style="display: none;">
                        <div class="popup bottom">
                            <div class="popup_title">
                                <b>통신사 선택</b>
                                <i class="ico_cen del"></i>
                            </div>
                            <div class="popup_bottom_con">
                                <span>
                                    <b>KT</b>
                                </span>
                                <span>
                                    <b>SKT</b>
                                </span>
                                <span>
                                    <b>LG U+</b>
                                </span>
                                <span>
                                    <b>KT 알뜰폰</b>
                                </span>
                                <span>
                                    <b>STK 알뜰폰</b>
                                </span>
                                <span>
                                    <b>LG U+ 알뜰폰</b>
                                </span>
                            </div>
                        </div>
                    </div> 

                    <!-- 보안문자 입력팝업 & 인증번호 입력팝업 -->
                    <div class="popup_bg" id="slide_popup"  >
                        <div class="popup bottom fix_type" style="bottom:0;">
                            <div class="popup_title hung">
                                <i class="ico_cen del"></i>
                            </div>
                            <div class="secury_pop_wrap" style="display: none;">
                                <div class="tit">
                                    <h1>
                                        아래의 보안문자를<br>
                                        입력해주세요
                                    </h1>
                                </div>
                                <article class="secury center">
                                    <div class="img">
                                       <img src="">
                                    </div>
                                    <div class="mini_btn_wrap">
                                        <button type="button" class="mini typeA">
                                            <span>다른 숫자로 변경할게요</span>
                                        </button>
                                    </div>
                                    <!-- 잘못입력시 addClass error -->
                                    <div class="input_wrap error">
                                        <div class="entry_wrap">
                                            <div class="entry">
                                                <input type="number" placeholder="숫자 그대로 입력">
                                            </div>
                                        </div>
                                        <div class="warn">
                                            <span class="txt01">보안문자가 일치하지 않아요</span>
                                        </div>
                                    </div>
                                </article>
                                <div class="pop_btn_fix">
                                    <!-- 입력후 addClass bgc_sig -->
                                    <button class="type_A  bgc_sig"><span>다음</span></button>
                                </div>
                            </div>
                            <div class="secury_pop_wrap" >
                                <div class="tit">
                                    <h1>
                                        문자로 발송된 인증번호를<br>
                                        입력해 주세요                
                                    </h1>  
                                    <p>
                                        인증번호가 오지 않는 경우 앞에 입력한<br>
                                        정보를 다시 확인해 주세요
                                    </p>

                                </div>
                                <article class="secury ">
                                    <!-- 잘못입력시 addClass error -->
                                    <div class="input_wrap error">
                                        <div class="entry_wrap">
                                            <div class="txt">
                                                <span class="txt01">인증번호</span>
                                            </div>
                                            <div class="entry">
                                                <input type="number" placeholder="숫자6자리 입력">
                                            </div>
                                            <div class="time">
                                                <span class="txt02">02:22</span>
                                            </div>
                                        </div>
                                        <div class="warn">
                                            <span class="txt01">휴대폰번호를 입력해 주세요</span>
                                        </div>
                                    </div>
                                    
                                    <div class="mini_btn_wrap">
                                        <button type="button" class="mini typeA">
                                            <span>다시 요청할게요</span>
                                        </button>
                                    </div>
                                </article>
                                <div class="pop_btn_fix">
                                    <!-- 입력후 addClass bgc_sig -->
                                    <button class="type_A"><span>본인확인</span></button>
                                </div>
                            </div>
                        </div>
                    </div> 
                </section>
            </div> 
     </div>

     <script>
    //  인증번호 입력 활성화
    $(document).ready(function () {
        $(".phone .btn button.active").click(function () {
        $(".code").css("display", "flex");   
        });
    });

    // 팝업
    $(document).ready(function () {
        $(".select").click(function () {
            $(".identi_wrap #slide_popup").fadeIn(500);
            $(".identi_wrap  #slide_popup > .popup.bottom").css("bottom", "0");
            $("html, body").css("overflow", "hidden");
            $("html, body").css("height", "100%");
            
    });
    // 팝업 배경터치하면 사라짐
    $(document).click(function (e) {
        if ($(".popup_bg, .del").is(e.target)) {
            $(".popup_bg").hide();
            $(".popup.bottom").show().animate({bottom: "-100%"}, 100);
            }
        });
    });
     </script>
</body>
</html>
