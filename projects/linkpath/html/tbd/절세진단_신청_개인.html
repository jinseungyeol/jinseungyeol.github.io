<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  
  <!-- container -->
  <div class="container">
    
    <!-- 본인인증 정보화면 start -->
    <div class="savingWrap">
      <div class="inner">
        <div class="areaTit">
          <h1 class="defTit">
            <span>부가세 절세</span>
            <span>진단서비스</span>
          </h1>
          <p>
            <span>사장님의 숨겨진 세금</span>
            <span>절세 가능금액을 찾아드립니다.</span>
          </p>
        </div>
        <!-- certiForm -->
        <form id="certiForm" novalidate="">
          <!-- active 클래스 추가시 simpleCerti노출 -->
          <div class="busiNum active">
            <div>
              <p class="formTit">사업자번호</p>
              <input type="tel"placeholder="000-00-00000" maxlength="12">
            </div>
            <button type="button" class="active">사업자 인증</button> <!-- active 클래스 추가시 버튼 활성화 -->
          </div>
          <div class="simpleCerti">
            <div class="agree">
              <p class="formTit">부가세 절세금액 조회를 위한 사장님의 개인정보 활용 동의</p>
              <ul class="checkList">
                <li>
                  <div>
                    <label>
                      <input type="checkbox" class="inputData">
                      <span>개인정보 수집이용 동의 (필수)</span>
                    </label>
                    <a href="javascript:;">
                      <img src="../../img/wp/ico/ico_ts_right_white.svg" width="24px" alt="개인정보 수집이용 동의 이동">
                    </a>
                  </div>
                </li>
                <li>
                  <div>
                    <label>
                      <input type="checkbox" class="inputData">
                      <span>마케팅 활용 동의 (필수)</span>
                    </label>
                    <a href="javascript:;">
                      <img src="../../img/wp/ico/ico_ts_right_white.svg" width="24px" alt="마케팅 활용 동의 이동">
                    </a>
                  </div>
                </li>
                <li>
                  <div>
                    <label>
                      <input type="checkbox" class="inputData">
                      <span>마케팅 활용 수신 동의 (필수)</span>
                    </label>
                    <a href="javascript:;">
                      <img src="../../img/wp/ico/ico_ts_right_white.svg" width="24px" alt="마케팅 활용 수신 동의 이동">
                    </a>
                  </div>
                </li>
              </ul>
            </div>
            <div class="inputWrap">
              <p>
                사장님의 부가세 절세 가능금액 조회를 위해 <strong>본인인증을 진행합니다</strong>
              </p>
              <div class="inputBox">
                <input type="text" class="inputData" placeholder="이름" maxlength="100">
              </div>
              <div class="inputBox resident">
                <input type="tel" class="inputData" maxlength="6" placeholder="생년월일 6자리">
                <strong class="divide">-</strong>
                <input type="tel" class="inputData" maxlength="1">
                <span class="backNum">●●●●●●</span>
              </div>
              <div class="telBox">
                <div class="selectBox">
                  <select class="selectItem">
                    <option value="SKT">SKT</option>
                    <option value="KT">KT</option>
                    <option value="LG U+">LG U+</option>
                  </select>
                </div>
                <div class="inputBox">
                  <input type="tel" class="inputData" maxlength="13" placeholder="휴대폰번호 입력 (‘-’ 제외)">
                </div>
              </div>
            </div>
            <div class="btnWrap">
              <button type="button" class="btnKakao active">카카오톡 간편인증 실행하기</button><!-- active 클래스 추가시 버튼활성화 -->
              <button type="button" class="btnPass active">PASS 간편인증 실행하기 </button><!-- active 클래스 추가시 버튼활성화 -->
            </div>
          </div>
        </form>
        <!-- //certiForm -->
      </div>
    </div>
    <!-- //본인인증 정보화면 end -->

    </div>
  <!-- //container -->
</body>
</html>
