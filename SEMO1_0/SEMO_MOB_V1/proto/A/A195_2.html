<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd">
      
      <!-- 상단 타이틀 -->
      <div class="title">영업점 검색</div>
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join"> <!-- 클래스 변경 (join_wrap -> wrap join) -->

        <!-- 영업점 선택 -->
        <div class="join_box">
          
          <div class="title_sub">IBK 기업은행 권유영업점을 선택해 주세요.</div> <!-- 클래스 변경 (join_tit -> title_sub) -->

          <div class="join_block type2">
            <input type="text" class="join_input type2" placeholder="영업점 입력">
            <button class="btn_branch">검색</button>
          </div>

          <div class="join_noti">
            <i class="character"></i>
            <span>‘IBK 세모장부’ 가입에 가장 도움이 된 기업은행 영업점을 선택해 주세요.</span>
          </div>
          <div class="join_noti">
            <i class="character"></i>
            <span>권유 영업점은 최초 1회만 등록 가능하며, 미 등록 시 회원가입 후 앱내에서 다시 등록이 가능합니다.</span>
          </div>
  
          <!-- 가입성공 -->
          <div class="join_result"> 
            <i class="ico_result_s"></i>
            <span class="join_result_txt">가입이 완료되었습니다.</span>
            <span class="join_noti"> 영업점의 명칭을 다시 확인해 주세요.</span>
          </div> 
          <!-- //가입성공 -->

        </div>
        <!-- //영업점 선택 -->
        
      </div>
      <!-- //회원가입 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
