<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
  <script src="../../js/design.js"></script>

    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg">
            <!-- 상단 타이틀 -->
            <!-- <div class="title">급여관리</div> -->
            <!-- //상단 타이틀 -->

            <div class="wrap salary">
                <div class="salary_wrapper">
                    <div class="salary_title">
                        <div class="salary_title_top">
                            <i class="ico_cen"></i>
                            <b>해당 급여월을 선택해 주세요.</b>
                        </div>
                        <div class="salary_select">
                            <select name="years" class="day_years">
                                <option value="2020"><em>2021년</em> 5월<em></em></option>
                                <option value="2019"><em>2021년</em> 5월<em></em></option>
                                <option value="2018"><em>2021년</em> 5월<em></em></option>
                                <option value="2017"><em>2021년</em> 5월<em></em></option>
                            </select>
                            <i class="ico_cen up"></i><!-- up 클래스로 제어 -->
                        </div>
                    </div>
                    <div class="salary_cont">
                        <p class="salary_setting">급여일 설정</p>
                        <div class="salary_contents_wrap">
                            <div>
                                <p>
                                    <b>급여작성</b>
                                    <span>조회하기</span>
                                </p>
                                <em>이 달의 급여를 작성하여 
                                    세무사에게 공유할 수 있습니다.</em>
                            </div>
                            <div>
                                <p>
                                    <b>급여작성</b>
                                    <span>작성하기</span>
                                </p>
                                <em>직원들에게 급여명세서를 
                                    발송할 수 있습니다.</em>
                            </div>
                            <div>
                                <p>
                                    <b>원천세납부</b>
                                    <span>납부하기</span>
                                </p>
                                <em>원천세(직원관련 세금)를 
                                    조회 및 납부할 수 있습니다.</em>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
