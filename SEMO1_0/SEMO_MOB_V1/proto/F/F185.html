<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../../css/semo_cont.css" />
    <title>SEMO</title>
  </head>
  <body>
    <div class="new_content">
      <div class="cont_bg cont_pd">
        <!-- 클래스 cont_pd fix_button 포함 패딩-->

        <!-- 상단 타이틀 -->
        <div class="title">여신금융협회</div>
        <!-- //상단 타이틀 -->

        <div class="wrap setting">
          <div class="input_info_box">
            <span class="info_tit"
              >사용자 아이디와 비밀번호를 입력해 주세요.</span
            >
            <input
              class="info_input"
              placeholder="아이디(영문, 숫자)"
              value="SEMOJANGBU"
            />
            <p class="info_input">
              <span class="pwd_dot_box">
                <em class="dot"></em>
                <em class="dot"></em>
                <em class="dot"></em>
                <em class="dot"></em>
                <em class="dot"></em>
                <em class="dot"></em>
                <em class="dot"></em>
              </span>
              <a class="btn_change_pwd"
                ><i></i><em class="new_blind">비밀번호 변경</em></a
              >
            </p>
          </div>

          <div class="noti_fail">
            <span>조회실패</span>
            <p>
              해당 기관의 관련페이지 변경으로 거래가 실패하였습니다.[80002F32]
            </p>
          </div>

          <!-- 안내 -->
          <div class="noti_box pd_set posi_defalt">
            <p class="nomal_noti fw_bold none_w">
              <i class="character"></i>
              <span
                >여신금융협회 가맹점 매출정보 통합조회 서비스에 가입하지
                않았다면 지금 가입하세요.</span
              >
            </p>
            <p class="nomal_noti nb_mgset none_w">
              <i class="character">1.</i>
              <span
                >아래 회원가입하기 버튼을 눌러 여신금융협회 카드 매출 조회
                서비스에 가입합니다.</span
              >
            </p>
            <p class="nomal_noti nb_mgset none_w">
              <i class="character">2.</i>
              <span
                >회원가입 완료 후 상단
                <span class="c_blue_new">‘아이디입력’</span>버튼을 눌러
                여신금융협회 ID/PW를 입력해 주세요.</span
              >
            </p>

            <button class="btn_join_crefia">
              <!--btn_join_crefia, btn_join_crefia 자식노드 변경-->
              <strong class="set_mgr10">여신금융협회 회원가입하기</strong>
              <i class="join_arr"></i>
            </button>
          </div>
          <!-- 안내 -->
        </div>
      </div>

      <!-- 하단 fix 버튼 -->
      <div class="btm_fix on">
        <span>삭제</span>
        <span class="bgc_green">확인</span>
      </div>
      <!-- 하단 fix 버튼 -->
    </div>
  </body>
</html>
