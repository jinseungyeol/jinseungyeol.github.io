<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../../css/semo_cont.css" />
    <title>SEMO</title>
  </head>
  <body>
    <div class="new_content">
      <!-- 팝업 베경 -->
      <div class="popup_bg">
        <!-- 팝업 내용 -->
        <div class="popup pt_top2"><!-- 2020-12-04 pt_top2클래스 추가 -->
          <div class="popup_txt">
            <div class="popup_fee_box">
              <p class="pfb_classify">PRO</p>
              <p class="pfb_monthly default">월 <em>20,000</em>원</p>
              <p class="pfb_monthly">월 <em>9,000</em>원</p>
              <p class="pfb_percent">50% 할인</p>
            </div>
          </div>
          <div class="popup_noti">
            <p><i class="pn_dot"></i> <span>세무사 증빙 자동 제출</span></p>
            <p><i class="pn_dot"></i> <span>세모주치의 무료 컨설팅</span></p>
            <p><i class="pn_dot"></i> <span>직원 관리 무제한</span></p>
            <p>
              <i class="pn_dot"></i> <span>간편송금 송금수수료 20회 면제</span>
            </p>
            <p class="posi_base">
              <i class="pn_dot"></i>
              <span>무료 스마트팩스 제공<br />- 수신 무제한 무료</span>
            </p>
            <p><i class="pn_dot"></i> <span>프리미엄 알림 서비스</span></p>
            <p><i class="pn_dot"></i> <span>SNS 매출정보 프리미엄</span></p>
          </div>
          <div class="popup_btn">
            <span class="bgc_green">닫기</span>
            <!--클래스 bgc_green 배경색-->
          </div>
        </div>
        <!-- //팝업 내용 -->
      </div>
      <!-- //팝업 베경 -->
    </div>
  </body>
</html>
