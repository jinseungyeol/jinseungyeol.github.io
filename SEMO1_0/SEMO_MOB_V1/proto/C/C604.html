<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
    <!-- <link rel="stylesheet" href="../../css/test.css"> -->
    <!-- <link rel="stylesheet" href="../../css/semo_cont_nh.css"> -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <script src="../../js/design.js"></script>
    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg">
            <!-- 상단 타이틀 -->
            <!-- <div class="title">직원관리</div> -->
            <!-- //상단 타이틀 -->

            <div class="wrap staff">
                <div class="staff_wrapper">
                    <div class="staff_basic_info">
                        <div class="staff_basic_alret">
                            <p>기본정보를 입력해 주세요</p>
                        </div>
                        <div class="staff_basic_info_con">
                            <div class="staff_info_cell">
                                <p class="dot">이름</p>
                                <div>
                                    <div class="staff_info_name">
                                        <input type="text" placeholder="직원명을 입력해 주세요">
                                    </div>
                                    <div class="staff_country_em">
                                        <select>
                                            <option>내국인</option>
                                            <option>외국인</option>
                                        </select>
                                        <i class="ico_cen"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="staff_info_cell">
                                <p class="dot">휴대폰번호</p>
                                <div>
                                    <div class="staff_info_number">
                                        <input type="text" placeholder="숫자만 입력해 주세요">
                                    </div>

                                </div>
                            </div>
                            <div class="staff_info_cell">
                                <p>입사일자</p>
                                <div>
                                    <div class="staff_info_date">
                                        <select required>
                                            <option value="" disabled selected hidden>입사일자를 선택해 주세요</option>

                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="staff_info_cell">
                                <p>주민등록번호</p>
                                <div class="staff_reg_number">
                                    <div>
                                        <input type="text" placeholder="생년월일 6자리" maxlength="6">
                                    </div>

                                    <div>
                                        <input type="text" maxlength="1">
                                        <div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                            <div class="dot">●</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="staff_info_cell">
                                <p>급여계좌</p>
                                <div class="staff_bank_select">
                                    <div>
                                        <div>
                                            <i class="logo_bank ico_lb003"></i>
                                            <p>은행선택</p>
                                        </div>
                                        <input type="number" placeholder="계좌번호 입력">
                                    </div>
                                    <div>
                                        <div class="staff_bank_search active">
                                            예금주 조회
                                        </div>
                                        <input type="text" value="예금주:" class="">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="btm_button">
                    <span class="bgc_green">저장하기</span>
                 
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
