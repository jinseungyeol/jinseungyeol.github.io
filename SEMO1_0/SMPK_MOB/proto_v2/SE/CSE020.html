<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSS-->
  <link rel="stylesheet" href="../../css_v2/semo_style.css">
  <link rel="stylesheet" href="../../css_v2/partner.css">
  <title>CSE020</title>
</head>
<body>

  <!-- 헤더 타이틀 -->
  <div class="title b_white">
    <div class="title_left">
      <i class="ico_cen left_arrow"></i>
    </div>
    <span class="title_text">수집 관리</span>
  </div>


  <!-- cnt 클래스 안에 p태그에
    1. 수집진행중, 수집하기 일때 = progress 클래스 추가
    2. 수집오류 일때 = error 클래스 추가
  -->
  <div class="basic_wrapper">
    <div class="collect_manage">
      <div class="tit_wrap">
          <div class="tit">
              <div class="logo">
                  <i class="ico_cont"></i>
              </div>
              <div class="txt">
                  <h2>인증서로 빠르고 쉽게 연결 해보세요!</h2>
              </div>
          </div>
          <div class="btn_wrap">
              <button type="button">
                  <i class="ico_cont"></i>
              </button>
          </div>
      </div>
      <ul class="collect_list">
        <li>
          <div class="tit">
            <span>계좌 관리</span>
          </div>
          <div class="cnt">
            <p class="progress">수집 진행 중</p>
            <div class="btn_wrap">
              <button type="button">
                 <i class="ico_cont"></i>
              </button>
            </div>
          </div>
        </li>

        <li>
          <div class="tit">
            <span>홈택스 관리</span>
          </div>
          <div class="cnt">
            <p class="progress">수집하기</p>
            <div class="btn_wrap">
              <button type="button">
                 <i class="ico_cont"></i>
              </button>
            </div>
          </div>
        </li>

        <li>
          <div class="tit">
            <span>카드매출 관리</span>
          </div>
          <div class="cnt">
            <p class="error">수집오류</p>
            <div class="btn_wrap">
              <button type="button">
                 <i class="ico_cont"></i>
              </button>
            </div>
          </div>
        </li>

        <li>
          <div class="tit">
            <span>개인명의 카드지출 관리</span>
          </div>
          <div class="cnt">
            <p>3개</p>
            <div class="btn_wrap">
              <button type="button">
                 <i class="ico_cont"></i>
              </button>
            </div>
          </div>
        </li>

        <li>
          <div class="tit">
            <span>사업장명의 카드지출 관리</span>
          </div>
          <div class="cnt">
            <p>2개</p>
            <div class="btn_wrap">
              <button type="button">
                 <i class="ico_cont"></i>
              </button>
            </div>
          </div>
        </li>

        <li>
          <div class="tit">
            <span>배달앱매출 관리</span>
          </div>
          <div class="cnt">
            <p>1개</p>
            <div class="btn_wrap">
              <button type="button">
                 <i class="ico_cont"></i>
              </button>
            </div>
          </div>
        </li>

        <li>
          <div class="tit">
            <span>건강보험매출 관리</span>
          </div>
          <div class="cnt">
            <p>1개</p>
            <div class="btn_wrap">
              <button type="button">
                 <i class="ico_cont"></i>
              </button>
            </div>
          </div>
        </li>
      </ul>

    </div>
  </div>
  
</body>
</html>
