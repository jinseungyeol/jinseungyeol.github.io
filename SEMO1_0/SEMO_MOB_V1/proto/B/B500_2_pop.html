<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->

      <div class="wrap document">
        <div class="easy_send_select">
          <div>
            <div class="user_mark bussi">기업</div>
            <div class="ess_bank">IBK기업</div>
            <div class="ess_account">
              <span>1234-5678-12345-52</span>
              <a class="btn_select"><i class="ico_cen"></i><em class="new_blind">계좌선택</em></a>
            </div>
          </div>
          <div class="ess_history">송금관리</div><!--2020-10-19 문구수정-->
        </div>
        <div class="easy_send_input set_mgt35">
          <p>보낼 금액</p>
          <div>
            <div class="esi_edit off" contentEditable="true">금액을 입력해 주세요</div> <!--2020-07-29 placeholder 활성 클래스 off-->
            <span>원<span>
          </div>
        </div>
        <div class="easy_send_info">
          <p><span>잔액: <em>5,000,000</em>원</span></p>
          <p>
            <span>남은 송금한도: <em>3,000,000</em>원</span>
            <a><i class="ico_cen"></i><em class="new_blind">? 버튼</em></a>
          </p>
        </div>
      </div>
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>다음</span>
    </div>
    <!-- 하단 fix 버튼 -->

    <!-- 팝업 베경 -->
    <div class="popup_bg light">
      <!-- 팝업 내용 -->
      <div class="info_popup fix_btm">
        <a class="btn_close"><i class="ico_cen"></i><em class="new_blind">닫기</em></a>
        <div class="ip_list">
          <ul>
            <!--2020-09-08 문구수정-->
            <li>- 1일 송금한도 : 5,000,000원</li>
            <li>- 송금한도 초과 시 IBK기업은행 뱅킹서비스를 이용하시기 바랍니다.</li> <!--2020-09-21 문구추가-->
            <li>- 개인계좌에서 송금 시 무료</li>
            <li>- 기업계좌에서 송금 시 당행 무료, 타행은 무료횟수 소진 시 수수료 부과</li>
            <li>- 송금수수료는 송금 시 함께 출금됩니다.</li>
            <!--2020-09-08 문구수정-->
          </ul>
        </div>
      </div>
      <!-- //팝업 내용 -->
    </div>
    <!-- //팝업 베경 -->
  </div>
</body>
</html>
