<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">
    <!-- 2020-11-13 내용수정 -->
    <div class="cont_bg cont_pd">
      <div class="title">매입증빙</div>
      <div class="wrap purchase height_auto">
        <div class="card_purchase height42">
          <div class="card_cell">
            <span class="c_black">[카드매입]</span>
            <p>20.01.27.목 19:22</p>
            <div class="pay_normal">
              <!-- 
                  pay_normal 기본값 {파란색 border, background}
                  set_borderBrown {갈색 border, background}
                  set_borderGreen {초록 border, background}
               -->
              <p>일반과세자</p>
            </div>
            <p class="set_font16">영등포제1본사 가맹점 (주)알파문구로지스</p>
            <p class="set_font25 set_fontbold">1,200,000원</p>

          </div>
          <div class="card_text_con">
            <div class="card_bill_con">
              <span>
                <p>사업자번호</p>
                <p>848-87-00259</p>
              </span>
              <span>
                <p>대표자명</p>
                <p>박승현</p>
              </span>
              <span>
                <p>주소</p>
                <p>서울 영등포구 영신로 220 (508호)</p>
              </span>
            </div>
            <div class="card_bill_con">
              <span>
                <p>카드사명</p>
                <p>BC카드</p>
              </span>
              <span>
                <p>카드번호</p>
                <p>9430-03*-*-3917</p>
              </span>
              <span>
                <p>할부기간</p>
                <p>3개월</p>
              </span>
              <span>
                <p>구&nbsp;&nbsp;&nbsp;&nbsp;분</p>
                <p>승인</p>
              </span>
              <span>
                <p>승인번호</p>
                <p>15498000</p>
              </span>

            </div>

          </div>


          <div class="card_use">
            <div class="card_use_text">
              <p>용도설정</p>
              <div class="total_con_img"></div>
            </div>

          </div>
          <!--클릭하면 checked true-->
          <div class="card_memo">
            <div class="pay_detail_box_img ico_cen background50 set_mgb10 dtl_O2014"></div>
            <div class="card_memo_con">
              <span>추가메모 (최대20자)</span>
              <input type="text" placeholder="네이버 스토어팜에서 발생한 매출입니다.">
            </div>
          </div>
          <!-- 2020-12-07 체크박스 내용삭제 -->
        </div>
      </div>

    </div>

    <!-- 2020-11-13 내용수정 -->

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>취소</span>
      <span class="bgc_green">저장</span>
      <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>

</html>
