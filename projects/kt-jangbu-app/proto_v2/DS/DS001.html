<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
  <!-- css -->
  <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
  <link rel="stylesheet" href="../../css_v2/main.css">
  <link rel="stylesheet" href="../../css_v2/semo_style.css">
  <link rel="stylesheet" href="../../css_v2/kt_style.css">
  <!-- js -->
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
  <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
  <script src="../../js_v2/chart-3.5.1.min.js"></script>
  <script src="../../js_v2/lottie.js"></script>
  <script src="../../js_v2/wow.min.js"></script>
  <script src="../../js_v2/swiper-bundle.min.js"></script>
  <title>카드매출 관리</title>
</head>
<body>
  <!-- 헤더 타이틀 -->
  <div class="title b_white">
    <div class="title_left">
      <i class="ico_cen left_arrow"></i>
    </div>
    <span class="title_text">공동인증서 관리</span>
    <div class="title_share">
        <button class="share_btn">
          <span>인증서 도움말</span>
        </button>
      </div>
  </div>
  <div class="basic_wrapper">
    <section class="franchise_wrap link">
       <!--article  error01 , error02 클래스로 분기처리 -->
      <article class="franchise error01">
        <div class="logo">
          <span class="ico_cen"></span>
        </div>
        <div class="store">
          <p class="txt01 elipsis end">정선영()0020048201807132061015111</p>
          <p class="txt01">개인/금융결제원</p>
          <p class="txt03">
            <span>만료일 | 2022.11.27</span>
            <button class="underline" type="button">
               <span class="red">수집오류</span>
            </button>
          </p>
        </div>
      </article>
      <article class="franchise-box">
         <div class="franchise-box_tit">
             <h1>은행 6개</h1>
         </div>
         <div class="franchise-box_multi">
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_002"></i>
                <span>산업</span>
            </div> 
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_007"></i>
                <span>수협</span>
            </div> 
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_003"></i>
                <span>IBK기업</span>
            </div> 
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_011"></i>
                <span>NH농협</span>
            </div> 
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_004"></i>
                <span>KB국민</span>
            </div> 
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_020"></i>
                <span>우리</span>
            </div> 
         </div>
      </article>
      <article class="franchise-box">
         <div class="franchise-box_tit">
             <h1>개인카드 6개</h1>
         </div>
         <div class="franchise-box_list">
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_002"></i>
                <span>산업</span>
            </div> 
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_007"></i>
                <span>수협</span>
            </div> 
         </div>
      </article>
      <article class="franchise-box">
         <div class="franchise-box_tit">
             <h1>기업카드 6개</h1>
         </div>
         <div class="franchise-box_list">
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_003"></i>
                <span>우리</span>
            </div> 
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_011"></i>
                <span>NH농협</span>
            </div> 
         </div>
      </article>

      <article class="franchise-box">
         <div class="franchise-box_tit">
             <h1>기업카드 6개</h1>
         </div>
         <div class="franchise-box_list">
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_003"></i>
                <span>우리</span>
            </div> 
            <div class="franchise-box_item">
                <i class="ico_cont bank bk_011"></i>
                <span>NH농협</span>
            </div> 
         </div>
      </article>
      <article class="franchise-box">
        <div class="franchise-box_single">
            <div class="icon">
              <i class="ico_cont ico_hometax"></i>
            </div>
            <div class="single-box_tit">
              <h1>홈택스</h1>
            </div>
        </div>
     </article>
      <article class="franchise-box">
        <div class="franchise-box_single">
            <div class="icon">
              <i class="ico_cont ico_nhis"></i>
            </div>
            <div class="single-box_tit">
              <h1>건강보험</h1>
            </div>
        </div>
      </article>  
      <!-- 하단버튼 -->
        <footer class="btn flex_cs franchise_footer">
            <button type="button" class="type_B cancel">
                <span>삭제하기</span>
            </button>
            <button type="button" class="type_B">
              <span>인증서 교체하기</span>
            </button>
      </footer>
