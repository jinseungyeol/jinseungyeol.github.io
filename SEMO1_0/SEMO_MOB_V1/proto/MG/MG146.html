<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_nh.css" />
    <title>SEMO</title>
</head>

<body>
    <div class="new_content">

        <div class="cont_bg cont_pd">
            <!-- 클래스 cont_pd fix_button 포함 패딩-->

            <!-- 상단 타이틀 -->
            <div class="title">서비스해지</div>
            <!-- //상단 타이틀 -->

            <!-- 간편송금 -->
            <div class="wrap account">
                <div class="account_box">
                    <div class="transfer_result">
                        <div class="send_display_wrap">
                            <div class="checkmark-circle fail">
                                <div class="background"></div>
                                <div class="ex_mark "></div>
                                <div class="dot "></div>
                            </div>
                        </div>
                        <!--fail-->
                        <b>
                            고객님은 <b style="color: #00b259;">NH농협 영업점 가입</b> 고객입니다.
                        </b>
                    </div>

                    <p class="normal_sentence set_mgt16">
                        가까운 NH농협은행 <b style="color: #00b259;">영업점을 방문</b> <br>
                        하여 해지 신청을 해주시기 바랍니다.
                    </p>

                    <div class="branch_select_wrap">

                        <div class="branch_select_box">
                            <span class="bsb_tit">상호</span>
                            <div class="bsb_txt">
                                가나상사
                            </div>
                        </div>

                        <div class="branch_select_box">
                            <span class="bsb_tit">사업자 번호</span>
                            <div class="bsb_txt">
                                123-45-67890
                            </div>
                        </div>

                        <div class="branch_select_box">
                            <span class="bsb_tit">가입일</span>
                            <div class="bsb_txt ">
                                2020.03.24
                            </div>
                        </div>

                        <div class="branch_select_box">
                            <span class="bsb_tit">가입영업점</span>
                            <div class="bsb_txt ">
                                당산동(123456)
                            </div>
                        </div>
                    </div>

                    <p class="alert_q4 set_mgt15 set_pdb26">
                        <i class="ico_cen"></i>
                        <span>
                            NH농협은행 고객센터(0000-0000)로 <br>
                            연락하시면 가까운 영업점을 안내 <br>
                            받을 수 있습니다.
                        </span>
                    </p>
                </div>
            </div>
            <!-- //간편송금 -->
        </div>
        <!-- 하단 fix 버튼 -->
        <div class="btm_button">
            <span class="bgc_gray">취소</span>
            <!--클래스 bgc_green 배경색-->
            <span class="bgc_green">고객센터연결</span>
            <!--클래스 bgc_green 배경색-->
        </div>
        <!-- 하단 fix 버튼 -->
    </div>
</body>

</html>
