<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">대출약정신청</div>
      <!-- //상단 타이틀 -->

      <div class="wrap account"> 
        <div class="progress_state_box">
          <span class="on"></span> <!--신청 진행 활성 클래스 on-->
          <span></span>
          <span></span>
        </div>

        <div>
          <div class="title_sub">대출 약정을 신청하기 위해서는 <span class="c_blue_i">전체 약관 동의</span>가  필요합니다.</div>    

          <!-- 약관동의 -->
          <div class="terms_box on open"> <!--활성 클래스 on 전체 약관 표시 AND 활성 클래스 open 약관열기 -->
            <!-- 전체 동의 -->
            <div class="terms_li type2">
              <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
              <span>약관 전체 동의</span>
            </div>
            <!-- //전체 동의 -->

            <!-- 약관 -->
            <ul>
              <li class="terms_li set_top_cen">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>개인(신용)정보 수집·이용 및<br>제공 관련 고객 권리 안내문</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>개인(신용)정보 조회 동의서</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li set_top_cen">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>개인(신용)정보 수집ㆍ이용ㆍ제공<br>동의서 (여신금융거래)</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>공공기관 전산정보 이용 동의서</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
            </ul>
            <!-- //약관 -->
          </div>
          <!-- //약관동의 --> 
        </div>
      </div>
    </div>

    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>약관동의를 진행해 주세요</span>
    </div>
    <!-- 토스트 팝업 -->

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>취소</span>
      <span class="bgc_green">닫기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
