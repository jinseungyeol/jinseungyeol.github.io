<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg"> 

      <!-- 상단 타이틀 -->
      <div class="title">건강보험급여</div>
      <!-- //상단 타이틀 -->

      <div class="wrap document">
        <div>
          <div class="condition_head_wrap">
            <div class="tab_box">
              <span class="on">전체</span> <!--활성 클래스 on-->
              <span>요양</span>
              <span>의료</span>
            </div>
            <div class="condition_date_wrap"><!--날짜설정 박스 보이기 활성클래스 on-->
              <div class="condition_date_border">
                <div class="condition_date_box">
                  <span class="on">이번달</span>
                  <span>저번달</span>
                  <span>검색</span>
                </div>
              </div>
              <div class="condition_date_detail_box"> 
                <div class="condition_date_detail">
                  <p class="date_detail">2019-11-20</p>
                  <p class="division">-</p>
                  <p class="date_detail">2019-11-20</p>
                  <button class="btn_date">조회</button>
                </div>
              </div>
            </div>
          </div> 
          <div>
            <div class="total_wrap">
              <div>
                <span>총 <em>0</em>건</span>
                <span><em>0</em>원</span>
              </div>
            </div>
            <div class="pay_detail_list_wrap reset_flex"> <!--2020-11-11 reset_flex 클래스 추가-->
              <div class="pay_detail_list_state">
                <button class="btn_plus set_mgb18">
                  <i class="plus"></i>  건강보험 등록하기
                </button>
                <p class="pdls_txt">
                  <strong>건강보험급여 정보를</strong><br/>
                  등록해 보세요.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
