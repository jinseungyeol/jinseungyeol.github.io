<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  <!-- container -->
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_linkpath.svg" alt="로고">
            </a>
          </h1>
        </div>
      </div>
    </header>
    <!-- //header -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult fixB">
        <div class="inner">
          <div class="collectResultWrap">
            <div class="certiTitArea">
              <strong class="certiTit">간편수집 프로세스 안내</strong>
              <p class="certiTxt">아래의 순서대로 간편인증을 진행합니다.</p>
            </div>
            <div class="collectResult">
              <div class="item">
                <div class="cate">
                  <div class="num">1</div>
                  <div class="notiTit">
                    <em class="name">홈택스</em>
                  </div>
                </div>
                <div class="info">
                  <p>
                    <span>홈택스 자료를 간편인증을 통해 조회합니다.</span>
                  </p>
                </div>
              </div>
              <div class="item">
                <div class="cate">
                  <div class="num">2</div>
                  <div class="notiTit">
                    <em class="name">고용산재</em>
                  </div>
                </div>
                <div class="info">
                  <p>
                    <span>고용산재포탈 자료를 간편인증을 통해 조회합니다.</span>
                  </p>
                </div>
              </div>
              <div class="item">
                <div class="cate">
                  <div class="num">3</div>
                  <div class="notiTit">
                    <em class="name">끝 !</em>
                  </div>
                </div>
              </div>
            </div>
            <div class="areaFixedBottom">
              <div class="fixedBottomInner">
                <div class="cell">
                  <button class="activeBodyBtn"><span>시작하기</span></button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
