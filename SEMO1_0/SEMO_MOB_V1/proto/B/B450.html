<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg">
      
      <!-- 상단 타이틀 -->
      <div class="title">송금계좌 등록</div> <!--문구수정-->
      <!-- //상단 타이틀 -->

      <!-- 송금계좌 등록 -->
      <div class="wrap account">

        <div class="account_box">
          <p class="noti_comm set_top_le set_mgt15 set_mgb20"> <!--2020-09-19 set_cen_cent -> set_top_le로 클래스 변경-->
            <i class="ico_cen"></i>
            <!--2020-09-19 문구수정-->
            <span>IBK기업은행 계좌만 송금계좌로 등록이 가능합니다. 송금계좌로 별도로 등록하지 않은 계좌는 조회만 가능합니다.</span>
            <!--2020-09-19 문구수정-->
          </p>
          
          <div class="info_detail_list_box">  
            <ul>
              <li class="info_detail_list type2">
                <div>
                  <span class="bank_mark">
                    <i class="logo_bank ico_lb003"></i> 
                    <!-- 
                      ***은행 활성 클래스
                      lb003 -> ibk기업 / lb004 -> 국민 / lb020 -> 우리 / lb088 -> 신한 / 
                      lb081 -> 하나 / lb011 -> 농협 / lb023 -> sc / lb027 -> 씨티 / 
                      lb002 -> 산업 / lb071 -> 우체국 / lb032 -> 부산 / lb045 -> 새마을 / 
                      lb034 -> 광주 / lb007 -> 수협 / lb031 -> 대구 / lb039 -> 경남 / 
                      lb035 -> 제주 / lb037 -> 전북 / lb089 -> k / lb048 -> 신협 
                    -->
                  </span> 
                  <p class="set_fl_col">
                    <span class="info_bank_name">IBK기업은행</span>
                   <span class="info_acnt_name">보통예금통장</span>
                   <span class="info_acnt">1234-5678-12345-52</span>
                  </p> 
                </div>
                <p class="set_fl_col si"> 
                  <span class="user_mark bussi">기업</span> <!--기업 활성화 클래스 bussi-->
                </p>
              </li>
              <li class="info_detail_list type2">
                <div>
                  <span class="bank_mark">
                    <i class="logo_bank ico_lb003"></i> 
                  </span> 
                  <p class="set_fl_col">
                    <span class="info_bank_name">IBK기업은행</span>
                      <span class="info_acnt_name">보통예금통장</span>
                      <span class="info_acnt">1234-5678-12345-52</span>
                  </p> 
                </div>
                <p class="set_fl_col si"> 
                  <span class="user_mark indi">개인</span> <!--개인 활성화 클래스 indi-->
                </p>
              </li>
            </ul>
          </div>
        </div>

      </div>
      <!-- //송금계좌 등록 -->
      
    </div>

  </div>
</body>
</html>
