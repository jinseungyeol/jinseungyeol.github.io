<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content='세모리포트' property='og:title' />
    <meta content='https://www.semoreport.com' property='og:url' />
    <meta content="../img/semoR_thumb.png" property='og:image' />
    <meta content="사장님이 선정한 1등 보고서" property="og:description" />
    <link rel="icon" href="../img/favicon_semoR.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/odometer-theme-default.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/semoR_bridge.css">
  <script src="../js/jquery-3.5.1.min.js"></script>
    <script src="../js/odometer.js"></script>
    <script src="../js/semo.api.js"></script>
    <title>프리미엄 세무서비스 신청(사장님 전용)</title>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-TJW4JW5');</script>
    <!-- End Google Tag Manager -->
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
        <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TJW4JW5" height="0" width="0" style="display:none;visibility:hidden">
        </iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- wrapper -->
    <div class="wrapper">
        <!-- applyWrap -->
        <div class="applyWrap">
            <!-- formWrap -->
            <div class="formWrap">
                <section class="secBusiCerti">
                    <div class="inner">
                        <div class="areaFormTit">
                            <strong>프리미엄 세무서비스 <span>신청하기(사장님 전용)</span></strong>
                            <p>사장님의 사업장에 맞는 무료 절세 컨설팅과 <span>매달 프리미엄 세무서비스를 제공해드립니다.</span></p>
                        </div>
                        <div class="inputForm">
                            <div>
                                <!-- 입력 및 선택폼 -->
                                <div class="inputWrap">
                                    <div class="areaTit">
                                        <label class="formTit">사업자번호</label>
                                    </div>
                                    <div class="inputBox">
                                        <input type="tel" name="BIZ_NO" placeholder="000-00-00000" value="103-9900-733" maxlength="12"
                                            oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');">
                                    </div>
                                    <button class="btnCert active">사업자 인증</button><!-- 활성화시 active 클래스 -->
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="secPrivacy">
                    <div class="inner">
                        <strong>인증 및 세무컨설팅 개인정보 활용 동의</strong>
                        <ul class="checkList">
                            <li>
                                <label>
                                    <input type="checkbox" checked>
                                    <p>개인정보 수집이용 동의 (필수)</p>
                                    <button type="button" class="moveCert"></button>
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="checkbox" checked>
                                    <p>마케팅 활용 동의 (필수)</p>
                                    <button type="button" class="moveCert"></button>
                                </label>
                            </li>
                            <li>
                                <label>
                                    <input type="checkbox" checked>
                                    <p>마케팅 활용 수신 동의 (필수)</p>
                                    <button type="button" class="moveCert"></button>
                                </label>
                                <p class="infoTxt">
                                    우수세무사님을 통해 고객님의 절세컨설팅 및 프리미엄 세무상담을
                                    진행하기 위한 동의 입니다.
                                </p>
                            </li>
                        </ul>
                        <div class="inputForm">
                            <div class="inputWrap">
                                <div class="inputBox">
                                    <input type="text" value="홍길동" maxlength="100">
                                </div>
                            </div>
                            <div class="inputWrap rrn">
                                <label>
                                    <input type="text" value="999999">
                                    <span class="divide">-</span>
                                    <input type="text" value="1">
                                    <span class="backNum">******</span>
                                    <p class="focusBd"></p>
                                </label>
                                <p class="infoTxt">
                                    주민등록번호는 저장되지 않으며 컨설팅을 위한 분석 조회에만 사용됩니다.
                                </p>
                            </div>
                            <div class="inputWrap">
                                <div class="inputBox">
                                    <input type="tel" name="APPL_CNTC" placeholder="휴대폰번호 입력 (‘-’ 제외)" value="010-2703-9626" maxlength="13"
                                        oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');">
                                </div>
                            </div>
                        </div>
                        <div class="areaBtn">
                            <!-- active 클래스 추가시 활성화 -->
                            <button type="button" class="btnSubmit active">본인인증 실행 및 컨설팅 분석</button>
                            <div class="infoTxt">
                                <p>
                                    카카오인증으로 사업자를 인증합니다
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
            <!-- //formWrap -->
        </div>
        <!-- //applyWrap -->
    </div>
    <!-- //wrapper -->

    <script>
        // 사업자번호
        $("input[name='BIZ_NO']").on("input", function () {
            var autoHypen = $(this).val().replace(/[^0-9]/g, '').replace(/^(\d{0,3})(\d{0,2})(\d{0,5})$/g, '$1-$2-$3').replace(/-{1,2}$/g, ''); //하이픈 자동생성

            $(this).val(autoHypen);
        })

        // 연락처
        $("input[name='APPL_CNTC']").on("input", function () {
            var autoHypen = $(this).val().replace(/[^0-9]/g, '').replace(/^(\d{0,3})(\d{0,4})(\d{0,4})$/g, "$1-$2-$3").replace(/(\-{1,2})$/g, ""); //하이픈 자동생성

            $(this).val(autoHypen);
        });
    </script>
</body>

</html>
