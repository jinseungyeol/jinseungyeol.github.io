<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/test.css">
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <title>S_회원가입01</title>
</head>
<body>

    <div class="new_content pretendard join">
        <div class="cont_bg padding20">

          <!-- 회원가입 진행순서 ======================================================= -->
          <div class="join_process">

            <span class="one now">●</span>
            <!-- now 클래스로 활성화 -->
            <em class="active">1</em>

            <span class="two">●</span>

            <span class="three set_mgr0">●</span>
          </div>

          <!-- 약관 동의 ======================================================= -->
          <div class="agree_wrap">

            <div class="all">
            <!-- active 클래스로 활성화 -->

              <span class="ico_cen check_01"></span>
              <em>전체 약관 동의</em>
            </div>
            <div class="each_wrap">
              <div class="each necess">
                <div class="left">
                  <div class="inner">
                    <span class="ico_cen check_01"></span>
                  </div>
                  <!-- active 클래스로 활성화 -->

                </div>

                <div class="right">
                  <div class="main">
                    <p>필수 약관 전체 동의<em>*</em></p>
                    <span class="ico_cen up_01"></span>
                  </div>
                  <div class="sub_box">
                    <div class="sub">
                      <p>세모장부 이용약관 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                    <div class="sub">
                      <p>개인정보 수집 · 이용 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                    <div class="sub set_pdb_unset">
                      <p>신용정보 수집 · 이용 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="each confirm">
                <div class="left">
                  <div class="inner">
                    <span class="ico_cen check_01"></span>
                  </div>
                  <!-- active 클래스로 활성화 -->

                </div>

                <div class="right">
                  <div class="main">
                    <p>휴대폰 본인 확인 서비스<em>*</em></p>
                    <span class="ico_cen up_01"></span>
                  </div>
                  <div class="sub_box">
                    <div class="sub">
                      <p>통신사 이용약관 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                    <div class="sub">
                      <p>본인확인 서비스 이용약관 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                    <div class="sub">
                      <p>개인정보 수집 · 이용 및 위탁 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                    <div class="sub set_pdb_unset">
                      <p>고유식별정보 처리 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="each pick">
                <div class="left">
                  <div class="inner">
                    <span class="ico_cen check_01"></span>
                  </div>
                  <!-- active 클래스로 활성화 -->

                </div>

                <div class="right">
                  <div class="main">
                    <p>세모장부 선택 항목 <b>(선택)</b></p>
                    <span class="ico_cen up_01"></span>
                  </div>
                  <div class="sub_box">
                    <div class="sub">
                      <p>신용정보 제3자 제공 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                    <div class="sub set_pdb_unset">
                      <p>마케팅 정보 활용 및 수신 동의</p>
                      <span class="ico_cen right_01"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>


        <!-- 버튼 -->
        <div class="bot_fix">
          <button type="button" class="tybe_A">
            <span>확인</span>
          </button>
        </div>

    </div>

    <script>
      $('.agree_wrap .all').click(function(){
        $(this).toggleClass('active');
      })

      $('.agree_wrap .each_wrap .each .right .main').click(function(){
        $(this).toggleClass('active');
        $(this).siblings('.sub_box').toggle();
      })

      $('.agree_wrap .each_wrap .each .left .inner').click(function(){
        $(this).toggleClass('active');
      })
    </script>

</body>

</html>
