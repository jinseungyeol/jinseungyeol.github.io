<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg">
      
      <!-- 상단 타이틀 -->
      <div class="title">이체계좌 등록</div>
      <!-- //상단 타이틀 -->

      <!-- 이체계좌 등록 -->
      <div class="wrap account">
        <div class="account_box">
            <div class="title_sub">이체계좌는 IBK기업은행 기업용 계좌만 등록 가능합니다.</div>

            <!-- 이체계좌 목록 -->
            <div class="account_list_wrap">
               <!-- 이체계좌 목록 총계-->
              <div class="account_total_box">
                <p><i class="ico_account"></i><span>이체계좌</span><em class="account_number">3</em></p>
              </div>
              <!-- //이체계좌 목록 총계-->

              <!-- 이체계좌-->
              <div class="account_list_box alb_posi">
                <ul>
                  <li class="atlb_list">
                    <p>
                      <span class="bk_name">IBK 기업은행</span>
                      <span class="bk_rep">대표계좌</span>
                    </p>
                    <p>
                      <span class="bk_acnt">22-**3-44-55555</span>
                      <span class="bk_acnt_kind">IBK주거래우대통장</span>
                    </p>
                    <p class="bk_acnt_nick">기업 555</p>
                  </li>
                  <li class="atlb_list">
                    <p>
                      <span class="bk_name">IBK 기업은행</span>
                    </p>
                    <p>
                      <span class="bk_acnt">12-**3-44-5225</span>
                      <span class="bk_acnt_kind">보통예금통장</span>
                    </p>
                    <p class="bk_acnt_nick">카드입금통장</p>
                  </li>
                  <li class="atlb_list">
                    <p>
                      <span class="bk_name">IBK 기업은행</span>
                    </p>
                    <p>
                      <span class="bk_acnt">12-**3-44-5225</span>
                      <span class="bk_acnt_kind">보통예금통장</span>
                    </p>
                    <p class="bk_acnt_nick">IBK 기업은행</p>
                  </li>
                </ul>

                <!-- 이체계좌좌등록 추가버튼 -->
                <button class="btn_round type5"> <!--btn_round에 클래스명 type5 추가-->
                  <i class="ico_plus"></i> <span>이체계좌 등록</span>
                </button>
                <!-- //이체계좌좌등록 추가버튼 -->

              </div>
              <!-- //이체계좌-->
            </div>
            <!-- //이체계좌 목록 -->

          </div>

      </div>
      <!-- //이체계좌 등록 -->
      
    </div>
   
  </div>
</body>
</html>
