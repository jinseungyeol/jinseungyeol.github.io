<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">1:1문의</div>
      <!-- //상단 타이틀 -->

      <div class="wrap setting">
        <div class="enquiry_wrap">
           <p class="en_user">
             <span>요청자(아이디) : </span>
             <span>sanjuk1052@naver.com</span>
           </p>
           <textarea class="en_write" placeholder="*필수입력 문의 내용을 입력해 주세요. (최대 500자)">국세청 인증서 등록을 수정하는 곳이 어디에요? 모델명 : SM-S290S OS : 6.1.1 </textarea>
           <div class="en_attach_box">
            <div class="em_img" style="background-image: url('../img/img_sample.png');">
              <div><i></i>삭제</div>
            </div>
            <button class="en_attach small"><i></i>사진첨부</button>
           </div>
           <p class="noti_star wd_set color">
              <i class="character"></i>
              <span> 
                이미지 파일(jpg, png, gif)은 최대 10MB이하, 
                3개까지 등록이 가능합니다.
              </span>
            </p>
            <div class="en_terms">
              <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
              <span>개인정보 수집 및 이용 동의하기 (필수)</span>
              <a class="btn_en_terms"><i></i><em class="new_blind">약관열기</em></a>
            </div>
        </div>
      </div>
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix"> 
      <span>등록</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
