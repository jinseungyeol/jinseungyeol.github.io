<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 간편송금 -->
      <div class="wrap account">
        <div class="account_box">
          <div class="easy_send_result_wrap">
            <div class="transfer_list_wrap">
              <div class="tlw_result">
                <i class="ico_common success"></i>
                <span>송금완료</span>
              </div>
            </div>
            <p class="normal_sentence">
              <strong>홍길동님을</strong><br/>
              <span>거래처로 등록하시겠습니까?</span>
            </p>
            <div class="onoffBox set_cen_cen on"> <!--활성 클래스 on-->
              <div>
                <input type="checkbox" id="onoffCheck" class="onoffCheck" />
                <label for="onoffCheck" class="onoffCheck">
                  <span class="slider"></span>
                  <span class="onoff"></span>
                </label>
              </div>
            </div>
          </div>

        </div>
      </div>
      <!-- //간편송금 -->
      
      <!-- 하단 고정 텍스트 -->
      <p class="fix_btm_txt set_cen_cen fix_btm17">
        <span>누적 송금 수수료 보기</span>
        <a><i class="ico_cen"></i><em class="new_blind">? 버튼</em></a>
      </p>
      <!-- 하단 고정 텍스트 -->
    </div>

    <!-- 토스트 팝업 -->
    <div class="toast top">
      <span>거래처로 등록되었습니다.</span>
    </div>
    <!-- 토스트 팝업 -->
    
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span>
    </div>
    <!-- 하단 fix 버튼 -->

    <!-- 팝업 베경 -->
    <div class="popup_bg light">
      <!-- 팝업 내용 -->
      <div class="info_popup fix_btm">
        <a class="btn_close"><i class="ico_cen"></i><em class="new_blind">닫기</em></a>
        <div class="ip_list">
          <span class="ip_tit">2020년 01월 누적</span>
          <ul>
            <!--2020-09-08 문구수정-->
            <li>- 누적건수 : 10건</li>
            <li>- 누적 송금 수수료 : 5000원</li>
            <li class="c_orange">- 무료 횟수 소진 시 건당 500원</li>
            <!--2020-09-08 문구수정-->
          </ul>
        </div>
      </div>
      <!-- //팝업 내용 -->
    </div>
    <!-- //팝업 베경 -->
  </div>
</body>
</html>
