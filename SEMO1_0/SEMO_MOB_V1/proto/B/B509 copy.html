<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">

    <div class="cont_bg cont_pd">
      <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 간편송금 -->
      <div class="wrap account">
        <div class="account_box">
          <div class="easy_send_result_wrap">
            <div class="transfer_list_wrap">
              <div class="tlw_result">
                <!-- <i class="ico_common success"></i> -->
                <!-- send_display_wrap 추가 -->
                <div class="send_display_wrap">
                  <div class="checkmark-circle complete">
                    <div class="background"></div>
                    <div class="checkmark draw"></div>
                  </div>
                </div>
                <span>송금이<br>완료되었습니다.</span>
              </div>
            </div>
            <p class="normal_sentence">
              <strong>홍길동님을</strong><br />
              <span>거래처로 등록하시겠습니까?</span>
            </p>
            <div class="onoffBox set_cen_cen on">
              <!--활성 클래스 on-->
              <div>
                <input type="checkbox" id="onoffCheck" class="onoffCheck" />
                <label for="onoffCheck" class="onoffCheck">
                  <span class="slider"></span>
                  <span class="onoff"></span>
                </label>
              </div>
            </div>
          </div>

        </div>
      </div>
      <!-- //간편송금 -->

      <!-- 하단 고정 텍스트 -->

      <!-- fix_btm_txt 삭제 -->
      <!-- send_display_wrap_bt 추가 -->
      <div class="send_display_wrap_bt">
      <div class="send_c_bottom">
        <div class="send_c_shar">
          <i class="ico_cen"></i>
          <span>공유하기</span>
        </div>
        <div class="send_c_fees">
          <i class="ico_cen"></i>
          <span>누적 수수료</span>
        </div>
      </div>
    </div>
      <!-- 하단 고정 텍스트 -->
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span>
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>

</html>
