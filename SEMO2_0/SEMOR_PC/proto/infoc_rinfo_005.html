<!DOCTYPE html>
<html lang="ko" xml:lang="ko">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge, chrome=1">
<title>세모리포트</title>
<link rel="stylesheet" href="../css/reset_taxp.css">
<link rel="stylesheet" href="../css/app_header.css"><!-- [D] 세무대리인용 header -->
<link rel="stylesheet" href="../css/content_taxp.css"><!-- [D] 세무대리인용 -->

<!-- custom scrollbar plugin css -->
<link rel="stylesheet" href="../css/jquery.mCustomScrollbar.css">
  <script src="../js/lib/jquery/jquery-1.12.4.min.js"></script>
<script src="../js/lib/jquery/jquery-ui-1.10.4.min.js"></script>
<!-- custom scrollbar plugin -->
<script src="../js/design/jquery.mCustomScrollbar.concat.min.js"></script>
<script src="../js/design/jquery.placeholder.min.js"></script>
<script src="../js/lib/plugin/smart.popup.js"></script>
<script src="../js/comm/common.js"></script>
<script>
$(function(){
  // Invoke the plugin
  $('input, textarea').placeholder({customClass:'my-placeholder'});
  
  
  
  // 보기설정 보기
    $('#btn_showhide').on("click", function(event){
    	if($(this).hasClass("down")){
    		$("#tbl_area").show();
    		$(this).removeClass("down");
    	}else{
    		$("#tbl_area").hide();
    		$(this).addClass("down");
    	}
    });
    
});
</script>

</head>


<body style="width:1000px;"><!-- 팝업 사이즈 600*497 -->

<div class="pop_wrap" style="width:1000px;">

  <!-- 팝업 헤더 -->
  <div class="pop_header">
    <h1>실시간 정보수집</h1>
    <a href="#" onClick="close_smartPop();" class="btn_popclose"><img src="../img/txof/btn/btn_popclose_white.gif" alt="팝업닫기"></a>
  </div>
  <!-- //팝업 헤더 -->

  <!-- 팝업 컨텐츠 -->
  <div class="pop_container">
    <!-- 기존 height: 359px -->
    <div class="list_scroll" style="min-height: 565px; height: 565px;border-bottom:0;  ">

      <div class="title_wrap h1type">
        <div class="left">
          <h1><span class="company">나라백반</span> | <span class="businum">123-45-67890</span>&nbsp;<span>매출/매입/인건비/사업자정보 등 총 10여종의 데이터를 수집합니다.</span></h1>
        </div>
      </div>

      <div class="tb_cust_dv cboth mgl0" style=" display: none;">
        <div class="setinner">
          <div class="settxt">
            <span>수집기간</span>
            <div class="select_date">
              <div class="date_wrap">
                <select>
                  <option>2022</option>
                </select>
                <select>
                  <option>1</option>
                </select>
              </div>
              <span class="bar">~</span>
              <div class="date_wrap">
                <select>
                  <option>2022</option>
                </select>
                <select>
                  <option>12</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
      <table class="tbl_result mgt5 tac" style=" display: none;">
        <caption></caption>
        <colgroup>
          <col style="width: 10%">
          <col style="width: 12%">
          <col style="width: 15%">
          <col style="width: 20%">
        </colgroup>
        <thead>
          <tr>
            <th>
              <div class="tac">분류</div>
            </th>
            <th>
              <div class="tac">구분</div>
            </th>
            <th>
              <div class="tac">정보</div>
            </th>
            <th>
              <div class="tac">수집결과</div>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <div>정보</div>
            </td>
            <td>
              <div>건별</div>
            </td>
            <td>
              <div>사업자정보</div>
            </td>
            <td>
              <div class="txt_b">수집완료 (2022-12-07)</div>
            </td>
          </tr>
          <tr>
            <td>
              <div>매출</div>
            </td>
            <td>
              <div>집계</div>
            </td>
            <td>
              <div>전자(세금)계산서</div>
            </td>
            <td>
                <span class="areaLoading">
                  <img src="../../html/img/txof/ico/ico_reload.png" width="18px">
                </span>
                <span>수집중...</span>
            </td>
          </tr>
          <tr>
            <td>
              <div>매입</div>
            </td>
            <td>
              <div>집계</div>
            </td>
            <td>
              <div>전자(세금)계산서</div>
            </td>
            <td>
              <div class="txt_g">수집전</div>
            </td>
          </tr>
          <tr>
            <td>
              <div>인건비</div>
            </td>
            <td>
              <div>집계</div>
            </td>
            <td>
              <div>원천징수이행상황신고서</div>
            </td>
            <td>
              <div class="txt_r">수집실패 (홈택스 접속오류)</div>
            </td>
          </tr>
        </tbody>
      </table>
      <!-- collect_iframe 추가 show = display: block / hide = display: none -->
      <div class="collect_iframe" style=" display: flex ;">
          <div class="colif_wrap">
            <iframe width="540" height="360" src="https://www.youtube.com/embed/hCT7slftNAw" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            <div class="info_txt">
              <span>
                ※ 홈택스 시스템 접속 상황과 데이터 건수가 많은 경우 시간이 지연될 수 있습니다.
              </span>
            </div>
          </div>   
      </div>
      
      <div class="areaProgress">
        <div class="progressWrap">
          <div class="info">
            <span class="txt">실시간으로 정보를 수집중입니다.</span>
            <span class="result txt_b">처리결과 (3/10)</span>
          </div>
          <div class="progress">
            <div class="currentBar" style="width:56%">56%</div>
          </div>
        </div>
      </div>
      <!-- <textarea name="" id="" cols="30" rows="10" value="ㅇㄴㄴㅇㄹㄴㅇㄹㄹㄴㅇㄹ" placeholder="ㄴㅇㄹ"></textarea> -->
    </div>
  </div>
  <!-- //팝업 컨텐츠 -->
</div>

</body>
</html>
