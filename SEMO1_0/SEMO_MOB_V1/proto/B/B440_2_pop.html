<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!-- 팝업 베경 -->
    <div class="popup_bg">
      <!-- 팝업 내용 -->
      <div class="popup pt_top2"><!-- 2020-12-04 pt_top2클래스 추가 -->
        <div class="popup_txt">
          <span class="popup_tit">
            송금 핀번호를 확인해 주세요.
          </span>
          <span class="popup_sub ps_bold pt_pd9">
             다음의  경우에는 핀번호 등록이 불가합니다.
          </span>
          <span class="popup_sub ps_align pt_pd7">
            - 연속 숫자 3자리 이상 불가(예:123, 456)<br>
            - 동일한 숫자 3자리 이상 불가(예:111,222)<br>
            - 처음과 마지막 자리에 0 또는 00 불가<br>
            - 휴대폰번호 정순, 역순 불가<br>
            - 사업자 번호 정순, 역순 불가
          </span>
        </div>
        <div class="popup_btn">
          <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
        </div>
      </div>
      <!-- //팝업 내용 -->
    </div>
    <!-- //팝업 베경 -->
  </div>
</body>
</html>
