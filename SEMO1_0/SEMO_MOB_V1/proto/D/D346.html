<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg">

      <!-- 상단 타이틀 -->
      <div class="title">알림</div>
      <!-- //상단 타이틀 -->

      <div class="wrap notice">
        <div class="common_message">
          <i></i>
          <div>
            <p>세모주치의 <span>“<em>세무법인 한결멘토</em>”</span> 에서 발송한 메시지입니다.</p>
          </div>
        </div> 
        <div class="notice_wrap">
          <p class="notice_detail_tit">
            <i class="ico_ndt salary"></i>
            <span class="ndt_class">가맹점 청구</span>
            <span class="ndt_date">20.06.05 09:15</span>
          </p>

          <div class="notice_detail_wrap">
            <p class="ndw_tit">봉구비어 명동점 가맹점 청구입니다.</p>
            <div class="ndw_list">
              <p class="ndwl_payday">2019.07.01~07.31</p>
              <p>
                <strong class="ndwl_tit">청구금액</strong>
                <strong class="ndwl_info_b"><em class="set_ft18 c_blue_new">382,000</em>원</strong>
              </p>
              <div>
                <p>
                  <span class="ndwl_tit">물품</span>
                  <span class="ndwl_info_b"><em>152,000</em>원</span>
                </p>
                <p>
                  <span class="ndwl_tit">식자재</span>
                  <span class="ndwl_info_b"><em>152,000</em>원</span>
                </p> 
              </div>
            </div>
            
            <div class="ndw_detail set_prop"> <!--패딩조절 css 클래스 set_pd-->
              <div class="ndwd_list">
                <p>
                  <span  class="ndwd_tit_b">물품</span>
                  <span  class="ndwd_txt_b">84,000,000원</span>
                </p>
                <div>
                  <p>
                    <span  class="ndwd_tit">전용잔</span>
                    <span  class="ndwd_txt">30,500,000 원</span>
                  </p>
                  <p>
                    <span  class="ndwd_tit">식기</span>
                    <span  class="ndwd_txt">30,500,000 원</span>
                  </p>
                  
                  <p class="ndll_btn set_db"> 
                    <span class="ndll_bank">
                      <i class="logo_bank ico_lb003"></i> 
                      <span>
                        <em>기업은행</em> <br>
                        <em>120-23456-789</em>
                      </span>
                    </span>
                    <button class="btn_ndll pay">간편납부</button>
                  </p>
                </div>
              </div> 
              <div class="ndwd_list">
                <p>
                  <span  class="ndwd_tit_b">식자재</span>
                  <span  class="ndwd_txt_b">84,000,000원</span>
                </p>
                <div>
                  <p>
                    <span  class="ndwd_tit">웨지감자</span>
                    <span  class="ndwd_txt">30,500,000 원</span>
                  </p>
                  <p>
                    <span  class="ndwd_tit">치즈</span>
                    <span  class="ndwd_txt">30,500,000 원</span>
                  </p>
                  
                  <p class="ndll_btn set_db"> 
                    <span class="ndll_bank">
                      <i class="logo_bank ico_lb003"></i> 
                      <span>
                        <em>기업은행</em> <br>
                        <em>120-23456-789</em>
                      </span>
                    </span>
                    <button class="btn_ndll pay">간편납부</button>
                  </p>
                </div>
              </div> 
            </div> 
          </div>
        </div>
      </div>
      
    </div>

  </div>
</body>
</html>
