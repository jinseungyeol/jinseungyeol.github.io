<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="stylesheet" href="../../css/semo_cont.css">

  <title>SEMO</title>

<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 상단 타이틀 -->
      <div class="title">간편송금</div>
      <!-- //상단 타이틀 -->

      <div class="wrap document">
        <div>

              <span>거래처</span>
            </div>
            <div class="condition_account_wrap">

                  <span>최근입금</span>

                  <span class="on">내계좌</span><!--활성클래스 on-->
                </div>
              </div>
            </div>
          </div> 
          <div>
            <div class="send_wrap">
              <div class="send_box">
                <div class="logo_text_list_box">
                  <ul>
                    <li class="lt_list">
                      <i class="ico_cen logo_bank ico_lb003"></i>
                      <!-- 
                        .ico_lb003 -> ibk기업 / .ico_lb004 -> 국민 / .ico_lb020 -> 우리 / .ico_lb088 -> 신한 / 
                        .ico_lb081 -> 하나 / .ico_lb011 -> 농협 / .ico_lb023 -> sc / .ico_lb027 -> 씨티 / 
                        .ico_lb002 -> 산업 / .ico_lb071 -> 우체국 / .ico_lb032 -> 부산 / .ico_lb045 -> 새마을 / 
                        .ico_lb034 -> 광주 / .ico_lb007 -> 수협 / .ico_lb031 -> 대구 / .ico_lb039 -> 경남 / 
                        .ico_lb035 -> 제주 / .ico_lb037 -> 전북 / .ico_lb089 -> k / .ico_lb048 -> 신협 
                      -->
                      <p>
                        <strong class="lt_tit">예금주명</strong>
                        <span class="lt_txt">IBK기업은행 47900932341222</span>
                      </p>
                    </li>
                    <li class="lt_list">
                      <i class="ico_cen logo_bank ico_lb071"></i>
                      <p>
                        <strong class="lt_tit">예금주명</strong>
                        <span class="lt_txt">우체국 47900932341222</span>
                      </p>
                    </li>
                    <li class="lt_list">
                      <i class="ico_cen logo_bank ico_lb027"></i>
                      <p>
                        <strong class="lt_tit">예금주명</strong>
                        <span class="lt_txt">시티은행 47900932341222</span>
                      </p>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>

    </div>

    <!-- 하단 fix 버튼 -->
