<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
  <script src="../../js/design.js"></script>
    <!-- <link rel="stylesheet" href="../../css/test.css"> -->
    <!-- <link rel="stylesheet" href="../../css/semo_cont_nh.css"> -->


    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg">
            <!-- 상단 타이틀 -->
            <!-- <div class="title">급여작성</div> -->
            <!-- //상단 타이틀 -->

            <div class="wrap salary">
                <div class="salary_wrapper">
                    <div class="salary_write_em">
                        <div class="salray_write_con">
                            <div class="salary_write_em_name">
                                <b>김세모</b>
                            </div>
                            <div class="salary_write_em_cell">
                                <div class="disable">
                                    <p>합계</p>
                                    <div class="deli_log">
                                        <div class="deli_id">
                                            <input type="text" placeholder="" value="3,200,000 원">
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <p>급여</p>
                                    <div class="deli_log">
                                        <div class="deli_id">
                                            <input type="text" placeholder="">
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <p>성과급</p>
                                    <div class="deli_log">
                                        <div class="deli_id">
                                            <input type="text" placeholder="">
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <p>야근/초과</p>
                                    <div class="deli_log">
                                        <div class="deli_id">
                                            <input type="text" placeholder="">
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <p>업무경비</p>
                                    <div class="deli_log">
                                        <div class="deli_id">
                                            <input type="text" placeholder="">
                                        </div>
                                    </div>
                                </div>
                                <div class="salary_em_onoff">
                                    <p>식대</p>
                                    <div class="staff_on_off">
                                        <div class="slideOne">
                                            <input type="checkbox" id="slideOne_1" name="check" />
                                            <label for="slideOne_1"></label>
                                            <span>포함</span>
                                            <div class="slideOneBg"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="staff_em_info_text">
                                    <i class="ico_cen"></i>
                                    <p>월 10만원까지 비과세 적용 가능</p>
                                </div>
                                <div class="salary_em_onoff">
                                    <p>차량유지비</p>
                                    <div class="staff_on_off">
                                        <div class="slideOne">
                                            <input type="checkbox" id="slideOne_2" name="check" />
                                            <label for="slideOne_2"></label>
                                            <span>미포함</span>
                                            <div class="slideOneBg"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="staff_button">
                                    <b>+ 추가하기</b>
                                </div>
<!-- ===============================C654-1=============================== -->
                                <div>
                                    <p>지급액</p>
                                    <div class="deli_log">
                                        <div class="deli_id">
                                            <input type="text" placeholder="" value="144,500 원">
                                        </div>
                                    </div>
                                </div>
                                <div class="staff_info_cell">
                                    <p>근무일수</p>
                                    <div>
                                        <div class="staff_info_date">
                                            <select required="" >
                                                <option value="" disabled="" selected="" hidden="">입사일자를 선택해 주세요</option>
                                                    <option value="">7일</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <p>시급</p>
                                    <div class="deli_log">
                                        <div class="deli_id">
                                            <input type="text" placeholder="" value="144,500 원">
                                        </div>
                                    </div>
                                </div>

<!-- ===============================C654-1=============================== -->
                                <div class="salary_write_req">
                                    <span>
                                        <p>직원 개인 급여 메모</p>
                                    </span>
                                    <textarea placeholder="근무시간, 휴가 내용을 메모해주세요"></textarea>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
                <div class="btm_button">
                    <span class="bgc_green">저장하기</span>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
