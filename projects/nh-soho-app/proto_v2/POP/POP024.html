<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css_v2/common.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- JS -->
    <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <script src="../../js_v2/wow.min.js"></script>
    <script src="../../js_v2/chart-3.5.1.min.js"></script>
    <title>C656</title>
</head>
<body>
    <!-- ## 계좌선택 팝업 ## -->
    <div class="popup_bg account-choice" style="">
        <div class="popup bottom" style="bottom:0">
            <div class="popup_title">
                <b>배달앱 선택</b>
                <!-- is-active 클래스로 활성화 -->
                <button class="popup_all-check" type="button">
                    <i class="ico_cont"></i>
                    <p class="all-check_txt">전체선택</p>
                </button>
            </div>
            <div class="popup_bottom_con">
                <ul class="popup_account-list-wrap">
                    <li class="popup_account-list">
                        <div class="popup_account_cnt">
                            <div class="check-area">
                                <input class="account-checked" type="checkbox" id="account-checked">
                                <label for="account-checked"></label>
                            </div>
                            <i class="ico_cont delivery dv_1010"></i>
                            <div class="popup_account_txt">
                                <p class="popup_account_name">배달의 민족</p>
                            </div>
                        </div>
                    </li>
                    <li class="popup_account-list">
                        <div class="popup_account_cnt">
                            <div class="check-area">
                                <input class="account-checked" type="checkbox" id="account-checked02">
                                <label for="account-checked02"></label>
                            </div>
                            <i class="ico_cont delivery dv_1050"></i>
                            <div class="popup_account_txt">
                                <p class="popup_account_name">쿠팡이츠</p>
                            </div>
                        </div>
                    </li>
                    <li class="popup_account-list">
                        <div class="popup_account_cnt">
                            <div class="check-area">
                                <input class="account-checked" type="checkbox" id="account-checked03">
                                <label for="account-checked03"></label>
                            </div>
                            <i class="ico_cont delivery dv_1020"></i>
                            <div class="popup_account_txt">
                                <p class="popup_account_name">요기요</p>
                            </div>
                        </div>
                        <button class="btn_link-wrap">
                            <p class="btn_link-txt">연결하기</p>
                            <i class="ico_cont plus"></i>
                        </button>
                    </li>
                </ul>
                <div class="bot_fix_pd20">
                    <button class="type_B bgc_sig" type="button"><span>완료</span></button>
                </div> 
            </div>
        </div>
    </div>
</body>
</html>
