<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">업태/업종 변경</div>
      <!-- //상단 타이틀 -->

      <div class="wrap setting">
        <div class="input_info_box">
          <span class="info_tit">업태</span>
          <input class="info_input" placeholder="업태명 입력"> 
          <p class="nomal_noti wd_reset">
            <i class="character"></i> 
            <span>업태는 최대 20자입니다.</span>
          </p>
        </div>
        <div class="input_info_box">
          <span class="info_tit">업종</span>
          <input class="info_input" placeholder="업종명 입력"> 
          <p class="nomal_noti wd_reset">
            <i class="character"></i> 
            <span>업종는 최대 20자입니다.</span>
          </p>
        </div>
      </div>
      
    </div>

     <!-- 토스트 팝업 -->
     <div class="toast">
      <span>업태을 입력해 주세요.</span>
    </div>
    <!-- 토스트 팝업 -->

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>변경하기</span> 
    </div>
    <!-- 하단 fix 버튼 -->
    

  </div>
</body>
</html>
