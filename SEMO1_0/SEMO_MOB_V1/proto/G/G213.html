<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">

    <div class="cont_bg cont_pd">
      <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">세모주치의 관리</div>
      <!-- //상단 타이틀 -->

      <div class="wrap setting">
        <div class="accountant_info_wrap">
          <div class="accountant_info_box">
            <div class="accountant_info type2">
              <p>
                <span class="ai_tit">수임처명</span>
                <span class="ai_info">한효성 세무사</span>
              </p>
              <p>
                <span class="ai_tit">사업자 번호</span>
                <span class="ai_info">214-86-54125</span>
              </p>
              <p>
                <span class="ai_tit">수임동의일</span>
                <span class="ai_info">2019-05-08</span>
              </p>
            </div>
          </div>

          <!-- 안내 -->
          <div class="noti_box posi_defalt">
            <span class="nb_tit2">수임동의 내용</span>
            <p class="nomal_noti">
              <i class="character"><em class="noti_dot"></em></i>
              <span>세모장부에 조회된 증빙을 수임 세무사가 조회 할 수 있습니다.</span>
            </p>
            <p class="nomal_noti">
              <i class="character"><em class="noti_dot"></em></i>
              <span>수임 세무사가 수임처 앱에서 최신 증빙을 직접 조회 할 수 있습니다.</span>
            </p>
            <p class="nomal_noti">
              <i class="character"><em class="noti_dot"></em></i>
              <span>만약 수임취소할 경우 더 이상 수임 세무사가 증빙자료를 조회할 수 없습니다.</span>
            </p>
          </div>
          <!-- 안내 -->

        </div>
      </div>
      <!-- 수임취소 안내팝업 -->
      <div class="popup_bg alert" style="display: none;">
        <div class="popup_content">
          <div class="popup_title">
            <span style="text-align: center;">
              <b>한효성 세무사 수임을 <br>
                취소합니다. </b>
            </span>
          </div>
          <div class="popup_text" style="margin-top: unset;">
            <span>
              <p>
              </p>
            </span>
          </div>
          <div class="btm_button">
            <span class="bgc_gray">취소</span>
            <span class="bgc_green">확인</span>
            <!--클래스 bgc_green 배경색-->
          </div>
        </div>
      </div>
      <!-- 재수임 동의 안내팝업 -->
      <div class="popup_bg alert" style="display: none;">
        <div class="popup_content">
          <div class="popup_title">
            <span style="text-align: center;">
              <b>취소되었습니다. <br>
                다시 수임 동의 해주세요</b>
            </span>
          </div>
          <div class="popup_text" style="margin-top: unset;">
            <span>
              <p>
              </p>
            </span>
          </div>
          <div class="btm_button">
            <span class="bgc_gray">취소</span>
            <span class="bgc_green">확인</span>
            <!--클래스 bgc_green 배경색-->
          </div>
        </div>
      </div>
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>수임 취소</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>

</html>
