<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">스마트여신약정 조회</div>
      <!-- //상단 타이틀 -->

      <div class="wrap account"> 
        <div class="progress_state_box">
          <span class="suc"></span> <!--신청 진행 완료 활성 클래스 suc-->
          <span class="suc"></span> <!--신청 진행 완료 활성 클래스 suc-->
          <span class="on"></span> <!--신청 진행 활성 클래스 on-->
        </div>

        <div class="result_box set_pdtb20p">
          <div class="result_wrap fail"> <!--실패 활성 클래스 fail-->
            <i class="ico_rw fail"><em class="new_blind">실패 아이콘</em></i> <!--fail-->
            <span class="fail"><strong>여신약정 신청이<br>실패하였습니다.</strong></span>
          </div>
          <p class="normal_sentence error set_mgt40"> 
            데이터 처리 중 오류가 발생하였습니다. <br>
            잠시 후 이용하시기 바랍니다.<br>
            [0001]
          </p>

          <p class="noti_comm set_top_cen set_mgt40">
            <i class="ico_cen"></i>
            <span>동일한 오류가 계속 발생할 경우 해당 화면을<br>캡쳐하여 1:1 문의해 주세요.</span>
          </p>

          <button class="btn_call set_cen_cen set_mgt30">고객센터 바로가기</button>
        </div>
      </div>
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">돌아가기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
