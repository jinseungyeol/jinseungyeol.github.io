<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../../css/semo_cont.css" />
    <title>SEMO</title>
  </head>
  <body>
    <div class="new_content">
      <div class="cont_bg cont_pd">
        <!-- 클래스 cont_pd fix_button 포함 패딩-->

        <!-- 상단 타이틀 -->
        <div class="title">가입 서비스</div>
        <!-- //상단 타이틀 -->

        <div class="wrap setting">
          <div class="setting_box">
            <!-- pro/lite 요금 정보 -->
            <div class="fee_wrap">
              <div class="fee_box2">
                <p class="fee_classify">
                  <i class="ico_check_fee"></i>LITE 이용중
                </p>
                <p class="fee_mothly">월 <em>2,000</em>원(IBK계좌 등록 시 0원)</p>
                <p class="fee_txt">가입비·연회비 / VAT 별도</p>
                <p class="fee_change_date">4/1일 변경 예정</p>
              </div>
            </div>
            <!-- // pro/lite 요금 정보 -->

            <!-- 안내 -->
            <div class="noti_box posi_defalt fb_under">
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>세무사 증빙 자동 제출</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>세모주치의 무료 컨설팅</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>직원 관리 5인 이하</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>간편송금 송금수수료 5회 면제</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>무료 스마트팩스 제공<br />(수신 무제한 무료)</span>
              </p>
            </div>
            <!-- 안내 -->

            <p class="noti_star wd_set color">
              <i class="character"></i>
              <span>서비스는 한달에 한번 변경할 수 있습니다. </span>
            </p>
            <p class="noti_star wd_set color">
              <i class="character"></i>
              <span>PRO는 변경할 경우 바로 이용할 수 있습니다.</span>
            </p>
            <p class="noti_star wd_set color">
              <i class="character"></i>
              <span
                >LITE로 변경할 경우 변경한 월까지는 PRO로 이용할 수
                있습니다.</span
              >
            </p>
          </div>
        </div>
      </div>

      <!-- 토스트 팝업 -->
      <div class="toast">
        <span>다음달 1일에 변경 예정입니다.</span>
      </div>
      <!-- 토스트 팝업 -->

      <!-- 하단 fix 버튼 -->
      <div class="btm_fix">
        <span class="bgc_blue">서비스 변경하기</span>
      </div>
      <!-- 하단 fix 버튼 -->
    </div>
  </body>
</html>
