<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- css -->
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_nh.css">
  <!-- js -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <title>농협몰02</title>
</head>
<body>
  
  <div class="title_v2">
    <p class="nh_font">NH소상공인 파트너 X 농협몰</p>
    <div class="btn_right">
      <span class="ico_cen close_02"></span>
    </div>
  </div>
  <div class="new_content pretendard agriculture">
    <div class="cont_bg padding20">
      <div class="safe_title_wrap">
        <div class="safe_title c_b1">
          <div class="main">
            <h1>
              안심하고 먹을 수 있는
            </h1>
            <b>우리 농산물</b>
          </div>
          <div class="sub">
            <span>#우리농산물 # 안심쇼핑 #식자재주문 #바로주문</span>
          </div>
        </div>
      </div>
      <div class="agriculture_img">
        <div class="ico_cen"></div>
      </div>
      <div class="agree_wrap">
        <div class="agree">
          <p>해당 서비스는 <b>농협경제지주(주)</b>에서 제공합니다.</p>
          <div class="agree_check">
            <input type="checkbox" id="agree1">
            <div class="check_area">
              <label for="agree1"></label>
            </div>
            <span id="provide_agree">개인정보 제3자 제공 동의</span>
          </div>
        </div>
        <div class="btn nh_mall h65">시작하기</div>
      </div>
    </div>
  </div>

  <script>
    $('.new_content.agriculture .agree_check .check_area').click(function(){
      $('.new_content.agriculture .btn.nh_mall').toggleClass('active');
      $(this).toggleClass('active');
    })
  </script>

</body>
</html>
