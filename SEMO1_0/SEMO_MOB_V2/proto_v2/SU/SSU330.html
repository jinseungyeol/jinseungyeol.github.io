<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <title>S_회원가입05</title>
</head>
<body>

  <!-- 헤더 타이틀  -->
  <div class="title">
    <div class="title_left">
      <i class="ico_cen left_arrow set_pdl20"></i>
    </div>
    <span class="title_text">업종 검색</span>
  </div>

  <div class="basic_wrapper">

    <!-- 검색창 -->
    <section class="title_select_wrap bd_btm">
      <div class="title_select_section">
        <input type="text" placeholder="업태 또는 업종">
        <span class="ico_cen close_bg_gray"></span>
      </div>
      <p class="c_b2">검색결과 <em>111</em></p>
    </section>

    <!-- content -->
    <!-- 주소 검색하기 전 -->
    <section class="search_address big">
      <i class="ico_cont report_01"></i>
      <b class="c_b2 font_w_b">업종을 검색해 주세요</b>
      <span>
        <p><b>도로명+건물번호</b> 예)영신로 220</p>
        <p><b>지역명(동/리)+번지</b> 예)영등포동8가 92</p>
        <p><b>지역명(동/리)+ 건물명</b> 예)영등포동8가 knk타워</p>
      </span>
    </section>

    <!-- 주소 검색하기 후 -->
    <section class="address_list_wrap big set_mgt18" style="display: none;">
      <div class="address_list">
        <em>숙박 · 음식 > 음식점 및 주점업</em>
        <span class="set_mgt5">기사식당</span>
      </div>
      <div class="address_list">
        <em>숙박 · 음식 > 음식점 및 주점업</em>
        <span class="set_mgt5">한식/백반/한정식</span>
      </div>
      <div class="address_list">
        <em>숙박 · 음식 > 음식점 및 주점업</em>
        <span class="set_mgt5">한정식전문</span>
      </div>
      <div class="address_list">
        <em>숙박 · 음식 > 음식점 및 주점업</em>
        <span class="set_mgt5">기사식당</span>
      </div>
    </section>
  </div>

  <script>
    $('.title_select_section').click(function () {
      $(this).addClass('active')
      $('.new_content.sector .cont_bg p').css("display", "block");
    })
  </script>

</body>

</html>
