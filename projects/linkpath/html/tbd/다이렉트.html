<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  
  <!-- container -->
  <div class="container">
    <header class="header active">
      <div class="inner">
        <div class="left">
          <h1><a href="#" class="logo"><img src="../../img/wp/logo/logo_linkpath.svg"></a></h1>
        </div>
      </div>
    </header>
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult complete">
        <div class="inner">
          <div class="directTxtBox">
            <p class="txt">안녕하세요. <span class="focus">이로움세무회계</span> 입니다.</p>
            <p class="txt">컨설팅 상담을 위한 서류를 수집하려고 합니다.</p>
            <p class="txt">아래의 간편인증을 통해 서류를 전달해주세요.</p>
          </div>
          <div class="selectWrap">
            <div class="item">
              <p class="title">컨설팅 내용</p>
              <div class="selectBox consultCnt">
                <select>
                  <option value="경정청구">경정청구</option>
                  <option value="CEO 보험">CEO 보험</option>
                  <option value="사내 근로복지기금">사내 근로복지기금</option>
                  <option value="법인전환">법인전환</option>
                  <option value="정책자금">정책자금</option>
                  <option value="근로소득비과세">근로소득비과세</option>
                  <option value="자본거래">자본거래</option>
                  <option value="고용지원금">고용지원금</option>
                  <option value="창업중소기업">창업중소기업</option>
                </select>
              </div>
            </div>
            <div class="item">
              <p class="title">사업자번호</p>
              <div class="busiNumValid">
                <div class="selectBox">
                  <input type="text" placeholder="사업자번호 입력">
                  <button type="button" class="deleteBtn"></button>
                </div>
                <button class="activeBodyBtn inActiveBodyBtn"><span>인증하기</span></button>
              </div>
            </div>
            <div class="item">
              <p class="title">휴대폰번호</p>
              <div class="selectBox">
                <!-- error 클래스 추가시 에러, 입력 시 x버튼 노출 js처리 -->
                <input type="text" placeholder="휴대폰번호 입력">
                <button type="button" class="deleteBtn"></button>
              </div>
            </div>
          </div>
          <div class="areaBtn">
            <!-- 활성화 시 inActiveBodyBtn 클래스 제거 -->
            <button class="activeBodyBtn inActiveBodyBtn"><span>간편인증하기</span></button>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
