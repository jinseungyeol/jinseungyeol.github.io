		<div class="overlay" style="display: ;">
            <div class="pop_wrap" style="width: 800px; height: 600px;" >
                <div class="pop_inner">
                    <div class="prom_wrap">

                        </div>
                    </div> 
                </div>
            </div>
        </div>
	<script>



// GRID 1
let grid_01 = new w2grid({
		name: 'grid_01',
		box: '#grid_01',
		show: {
            footer: true,
            lineNumbers: true, 
		},
        reorderRows: true,
		columns: [
			{  field: 'fname', text: '노출', size: '150px'}, // frozen: true 필드 고정
			{ field: 'lname', text: '제목', size: '250px', style: 'text-align: center' },
			{ field: 'th_03', text: '진행 기간',  style: 'text-align: center' }

		],
		records: [
			{ "recid": 1, "fname": "1", "lname": "[설문] 세무사 피드백 공기청정기", "th_03": "22.06.10 08:46:00", "th_04": "신고개인"
				, w2ui: { class:{ fname:"hover_s", lname:"hover_s", th_05:"state_b hover_s", th_06:"state_b hover_s",  th_07:"state_b hover_s", th_08:"state_b hover_s"}} },
			{ "recid": 2, "fname": "나라백반", "lname": "123-45-67890", "th_03": "일반", "th_04": "기장법인"
				, w2ui: { class:{ fname:"hover_s", lname:"hover_s", th_05:"state_r", th_06:"disabled", th_07:"disabled", th_08:"disabeld" }} },
		]
	})

	</script>
