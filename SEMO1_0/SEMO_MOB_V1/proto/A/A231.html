<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 인증서 한 번에 등록하기 -->
      <div class="wrap join">

        <div class="certi_box">
          <!-- 계정등록 완료 -->
          <div class="result_wrap fail set_mgb30"> <!--실패 활성 클래스 fail-->
            <i class="ico_rw fail"><em class="new_blind">실패아이콘</em></i> <!--fail-->
            <span class="fail"><strong>계정조회가<br>실패하였습니다.</strong></span>
          </div>
          <!-- //계정등록 완료 -->
        </div>
        <p class="normal_sentence big">해당 인증서로 등록 가능한<br>계정이 없습니다.</p>
      </div>
      <!-- //인증서 한 번에 등록하기 -->
      <!-- 안내 -->
      <div class="noti_box">
        <p class="noti_comm set_top_le">
          <i class="ico_cen"></i>
          <span>계정을 조회하지 못하는 경우</span>
        </p>
        <div class="noti_box_list">
          <ul>
            <li>- 해당 기관 홈페이지에 인증서가 등록되지 않은 경우는 조회할 수 없습니다.</li>
            <li>- 기관별 서비스 점검시간에는 조회할 수 없습니다.</li>
            <li>- 수시입출금 계좌만 등록 가능합니다.</li>
            <li>- 카카오뱅크, 부산 썸뱅크, 숨김계좌 등 PC 인터넷뱅킹에서 조회할 수 없는 계정은 조회가 불가합니다.</li>
            <li>- 지정PC를 등록한 경우 계정조회가 안될 수 있습니다.</li>
          </ul>
        </div>
      </div>
      <!-- 안내 -->

    </div>
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">확인</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
