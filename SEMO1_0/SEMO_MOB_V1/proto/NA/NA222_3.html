<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_nh.css">
    <title>SEMO</title>
</head>
<style>

</style>

<body>
    <div class="new_content">
        <div class="cont_bg cont_pd">
            <div class="title">프리미엄서비스 가입관리</div>

            <div class="wrap service">
                <div class="certi_box">
                    <div class="service_alert" style="display:none;">
                        <p>혜지예정일 : <em>2222년 0월 1일</em></p>
                    </div>
                    <ul class="service_wrapper011">
                        <li class="g_reg011_01">
                            <i>
                                <div>
                                    <p>
                                        <span>무료사용기간 :</span>
                                        <span style="font-size:16px;">21.04.20 ~ 21.05.19</span>
                                    </p>
                                    <p>
                                        <span>사용료 :</span>
                                        <span>월 4,950원(VAT포함)</span>
                                    </p>
                                    <p>
                                        <span>결제예정일 : </span>
                                        <span>매월 10, 17, 24일</span>
                                    </p>
                                    <p>
                                        <span>납부자번호 :</span>
                                        <span>456789</span>
                                    </p>

                                </div>
                            </i>
                        </li>
                        <li class="g_reg011_02">
                            <i></i>
                        </li>
                        <li class="g_reg011_03">
                            <i></i>
                            <div class="service_term">
                                <span>해지하기</span>
                            </div>

                            <!--============ "service_term" 클래스 g_reg011_03 자식으로 넣었슴니다  ============= -->
                        </li>
                    </ul>

                </div>
            </div>
            <!-- 해지팝업 -->
            <div class="popup_bg alert" style="display: none;">
                <div class="popup_content">
                    <div class="popup_title">
                        <span>
                            <b style="text-align: center;">정말 프리미엄 회원 서비스를
                                해지하시겠어요?</b>
                        </span>
                    </div>
                    <div class="popup_text">
                        <span>
                            <p style="text-align: center;">
                                이번 달 말까지 프리미엄 회원으로
                                사용하실 수 있으며 요금이 청구됩니다.
                            </p>

                        </span>

                    </div>

                    <div class="btm_button">
                        <span class="bgc_gray">취소</span>
                        <span class="bgc_green">확인</span>
                        <!--클래스 bgc_green 배경색-->
                    </div>
                </div>
            </div>
            <!-- 안내 -->
        </div>
        <!-- 하단 fix 버튼 -->
        <div class="btm_button">
            <span class="bgc_green">확인</span>
        </div>
        <!-- 하단 fix 버튼 -->


    </div>
