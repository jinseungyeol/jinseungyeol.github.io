<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/main.css">

  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>전체계좌목록</title>
</head>
<body>
    <div class="title b_white">
        <div class="title_left">
          <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">전체계좌목록</span>
        <div class="title_share">
            <button class="share_btn">
              <span>계좌관리</span>
            </button>
          </div>
      </div>
      <main class="whole-account-list">
        <div class="whole-account_header">
            <div class="whole-account_header_top">
                <div class="main_tit">
                   <h1>3,270,500원</h1>
                </div>
                <div class="btn_wrap">
                    <button class="refresh">새로고침</button>
                    <span>방금 전</span>
                </div>
            </div>
            <div class="whole-account_header_bottom">
                <div class="sub_tit">
                    <h2>전체계좌 7개</h2>
                </div>
            </div>
        </div>
        <section class="whole-account_content_wrap">
            <article class="whole-account_content">
                <div class="whole-account_content_header">
                    <div class="main_title">
                        <i class="ico_cont bank bk_003"></i>
                        <h1>IBK기업</h1>
                    </div>
                    <div class="amount">
                        <span>530,550원</span>
                        <i class="ico_cont"></i>
                    </div>
                </div>
                <div class="whole-account_content_list">
                    <div class="content_item">
                        <div class="content_item_tag">
                            <!-- pulpple/ gree/ yellow cla  ss 로 분기처리  -->
                            <span class="pupple">기업</span>
                            <span class="green">공유</span>
                            <span class="yellow">송금</span>
                        </div>
                        <div class="content_item_substance">
                            <div class="name_wrap">
                                <div class="name">
                                    <span>일반보통예금사업자</span>
                                </div>
                                <div class="account">
                                    <span>001-5014401-92440</span>
                                </div>
                            </div>
                            <div class="amount">
                                <span>30,400원</span>
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                    </div>
                    <div class="content_item">
                        <div class="content_item_tag">
                            <span class="blue">개인</span>
                            <span class="green">공유</span>
                        </div>
                        <div class="content_item_substance">
                            <div class="name_wrap">
                                <div class="name">
                                    <span>일반보통예금사업자<span>
                                </div>
                                <div class="account">
                                    <span>001-5014401-92440</span>
                                </div>
                            </div>
                            <div class="amount">
                                <span>30,400원</span>
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </article>
            <article class="whole-account_content">
                <div class="whole-account_content_header">
                    <div class="main_title">
                        <i class="ico_cont bank bk_011"></i>
                        <h1>NH농협</h1>
                    </div>
                    <div class="amount">
                        <span>530,550원</span>
                        <i class="ico_cont"></i>
                    </div>
                </div>
                <div class="whole-account_content_list">
                    <div class="content_item">
                        <div class="content_item_tag">
                            <span class="pupple">기업</span>
                        </div>
                        <div class="content_item_substance">
                            <div class="name_wrap">
                                <div class="name">
                                    <span>일반보통예금사업자</span>
                                </div>
                                <div class="account">
                                    <span>001-5014401-92440</span>
                                </div>
                            </div>
                            <div class="amount">
                                <span>30,400원</span>
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                    </div>
                    <div class="content_item">
                        <div class="content_item_tag">
                            <span class="blue">개인</span>
                        </div>
                        <div class="content_item_substance">
                            <div class="name_wrap">
                                <div class="name">
                                    <span>일반보통예금사업자<span>
                                </div>
                                <div class="account">
                                    <span>001-5014401-92440</span>
                                </div>
                            </div>
                            <div class="amount">
                                <span>30,400원</span>
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </article>
            <!-- 계좌 목록 없을 때 -->
            <article class="whole-account_content" style="display: none;">
                <div class="none_account">
                    <h1 class="info">연결한 계좌가 없어요</h1>
                    <button class="entry_btn">
                        <span class="c_purple">
                            계좌 추가
                        </span>
                    </button>   
                </div>
            </article>
        </section>
      
      </main>
</body>
</html>
