<!DOCTYPE html>
<html lang="ko">

<head>

    <link rel="stylesheet" href="../../css/semo_cont.css">

<body>
    <div class="new_content">
        <div class="cont_bg ">
            <div class="wrap account">

                    <p class="on">

                    </p>
                    <p>
                        <i>②</i>
                        <em class="progress_on_title">2, 정보제공동의</em>
                    </p>
                    <p>
                        <i>③</i>
                        <em class="progress_on_title">3. 약정서 확인</em>
                    </p>
             
                </div>
                <div class="change_text check_list">
                    <span>
                        자영업자 체인지업에 대한 심사가
                        아래와 같이 완료되었습니다.
                    </span>

                <table class="application_table set_mgt15">
                    <tr>
                        <th>사업자등록번호</th>
                        <td>123-45-67890</td>
                    </tr>
                    <tr>
                        <th>기업명</th>

                    </tr>

                        <th>대표자명</th>

                    </tr>
                    <tr>
                        <th>지원기간</th>

                    </tr>
                    <tr>
                        <th>지원내용</th>
                        <td>지원기간 내 만기연장<br>
                            금리 : 연 3.0% 이내
                        </td>
                    </tr>
                    <tr>
                        <th>경영목표</th>
                        <td>2021년 700백만원<br>
                            2022년 800백만원
                        </td>
                    </tr>
                    <tr>
                        <th>경영정상화방안</th>
                        <td>고정비 절감 <br>
                            신규매출처 확보</td>
                    </tr>
                </table>

            </div>
        </div>
        <!-- 하단 fix 버튼 -->
        <div class="btm_button ">
            <span class="bgc_green">다음</span>
            <!--클래스 bgc_green 배경색-->

        <!-- 하단 fix 버튼 -->
    </div>
