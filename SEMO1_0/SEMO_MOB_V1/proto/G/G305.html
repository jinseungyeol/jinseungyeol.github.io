<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../../css/semo_cont.css" />
    <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css" /> -->

    <title>SEMO</title>
  </head>
  <body>
    <div class="new_content">
      <div class="cont_bg cont_pd">
        <!-- 클래스 cont_pd fix_button 포함 패딩-->

        <!-- 상단 타이틀 -->
        <div class="title">가입 서비스 변경</div>
        <!-- //상단 타이틀 -->

        <div class="wrap setting">
          <div class="setting_box">
            <!-- pro/lite 요금 정보 -->
            <div class="fee_wrap">
              <div class="fee_box">
                <div class="fee lite">
                  <p class="fee_classify"><i class="ico_check_fee"></i>LITE</p>
                  <p class="fee_mothly default">월 <em>5,000</em> 원</p> <!--2020-08-28 가격 변경-->
                  <p class="fee_mothly promotion">월 <em>3,000</em> 원</p> <!--2020-08-28 가격 변경-->
                  <!-- 2020-08-28 제세히보기 삭제 -->
                  <!-- <button class="btn_fee">자세히보기</button> -->
                  <!-- 2020-08-28 제세히보기 삭제 -->

                </div>
                <div class="fee pro on">
                  <!--클릭했을때 활성화 클래스 on-->
                  <p class="fee_classify"><i></i>PRO</p>
                  <p class="fee_mothly default">월 <em>20,000</em> 원</p> <!--2020-08-28 가격 변경-->
                  <p class="fee_mothly promotion">월 <em>10,000</em>원</p> <!--2020-08-28 가격 변경-->
                  <!-- 2020-08-28 제세히보기 삭제 -->
                  <!-- <button class="btn_fee">자세히보기</button> -->
                  <!-- 2020-08-28 제세히보기 삭제 -->
                </div>
              </div>
              <p class="fee_txt">가입비 면제 / VAT 별도</p> <!--2020-08-28 문구 변경-->
            </div>
            <!-- // pro/lite 요금 정보 -->

            <!-- 안내 -->
            <!--2020-08-28 문구 추가 및 변경-->
            <div class="noti_box posi_defalt">
              <p class="nb_tit3">PRO고객들을 위한 특별혜택!</p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>전 메뉴 사용 가능</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>세모주치의에게 증빙자료 자동 공유</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>무료 절세컨설팅 제공</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>직원관리 인원 무제한 등록가능</span>
              </p>
              <p class="nomal_noti">
                <i class="character"><em class="noti_dot"></em></i>
                <span>세모워크(근태관리) 인원 무제한 이용가능</span>
              </p>
            </div>
            <!--2020-08-28 문구 추가 및 변경-->

            <!-- 안내 -->
          </div>
        </div>
      </div>

      <!-- 하단 fix 버튼 -->
      <div class="btm_fix">
        <span>변경하기</span>
      </div>
      <!-- 하단 fix 버튼 -->
    </div>
  </body>
</html>
