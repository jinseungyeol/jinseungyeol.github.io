<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>

</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd">
      <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <div class="wrap setting set_mgt_unset">
        <div class="setting_box">
          <div class="deli_certi set_pdt88">
            <div class="send_display_wrap">
              <div class="checkmark-circle complete">
                <div class="background"></div>
                <div class="checkmark draw"></div>
              </div>
            </div>
            <span class="deli_check">제로페이 매출증빙 연동에 <br> 성공했습니다.</span>

          </div>
          <!-- 
              <div class="checkmark-circle fail">
            <div class="background"></div>
            <div class="ex_mark "></div>
            <div class="dot "></div>
          </div>
         -->
          <div class="peris_sus set_mgt45">
            <div class="peris_sus_con">
              <span>제로페이ID</span>
              <span>zero1004</span>
            </div>

          </div>
          <div class="deli_center_con hide">
            <div class="deli_fail">
              <span>제로페이 홈페이지에서 입력하신
                ID/PW로 로그인 가능여부를 확인 후
                다시 시도해 주세요.</span>
            </div>
          </div>
          <div class="peris_link">
            <!-- hide클래스로 제어 -->
            <span>ID/PW가 변경되었어요.</span>
            <span>제로페이 홈페이지 바로가기</span>
          </div>
          <span class="deli_complete_text hide">
            <!-- hide클래스로 제어 -->
            <p>ㆍ</p>
            <p>제로페이 데이터는 익일부터 최근 3개월의 데이터를
              자동으로 업데이트합니다.</p>
            <!-- 
               완료 : 배달앱은 부가세신고자료 기반으로 조회합니다.
               오류 : 배달앱 계정을 다시 등록해주세요. 동일한 오류가 계속 
                      발생할 경우 고객센터 > 1:1문의로 문의주세요.
             -->
          </span>
        </div>
      </div>
      <!-- 하단 fix 버튼 -->
      <div class="btm_button zero">
        <span class="bgc_gray" >닫기</span>
        <span class="bgc_green ">제로페이 매출증빙
          바로가기</span>
        <!--클래스 bgc_green 배경색-->
      </div>
      <!-- 하단 fix 버튼 -->
    </div>
</body>

</html>
