<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../proto/css/nh_cont.css">
  <link rel="stylesheet" href="../../../css/semo_cont.css">
  <link rel="stylesheet" href="../../../css/PDCT.css" />
  <script src="../../../js/jquery-3.5.1.min.js"></script>
  <script src="../../../js/PDCT.js"></script>


</head>

<body>
  <div class="container">
    <div class="data_popup"
    style="width: 100vw; height: 100vh; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background-color: rgba(0, 0, 0, 0.25); z-index: 999999999; display: none;">
    <div class="textarea" style="box-shadow:5px 10px 15px 5px #888888;">
      <div class="delete">X</div>
      <div class="htmlContent"></div>
    </div>
  </div>
    <section>
      <div class="p_right_box">
        <div class="p_right_box_title">Input</div>
        <div class="p_right_container">
          <ul class="p_right_box">
            <li style="width: 400px; margin-left: unset;">
              <span class="p_con_title">.deli_log</span>

              <div class="deli_log">
                <div class="deli_id">
                  <input type="text" placeholder="6~15자리 영문/숫자(특수문자 불가)">
                </div>
                <div class="deli_pass">
                  <input type="password" placeholder="10자리 이상 영문/숫자">
                </div>
              </div>
            </li>
            <li>
              <span class="p_con_title">.staff_info_cell</span>
              <div class="staff_info_cell">
                <p class="dot">휴대폰번호</p>
                <div>
                    <div class="staff_info_number">
                        <input type="text" placeholder="숫자만 입력해 주세요">
                    </div>

                </div>
            </div>
            </li>
            <li>
              <span class="p_con_title">.salary_select_wrap</span>

              <div class="staff_info_cell">
                <p>계약형태</p>
                <div class="salary_select_wrap">
                    <select class="date_select" required="">
                        <option value="" hidden="" disabled="" selected=""></option>
                        <option value="">정규직</option>
                        <option value="">계약직</option>
                    </select>
                    <i class="ico_cen"></i><!-- up클래스로 활성화 -->
                </div>

            </div>
            </li>
            <li>
              <span class="p_con_title">.staff_bank_select</span>

              <div class="staff_info_cell">
                <p>급여계좌</p>
                <div class="staff_bank_select">
                    <div>
                        <div>
                            <i class="logo_bank ico_lb003"></i>
                            <p>은행선택</p>
                        </div>
                        <input type="number" placeholder="계좌번호 입력">
                    </div>
                    <div>
                        <div class="staff_bank_search active focus">
                            예금주 조회
                        </div>
                        <input type="text" value="예금주:" class="active">
                    </div>
                </div>
            </div>
            </li>
            <li>
              <span class="p_con_title">.staff_bank_select</span>
              <div class="staff_info_cell">
                <p>주민등록번호</p>
                <div class="staff_reg_number">
                    <div>
                        <input type="text" placeholder="생년월일 6자리" maxlength="6">
                    </div>

                    <div>
                        <input type="text" maxlength="1">
                        <div>
                            <div class="dot">●</div>
                            <div class="dot">●</div>
                            <div class="dot">●</div>
                            <div class="dot">●</div>
                            <div class="dot">●</div>
                            <div class="dot">●</div>
                        </div>
                    </div>
                </div>
            </div>
            </li>
          </ul>
          <ul class="p_right_box">


            <li>

            </li>

            <li>
            </li>
          </ul>
        </div>
      </div>
    </section>
    <footer></footer>
  </div>
</body>

</html>
