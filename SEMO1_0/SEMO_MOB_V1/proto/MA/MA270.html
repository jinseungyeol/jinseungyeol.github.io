<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 납부계좌 등록결과 -->
      <div class="wrap join">
        <div class="pay_box">
          <div class="pay_result_wrap">
            <div class="pr_result_box">
              <i class="ico_pr_result fail"></i>
              <!-- 2020-06-05 <em>실패하였습니다.</em> -> 실패하였습니다. -->
              <span class="pr_result fail">출금계좌 등록이<br>실패하였습니다.</span>
            </div>

            <p class="normal_sentence big"> 
              해당 기관의 관련페이지 <br>
              변경으로 거래가 실패하였습니다.<br>
              [80002F32]
            </p>

            <p class="noti_comm set_top_cen set_mgt30">
              <i class="ico_cen"></i>
              <span>동일한 오류가 계속 발생할 경우<br>
                해당 화면을 캡쳐하여 1:1 문의해 주세요.</span>
            </p>

            <button class="btn_call set_cen_cen set_mgt30">고객센터 바로가기</button>
          </div>
        </div>
      </div>
      <!-- //납부계좌 등록결과 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다시 등록하기</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
