<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">

  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg">
      
      <!-- 상단 타이틀 -->
      <div class="title">송금계좌 관리</div>
      <!-- //상단 타이틀 -->

      <!-- 송금계좌 등록 -->
      <div class="wrap account">
        <div class="account_box">
          <!-- 송금계좌 목록 -->
          <div class="info_detail_list_wrap">
              <!-- 이체계좌 목록 총계-->
            <div class="info_detail_total_list"> 
              <p class="set_cen_cen">
                <i class="ico_cen info_mark bankbook"></i>
                <span class="account_info set_cent_le">송금계좌 <em class="account_number">1</em>개</span>
                <!-- 2020-08-10 삭제 -->
                <!-- <span class="agent_info set_cent_le">(<em class="agent_number">1</em>개 은행)</span> -->
                <!-- 2020-08-10 삭제 -->
              </p> 
            </div>
            <!-- 2020-07-17 -->
            <!-- //이체계좌 목록 총계-->
            <!-- 2020-08-10 삭제 -->
            <!-- <div class="info_detail_renew">
              <p>18.12.12  13:00</p>
              <a><i class="ico_cen"></i><em class="new_blind">갱신</em></a>
            </div> -->
            <!-- 2020-08-10 삭제 -->
            <!-- 2020-08-10 추가 -->
            <p class="noti_comm set_cen_cen set_mgt15 set_mgb20">
              <i class="ico_cen"></i>
              <span>송금계좌는 IBK기업은행 계좌만 가능합니다.</span>
            </p>
            <!-- 2020-08-10 추가 -->
            <!-- 계좌-->
            <div class="info_detail_list_box">  
              <ul>
                <li class="info_detail_list type2">
                  <div>
                    <span class="bank_mark">
                      <i class="logo_bank ico_lb003"></i> 
                      <!-- 
                        ***은행 활성 클래스
                        lb003 -> ibk기업 / lb004 -> 국민 / lb020 -> 우리 / lb088 -> 신한 / 
                        lb081 -> 하나 / lb011 -> 농협 / lb023 -> sc / lb027 -> 씨티 / 
                        lb002 -> 산업 / lb071 -> 우체국 / lb032 -> 부산 / lb045 -> 새마을 / 
                        lb034 -> 광주 / lb007 -> 수협 / lb031 -> 대구 / lb039 -> 경남 / 
                        lb035 -> 제주 / lb037 -> 전북 / lb089 -> k / lb048 -> 신협 
                      -->
                    </span> 
                    <p class="set_fl_col">
                      <span class="info_bank_name">IBK기업은행</span>
                     <!-- 2020-08-10 수정 -->
                     <span class="info_acnt_name">보통예금통장</span>
                     <span class="info_acnt">1234-5678-12345-52</span>
                     <!-- 2020-08-10 수정 -->
                      <!-- 2020-08-10 삭제 -->
                      <!-- <span class="info_fail">조회실패</span> -->
                      <!-- 2020-08-10 삭제 -->
                    </p> 
                  </div>
                  <p class="set_fl_col si"> 
                    <span class="user_mark bussi">기업</span> <!--기업 활성화 클래스 bussi-->
                    <span class="info_ref">대표</span>
                  </p>
                </li>
                <li class="info_detail_list type2">
                  <div>
                    <span class="bank_mark">
                      <i class="logo_bank ico_lb003"></i> 
                    </span> 
                    <p class="set_fl_col">
                      <span class="info_bank_name">IBK기업은행</span>
                        <!-- 2020-08-10 수정 -->
                        <span class="info_acnt_name">보통예금통장</span>
                        <span class="info_acnt">1234-5678-12345-52</span>
                        <!-- 2020-08-10 수정 -->
                      <!-- 2020-08-10 삭제 -->
                      <!-- <span class="info_fail">조회실패</span> -->
                      <!-- 2020-08-10 삭제 -->
                    </p> 
                  </div>
                  <p class="set_fl_col si"> 
                    <span class="user_mark indi">개인</span> <!--개인 활성화 클래스 indi-->
                    <span class="info_ref">대표</span>
                  </p>
                </li>
              </ul>
              <button class="btn_plus set_mgb18">
                <i class="plus"></i>  송금계좌 등록
              </button>
            </div>
            <!-- //계좌-->
            <!-- //2020-07-17 -->

          </div>
          <!-- //송금계좌 목록 -->
        </div>
      </div>
      <!-- //송금계좌 등록 -->
      
    </div>
   
    <!-- 토스트 팝업 -->
    <div class="toast">
      <span>최대 10개까지 등록 가능합니다.</span>
    </div>
    <!-- 토스트 팝업 -->

  </div>
</body>
</html>
