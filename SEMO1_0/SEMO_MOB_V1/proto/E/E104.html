<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css"> 
  <link rel="stylesheet" href="../../css/semo_cont_nh.css"> 
   
  <title>SEMO</title>
</head>
<body>
  <div class="new_content "> 
    <!-- 2020-06-11 뒤로가기 삭제 -->
    <div class="cont_bg">

      <div class="wrap join">
        <div class="intro_board_wrap">
          <div class="board_bg">
            <!--2020-06-16 br 태그 삭제-->
            <div class="title">세모톡은</div> 
            <div class="board_txt">
              <strong class="text">
                세모주치의와 세무 상담과 
                각종 자료를 주고 받을 수 있는  
                1:1 전용톡입니다. 
              </strong> 
              <span class="text">
                세모톡에서 주고 받은 대화이력과 
                자료들은 만료기간이 없어 언제라도 
                필요하실 때 확인하실 수 있습니다. 
              </span>  
              <span class="text c_orange">
                세모주치의와 수임 동의를 하시면 
                세모톡 화면으로 바로 입장하실 수  
                있습니다. 
              </span> 
              <div class="board_logo"></div>
            </div>
            <!--//2020-06-16 br 태그 삭제-->
          </div>
          <button class="btn_full bgc_gray_grl">
            <span><i class="ico_cen person"></i> 아직 세모주치의가 없다면?</span>
            <i></i>
          </button>
          <button class="btn_full bgc_gray_gnl">
            <span><i class="ico_cen paper"></i> 수임동의하러 가기</span>
            <i></i>
          </button>
        </div>
      </div>
      
    </div>
  </div>
</body>
</html>
