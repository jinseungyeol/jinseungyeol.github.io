<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  <!-- container -->
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_linkpath.svg" alt="로고">
            </a>
          </h1>
        </div>
      </div>
    </header>
    <!-- //header -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult fixB">
        <div class="inner">
          <div class="certiTitArea">
            <img src="../../img/wp/ico/ico_gvo.svg" alt="정부24 아이콘">
            <strong class="certiTit">
              지방세 세목별 과세증명서
              <span class="progress">(2/2)</span>
            </strong>
          </div>
          <div class="infoMsgBox">
            <p class="infoMsg">
              지방세를 납부하고 있는 건물 주소를 선택해주세요.
            </p>
          </div>
          <div class="userInfoSection">
            <div class="InfoPanel">
              <p class="pannelTit">주소검색</p>
            </div>
            <div class="selectWrap">
              <div class="userInfoBox">
                <div class="item">
                  <p class="title">주소</p>
                  <div class="selectBox">
                    <input type="text" placeholder="주소검색" class="addrSearchInput" readonly>
                  </div>
                </div>
                <div class="item">
                  <p class="title">상세주소</p>
                  <div class="selectBox">
                    <input type="text" placeholder="상세주소 입력">
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="areaFixedBottom">
            <div class="fixedBottomInner">
              <div class="cell">
                <button class="activeBodyBtn inActiveBodyBtn"><span>다음</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
