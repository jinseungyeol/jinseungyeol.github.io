<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>CSE100</title>
</head>
<body>
    <div class="title">
        <div class="title_left">
          <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">이용약관</span>
    </div>
    <main class="cse100">
        <section class="common_link-template">
         
            <article class="link-template basic">
                <h1 class="main_tit">
                    필수 동의 내용
                </h1>
                <ul class="link-template_list">
                    <li class="item_wrap">
                        <div class="basic_item">
                            <div class="txt">
                                <span>서비스 이용약관</span>
                            </div>
                            <div class="icon">
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                    </li>
                    <li class="item_wrap">
                        <div class="basic_item">
                            <div class="txt">
                                <span>개인정보 처리방침</span>
                            </div>
                            <div class="icon">
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                    </li>
                    <li class="item_wrap">
                        <div class="basic_item">
                            <div class="txt">
                                <span>개인정보 수집 · 이용 동의</span>
                            </div>
                            <div class="icon">
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                    </li>
                    <li class="item_wrap">
                        <div class="basic_item">
                            <div class="txt">
                                <span>신용정보 수집 · 이용 동의</span>
                            </div>
                            <div class="icon">
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                    </li>
                </ul>
              
            </article>
            <div class="depth_line">

            </div>
            <article class="link-template toggle">
                <h1 class="main_tit">
                    선택 동의 내용
                </h1>
                <ul class="link-template_list">
                    <li class="item_wrap">
                        <div class="basic_item">
                            <div class="txt">
                                <span>개인(신용)정보 제3자 제공 동의</span>
                            </div>
                            <div class="icon">
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                        <div class="onoff_input_wrap">
                            <div class="onoff_input">
                                <input type="checkbox" id="slideOne1" name="check" checked>
                                <label for="slideOne1"></label>
                                <div class="onoff_input_bg"></div>
                            </div>
                        </div>
                    </li>
                    <li class="item_wrap">
                        <div class="basic_item">
                            <div class="txt">
                                <span>마케팅 활용 동의</span>
                            </div>
                            <div class="icon">
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                        <div class="onoff_input_wrap">
                            <div class="onoff_input">
                                <input type="checkbox" id="slideOne1" name="check" checked>
                                <label for="slideOne1"></label>
                                <div class="onoff_input_bg"></div>
                            </div>
                        </div>
                    </li>
                    <li class="item_wrap">
                        <div class="basic_item">
                            <div class="txt">
                                <span>마케팅 수신 동의</span>
                            </div>
                            <div class="icon">
                                <i class="ico_cont"></i>
                            </div>
                        </div>
                        <div class="onoff_input_wrap">
                            <div class="onoff_input">
                                <input type="checkbox" id="slideOne1" name="check" checked>
                                <label for="slideOne1"></label>
                                <div class="onoff_input_bg"></div>
                            </div>
                        </div>
                    </li>
                </ul>
              
            </article>
        </section>
