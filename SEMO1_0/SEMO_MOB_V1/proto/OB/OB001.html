<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!--뒤로가기-->
    <div class="header">
      <div class="process_bar_box">
        <p class="process_bar" style="width:50%;"></p> <!--진행 상태 width %값으로 최소 0 ~ 최대 100%-->
      </div>
      <a class="btn_back"><i class="ico_back"></i><em class="new_blind">뒤로가기</em></a>
    </div>
    <!--//뒤로가기-->

    <div class="cont_bg cont_pd_hd"> <!-- 클래스 cont_pd_hd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">회원가입</div> 
      <!-- //상단 타이틀 -->

      <!-- 회원가입 -->
      <div class="wrap join">
        <div class="join_box set_mgb30">
          <div class="title_sub">사업자 번호를 입력해 주세요.</div>

          <div class="join_block">
            <!-- 사업자 번호-->
            <input type="number" name="busi_number" class="join_input" placeholder="'-'를 빼고 입력해 주세요." value="123456789">
            <!-- //사업자 번호-->
            <span class="check_result_txt success">가입 가능한 사업자 번호입니다.</span> <!--가입가능 활성 클래스 success-->
          </div>
        </div>
        <div class="join_box">
          <div class="title_sub">i-ONE 소상공인을 이용하기 위해서는 약관 동의가 필요합니다.</div>

          <!-- 약관동의 -->
          <div class="terms_box on open"> <!--활성 클래스 on 전체 약관 표시 AND 활성 클래스 open 약관열기 -->
            <!-- 전체 동의 -->
            <div class="terms_li type2">
              <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
              <span>약관 전체 동의</span>
              <a class="btn_term_open"><i class="ico_arr"></i><em class="new_blind">약관열기</em></a>
            </div>
            <!-- //전체 동의 -->

            <!-- 약관 -->
            <ul>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>i-ONE 소상공인 이용약관</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>개인 정보 처리 방침</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>실시간 간편송금 이용동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>마케팅 활용 동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>거래 정보 조회 위임동의</span> 
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
              <li class="terms_li">
                <input type="checkbox" class="check_terms"> <!--클릭하면 checked true-->
                <span>절세 컨설팅 동의(선택)</span> 
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li>
            </ul>
            <!-- //약관 -->
          </div>
          <!-- //약관동의 -->
        </div>
      </div>
      <!-- //회원가입 -->
      
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
