<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  
  <!-- container -->
  <div class="container">
    <!-- 2024-11-08 -->
    <!-- landingHeader -->
    <header class="landingHeader">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_primary02.svg" alt="로고">
            </a>
          </h1>
        </div>
        <div class="right">
          <div class="rContBtnCol">
            <div class="btnBox">
              <button class="bdGrayBodyBtn">
                <img class="leftIcon" src="../../img/wp/ico/ico_link_gray.svg" alt="링크">
                <span>공유하기</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- //landingHeader -->
    <!-- //2024-11-08 -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap editPreview">
        <div class="gridCont">
          <div class="gridBox">
            <div class="gCol data">
              <div class="savePreviewList">
                <li>
                  <img src="../../img/wp/bg/bg_bridge_default.png" alt="섹션1">
                </li>
                <li>
                  <img src="../../img/wp/bg/bg_bridge_default02.png" alt="섹션2">
                </li>
                <li>
                  <img src="../../img/wp/bg/bg_bridge_default03.png" alt="섹션3">
                </li>
                <li>
                  <img src="../../img/wp/bg/bg_bridge_default04.png" alt="섹션4">
                </li>
              </div>
            </div>
          </div>
        </div>
        <div class="apply">
          <div class="inner">
            <div class="description">
              <h1>
                <p>프리미엄 세무서비스</p>
                <strong>
                  <span>무료상담 신청하고</span>
                  <span>혜택 받아가세요.</span>
                </strong>
              </h1>
              <div class="txtBox">
                <p>✅ 경영·세무 10여종 프리미엄 보고서 무료 체험</p>
                <p>✅ 전문 세무사의 간편 상담 지원</p>
                <p>✅ 상권분석, 정부지원금 등 경영 정보제공</p>
              </div>
              <form id="applyForm" novalidate="">
                <div class="inputWrap">
                  <div class="col">
                    <div class="inputBox">
                      <p class="formTit">사업자번호</p>
                      <div class="field num">
                        <input type="tel" placeholder="000" maxlength="3" name="biz_no1">
                        <span class="divide">-</span>
                        <input type="tel" placeholder="00" maxlength="2" name="biz_no2">
                        <span class="divide">-</span>
                        <input type="tel" placeholder="00000" maxlength="5" name="biz_no3">
                      </div>
                    </div>
                    <div class="inputBox">
                      <p class="formTit">대표자명</p>
                      <div class="field">
                        <input type="text" placeholder="홍길동" maxlength="100">
                      </div>
                    </div>
                    <div class="inputBox">
                      <p class="formTit">지역</p>
                      <div class="field">
                        <input type="text" placeholder="서울특별시 청담동" maxlength="100">
                      </div>
                    </div>
                  </div>
                  <div class="col">
                    <div class="inputBox">
                      <p class="formTit">상호명</p>
                      <div class="field">
                        <input type="text" placeholder="세모베이커리 청담점" maxlength="100">
                      </div>
                    </div>
                    <div class="inputBox">
                      <p class="formTit">연락처</p>
                      <div class="field num">
                        <input type="tel" placeholder="010" maxlength="3">
                        <span class="divide">-</span>
                        <input type="tel" placeholder="0000" maxlength="4">
                        <span class="divide">-</span>
                        <input type="tel" placeholder="0000" maxlength="4">
                      </div>
                    </div>
                    <div class="inputBox">
                      <p class="formTit">업태 및 업종</p>
                      <div class="field">
                        <input type="text" placeholder="요식업(한식)" maxlength="100">
                      </div>
                    </div>
                  </div>
                </div>
                <div class="useService">
                  <p class="formTit">
                    <span>현재 세무 기장서비스를</span> <span>이용하고 계신가요?</span>
                  </p>
                  <div class="selectBox">
                    <select>
                      <option value="예">예</option>
                      <option value="아니오">아니오</option>
                    </select>
                  </div>
                </div>
                <div class="customerInquiry">
                  <p class="formTit">문의내용</p>
                  <textarea rows="5" maxlength="4000"></textarea>
                </div>
                <div class="privacy">
                  <div class="areaCheck">
                    <label>
                      <input type="checkbox">
                      <span>개인정보처리방침 동의</span>
                    </label>
                    <a href="javascript:;">[보기]</a>
                  </div>
                  <button type="submit" class="btnSubmit">신청하기</button> <!-- active클래스 추가시 활성화 -->
                </div>
              </form>
            </div>
          </div>
        </div>
        <div class="btnfitApply">
          <div class="content">
            <button type="button" class="btnApply">
              무료혜택 신청하기
              <div class="arrow">
                <img src="../../img/wp/ico/ico_arrow_right_white02.png" alt="화살표">
                <img src="../../img/wp/ico/ico_arrow_right_white02.png" alt="화살표">
                <img src="../../img/wp/ico/ico_arrow_right_white02.png" alt="화살표">
              </div>
            </button>
          </div>
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
