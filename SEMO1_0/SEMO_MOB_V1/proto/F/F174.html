<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd_hd fix_button 포함 패딩-->       
      <div class="wrap setting">
        <div class="common_result">
          <i class="ico_common success"></i>
          <p>카드 등록이 완료되었습니다.</p>
        </div>
        <!-- 리스트 -->
        <div> 
          <!-- 카드 목록 -->
          <div class="account_list_wrap">
            <!-- 카드 목록 총계-->
            <div class="account_total_box">
              <p>
                <i class="ico_account card"></i> <!--card 클래스명 추가-->
                <span>카드 <em class="account_number">5</em><span>개</span> (<em class="bank_number">4</em>개 카드사)</span> <!--문수수정, ui수정-->
              </p>
            </div>
            <!-- //카드 목록 총계-->

            <!-- 카드-->
            <div class="account_list_box alb_posi">
              <ul>
                <li class="atlb_list3">
                  <div>
                    <span class="bk_class_busi">기업</span>
                  </div>
                  <div>
                    <span class="bk_name"><i class="ico_c_fail"></i>IBK 기업은행</span>
                    <span class="bk_acnt_class">쇼핑엔조이</span>
                    <span class="bk_acnt">1234-5678-****-5211</span> 
                  </div>
                  <div> 
                    <div class="bk_enroll">등록</div>
                  </div>
                </li> 
              </ul>
            </div>
            <!-- //카드-->
          </div>
          <!-- //카드 목록 -->           
        </div>
        <!-- //리스트 -->

        <p class="noti_star mgl_set  mgb_set color">
          <i class="character"></i>
          <span>계정을 등록한 익일부터 내역을 조회할 수 있습니다.</span>
        </p>
           
      </div> 
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="btm_fix"> 
      <span class="bgc_green">추가 등록</span>
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
