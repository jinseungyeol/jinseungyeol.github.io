<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <!-- <link rel="stylesheet" href="../../css_v2/kt_style.css"> -->
    <link rel="stylesheet" href="../../css_v2/main.css">
    <title>SB063_세모장부 리뉴얼 캘린더 및 상세내역_CPO020</title>
</head>

<body>

    <div class="calendar_details">
        <!-- ## 헤더 ## -->
        <header class="fix-top-nav">
            <div class="fix-top-nav_cnt">
                <h1 class="fix-top-nav_main-tit">
                    <button class="check-area" type="button">
                        <i class="ico_cont left_arrow"></i>
                    </button>
                    <p class="main-tit_sub-txt">기타내역 추가</p>
                </h1>
                <div class="fix-top-nav_icon">
                    <button class="check-area" type="button">
                        <i class="ico_cont trash-can">휴지통</i>
                    </button>
                </div>
            </div>
        </header>

        <!-- ## 매출, 지출 탭 ## -->
        <section class="calendar-main-header-wrap">
            <div class="card-income-wrap">
                <div class="card-income_tab-menu">
                    <!-- is-active 클래스로 분기처리 -->
                    <button class="card-income_txt is-active" type="button">매출</button>
                    <button class="card-income_txt" type="button">지출</button>
                </div>
            </div>
        </section>

        <!-- 인풋 -->
        <section class="ness_info">
            <div class="cnt">
                <!-- 금액 입력 -->
                <article class="info_box_wrap ceo">
                    <label for="info01" class="info_box">
                        <div class="left">
                            <input type="text" id="info01" required="required">
                            <p>금액 입력</p>
                        </div>
                        <div class="right">
                            <button type="button" class="ico_cen close_bg_gray"></button>
                        </div>
                    </label>
                </article>

                <!-- 매출 내용 -->
                <article class="info_box_wrap ceo">
                    <label for="info02" class="info_box">
                        <div class="left">
                            <input type="text" id="info02" required="required">
                            <p>매출 내용</p>
                        </div>
                        <div class="right">
                            <button type="button" class="ico_cen close_bg_gray"></button>
                        </div>
                    </label>
                </article>
            </div>
        </section>

        <section class="deal-history_info-total">
            <ul class="deal-history_summary">
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">용도</p>
                    </div>
                    <div class="summary-val-wrap">
                        <button class="summary-val" type="button">
                            <!-- none 클래스, elipsis 클래스로 분기처리 -->
                            <p class="summary-val_txt none">미분류</p>
                            <i class="ico_cont right"></i>
                        </button>
                    </div>
                </li>
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">거래시작</p>
                    </div>
                    <div class="summary-val-wrap">
                        <div class="summary-val">
                            <!-- is-active 클래스시 오른쪽 화살표 활성화 -->
                            <input type="text" class="summary-val_txt start" placeholder="날짜 선택" readonly="readonly">
                            <i class="ico_cont right"></i>
                        </div>
                    </div>
                </li>
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">거래종료</p>
                    </div>
                    <div class="summary-val-wrap">
                        <div class="summary-val">
                            <!-- is-active 클래스시 오른쪽 화살표 활성화 -->
                            <input type="text" class="summary-val_txt end" placeholder="날짜 선택" readonly="readonly">
                            <i class="ico_cont right"></i>
                        </div>
                    </div>
                </li>
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">반복</p>
                    </div>
                    <div class="summary-val-wrap">
                        <button class="summary-val" type="button">
                            <!-- none 클래스, elipsis 클래스로 분기처리 -->
                            <p class="summary-val_txt elipsis">안 함</p>
                            <i class="ico_cont right"></i>
                        </button>
                    </div>
                </li>
            </ul>
        </section>

        


        <!-- 확인버튼 -->
        <div class="bot_fix">
            <button type="button" class="type_A  bgc_sig">
                <span>확인</span>
            </button>
        </div>  

    </div>

    <!-- ## 반복 팝업 ## -->
    <div class="popup_bg" style="display: none;">
        <div class="popup bottom" style="bottom:0">
            <div class="popup_title">
                <b>반복</b>
                <i class="ico_cen del"></i>
            </div>
            <div class="popup_bottom_con">
                <ul class="popup_day-choice-list-wrap">
                    <!-- active 클래스로 제어 -->
                    <li class="popup_day-choice-list">
                        <div class="check-area">
                            <i class="ico_cont"></i>
                        </div>
                        <p class="popup_day-choice_date">안 함</p>
                    </li>
                    <li class="popup_day-choice-list">
                        <div class="check-area">
                            <i class="ico_cont"></i>
                        </div>
                        <p class="popup_day-choice_date">매일</p>
                    </li>
                    <li class="popup_day-choice-list">
                        <div class="check-area">
                            <i class="ico_cont"></i>
                        </div>
                        <p class="popup_day-choice_date">매주</p>
                    </li>
                    <li class="popup_day-choice-list">
                        <div class="check-area">
                            <i class="ico_cont"></i>
                        </div>
                        <p class="popup_day-choice_date">매월</p>
                    </li>
                    <li class="popup_day-choice-list">
                        <div class="check-area">
                            <i class="ico_cont"></i>
                        </div>
                        <p class="popup_day-choice_date">매년</p>
                    </li>
                </ul>
            </div>
        </div>
    </div>





    <script>
    $(function () {
        $('.ness_info .info_box_wrap').click(function(){
            $(this).addClass('active').siblings().removeClass('active');
            $(this).find(".close_bg_gray").mousedown( function() {
            $(this).parent().siblings().find("input").val("");
            })
        });

        // 데이트피커
        // start
        $('.summary-val_txt.start').mobiscroll().datepicker({
            controls: ['date'],
            display: 'center',
            dateFormat: 'YYYY. MM. DD',
            dateWheels: '|YYYY| |MM| |DD|',
            cssClass: 'popup_from-to-date',
            buttons: [
                {
                    text: '확인',
                    cssClass: 'btn_set-date', 
                    handler: 'set'
                }
            ],
        }).mobiscroll('getInst');

        // end
        $('.summary-val_txt.end').mobiscroll().datepicker({
            controls: ['date'],
            display: 'center',
            dateFormat: 'YYYY년 MM월 DD일',
            dateWheels: '|YYYY| |MM| |DD|',
            cssClass: 'popup_from-to-date',
            buttons: [
                {
                    text: '확인',
                    cssClass: 'btn_set-date.end', 
                    handler: 'set'
                }
            ],
        }).mobiscroll('getInst');

        // ## 반복 팝업
        $(".popup_day-choice-list").click( function() {
                $(this).addClass("active").siblings().removeClass("active");
        }).eq(0).trigger("click");
    })


    </script>

</body>
</html>
