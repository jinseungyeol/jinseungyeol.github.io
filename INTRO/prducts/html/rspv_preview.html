<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/intro.css">
  <script src="../../js/jquery-3.5.1.min.js"></script>
    <title>퍼블리셔 가이드</title>
</head>

<body>
    <div class="wrapper" data-device="desktop">
        <header class="includeHeader">
            <div class="inner">
                <div class="devicesWrap">
                    <button data-device="desktop" class="desktop active"></button>
                    <button data-device="tablet" class="tablet"></button>
                    <button data-device="mobile" class="mobile"></button>
                </div>
            </div>
        </header>
        <div class="previewWrap">
            <div class="previewInner">
                <div class="previewPannel desktop active">
                    <div>
                        <iframe src="" frameborder="0"></iframe>
                    </div>
                </div>
                <div class="previewPannel tablet">
                    <div>
                        <iframe src="" frameborder="0"></iframe>
                        <div class="rangeWrap">
                            <input type="range" min="785" max="1040" value="785" oninput="handleInput(this)">
                            <p id="currentWidth"><span>768</span> px</p>
                        </div>
                    </div>
                </div>
                <div class="previewPannel mobile">
                    <div>
                        <iframe src="" frameborder="0"></iframe>
                        <div class="rangeWrap">
                            <input type="range" min="377" max="784" value="377" oninput="handleInput(this)">
                            <p id="currentWidth"><span>360</span> px</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(function() {
            insertIframeURL()
            $(".devicesWrap button").on("click", function() {
                insertIframeURL()
                $(this).addClass('active').siblings().removeClass('active')
                $('.previewPannel').eq($(this).index()).addClass('active').siblings().removeClass('active')
            })
        })

        function insertIframeURL() {
            var urlParams = new URLSearchParams(window.location.search);
            var iframeURL = urlParams.get('iframeURL');
            $('iframe').attr('src', iframeURL)
        }

        function handleInput(obj){
            $(obj).parent().siblings('iframe').width(obj.value)
            $(obj).siblings().children().text(obj.value - 17)
        }
    </script>
</body>

</html>
