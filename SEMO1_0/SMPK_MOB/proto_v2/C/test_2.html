<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{width: 100%; height: 100%; margin: 0 0;}
        .wrapper{
            width: 100%;
            height: 100%;
            display: flex;
        }
        section{display: flex; flex-direction: column; align-items: center;}
        .div1{width: 200px; height: 200px; background-color: green;}
        .div2{width: 100px; height: 100px; background-color: red;}
    </style>
</head>

<body>


    <div class="wrapper">
        <section>
            <div class="div1"></div>
            <div class="div2" style="margin-top: -50px;"></div>
        </section>
        <section>
            <div class="div2" style="margin-bottom: -50px; z-index: 2;"></div>
            <div class="div1"></div>
        </section>
        <section>
            <div class="div1"></div>
            <div class="div2" style="margin-top: -50px;"></div>
        </section>
    </div>



</body>

</html>
