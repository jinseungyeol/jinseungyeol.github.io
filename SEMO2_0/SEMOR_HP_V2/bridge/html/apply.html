<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content='세모리포트' property='og:title' />
    <meta content='https://www.semoreport.com' property='og:url' />
    <meta content="../img/semoR_thumb.png" property='og:image' />
    <meta content="사장님이 선정한 1등 보고서" property="og:description" />
    <link rel="icon" href="../img/favicon_semoR.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/odometer-theme-default.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/semoR_bridge.css">
  <script src="../js/jquery-3.5.1.min.js"></script>
    <script src="../js/odometer.js"></script>
    <script src="../js/semo.api.js"></script>
    <title>프리미엄 세무서비스 신청(사장님 전용)</title>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-TJW4JW5');</script>
    <!-- End Google Tag Manager -->
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
        <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TJW4JW5" height="0" width="0" style="display:none;visibility:hidden">
        </iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- wrapper -->
    <div class="wrapper">
        <!-- applyWrap -->
        <div class="applyWrap">
            <!-- formWrap -->
            <div class="formWrap">
                <div class="inner">
                    <div class="areaFormTit">
                        <strong>프리미엄 세무서비스 <span>신청하기(사장님 전용)</span></strong>
                        <p>사장님의 사업장에 맞는 무료 절세 컨설팅과 <span>매달 프리미엄 세무서비스를 제공해드립니다.</span></p>
                    </div>
                    <!-- inputForm -->
                    <div class="inputForm">
                        <div>
                            <!-- 입력 및 선택폼 -->
                            <div class="inputWrap">
                                <div class="areaTit">
                                    <label class="formTit">사업자번호</label>
                                </div>
                                <div class="inputBox">
                                    <input type="tel" name="BIZ_NO" placeholder="000-00-00000" maxlength="12"
                                        oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');">
                                </div>
                            </div>
                            <div class="inputWrap">
                                <div class="areaTit">
                                    <label class="formTit">상호명</label>
                                </div>
                                <div class="inputBox">
                                    <input type="text" placeholder="세모베이커리 청담점" maxlength="100">
                                </div>
                            </div>
                            <div class="inputWrap">
                                <div class="areaTit">
                                    <label class="formTit">대표자명</label>
                                </div>
                                <div class="inputBox">
                                    <input type="text" placeholder="홍길동" maxlength="100">
                                </div>
                            </div>
                            <div class="inputWrap">
                                <div class="areaTit">
                                    <label class="formTit">연락처</label>
                                </div>
                                <div class="inputBox">
                                    <input type="tel" name="APPL_CNTC" placeholder="010-0000-0000" maxlength="13"
                                        oninput="this.value = this.value.replace(/[^0-9.]/g, '').replace(/(\..*?)\..*/g, '$1');">
                                </div>
                            </div>
                            <div class="inputWrap">
                                <div class="areaTit">
                                    <label class="formTit">주소</label>
                                </div>
                                <div class="inputBox">
                                    <textarea name="APPL_LC" placeholder="서울특별시 청담동 1번지" rows="1" maxlength="100" autocomplete="on"></textarea>
                                </div>
                            </div>
                            <div class="inputWrap">
                                <div class="areaTit">
                                    <label class="formTit">업태 및 업종</label>
                                </div>
                                <div class="inputBox">
                                    <input type="text" placeholder="요식업(한식)" maxlength="200">
                                </div>
                            </div>
                            <div class="inputWrap select">
                                <div class="areaTit">
                                    <label class="formTit">현재 세무 기장서비스를 이용하고 계신가요?</label>
                                </div>
                                <div class="selectBox" onclick="fn_areaOutClick(this)">
                                    <a href="javascript:;" class="selectItem">
                                        <input type="text" placeholder="선택하기" readonly>
                                        <img src="https://tax.semoreport.com/img/ico_down.png">
                                    </a>
                                    <ul class="selectList">
                                        <li>
                                            <a href="javascript:;">예</a>
                                        </li>
                                        <li>
                                            <a href="javascript:;">아니오</a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                            <!-- //입력 및 선택폼 -->
                            <!-- 관심사 -->
                            <div class="selectService">
                                <label class="formTit">세모리포트에서 제공하는 서비스 중 관심사를 선택해 주세요.(중복선택 가능)</label>
                                <div class="inner">
                                    <ul class="serviceList">
                                        <li class="rept">
                                            <a href="javascript:;">
                                                <div class="content">
                                                    <div class="left">
                                                        <span class="icon"></span>
                                                    </div>
                                                    <div class="right">
                                                        <strong>사업분석 보고서</strong>
                                                        <span>매출 · 매입 · 손익 분석 맞춤 보고서</span>
                                                    </div>
                                                </div>
                                            </a>
                                        </li>
                                        <li class="consult">
                                            <a href="javascript:;">
                                                <div class="content">
                                                    <div class="left">
                                                        <span class="icon"></span>
                                                    </div>
                                                    <div class="right">
                                                        <strong>무료 절세컨설팅</strong>
                                                        <span>부가세 · 종소세 등 절세 1:1 컨설팅</span>
                                                    </div>
                                                </div>
                                            </a>
                                        </li>
                                        <li class="busi">
                                            <a href="javascript:;">
                                                <div class="content">
                                                    <div class="left">
                                                        <span class="icon"></span>
                                                    </div>
                                                    <div class="right">
                                                        <strong>주변 상권 분석</strong>
                                                        <span>상권 내 매출 및 유동인구 정보</span>
                                                    </div>
                                                </div>
                                            </a>
                                        </li>
                                        <li class="gvmt">
                                            <a href="javascript:;">
                                                <div class="content">
                                                    <div class="left">
                                                        <span class="icon"></span>
                                                    </div>
                                                    <div class="right">
                                                        <strong>정부지원금 안내</strong>
                                                        <span>업종별 맞춤 정부지원금 안내</span>
                                                    </div>
                                                </div>
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                            <!-- //관심사 -->
                            <!-- 안내사항 및 개인정보처리방침동의 -->
                            <div class="agreeWrap">
                                <div class="infoBox">
                                    <ul class="dotList">
                                        <li>
                                            신청내용을 작성해 주시면 담당자가 자세히 안내해 드리겠습니다.
                                        </li>
                                    </ul>
                                </div>
                                <div class="provide">
                                    <input type="checkbox" id="terms">
                                    <label for="terms">개인정보처리방침에 동의합니다</label>
                                </div>
                                <div class="areaSubmit">
                                    <!-- active 클래스 추가시 활성화 -->
                                    <button type="button" class="btnSubmit">신청하기</button>
                                </div>
                            </div>
                            <!-- //안내사항 및 개인정보처리방침동의 -->
                        </div>
                    </div>
                    <!-- //inputForm -->
                </div>
            </div>
            <!-- //formWrap -->
        </div>
        <!-- //applyWrap -->
    </div>
    <!-- //wrapper -->

    <script>
        // 사업자번호
        $("input[name='BIZ_NO']").on("input", function () {
            var autoHypen = $(this).val().replace(/[^0-9]/g, '').replace(/^(\d{0,3})(\d{0,2})(\d{0,5})$/g, '$1-$2-$3').replace(/-{1,2}$/g, ''); //하이픈 자동생성

            $(this).val(autoHypen);
        })

        // 연락처
        $("input[name='APPL_CNTC']").on("input", function () {
            var autoHypen = $(this).val().replace(/[^0-9]/g, '').replace(/^(\d{0,3})(\d{0,4})(\d{0,4})$/g, "$1-$2-$3").replace(/(\-{1,2})$/g, ""); //하이픈 자동생성

            $(this).val(autoHypen);
        })

        // 지역 textarea 반응형 처리
        $(window).on("resize", function () {
            if ($(window).innerWidth() <= 540) {
                $("textarea[name='APPL_LC']").attr("rows", 3);
            } else {
                $("textarea[name='APPL_LC']").attr("rows", 1);
            }
        });

        // 세무 기장서비스 이용 선택
        $(".selectBox .selectItem").click(function () {
            $(this).parent().toggleClass("active");
        })

        $(".selectList li").on("click", function () {
            $(this).addClass("selected").siblings().removeClass("selected");
            $(this).parents(".selectBox").removeClass("active");
            $(".selectItem input").val($(this).find("a").text());
        })

        // 서비스 관심사 선택
        $(".serviceList li").click(function () {
            $(this).toggleClass("active");
        })

        // 영역 외 클릭시 active 클래스 제거
        function fn_areaOutClick(obj) {
            $(document).click(function (event) {
                var container = $(obj);

                if (!container.is(event.target) && !container.has(event.target).length) {
                    container.removeClass("active");
                }
            });
        }
    </script>
</body>

</html>
