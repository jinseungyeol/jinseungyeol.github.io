<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <title>SB063_세모장부 리뉴얼 캘린더 및 상세내역_CHT100</title>
</head>

<body>

    <div class="calendar_enter-search">
        <!-- ## 헤더 ## -->
        <header class="fix-top-nav">
            <div class="fix-top-nav_cnt">
                <h1 class="fix-top-nav_main-tit">
                    <button class="check-area" type="button">
                        <i class="ico_cont left_arrow"></i>
                    </button>
                    <p class="main-tit_sub-txt">전체매출</p>
                </h1>
                <div class="content_tit_btn_wrap">
                    <span>방금 전</span>
                    <div class="content_tit_btn">
                        <!-- spin 클래스로 새로고침 이미지 애니메이션 -->
                        <button class="refresh gray" type="button">새로고침</button>
                    </div>       
                </div>
            </div>
        </header>

        <!-- 날짜 -->
        <section class="from-to-date-wrap">
            <div class="from-to-date_cnt">
                <button class="check-area" type="button">
                    <input type="text" class="from-to-date from" placeholder="2021. 03. 01" readonly="readonly"/>
                </button>
                <button class="check-area" type="button">
                    <input type="text" class="from-to-date to" placeholder="2021. 03. 31" readonly="readonly"/>
                </button>
            </div>
        </section>

        <section class="deal-history_info-total">
            <div class="calendar_entire-wrap">
                <h2 class="calendar_entire_tit">전체 매출</h2>
                <p class="calendar_entire_val">300,900,707원</p>
            </div>

            <ul class="deal-history_summary">
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">카드</p>
                    </div>
                    <div class="summary-val-wrap">
                        <button class="summary-val" type="button">
                            <!-- none 클래스, elipsis 클래스로 분기처리 -->
                            <p class="summary-val_txt elipsis">300,000,000</p>
                            <i class="ico_cont right"></i>
                        </button>
                    </div>
                </li>
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">배달</p>
                    </div>
                    <div class="summary-val-wrap">
                        <button class="summary-val" type="button">
                            <!-- none 클래스, elipsis 클래스로 분기처리 -->
                            <p class="summary-val_txt elipsis">300,000,000</p>
                            <i class="ico_cont right"></i>
                        </button>
                    </div>
                </li>
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">건강보험</p>
                    </div>
                    <div class="summary-val-wrap">
                        <button class="summary-val" type="button">
                            <!-- none 클래스, elipsis 클래스로 분기처리 -->
                            <p class="summary-val_txt elipsis">300,000,000</p>
                            <i class="ico_cont right"></i>
                        </button>
                    </div>
                </li>
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">세금계산서</p>
                    </div>
                    <div class="summary-val-wrap">
                        <button class="summary-val" type="button">
                            <!-- none 클래스, elipsis 클래스로 분기처리 -->
                            <p class="summary-val_txt elipsis">300,000,000</p>
                            <i class="ico_cont right"></i>
                        </button>
                    </div>
                </li>
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">현금영수증</p>
                    </div>
                    <div class="summary-val-wrap">
                        <button class="summary-val" type="button">
                            <!-- none 클래스, elipsis 클래스로 분기처리 -->
                            <p class="summary-val_txt elipsis">300,000,000</p>
                            <i class="ico_cont right"></i>
                        </button>
                    </div>
                </li>
                <li class="deal-history_summary-list">
                    <div class="summary-name-wrap">
                        <p class="summary-name">건강보험</p>
                    </div>
                    <div class="summary-val-wrap">
                        <button class="summary-val" type="button">
                            <!-- none 클래스, elipsis 클래스로 분기처리 -->
                            <p class="summary-val_txt elipsis">300,000,000</p>
                            <i class="ico_cont right"></i>
                        </button>
                    </div>
                </li>
            </ul>
        </section>

    </div>





    <script>
    
    mobiscroll.setOptions({
        locale: mobiscroll.localeEn,
        theme: 'ios',
        themeVariant: 'light'
    });

    $(function () {
        // 데이트피커
        // from
        $('.from-to-date.from').mobiscroll().datepicker({
            controls: ['date'],
            display: 'center',
            dateFormat: 'YYYY. MM. DD',
            dateWheels: '|YYYY| |MM| |DD|',
            cssClass: 'popup_from-to-date',
            buttons: [
                {
                    text: '확인',
                    cssClass: 'btn_set-date', 
                    handler: 'set'
                }
            ],
        }).mobiscroll('getInst');

        // to
        $('.from-to-date.to').mobiscroll().datepicker({
            controls: ['date'],
            display: 'center',
            dateFormat: 'YYYY. MM. DD',
            dateWheels: '|YYYY| |MM| |DD|',
            cssClass: 'popup_from-to-date',
            buttons: [
                {
                    text: '확인',
                    cssClass: 'btn_set-date', 
                    handler: 'set'
                }
            ]
        }).mobiscroll('getInst');
        
        // 지난달, 지난주, 어제, 오늘
        $(".tab-menu_nav").click( function() {
            $(this).addClass("is-active").siblings().removeClass("is-active");
        })
    });

    </script>

</body>
</html>
