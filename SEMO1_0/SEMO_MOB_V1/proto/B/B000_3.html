
<!DOCTYPE html>

  <body>
    <div class="new_content">
      <div class="cont_bg bg_top on">
      <!-- 메인 헤더(타이틀) -->

        <span class="my_tit"> <!--2020-08-03 문구 수정-->

            <strong class="ellipsis">세무법인 한결세무회계</strong>
          </p>
          <a><i class="ico_cen"></i><em class="new_blind">이동 버튼</em></a>
        </button><!--2020-08-03 추가-->
      </div>
      <!-- //메인 헤더(타이틀) -->

        <!-- 메인 컨텐츠 -->
        <div class="my_cont">
          <!-- 메인 총 잔액 -->
          <div class="my_list ml_total">
            <!--2020-08-03 추가-->
            <div class="mtt_noti">
              <p class="mttn_tit">
                가입 후 최초 1회<br>
                공인(공동)인증서 등록이 필요합니다.
              </p>
              <p class="mttn_txt">
                공인(공동)인증서 등록이 필요합니다.<br>
                계좌, 카드, 홈택스 내역을<br>
                한 번에 연결하세요.
              </p>
              <a><i class="ico_cen"></i><em class="new_blind">이동 화살표</em></a>
            </div>
              <!--2020-08-03-->
          </div>
          <!-- //메인 총 잔액 -->

          <!-- 메인 상세내역 -->
          <div class="ml_detail">
            <ul>
              <li class="my_list fix_list">
                <div class="mdt_h">
                  <p>
                    <span class="dth_tit">카드 매출</span>
                    <span>
                      <span class="date">19.12.30 13:55:46</span>
                      <span class="ico_re"
                        ><i></i><em class="new_blind">갱신</em></span
                      >
                    </span>
                  </p>
                </div>
                <div class="mli_dt l_width">
                  <p>
                    <span

                    >
                    <span><em class="won ellipsis">300,000,000</em>원</span>
                  </p>
                  <p>
                    <span
                      >이번달 매출<i class="number n_in"><em>2</em></i></span
                    >
                    <span><em class="won ellipsis">300,000,000</em>원</span>
                  </p>
                </div>
              </li>
            </ul>
          </div>
          <!-- //메인 상세내역 -->

          <!-- 메인 상세내역  추가하기 -->
          <div class="ml_plus">
            <i class="plus"></i> 즐겨찾는 메뉴
            <!--즐겨찾는 메뉴 버튼 문구추가-->
          </div>
          <!-- 메인 상세내역  추가하기  -->
        </div>
