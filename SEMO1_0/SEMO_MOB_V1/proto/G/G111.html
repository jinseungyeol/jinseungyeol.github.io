<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
      
    <div class="cont_bg">

      <!-- 상단 타이틀 -->
      <div class="title">주소 변경</div>
      <!-- //상단 타이틀 -->
      
      <div class="wrap setting">

        <div class="title_sub blod">주소검색</div>
        <div class="title_sub">시도와 동이름(읍/면/리) 또는 도로명을 입력하신 후 검색을 눌러주세요.</div>

        <div class="input_info_box"> 
          <div class="plb_region_search on"> <!--활성화 클래스 on-->
            <div class="plb_region"> 
              <span>전국</span>
              <a class="btn_plb_a"><i></i><em class="new_blind">지역</em></a>
            </div>
            <div class="region_list_box">
              <div class="region_list">
                <p class="on">서울시</p> <!--활성화 클래스 on-->
                <p>경기도</p>
                <p>강원도</p>
                <p>경상남도</p>
                <p>경상북도</p>
                <p>광주광역시</p>
                <p>대구광역시</p>
                <p>대전광역시</p>
                <p>부산광역시</p>
                <p>세종시</p>
                <p>울산광역시</p>
                <p>인천광역시</p>
                <p>전라남도</p>
                <p>전라북도</p>
                <p>제주도</p>
                <p>충청남도</p>
                <p>충정북도</p>
              </div>
            </div>
          </div>
          <input class="info_input" placeholder="동이름(읍/면/리) 또는 도로명 입력"> 
          <button class="btn_address">주소 검색</button>
        </div>
        <p class="noti_star mgb_set mgl_set color">
          <i class="character"></i>
          <span>
            1. 구/읍/면/리와 지번을 입력하세요.<br>
            &nbsp&nbsp예) 영등포구 여의도동 1<br>
            2. 도로명을 입력하세요.<br>
            &nbsp&nbsp예) 의사당대로 1
          </span>
        </p>
      </div>
    </div>
 
    

  </div>
</body>
</html>
