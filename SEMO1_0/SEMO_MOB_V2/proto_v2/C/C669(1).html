<body>
    <div class="title b_white">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">급여관리</span>
        <div class="title_right">
            <i class="ico_cen info"></i>
        </div>
    </div>
    <div class="basic_wrapper b_gray">
        <div class="padding_wrapper20">
            <div class="pay_admin">
                <div class="pay_date">
                    <div class="pay_month">
                        <span>2021년 12월</span>
                    </div>
                    <div class="pay_day">
                        <span>
                            급여 지급일 : 21일
                        </span>
                        <i class="ico_cen"></i>
                    </div>
                </div>
                <div class="pay_record">
                    <div class="pay_clock">
                        <i class="ico_cen"></i>
                    </div>
                    <div class="pay_record_text">
                        <div class="rec_txt01">
                            최근 활동 이력
                        </div>
                        <div class="rec_txt02">
                            21.05.04
                            <span>
                                급여작성 내용을 세무사가 확인했습니다
                            </span>
                        </div>
                        <div class="rec_txt03">
                            <span>
                                펼치기
                                <p>▼</p>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
           
        </div>
        <div class="pay_content">
            <div class="pay_list">
                <div class="pl_txt">
                    <p>급여작성</p>
                    <span>
                        이 달의 급여를 작성하여<br>
                        세무사에게 공유할 수 있습니다.
                    </span>
                </div>

                <div class="pl_btn sample">
                <!-- sample 클래스 지우면 replace는 display: none; 됨 -->
                    <span class="origin">작성하기</span>
                    <span class="replace">샘플보기</span>
                </div>

            </div>
            <div class="pay_list">
                <div class="pl_txt">
                    <p>급여명세서 발송</p>
                    <span>
                        급여대장을 등록하면<br>
                        급여명세서를 보낼 수 있습니다.
                    </span>
                </div>

                <div class="pl_btn sample">
                <!-- sample 클래스 지우면 replace는 display: none; 됨 -->
                    <span class="origin">조회하기</span>
                    <span class="replace">샘플보기</span>
                </div>

            </div>
            <div class="pay_list">
                <div class="pl_txt">
                    <p>원천세납부</p>
                    <span>
                        원천세(직원관련 세금)를<br>
                        조회 및 납부할 수 있습니다.
                    </span>
                </div>
                
                <div class="pl_btn">
                    <!-- sample 클래스 지우면 replace는 display: none; 됨 -->
                    <span class="origin">조회하기</span>
                    <span class="replace">샘플보기</span>
                </div>

            </div>
        </div>
    </div>
