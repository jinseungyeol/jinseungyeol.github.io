<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!--뒤로가기-->
    <div class="header hgbc_blue">
      <a class="btn_back"><i class="ico_back"></i><em class="new_blind">뒤로가기</em></a>
    </div>
    <!--//뒤로가기-->

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button header 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title_box">
        <span class="tit_big">체험 기간이 종료되었습니다.</span>
        <span class="tit_small">수수료 출금계좌를 등록해 주세요</span>
      </div>
      
      <!-- //상단 타이틀 -->

      <!-- 납부계좌 등록 -->
      <div class="wrap join posi_type1"> <!--클래스 posi_type2 높이 설정-->
        <div class="pay_box">
          <!-- pro/lite 요금 정보 -->
          <div class="fee_wrap">
            <div class="fee_box">
              <div class="fee lite">
                <p class="fee_classify"><i class="ico_check_fee"></i>LITE</p>
                <p class="fee_mothly promotion">월 <em>2,000</em>원</p>
                <button class="btn_fee">자세히보기</button>
              </div>
              <div class="fee pro on"> <!--활성화 클래스 on-->
                <p class="fee_classify"><i></i>PRO</p>
                <p class="fee_mothly promotion">월 <em>9,000</em>원</p>
                <button class="btn_fee">자세히보기</button>
              </div>
            </div>
            <p class="fee_txt">가입비·연회비 / VAT 별도</p>
          </div>
          <!-- // pro/lite 요금 정보 -->

          <p class="nomal_noti">
            <i class="character"></i> 
            <span>출금계좌로 등록 하시면 IBK 모바일자금관리 요금은 자동출금 됩니다.</span>
          </p>

          <!-- 정보입력 -->
          <div class="pay_input_box">
            <div class="input_info_box">
              <span class="info_tit">이메일 <em>(필수)</em></span>
              <input class="info_input" placeholder="이메일 입력" value="semo@semojangbu.com">

              <p class="nomal_noti">
                <i class="character"></i> 
                <span>세금계산서 및 청구서 발송을 위해 정확히 입력해 주세요.</span>
              </p>
            </div>

            <div class="input_info_box">
              <span class="info_tit">은행 <em>(필수)</em></span>
              <div class="info_box">
                <span class="ib_bank"><i class="logo_bank ico_lb003"><em class="new_blind">은행 로고</em></i>KB국민은행</span>
                <a><i class="ico_arr"></i><em class="new_blind">팝업열기</em></a>
              </div>
            </div>

            <div class="input_info_box">
              <span class="info_tit">계좌번호 <em>(필수)</em></span>
              <input class="info_input" placeholder="계좌번호를 (-)없이 입력해 주세요." value="1234567890123456">
            </div>

            <div class="input_info_box">
              <span class="info_tit">사업자(주민)번호 <em>(필수)</em></span>
              <input class="info_input" placeholder="계좌 소유주의 사업자(주민)번호를 입력해 주세요." value="1234567890">

              <p class="nomal_noti">
                <i class="character"></i> 
                <span>사업자 번호는 10자리, 주민번호는 생년월일 6자리를 입력해 주세요</span>
              </p>
            </div>

            <div class="input_info_box">
              <span class="info_tit">예금주</span>
              <div class="info_box">
                <span class="ib_owner">홍길동</span>
              </div>
            </div>

          </div>
          <!-- //정보입력 -->

        </div>
      </div>
      <!-- //납부계좌 등록 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix on">
      <span>등록취소</span>
      <span class="bgc_green">출금계좌 등록</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
