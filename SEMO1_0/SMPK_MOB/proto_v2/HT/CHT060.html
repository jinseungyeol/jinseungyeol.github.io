    <div class="title">
        <div class="title_left">

    <main class="semo-home_edit">
        <ul class="edit-list_wrap">
            <li class="edit-list">
                <div class="edit-item account is-on">
                    <div class="item-left">
                        <i class="ico_cont"></i>
                        <h1 class="item_tit">계좌</h1>
                        <span class="item_desc">입출금 내역</span>
                    </div>
                    <div class="item-right">
                        <i class="ico_cont"></i>
                    </div>
                </div>
            </li>
            <li class="edit-list">
                <div class="edit-item sales is-on">
                    <div class="item-left">
                        <i class="ico_cont"></i>
                        <h1 class="item_tit">매출</h1>

                    </div>
                    <div class="item-right">
                        <i class="ico_cont"></i>
                    </div>
                </div>
            </li>
            <li class="edit-list">
                <div class="edit-item spend is-on">

                    <div class="item-right">
                        <i class="ico_cont"></i>
                    </div>
                </div>
            </li>
            <li class="edit-list">
                <div class="edit-item deposit is-on">

                </div>
            </li>
            <li class="edit-list">
                <div class="edit-item work is-on">
                    <div class="item-left">
                        <i class="ico_cont"></i>
                        <h1 class="item_tit">근태</h1>
                        <span class="item_desc">직원 출퇴근 내역</span>
                    </div>
                    <div class="item-right">
                        <i class="ico_cont"></i>
                    </div>
                </div>
            </li>
        </ul>
        <div class="bot_fix_pd20">

                <i class="ico_cont"></i>

            </div>
            <button class="type_B white is-active">
                <span>저장하기</span>
            </button>
        </div>
        <div class="popup_bg" id="slide_popup" style="display: none;">
            <div class="popup bottom" style="bottom:0;">
                <div class="popup_title">
                    <b>근로계약서 작성하기</b>
                    <i class="ico_cen del"></i>
                </div>
                   <div class="popup_title_desc">
                       <span>
                        근로계약서를 작성할 직원을 선택해주세요
                       </span>
                    </div>
                <div class="popup_bottom_con choicebox">
                    <span>
                        <i class="ico_cont choice is-active"></i>

                    </span>
                    <span class="is-active">

                    </span>
                    <span>

                    <span>

                    </div>
                </div>
               
                <div class="bot_fix_pd20 db">
                    <button class="double_rd">닫기</button>
                    <button class="double_rd bgc_sig">선택하기</button>
                </div> 
            </div>
            
        </div>
        <div class="popup_bg" style="display: none;">
            <div class="popup alert">
                <div class="alret_text">
                    <h1 class="info">등록된 직원이 없어요<i class="ico_cont"></i></h1>
                    <span class="txt01">
                        직원관리 메뉴에서 직원등록 후<br>
                        근로계약서를 작성해보세요.
                    </span>
                    <span class="txt03">
                        직원관리 메뉴로 이동하시겠어요?
                    </span>
                </div>
                <div class="btm_button">
                    <span class="c_gray">닫기</span>
                    <span class="bgc_sig flex-1">이동할래요</span>
                </div>
            </div>

     </script>
