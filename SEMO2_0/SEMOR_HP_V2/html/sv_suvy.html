<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TJW4JW5"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <!-- wrapper -->
    <div class="wrapper">
        <div id="csSuvy">
            <div class="applyWrap">
                <div class="formWrap">
                    <!-- 신청화면 -->
                    <div class="inner">
                        <div class="areaFormTit">
                            <strong>
                                세모리포트 만족도 조사
                                <img src="../bridge/img/woori/ico_heart.png" alt="하트" width="60px">
                            </strong>
                            <div class="desc_wrap">
                                <div class="descTxt">
                                    <p>
                                        <span>더 나은 세모리포트 서비스를 만들기 위해</span> 
                                        <span>만족도 조사를 진행하고 있습니다.</span>
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div class="inputForm">
                            <form id="applyForm" novalidate="novalidate">
                                <input type="hidden" name="RESH_CATE" value="2">
                                <ul class="checkList">
                                    <li>
                                        <div class="areaTit">
                                            <div class="badge">10점 만점</div>
                                            <p class="suvyTit">[필수] 세모리포트를 다른 세무사님께 추천하시겠습니까?</p>
                                        </div>
                                        <div class="scoreWrap">
                                            <div data-score="1" class="score">1</div>
                                            <div data-score="2" class="score">2</div>
                                            <div data-score="3" class="score">3</div>
                                            <div data-score="4" class="score">4</div>
                                            <div data-score="5" class="score">5</div>
                                            <div data-score="6" class="score">6</div>
                                            <div data-score="7" class="score">7</div>
                                            <div data-score="8" class="score">8</div>
                                            <div data-score="9" class="score">9</div>
                                            <div data-score="10" class="score">10</div>
                                        </div>
                                    </li>
                                    <li>
                                        <div class="inputWrap select">
                                            <div class="areaTit">
                                                <p class="suvyTit">
                                                    [선택] 세모리포트 서비스에 대한 칭찬, 불만, 개선 내용이 있으시면 간단히 남겨주세요
                                                </p>
                                            </div>
                                            <textarea rows="5" id="userOpinion" placeholder="소중한 의견 부탁드립니다." maxlength="4000"></textarea>
                                        </div>
                                        <div class="agreeWrap">
                                            <div class="areaSubmit">
                                                <button type="submit" class="btnSubmit">전송하기</button>
                                            </div>
                                        </div>
                                    </li>
                                </ul>
                            </form>
                        </div>
                    </div>
                    <!-- //신청화면 -->
                    <!-- 완료화면 -->
                    <div class="completeMsg">
                        <div class="inner">
                            <img src="../img/ico_complete.svg">
                            <div class="areaFormTit">
                                <strong>
                                    <span>만족도</span>
                                    <span>전송을 완료했어요</span>
                                </strong>
                                <div class="desc_wrap">
                                    <div class="descTxt">
                                        <p>
                                            <span>고객님의 소중한 의견에</span>
                                            <span>감사드립니다.</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- //완료화면 -->
                </div>
            </div>
        </div>
    </div>
    <!-- //wrapper -->
    <script>
        $(function() {
            // 유효성 검사 
            $("#applyForm").on("submit", function (e) {

                e.preventDefault();

                // 유효성검사
                if (!$('.score').hasClass('active')) {
                    alert('만족도 점수를 체크해주세요.')
                    return;
                }

                var param = {
                    API_ID: "EXTN_HOME_C001",
                    REQ_DATA: {
                        RESH_CATE: $("input[name='RESH_CATE']").val(),
                        RESH_SCOR: $(".score.active").data('score'),
                        RESH_TYPE: $(".selectList .selected").data('type'),
                        RESH_COMMENT: $("#userOpinion").val(),
                    }
                }

                console.log(param)

                semoApi.callAjax(param, function (data) {
                    if (data.RSLT_CD == '0000') {
                        $("#csSuvy").addClass("complete")
                    } else {
                        alert(data.RSLT_MSG);
                    }
                });
            })

            // 실시간 유효성 검사 함수
            function fn_validation() {
                $(".btnSubmit").removeClass("active");

                // 유효성검사
                if (!$('.score').hasClass('active')) {
                    return;
                } else if (!$(".selectList li").hasClass('selected') && $("#userOpinion").val() !== '') {
                    return;
                } else {
                    $(".btnSubmit").addClass("active");
                }
            }

            $('.score').click(function() {
                $(this).addClass('active').siblings().removeClass("active");
                fn_validation()
            })
        });
    </script>
</body>

</html>
