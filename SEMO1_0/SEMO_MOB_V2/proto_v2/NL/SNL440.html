<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>SNL440</title>
</head>
<body>
    <div class="title b_white">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">알림</span>
    </div>
    <main class="snl440">
        <section class="snl440-top">
            <div class="icon">
                <i class="ico_cont"></i>
            </div>
            <div class="main_tit">
                <h1 class="tit">
                    비플식권
                </h1>
                <p class="time">
                    2022. 10. 14(수) 12:15
                </p>
            </div>
            <div class="info-box">
                <div class="info">
                    <span>
                        결제금액
                    </span>
                </div>
                <div class="state">
                    <span>
                        10,000원이 결제 되었습니다.
                    </span>    
                </div>
            </div>
            <article class="snl-board">
                <ul class="list">
                    <li class="item">
                        <div class="left">
                            <span>상태</span>
                        </div>
                        <div class="right">
                            <!-- 빨간색글씨 class sucess 파란색 글씨 fail -->
                            <span class="success">거래완료</span>
                        </div>
                    </li>
                    <li class="item">
                        <div class="left">
                            <span>결제금액</span>
                        </div>
                        <div class="right">
                            <span>10,000원</span>
                        </div>
                    </li>
                </ul>
            </article>
        </section>
        <div class="division-line"></div>
        <section class="snl-middle">
            <article class="snl-board">
                <div class="main_tit">
                    <h1>상세내역</h1>
                </div>
                <ul class="list">
                    <li class="item">
                        <div class="left">
                            <span>카드사</span>
                        </div>
                        <div class="right">
                            <span>제로페이</span>
                        </div>
                    </li>
                    <li class="item">
                        <div class="left">
                            <span>카드번호</span>
                        </div>
                        <div class="right">
                            <span>0706-0010-****-****</span>
                        </div>
                    </li>
                    <li class="item">
                        <div class="left">
                            <span>거래 승인일시</span>
                        </div>
                        <div class="right">
                            <span>2022.10.14 15:35:55</span>
                        </div>
                    </li>
                    <li class="item">
                        <div class="left">
                            <span>승인번호</span>
                        </div>
                        <div class="right">
                            <span>PBP0000482437</span>
                        </div>
                    </li>
                    <li class="item">
                        <div class="left">
                            <span>사용가맹점</span>
                        </div>
                        <div class="right">
                            <span>wecafe</span>
                        </div>
                    </li>
                    
                </ul>
            </article>
        </section>
        <footer class="bot_fix_pd20">
            <!-- 버튼 / bgc_sig 클래스로 제휴별 배경색상 제어 -->
            <button type="button" class="type_B bgc_sig">
                <span>식권 영수증 확인하기</span>
            </button>
        </footer>
        <!-- 정보 하단 여백 52px -->
    </main>
</body>
</html>
