<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd_hd fix_button 포함 패딩--> 

      <!-- 상단 타이틀 -->
      <div class="title">홈택스</div>
      <!-- //상단 타이틀 -->

      <div class="wrap setting">
        <div class="setting_box"> 
          <div class="hometax_wrap set_pd"> 
            <!-- 2020-06-05 btn_round 삭제 btn_plus로 수정 -->
            <button class="btn_plus">
              <i class="plus"></i>
              공인(공동)인증서 등록하기
            </button>
            <!-- //2020-06-05 btn_round 삭제 btn_plus로 수정 -->

            <!-- 2020-06-05  nomal_noti 삭제 alert_q 추가-->
            <p class="alert_q2">
              <i class="ico_cen"></i>
              <span>
                국세청 홈택스에 공인(공동)인증서를 등록하지<br>않았다면 지금 등록하세요
              </span>
            </p>
            <!-- //2020-06-05  nomal_noti 삭제 alert_q 추가-->

            <div class="bm_app_box">
              <div>
                <p class="bm_img"><i></i><em class="new_blind">홈택스 이미지</em></p>
                <p class="bm_app_aos"><i></i><em class="new_blind">안드로이드</em></p>
              </div>
              <div>
                <p class="bm_img"><i></i><em class="new_blind">홈택스 이미지</em></p>
                <p class="bm_app_ios"><i></i><em class="new_blind">IOS</em></p>
              </div>
            </div>
 
            <!-- 2020-06-05  nomal_noti 삭제 alert_q 추가-->
            <p class="alert_q2 color">
              <i class="ico_cen"></i>
              <span>
                등록한 인증서를 세모장부에도 잊지 말고 <br>등록해주세요.
              </span>
            </p>
            <!-- //2020-06-05  nomal_noti 삭제 alert_q 추가-->
          </div>

        </div>
      </div>
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>취소</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
