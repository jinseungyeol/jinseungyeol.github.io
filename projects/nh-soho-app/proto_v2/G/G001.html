<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css_v2/common.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- JS -->
    <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <script src="../../js_v2/wow.min.js"></script>
    <script src="../../js_v2/chart-3.5.1.min.js"></script>
    <title>G300</title>
</head>
<body>
    <div class="title">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">알림설정</span>
    </div>
    <div class="report_wrap report_pd20">
        <div class="noti_set_wrap">
            <div class="noti_set">
                <div class="noti_set_tit">
                    <span>보고서</span>
                </div>
                <div class="noti_list">
                    <div class="sub_tit">
                        <span>하루씀씀</span>
                    </div>
                    <div class="item">
                        <div class="noti_txt txt01">
                            <p>매일 10시 아침보고서</p>
                        </div>
                        <div class="onoff_input_wrap">
                            <div class="onoff_input">
                                <input type="checkbox" id="slide01" name="check">
                                <label for="slide01"></label>
                                <div class="onoff_input_bg"></div>
                            </div>
                        </div>
                    </div>
                    <div class="item">
                        <div class="noti_txt txt02">
                            <p>매일 오후 3시 카드매출 알림</p>
                        </div>
                        <div class="onoff_input_wrap">
                            <div class="onoff_input">
                                <input type="checkbox" id="slide02" name="check">
                                <label for="slide02"></label>
                                <div class="onoff_input_bg"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="noti_list">
                    <div class="sub_tit">
                        <span>월간씀씀</span>
                    </div>
                    <div class="item">
                        <div class="noti_txt txt01">
                            <p>매월 2회 프리미엄보고서</p>
                        </div>
                        <div class="onoff_input_wrap">
                            <div class="onoff_input">
                                <input type="checkbox" id="slide03" name="check">
                                <label for="slide03"></label>
                                <div class="onoff_input_bg"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
