<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css"> 
  <link rel="stylesheet" href="../../css/semo_cont_nh.css"> 
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd_hd fix_button 포함 패딩--> 
      
      <!-- 상단 타이틀 -->
      <div class="title">카드 등록</div>
      <!-- //상단 타이틀 -->
 
      <div class="wrap setting">
        <div class="title_sub">등록하려는 카드사를 선택해 주세요.</div>
        <div class="card_wrap">
          <div class="card_name cl_1 on"><i></i><span class="new_blind">비씨카드</span></div> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_2 on"><i></i><span class="new_blind">국민카드</span></div> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_3 on"><i></i><span class="new_blind">삼성카드</span></div> <!--선택 활성화 클래스 on--> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_4 on"><i></i><span class="new_blind">농협카드</span></div> <!--선택 활성화 클래스 on--> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_5 on"><i></i><span class="new_blind">신한카드</span></div> <!--선택 활성화 클래스 on--> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_6 on"><i></i><span class="new_blind">현대카드</span></div> <!--선택 활성화 클래스 on--> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_7 on"><i></i><span class="new_blind">롯데카드</span></div> <!--선택 활성화 클래스 on--> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_8 on"><i></i><span class="new_blind">하나카드</span></div> <!--선택 활성화 클래스 on--> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_9 on"><i></i><span class="new_blind">씨티카드</span></div> <!--선택 활성화 클래스 on--> <!--선택 활성화 클래스 on-->
          <div class="card_name cl_10 on"><i></i><span class="new_blind">우리카드</span></div> <!--선택 활성화 클래스 on-->
        </div>
        <p class="noti_star wd_set color">
          <i class="character"></i>
          <span>복수로 선택 가능합니다.</span>
        </p> 
      </div> 
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">다음</span> 
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>
</html>
