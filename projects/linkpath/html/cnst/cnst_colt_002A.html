<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
</head>
<body>
  <!-- container -->
  <div class="container">
    <!-- header -->
    <header class="header">
      <div class="inner">
        <div class="left">
          <h1>
            <a href="#" class="logo">
              <img src="../../img/wp/logo/logo_linkpath.svg" alt="로고">
            </a>
          </h1>
        </div>
      </div>
    </header>
    <!-- //header -->
    <!-- wrapper -->
    <div class="wrapper">
      <!-- content -->
      <div class="contentWrap consult">
        <div class="inner">
          <div class="selectWrap">
            <div class="item">
              <p class="title">사업장명</p>
              <div class="selectBox">
                <!-- error 클래스 추가시 에러, 입력 시 x버튼 노출 js처리 -->
                <input type="text" placeholder="사업장명 입력">
                <button type="button" class="deleteBtn"></button>
              </div>
            </div>
          </div>
          <div class="agencyInfo">
            <table>
              <colgroup>
                <col width="40%"><!-- 2024-10-08 -->
                <col>
              </colgroup>
              <tbody>
                <tr>
                  <th>기관명</th>
                  <th>수집서류</th>
                </tr>
                <tr>
                  <td class="name">홈택스</td>
                  <td>사업자등록 증명</td>
                </tr>
                <tr>
                  <td class="name">홈택스</td>
                  <td>납무내역(사실)증명</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="agreeWrap">
            <div class="titleWrap">
              <p class="infoTit">
                컨설팅을 위한 개인정보 활용 동의
              </p>
            </div>
            <ul class="agreeList">
              <li class="all">
                <label>
                  <input type="checkbox">
                  <span>전체 동의</span>
                </label>
              </li>
              <li>
                <label>
                  <input type="checkbox">
                  <span>개인정보 수집이용 동의 (필수)</span>
                </label>
                <a href="#" class="mvBtn"></a>
              </li>
              <li>
                <label>
                  <input type="checkbox">
                  <span>마케팅 활용 동의 (필수)</span>
                </label>
                <a href="#" class="mvBtn"></a>
              </li>
              <li>
                <label>
                  <input type="checkbox">
                  <span>마케팅 수신 동의 (필수)</span>
                </label>
                <a href="#" class="mvBtn"></a>
              </li>
            </ul>
          </div>
          <!-- 241018 -->
          <div class="areaBtn">
            <div class="cell">
              <!-- 활성화 시 inActiveBodyBtn 클래스 제거 -->
              <button class="activeBodyBtn inActiveBodyBtn"><span>법인 공동인증서 제출하기</span></button>
            </div>
          </div>
          <!-- //241018 -->
        </div>
      </div>
      <!-- //content -->
    </div>
    <!-- //wrapper -->
  </div>
  <!-- //container -->
</body>
</html>
