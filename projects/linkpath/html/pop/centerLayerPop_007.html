<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="icon" href="../../img/wp/logo/favicon.ico" type="image/x-icon">
  <!-- CSS -->
  <link rel="stylesheet" href="../../css/swiper-bundle.min.css">
  <link rel="stylesheet" href="../../css/w2ui_2.0.css">
  <link rel="stylesheet" href="../../css/wp_base.css">
  <link rel="stylesheet" href="../../css/wp_style.css">
  <!-- JS -->
  <script src="../../js/jquery-3.5.1.min.js"></script>
  <script src="../../js/chart-3.5.1.min.js"></script>
  <script src="../../js/swiper-bundle.min.js"></script>
  <script src="../../js/w2ui.js"></script>
  <script src="../../js/common_ui.js"></script>
  <!-- PUBL 사이트 외부접속 스크립트 삽입 JS -->
  <script src="https://publ.roumit.com/js/firebase_include.js"></script>
  <title>Link Path</title>
  <script>
    $(function() {
      popCenter('.popWrap')
    })
  </script>
</head>
<body>
  <div class="popWrap">
    <div class="dim" onclick="popdimClose(this)"></div>
    <div class="popInner small">
      <div class="popTit divide">
        <div class="titleWrapCenter">
          <h1>전자민원캐시</h1>
          <button type="button" class="popCloseBtn" title="닫기" onclick="popClose(this)"></button>
        </div>
      </div>
      <div class="popCont">
        <div class="txtArea">
					<p class="boldTxt">
						전자민원캐시는 <span class="pointColor">법원 인터넷등기소, 정부24, 운전면허자동정보검증지스템</span> 등 서비스에서 이용 할 수있는 <span class="pointColor">선불 충전형 결제수단</span>입니다.
					</p>
				</div>
        <div class="txtArea">
					<p class="boldTxt">만드는 방법</p>
					<div class="moveActive">
						<div class="titArea">
							<p class="activeTit">전자민원캐시 홈페이지에서 카드 발급 및 결제 비밀번호를 설정할 수 있습니다.</p>
						</div>
						<div class="linkArea">
							<a href="#" class="mvLinkPrimaryBtn">바로가기</a>
						</div>
					</div>
				</div>
        <div class="txtArea">
					<p class="boldTxt">전자민원캐시 첫 이용 안내</p>
					<img src="../../img/wp/bg/bg_ecsc.svg" alt="전자민원캐시 첫 이용 안내">
					<div class="stageGray">
						<p>1 단계) 전자민원캐시 회원가입</p>
						<p>2 단계) 전자민원캐시 구입/충전</p>
						<p>3 단계) 내 번호 등록</p>
					</div>
					<p class="infoTxtOrange">* 신규로 발급하신 경우 반드시 전자민원캐시 홈페이지에서 [내번호 등록]을 완료해주세요.</p>
				</div>
      </div>
      <div class="confirmPopBtnWrap">
        <div class="areaBtn">
          <button class="activeBodyBtn" onclick="popClose(this)">확인</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
