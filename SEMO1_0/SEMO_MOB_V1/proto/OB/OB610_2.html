<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
    <title>SEMO</title>
</head>

<body>
    <div class="new_content">
        <div class="cont_bg cont_pd">
            <div class="wrap account">
                <div class="progress_state_box">
                    <p>
                        <i>①</i>
                        <em class="progress_on_title">1. 체크리스트</em>
                    </p>
                    <p>
                        <i>②</i>
                        <em class="progress_on_title">2. 정보입력</em>
                    </p>
                    <p class="on">
                        <i>③</i>
                        <em class="progress_on_title">3. 최종확인</em>
                    </p>
                </div>
                <div class="title_sub">신청정보</div>
                <table class="application_table">
                    <tr>
                        <th colspan="2">신청일자</th>
                        <td colspan="2">2020-03-31</td>
                    </tr>
                    <tr>
                        <th colspan="2">기업명</th>
                        <td colspan="2">가나상사</td>
                    </tr>
                    <tr>
                        <th colspan="2">대표자명</th>
                        <td colspan="2">홍길동</td>
                    </tr>
                    <tr>
                        <th colspan="2">사업자등록번호</th>
                        <td colspan="2">123-45-6789</td>
                    </tr>
                    <tr>
                        <th rowspan="2">
                            경영 <br>
                            정상화 <br>
                            방안
                        </th>
                        <th style="text-align: center;">매출목표</th>
                        <td colspan="2">
                            2021년 000백만원<br>
                            2022년 000백만원
                        </td>
                    </tr>
                    <tr>
                        <th style="text-align: center;">향후계획</th>
                        <td colspan="2">
                            고정비절감,기타 <br>
                            (추후상담)
                        </td>
                    </tr>
                </table>

                <div class="duplicate_wrap set_mgt15 set_pdb15">
                    <i class="gray_info "></i>
                    <div class="change_text">
                        <span>유의사항 자영업자 체인지업 신청시 입력한 정보의
                            일치여부를 확인 바랍니다.
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <!-- 하단 fix 버튼 -->
        <div class="btm_button ">
            <span class="bgc_green">다음</span>
            <!--클래스 bgc_green 배경색-->
        </div>
        <!-- 하단 fix 버튼 -->
    </div>
</body>

</html>
