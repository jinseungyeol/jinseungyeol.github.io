<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../../css/semo_cont.css" >
    <!-- <link rel="stylesheet" href="../../css/semo_cont_kt.css" > -->
    <title>SEMO</title>
  </head>
  <body>
    <div class="new_content">
      <div class="cont_bg">
        <div class="wrap document">
          <div class="set_mgt20 set_mgb30">
            <div class="semo_text">
              <i></i>
              <p>
                <span>소상공인 사장님을 위한 매출 관리 & 절세 습관</span>
              </p>
            </div>
            <div>
              <button class="btn_consulting">
                <p>
                  <i></i>
                  <span>
                    <span>1:1 세모주치의 신청하기</span>
                    <span>사장님의 절세 및 경영을 지원합니다</span>
                  </span>
                </p>
                <i class="arr_right"></i>
              </button>
            </div>
          </div>

          <div class="function_list_box set_mgb36">
            <u class="flb_tit">세무 증빙</u>
            <ul>
              <li class="func_list">
                <i class="ico_cen camera"></i>
                <span>수기증빙</span>
              </li>
              <li class="func_list">
                <i class="ico_cen out"></i>
                <span>매입증빙</span>
              </li>
              <li class="func_list">
                <i class="ico_cen in"></i>
                <span>매출증빙</span>
              </li>
              <li class="func_list">
                <i class="ico_cen look"></i>
                <span>계좌증빙</span>
              </li>
              <li class="func_list">
                <i class="ico_cen healthy"></i>
                <span>건강보험증빙</span>
              </li>
              <li class="func_list">
                <span></span>
              </li>
            </ul> 
          </div>
          <div class="function_list_box set_mgb26">
            <u class="flb_tit">업무 관리</u> 
            <ul>
              <li class="func_list">
                <i class="ico_cen people"></i>
                <span>직원관리</span>
              </li>
              <li class="func_list">
                <i class="ico_cen business"></i>
                <span>거래처관리</span>
              </li> 
              <li class="func_list">
                <i class="ico_cen paper"></i>
                <span>서류함</span>
              </li>
              <li class="func_list">
                <i class="ico_cen swork"></i>
                <span>세모워크</span>
              </li>
            </ul> 
          </div>
          <div>
            <button class="btn_full bgc_yl">
              <span class="c_yl"><i class="ico_cen card_y"></i> 계좌ㆍ카드ㆍ계산서 영수증 연동하기</span>
              <i></i>
            </button>
            <button class="btn_full bgc_gnl">
              <span class="c_bl"><i class="ico_cen card_b"></i> 카드 매입 연동하기</span>
              <i></i>
            </button>
            <button class="btn_full bgc_ol">
              <span class="c_rl"><i class="ico_cen card_o"></i> 카드 매출 연동하기</span>
              <i></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
