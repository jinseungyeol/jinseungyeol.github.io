<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">계정 조회 결과</div>
      <!-- //상단 타이틀 -->

      <!-- 인증서 한 번에 등록하기 -->
      <div class="wrap join">

        <div class="certi_box">
          <!-- 계정등록 완료 -->
          <div class="cbi_result_box">
            <i class="ico_cbir fail"></i>
            <p class="cbir_tit">계정등록이<br>실패하였습니다.</p>
            <p class="normal_sentence big set_mgt30">
              계정 조회 결과를 확인하시기<br>바랍니다.
            </p>
          </div>
          <!-- //계정등록 완료 -->
          

          <!-- 리스트 -->
          <div class="set_full">
            <!-- 은행 목록 -->
            <div class="search_result_list_wrap">
                <!-- 은행 목록 총계-->
              <div class="search_result_total_box">
                <div class="sr_total set_cent_le">
                  <span class="set_cent_le">계좌&nbsp;&nbsp;<em class="number">0</em>&nbsp;개</span>
                </div>
              </div>
              <!-- //은행 목록 총계-->

              <!-- 은행-->
              <div class="search_result_box">
                <ul>
                  <li class="srb_list set_cent_le">
                    <span class="list_none">등록된 계좌가 없습니다.</span> 
                  </li>
                </ul>
              </div>
              <!-- //은행-->
            </div>
            <!-- //은행 목록 -->

            <!-- 카드 목록 -->
            <div class="search_result_list_wrap">
              <!-- 카드 목록 총계-->
              <div class="search_result_total_box">
                <p class="sr_total set_cent_le">
                  <span class="set_cent_le">카드&nbsp;&nbsp;<em class="number">5</em>&nbsp;개</span>
                </p>
              </div>
              <!-- //카드 목록 총계-->

              <!-- 카드-->
              <div class="search_result_box">
                <ul>
                  <li class="srb_list set_cent_le">
                    <span class="list_none">등록된 카드가 없습니다.</span> 
                  </li>
                </ul>
              </div>
              <!-- //카드-->
            </div>
            <!-- //카드 목록 -->

            <!-- 홈택스 목록 -->
            <div class="search_result_list_wrap">
              <!-- 홈택스 정보-->
              <div class="search_result_total_box">
                <p class="sr_total set_cent_le">
                  <span class="set_cent_le">홈택스</span>
                </p>
              </div>
              <!-- //홈택스 정보-->

              <!-- 홈택스-->
              <div class="search_result_box">
                <ul>
                  <li class="srb_list set_cent_le">
                    <span class="list_none">등록된 계정이 없습니다.</span> 
                  </li>
                </ul>
              </div>
              <!-- //홈택스-->
            </div>
            <!-- //홈택스 목록 -->
            
          </div>
          <!-- //리스트 -->

        </div>
        <!-- 안내 -->
        <div class="noti_box posi_defalt">
          <p class="noti_comm red set_cen_cen">
            <i class="ico_cen"></i>
            <span>다른 인증서와 ID/PW 방식의 기관은 추가로 등록해 주세요.</span>
          </p>
        </div>
        <!-- 안내 -->
      </div>
      <!-- //인증서 한 번에 등록하기 -->
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">확인</span>
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
