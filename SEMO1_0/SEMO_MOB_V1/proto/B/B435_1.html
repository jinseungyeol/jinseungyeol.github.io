<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">

    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->
      
      <!-- 상단 타이틀 -->
      <div class="title">이체핀번호 변경</div>
      <!-- //상단 타이틀 -->

      <!-- 이체계좌 등록 -->
      <div class="wrap account">
        <div class="account_box">
            <div class="title_sub">현재 핀번호를 입력해 주세요.</div>

            <!-- 핀번호 입력 -->
            <div class="pin_box">
              <div class="pin_wrap">
                <div class="pin_box on"></div> <!--활성화 클래스 on 번호입력 표시-->
                <div class="pin_box on"></div>
                <div class="pin_box on"></div>
                <div class="pin_box on"></div>
                <div class="pin_box on"></div>
                <div class="pin_box on"></div>
              </div>
            </div>
            <!-- //핀번호 입력 -->

            <span class="nomal_noti center">
              <u class="c_gray_l">핀번호가 기억나지 않아요.</u>
            </span>
          </div>

      </div>
      <!-- //이체계좌 등록 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span>확인</span>
    </div>
    <!-- 하단 fix 버튼 -->
    
  </div>
