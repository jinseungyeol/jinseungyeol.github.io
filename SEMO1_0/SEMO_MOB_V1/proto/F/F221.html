<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
  <style>
    .deli_certi{padding-bottom: 75px;}
    .deli_center:first-child{padding-left: unset; width: 100%; justify-content: flex-start; margin-bottom: 17px; margin-left: 21px;}
    .deli_center:last-child{padding-left: unset; margin-left: 21px;}
    .setting_box > .deli_center_con .deli_center:first-child{padding-left: unset;width: 100%; justify-content: flex-start; margin-bottom: 17px;}

    .deli_center{display: flex; flex-direction: unset; justify-content: flex-start; width: 100%; gap: unset;}
    .deli_center_con{display: flex; flex-direction: column; width: 100%; margin-top: unset; padding: 14px 0; border-top: 1px solid #c8c8c8; border-bottom: 1px solid #c8c8c8;}
    .deli_center_con.hide + .deli_center_con{border-top: unset; border-bottom: unset; flex-direction: unset;}
    .deli_center > span{font-size: 16px;}
    .deli_center span:first-child{color: #a9adb5; font-weight: normal; margin-right: 12px; text-align: left;}
    .deli_center span:last-child{color: #000000; font-weight: bold;}
    .deli_change span{font-size: 13px; text-align: left; color: #0095ff;}
    .app_list_change{margin-left: 21px;}
    .app_list_change span{font-size: 13px;color: #0095ff;}
    .app_list_change span p{text-align: center; font-size: 13px;}
    .deli_change + .app_list_change{padding-left: unset; font-size: 13px; margin-top: 18px;}
    .deli_change{gap: 18px; padding-left: unset;  margin-left: 21px;} 
    .deli_change_con.bottom{position: absolute; left: 50%; transform: translateX(-50%); bottom: 0; width: 100%;}
  </style>
</head>

<body>
  <div class="new_content">
    <!-- F221, F221_1 -->
    <div class="cont_bg cont_pd">
      <!-- 클래스 cont_pd fix_button 포함 패딩-->
      <!-- 상단 타이틀 -->
      <!-- //상단 타이틀 -->
      <div class="wrap setting set_mgt_unset">
        <div class="deli_certi">
          <div class="deli_icon">
            <div class="logo_al_1050"></div>
            <!-- 
              logo_al_1010 배달의 민족 
              logo_al_1020 요기요
              logo_al_1030 배달통
              logo_al_1040 배고파
              logo_al_1050 쿠팡잇츠
            -->
          </div>
    
        </div>
        <div class="deli_center_con">
          <div class="deli_center">
            <!-- 2021-03-02 내용수정 -->
            <span>증빙기관</span>
            <span>쿠팡잇츠</span>
          </div>
          <div class="deli_center">
            <span style="margin-right: 26.5px;">아이디</span>
            <span>semojangbu</span>
          </div>
        </div>
        <div class="deli_change_con bottom">
          <div class="deli_change">
            <span>비밀번호가 변경되었어요.</span>
            <span>ID가 변경되었어요.</span>
          </div>
          <div class="app_list_change">
            <span>
              <p>배민사장님광장</p>&nbsp;사이트 가기
            </span>
          </div>
        </div>
      </div>
    </div>
    <!-- 하단 fix 버튼 -->
    <div class="btm_button on">
      <span>취소</span>
      <span class="bgc_green">확인</span>
      <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>

</html>
