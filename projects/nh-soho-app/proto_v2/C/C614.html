<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS -->
    <link rel="stylesheet" href="../../css_v2/swiper-bundle.min.css">
    <link rel="stylesheet" href="../../css_v2/mobiscroll.jquery.min.css">
    <link rel="stylesheet" href="../../css_v2/common.css">
    <link rel="stylesheet" href="../../css_v2/main.css">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/nh_style.css">
    <!-- JS -->
    <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <script src="../../js_v2/mobiscroll.jquery.min.js"></script>
    <script src="../../js_v2/swiper-bundle.min.js"></script>
    <script src="../../js_v2/wow.min.js"></script>
    <script src="../../js_v2/chart-3.5.1.min.js"></script>
    <title>C642</title>
    <script>
        $(document).ready(function () {
            $(".section_nation").click(function () {
                $("#slide_popup").fadeIn(500);
                $("#slide_popup > .popup.bottom").css("bottom", "0");

            });
            // 팝업 배경터치하면 사라짐
            $(document).click(function (e) {
                if ($(".popup_bg").is(e.target)) {
                    $(".popup_bg").fadeOut(200);
                    $(".popup.bottom").show().animate({
                        bottom: "-100%"
                    }, 200);
                }
            });
            $(".section_content").click(function () {
                $(this).addClass("active");
                $(this).siblings().removeClass("active");
            });
        });
    </script>
</head>
<body>
    <div class="title">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">기본정보 입력하기</span>
    </div>
    <div class="basic_wrapper b_gray">
        <div class="padding_wrapper25 set_pdb36">
            <div class="section_input_wrap set_mgt18">
                <div class="section_input_title">
                    <i class="ico_cen section_num1 on"></i>
                    <p>직원정보 입력</p>
                </div>
                <div class="section_content_wrap">
                    <div class="section_content ">
                        <input type="text" id="text1" required="required">
                        <label for="text1" class="dot">이름</label>
                        <div class="section_nation">
                            <input type="text" required="required" placeholder="내국인" readonly>
                            <i class="ico_cen down"></i>
                        </div>
                    </div>
                    <div class="section_content">
                        <input type="number" class="active" id="text2" required="required">
                        <label for="text2" class="dot">휴대폰 번호</label>
                    </div>
                    <div class="section_content readonly">
                        <input type="text" id="text3" required="required" readonly="readonly">
                        <label for="text3">입사일자</label>
                    </div>
                    <!-- 주민번호 입력 영역 -->
                    <div class="section_content input_id ">
                        <label class="section_input_id_wrap " for="text4">
                            <div class="section_input_id">
                                <input type="text" maxlength="6" id="text4" required="required">
                                <span>-</span>
                                <input type="text" maxlength="1" id="text4" required="required">
                                <div class="id_back_number">
                                    <p>●</p>
                                    <p>●</p>
                                    <p>●</p>
                                    <p>●</p>
                                    <p>●</p>
                                    <p>●</p>
                                </div>
                                <label for="text4">주민등록번호</label>
                            </div>
                        </label>
                    </div>
                    <!-- 급여계좌 선택 영역 -->
                    <div class="section_content input_account ">
                        <label class="section_input_account_wrap" for="text6">
                            <div class="section_input_account">
                                <div class="section_select_bank">
                                    <i class="ico_cen ico_lb001 set_mgr6"></i>
                                    <input type="text" id="text6" class="section_bank_title" placeholder="은행선택"
                                        required="required" readonly>
                                    <i class="ico_cen down"></i>
                                    <input type="text" id="text5" required="required" placeholder="계좌번호 입력">
                                    <label for="text5">급여계좌</label>
                                </div>
                                <div class="section_search_wrap">
                                    <div class="section_search_btn">
                                        <p>예금주 조회</p>
                                    </div>
                                    <span class="section_account_user">
                                        김세모
                                    </span>
                                    <div class="section_account_error">
                                        <i class="ico_cen error_red"></i>
                                        <p>예금주 오류</p>
                                    </div>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
            <div class="next_button active">
                <p>다음</p>
            </div>
            <div class="section_input_wrap set_mgt18">
                <div class="section_input_title">
                    <i class="ico_cen complete"></i>
                    <p>계약형태 입력</p>
                </div>
            </div>
            <div class="section_input_wrap set_mgt18">
                <div class="section_input_title">
                    <i class="ico_cen section_num3 complete"></i>
                    <p>입사서류 입력</p>
                </div>
            </div>
            <div class="section_input_wrap set_mgt18">
                <div class="section_input_title">
                    <i class="ico_cen section_num4 complete"></i>
                    <p>기타정보 입력</p>
                </div>
            </div>
        </div>
        <div class="btm_button bottom_fix">
            <span>저장하기</span>
        </div>
    </div>
</body>
</html>
