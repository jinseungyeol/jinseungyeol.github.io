<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <!-- <link rel="stylesheet" href="../../css_v2/nh_style.css"> -->
    <link rel="stylesheet" href="../../css_v2/kt_style.css">
    <title>Document</title>
</head>

<body>
    <div class="title b_white">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">담당세무사정보</span>
    </div>
    <div class="basic_wrapper ">  
        <div class="padding_wrapper20">
            <div class="content_info_share">
                <span>
                    <i class="ico_cen bi"></i>
                    <p class="info">직원관리 도움말</p>
                </span>
                <div class="content_info_title">
                    <b>입사서류 제출</b>
                </div>
                <p>안녕하세요. 입사를 축하 드립니다. <br> 입사시 필요한 정보를 등록해주세요.</p>
                <div class="content_info_name set_mgt18">
                    <span>
                        <em>상호명</em>
                        <p>세모식당</p>
                    </span>
                    <span>
                        <em>대표자명</em>
                        <p>홍길동</p>
                    </span>
                </div>
            </div>
        </div>
        <div class="tax_info_input_wrap height_unset ">
            <span>기본정보</span>
            <div class="section_content_wrap set_mgt18">
                <div class="section_content input_id active">
                    <label class="section_input_id_wrap " for="text4">
                        <div class="section_input_id">
                            <input type="text" maxlength="6" id="text4" required="required">
                            <span>-</span>
                            <input type="text" maxlength="1" id="text4" required="required">
                            <div class="id_back_number">
                                <p>●</p>
                                <p>●</p>
                                <p>●</p>
                                <p>●</p>
                                <p>●</p>
                                <p>●</p>
                            </div>
                            <label for="text4">주민등록번호</label>
                        </div>
                    </label>
                </div>
                <div class="section_content input_account ">
                    <label class="section_input_account_wrap" for="text6">
                        <div class="section_input_account">
                            <div class="section_select_bank">
                                <i class="ico_cen ico_lb001 set_mgr6"></i>
                                <input type="text" id="text6" class="section_bank_title" placeholder="은행선택"
                                    required="required" readonly="">
                                <i class="ico_cen down"></i>
                                <input type="text" id="text5" required="required" placeholder="계좌번호 입력">
                                <label for="text5">급여계좌</label>
                            </div>
                            <div class="section_search_wrap">
                                <div class="section_search_btn">
                                    <p>예금주 조회</p>
                                </div>
                                <span class="section_account_user">
                                    김세모
                                </span>
                                <div class="section_account_error">
                                    <i class="ico_cen error_red"></i>
                                    <p>예금주 오류</p>
                                </div>
                            </div>

                        </div>
                    </label>
                </div>
                <div class="section_content">
                    <input type="text" id="text3" required="required">
                    <label for="text3">부양가족수</label>
                </div>
                <!-- 급여계좌 선택 영역 -->
                <div class="section_content">
                    <input type="text" id="text4" required="required">
                    <label for="text4">이메일</label>
                </div>
                <div class="section_content address">
                    <div class="address_list"id="text5">
                        <span>07228</span>
                        <p>서울 영등포구 영신로 220 (KnK디지털타워)</p>
                    </div>
                    <label for="text5">주소</label>
                </div>
                <div class="section_content">
                    <input type="text" id="text6" required="required">
                    <label for="text6">상세주소</label>
                </div>
            </div>
        </div>
        <div class="tax_info_input_wrap height_unset">
            <span>첨부서류 선택</span>
            <div class="section_include_wrap set_mgt18">
                <div class="section_include active">
                    <span>주민등록본</span>
                    <i class="ico_cen plus_gray_light"></i>
                </div>
                <div class="section_include">
                    <span>보건증</span>
                    <i class="ico_cen plus_gray_light"></i>
                </div>
                <div class="section_include">
                    <span>가족관계증명서</span>
                    <i class="ico_cen plus_gray_light"></i>
                </div>
                <div class="section_include">
                    <span>차량등록증</span>
                    <i class="ico_cen plus_gray_light"></i>
                </div>
                <div class="section_include">
                    <span>신분증 사본</span>
                    <i class="ico_cen plus_gray_light"></i>
                </div>
                <div class="section_include">
                    <span>자격증 사본</span>
                    <i class="ico_cen plus_gray_light"></i>
                </div>
            </div>
        </div>
        <div class="content_info_date mb_btm_button">
            <i class="ico_cen info_gray"></i>
            <span>
                본 페이지는 30일 이내에만 접속 가능 합니다.
                <p>접속 만료일 : 2021.07.20</p>
            </span>
        </div>
        <div class="btm_button bottom_fix active">
            <span>서류제출하기</span>
        </div>
    </div>

</body>

</html>
