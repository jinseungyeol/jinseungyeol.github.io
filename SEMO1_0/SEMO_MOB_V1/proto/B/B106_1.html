<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css">
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">

    <div class="cont_bg">

      <!-- 상단 타이틀 -->
      <div class="title">전체계좌 조회</div>
      <!-- //상단 타이틀 -->

      <div class="wrap account">
        <div class="price_detail_list_wrap">
          <div class="carousel_wrap">
            <a class="btn_carousel_left">
              <i class="ico_cen"></i><em class="new_blind">캐러셀 왼쪽으로 이동</em>
            </a>
            <div class="carousel_display">
              <div class="carousel_box" style="width: 100%; left: 0;">
                <!-- width: (목록 개수*100)%; left: -100% 씩이동; -->
                <div class="carousel_item">
                  <p>
                    <span class="bank_mark">
                      <i class="logo_bank ico_lb003"></i> <span>IBK 기업은행</span>
                    </span>
                    <span class="info_date">18.12.12 13:00</span>
                  </p>
                  <p>
                    <span>
                      <span class="user_mark indi">개인</span>
                      <!--개인 활성화 클래스 indi-->
                      <span class="info_acnt_class">IBK주거래우대통장</span>
                    </span>
                    <span class="info_acnt">1234-5678-12345-52</span>
                  </p>
                  <p>
                    <span class="info_won"><em>43,200,000</em> 원</span>
                    <span class="info_fail">조회실패</span>
                  </p>
                </div>
              </div>
            </div>
            <a class="btn_carousel_right">
              <i class="ico_cen"></i><em class="new_blind">캐러셀 오른쪽으로 이동</em>
            </a>
          </div>
          <!-- 2020-07-23 수정 -->
          <div class="result_wrap set_pdtb30">
            <p class="noti_comm result fail">
              <i class="ico_cen"></i>
              <!-- 2020-11-03 문구수정 -->
              <span>
                최초연결 시, 익일 아침 자동으로 <br>
                최근 3개월의 데이터를 불러옵니다.
              </span>
              <!-- 2020-11-03 문구수정 -->
            </p>
            <p class="noti_comm set_mgt26 set_top_cen">
              <i class="ico_cen"></i>
              <span>
                상단의 새로고침으로 최근 7일간의 내역을 먼저 <br>
                확인할 수 있습니다.
              </span>
            </p>
            <!-- 2020-10-29 내용추가-->
            <p class="noti_comm set_mgt10 set_top_cen">
              <i class="ico_cen"></i>
              <span>
                최근 3개월 내 거래가 없는 경우 내역을 가져오지 <br>
                못할 수 있으며 해당 은행에서 확인해 주세요.
              </span>
            </p>
            <!-- 2020-10-29 내용추가-->
          </div>
          <!-- 2020-07-23 수정 -->
        </div>
      </div>

    </div>
  </div>
</body>

</html>
