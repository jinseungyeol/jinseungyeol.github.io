<!doctype html>
<html lang="ko">
<head>
	<meta charset="UTF-8">

	<meta http-equiv="X-UA-Compatible" content="IE=edge">

<body>

	<!-- content -->
	<div class="content">

			<div class="cont_pd2">

				<div class="dview_bx">
					<div class="dview_top">
						<h1>(주)지엠아이</h1>
						<div class="dview_ipt">
							<input type="text" placeholder="메모를 입력하세요(최대 30자)">

						<div class="dview_chk">

						</div>
					</div>

					<div class="dview_cn">
						<table>
							<colgroup><col style="width:70px;"><col></colgroup>
							<tbody>
								<tr>
									<th>시간</th>
									<td>2019.05.30 18:30</td>
								</tr>
								<tr>
									<th>계좌</th>
									<td>IBK 082-052234-04-021</td>
								</tr>
								<tr>
									<th>구분</th>
									<td>계좌입금</td>
								</tr>
							</tbody>
						</table>
						<div class="add_line">
							<table>
								<colgroup><col style="width:70px;"><col></colgroup>
								<tbody>
									<tr>
										<th>입금</th>
										<td><span class="won"><em class="c_blue">100,000</em>원</span></td>
									</tr>
									<tr>
										<th>잔액</th>
										<td><span class="won"><em>286,525</em>원</span></td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
				<!-- //입출상세내역 -->
			</div>
		</div>

		<!-- 하단 fix버튼 -->
		<div class="btn_fix_botm">
			<div class="inner">
				<a>확인</a>
			</div>
		</div>
