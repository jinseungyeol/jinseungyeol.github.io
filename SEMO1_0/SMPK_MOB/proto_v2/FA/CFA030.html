<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
    <link rel="stylesheet" href="../../css_v2/partner.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>계좌 정보</title>
</head>
<body>

  <!-- 헤더 타이틀 -->
  <header class="title">
    <div class="title_left">
      <i class="ico_cen left_arrow"></i>
    </div>
    <span class="title_text">계좌 정보</span>
    <div class="title_share">
      <button class="share_btn">
        <span>편집하기</span>
      </button>
    </div>
  </header>

  <div class="basic_wrapper">
    <div class="my_account_manage">
      <section class="franchise_wrap">
  
        <div class="franchise_wrap_inner">
          <!-- 은행 로고 -->
          <article class="franchise">
            <div class="logo">
              <i class="bank bk_004"></i>
            </div>
            <div class="store">
              <h1>3333-07-1272628</h1>
              <p>국민은행 628</p>
            </div>
          </article>
      
          <!-- 최근 수집 일시 박스 -->
          <article class="recent_box_wrap">
            <div class="recent_box">
              <div class="date">
                <p>최근 수집 일시</p>
                <div class="flex_ac">
                  <em>2022-01-17 오후 17:28</em>
                  <span class="ico_cen refresh_02"></span>
                </div>
              </div>
      
              <div class="state">
                <p>정상</p>
              </div>
            </div>
          </article>
        </div>
      </section>

      <section class="account-info-wrap">
        <ul class="account-info">
          <li class="account-info__content">
            <div class="account-info__category">
              <p>계좌명</p>
            </div>
            <div class="account-info__answer">
              <em>보통예금</em>
            </div>
          </li>
          <li class="account-info__content">
            <div class="account-info__category">
              <p>별칭</p>
            </div>
            <div class="account-info__answer">
              <em>국민은행 628</em>
              <span class="ico_cen pencel_01"></span>
            </div>
          </li>
          <li class="account-info__content">
            <div class="account-info__category">
              <p>예금유형</p>
            </div>
            <div class="account-info__answer">
              <em>보통예금</em>
            </div>
          </li>
          <li class="account-info__content">
            <div class="account-info__category">
              <p>계좌번호</p>
            </div>
            <div class="account-info__answer">
              <em>3333-07-7123485</em>
            </div>
          </li>
          <li class="account-info__content">
            <div class="account-info__category">
              <p>계좌구분</p>
            </div>
            <div class="account-info__answer">
              <div class="account-info__check-wrap">
                <div class="account-info__check">
                  <input type="radio" name="account-division" id="account-info_check-01">
                  <label for="account-info_check-01"></label>
                  <em>기업</em>
                </div>
                <div class="account-info__check">
                  <input type="radio" name="account-division" id="account-info_check-02" checked>
                  <label for="account-info_check-02"></label>
                  <em>개인</em>
                </div>
              </div>
            </div>
          </li>
          <li class="account-info__content">
            <div class="account-info__category">
              <p>세무사공유</p>
            </div>
            <div class="account-info__answer">
              <div class="account-info__check-wrap">
                <div class="account-info__check">
                  <input type="radio" name="tax-share" id="account-info_check-03" checked>
                  <label for="account-info_check-03"></label>
                  <em>공유</em>
                </div>
                <div class="account-info__check">
                  <input type="radio" name="tax-share" id="account-info_check-04">
                  <label for="account-info_check-04"></label>
                  <em>공유안함</em>
                </div>
              </div>
            </div>
          </li>
          <li class="account-info__content">
            <div class="account-info__category">
              <p>송금계좌</p>
            </div>
            <div class="account-info__answer">
              <em>2022-01-27 등록</em>
            </div>
          </li>
        </ul>
      </section>

    </div>
  </div>
</body>
</html>
