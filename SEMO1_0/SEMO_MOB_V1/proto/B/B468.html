<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="../../css/semo_cont.css" />
    <title>SEMO</title>
  </head>
  <body>
    <div class="new_content">
      <div class="cont_bg cont_pd">
        <!-- 클래스 cont_pd fix_button 포함 패딩-->

        <!-- 상단 타이틀 -->
        <div class="title">송금계좌 등록</div>
        <!-- //상단 타이틀 -->

        <!-- 송금계좌 등록 -->
        <div class="wrap account">
          <div class="account_box">
            <div class="account_setting_box">
              <div class="account_set">
                <p>
                  <span class="as_tit">은행</span>
                  <span class="as_info">IBK 기업은행</span>
                </p>
                <p>
                  <span class="as_tit">예금유형</span>
                  <span class="as_info">IBK 주거래우대통장</span>
                </p>
                <p>
                  <span class="as_tit">계좌번호</span>
                  <span class="as_info">12-**3-44-25225</span>
                </p>
                <p>
                  <span class="as_tit">대표계좌설정</span>
                  <button class="as_btn rep_account"><i></i>대표계좌</button>
                </p>
              </div>

              <p class="noti_star center wd_set">
                <i class="character"></i>
                <span>송금계좌를 삭제하여도 계좌 조회는 가능합니다.</span>
              </p>
            </div>
          </div>
        </div>
        <!-- //송금계좌 등록 -->
      </div>

      <!-- 하단 fix 버튼 -->
      <div class="btm_fix on">
        <span>취소</span>
        <span class="bgc_green">삭제</span>
      </div>
      <!-- 하단 fix 버튼 -->
    </div>
  </body>
</html>
