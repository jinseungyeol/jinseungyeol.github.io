<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css" />
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">

    <div class="cont_bg cont_pd">
      <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 상단 타이틀 -->
      <div class="title">대출계좌 상세조회</div>
      <!-- //상단 타이틀 -->

      <div class="wrap account">
        <div>
          <div class="loan_check_box">
            <div class="lcb_list">
              <p>
                <span class="div_tit">기타중소운전자금대출</span>
                <span class="div_txt">잔액 : <em>99,999,999</em>원</span>
              </p>
              <p>
                <span class="div_tit">대출계좌번호</span>
                <span class="div_txt">1234-56789-1234</span>
              </p>
              <p>
                <span class="div_tit">대출일자</span>
                <span class="div_txt">2020-07-01</span>
              </p>
              <p>
                <span class="div_tit">대출만기일</span>
                <span class="div_txt">2021-07-01</span>
              </p>
              <p>
                <span class="div_tit">최장만기일
                </span>
                <span class="div_txt">2025-07-01</span>
              </p>
              <p>
                <span class="div_tit">대출(한도)금액</span>
                <span class="div_txt"><em>999,999,999</em>원</span>
              </p>
              <p>
                <span class="div_tit">대출이자율
                </span>
                <span class="div_txt"><em>2.15000</em>%</span>
              </p>
              <p>
                <span class="div_tit">상환방식</span>
                <span class="div_txt">상환방식</span>

              </p>
              <p>
                <span class="div_tit">영업점</span>
                <span class="div_txt">당산역<em>(01234)</em></span>
              </p>

            </div>
          </div>
        </div>
        <div class="terms_box open">
          <ul class="border">
            <!-- 2021-01-18 border 클래스 추가 -->
            <li class="terms_li ">
              <!--클릭하면 checked true-->
              <!-- 2021-01-18 문구수정 -->
              <span>① 대출거래와 관련한 자세한 문의사항은 거래 영업점으로 문의하여 자세히 안내 받으시기 바랍니다.</span>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 토스트 팝업 -->
    <div class="toast hide">
      <span>모든 항목에 체크해주세요.</span>
    </div>
    <!-- 토스트 팝업 -->

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span onclick="location.href='../OB/OB632.html'" class="bgc_green">기간연장 신청하기
      </span>
      <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->
  </div>
</body>

</html>
