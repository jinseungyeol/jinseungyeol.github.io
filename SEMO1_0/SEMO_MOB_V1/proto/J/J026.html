<script>
    $(document).ready(function () {
        $('.income_content_slider').bxSlider({
            // auto: true,
            speed: 500,
            pause: 4000,
            mode: 'horizontal',
            autoControls: false,
            pager: true,
            preventDefaultSwipeY: false,
            hideControlOnEnd: false,
            infiniteLoop: false,
            controls: false,
            moveSlides: 0,
            autoHover: true,
            autoDelay: 5000,
            onSlideAfter: function ($slideElement, oldIndex, currentIndex) {
                if (currentIndex == 3) {
                    $(".bx-default-pager").fadeOut(100);
                    $(".btm_button").fadeIn(200);
                } else {
                    $(".bx-default-pager").fadeIn(200);
                    $(".btm_button").fadeOut(300);

                }
            }
