<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <div class="cont_bg cont_pd"> <!-- 클래스 cont_pd fix_button 포함 패딩-->

      <!-- 납부계좌 등록결과 -->
      <div class="wrap join">
        <div class="pay_box">
          <div class="pay_result_wrap">
            <div class="pr_result_box">
              <i class="ico_pr_result success"></i>
              <span class="pr_result">가상계좌 등록완료</span>
            </div>

            <div class="pr_info_box">
              <p class="pfib_width">
                <span class="pri_tit">은행명</span>
                <span class="pri_txt">기업은행</span>
              </p>
              <p class="pfib_width">
                <span class="pri_tit">납부방법</span>
                <span class="pri_txt">가상계좌</span>
              </p>
              <p class="pfib_width_s">
                <i class="pris_dot"></i>
                <span class="pri_tit_s2">신청일</span>
                <span class="pri_txt_s">2020.03.16</span>
              </p>
              <p class="pfib_width_s">
                <i class="pris_dot"></i>
                <span class="pri_tit_s2">청구예정일</span>
                <span class="pri_txt_s">2020.03.21</span>
              </p>
            </div>

            <p class="nomal_noti">
              <i class="character"></i> 
              <span>가상계좌는 임시 납부방법입니다. <strong>기업은행 기업계좌</strong>를 출금계좌로 등록해 주세요</span>
            </p>
          </div>
        </div>
      </div>
      <!-- //납부계좌 등록결과 -->
      
    </div>

    <!-- 하단 fix 버튼 -->
    <div class="btm_fix">
      <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
    </div>
    <!-- 하단 fix 버튼 -->

  </div>
</body>
</html>
