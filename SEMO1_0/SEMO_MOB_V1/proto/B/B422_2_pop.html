<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <title>SEMO</title>
</head>
<body>
  <div class="new_content">
    <!-- 팝업 베경 -->
    <div class="popup_bg">
      <!-- 팝업 내용 -->
      <div class="popup pt_top2"><!-- 2020-12-04 pt_top2클래스 추가 -->
        <div class="popup_txt">
          <span class="popup_tit">지급가능금액 초과 안내</span>
          <span class="popup_sub pt_pd5">
            1회 지급 한도는 2,000,000원입니다.<br>
            초과되는 금액은<br>i-ONE뱅크에서 송금 가능합니다.
          </span>
          <span class="popup_sub ps_bold pt_pd5">
            i- ONE 뱅크로 이동하시겠습니까?
          </span>
          <div class="bnnk_check_box">
            <input type="radio" name="bank_class" class="bank_class" id="bank_class1" value="기업뱅킹" checked>
            <label for="bank_class1"><i class="ico_check"></i> 기업뱅킹</label>
            <input type="radio" name="bank_class" class="bank_class" id="bank_class2" value="개인뱅킹">
            <label for="bank_class2"><i class="ico_check"></i>  개인뱅킹</label>
          </div>
        </div>
        <div class="popup_btn on">
          <span>취소</span> <!--클래스 bgc_green 배경색-->
          <span class="bgc_green">확인</span> <!--클래스 bgc_green 배경색-->
        </div>
      </div>
      <!-- //팝업 내용 -->
    </div>
    <!-- //팝업 베경 -->
  </div>
</body>
</html>
