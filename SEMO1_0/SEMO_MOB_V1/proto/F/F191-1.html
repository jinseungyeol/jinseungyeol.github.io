<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
  <script src="../../../js/jquery-3.5.1.min.js"></script>
    <title>SEMO</title>
</head>

<body>
    <div class="new_content pretendard">
        <div class="cont_bg">


            <div class="popup_bg hometax">
                <div class="popup_content">
                    <div class="popup_title">
                        홈택스에 연결이 안됐다면?
                    </div>
                    <div class="popup_link set_mgt12">
                        <div class="popup_link_txt">
                            <span>인증서 연결,</span> <br>
                            손쉽게 할 수 있어요!
                        </div>
                        <div class="popup_link_img">
                            <i class="ico_cen"></i>
                        </div>
                    </div>
                    <div class="popup_info">
                        <div class="items">
                            <div class="item">
                                <!-- active 클래스로 제어 -->
                                <div class="popup_info_tit active">
                                    <!-- 클릭하면 .popup_info_cnt 슬라이드  -->
                                    <!-- /// active 클래스로 제어 -->
                                    <div>
                                        <span class="set_mgr16 c_sig">01.</span>
                                        <em>회원가입이 안 된 경우</em>
                                    </div>
                                    <i class="ico_cen"></i>
                                </div>
                                <div class="popup_info_cnt on">
                                    <!-- on 클래스 슬라이드 -->
                                    <div>
                                        <div class="ico_cen"></div>
                                        <p>홈택스(손택스) 회원가입</p>
                                    </div>
                                    <div>
                                        <div class="ico_cen"></div>
                                        <p>공동인증서 등록</p>
                                    </div>
                                    <div>
                                        <div class="ico_cen"></div>
                                        <p>세모장부 홈택스 연결</p>
                                    </div>
                                </div>
                            </div>
                            <div class="item">
                                <!-- active 클래스로 제어 -->
                                <div class="popup_info_tit">
                                    <!-- 클릭하면 .popup_info_cnt 슬라이드  -->
                                    <!-- /// active 클래스로 제어 -->
                                    <div>
                                        <span class="c_sig">02.</span>
                                        <!-- css별 컬러 제어 -->
                                        <em>공동인증서가 없는 경우</em>
                                    </div>
                                    <i class="ico_cen"></i>
                                </div>
                                <div class="popup_info_cnt">
                                    <div>
                                        <div class="ico_cen"></div>
                                        <p>홈택스 > 인증센터 > 공동인증서 등록</p>
                                    </div>
                                    <div>
                                        <div class="ico_cen"></div>
                                        <p>세모장부 홈택스 연결</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="duplicate_wrap">
                        <i class="ico_cen"></i>
                        <div class="change_text">
                            <span><em>홈택스 바로가기</em> 버튼을 눌러보세요.</span>
                        </div>
                    </div>
                    <div class="btm_button">
                        <span class="bg_sig">홈택스 바로가기</span>
                        <!-- css별 배경컬러 제어 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $('.popup_bg.hometax .popup_info .popup_info_tit').click(function () {
            $(this).addClass('active');
            $(this).parent().siblings('.item').children('.popup_info_tit').removeClass('active');
            $(this).siblings().slideDown();
            $(this).parent().siblings('.item').children('.popup_info_tit').siblings().slideUp();
        })
    </script>

</body>

</html>
