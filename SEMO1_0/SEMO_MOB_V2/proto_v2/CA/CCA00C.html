<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css_v2/semo_style.css">
  <script src="../../js_v2/jquery-3.5.1.min.js"></script>
    <title>카드매출 관리</title>
</head>
<body>

    <!-- 헤더 타이틀 -->
    <div class="title bgc_gray01">
        <div class="title_left">
            <i class="ico_cen left_arrow"></i>
        </div>
        <span class="title_text">카드매출 관리</span>
    </div>

    <div class="basic_wrapper bgc_gray01">

        <div class="card_connect_wrap set_pdt7">
            <section class="ys_connect hometax">
                <!-- '카드매출을 연결하면?' 텍스트 -->
                <article class="intro text">
                    <h1 class="tit">
                        카드매출을 연결하면?
                    </h1>
                    <h2 class="sub_tit">
                        카드매출을 한 눈에<br>
                        확인할 수 있어요!
                    </h2>
                </article>

                <!-- 계산기 이미지 -->
                <article class="img">
                    <span class="ico_cen calc_01"></span>
                </article>

                <!-- 하단고정 -->
                <footer class="bot_fix_pd20 bgc_gray01 set_pdb27">
                    <!-- 디스크립션 -->
                    <div class="desc">
                        <p>
                            사장님! 안심하세요.<br>
                            제출한 정보는 수집 목적으로만 사용되어요.
                        </p>
                    </div>
                    <!-- 버튼 / bgc_sig 클래스로 제휴별 배경색상 제어 -->
                    <button type="button" class="type_B bgc_sig"><span>카드매출 바로 연결하기</span></button>
                </footer>

            </section>
        </div>


    </div>    
</body>
</html>
