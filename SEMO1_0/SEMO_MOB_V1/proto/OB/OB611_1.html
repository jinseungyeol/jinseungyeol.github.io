<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../../css/semo_cont.css">
  <link rel="stylesheet" href="../../css/semo_cont_ibk.css" />
  <title>SEMO</title>
</head>

<body>
  <div class="new_content">
    <div class="cont_bg ">
      <div class="progress_state_box set_mgt15">
        <p>
          <i>①</i>
          <em class="progress_on_title">1. 심사결과 확인</em>
        </p>
        <p class="on">
          <i>②</i>
          <em class="progress_on_title">2, 정보동의</em>
        </p>
        <p>
          <i>③</i>
          <em class="progress_on_title">3. 정보확인</em>
        </p>

      </div>
      <div class="change_text check_list">
        <span>
          자영업자 체인지업 약정 전 유의사항을 확인하시고, 아래 내용을 충분히 이해하신 후 동의 바랍니다.
        </span>
      </div>
      <div class="terms_box on open set_mgt17">
        <!--활성 클래스 on 전체 약관 표시 AND 활성 클래스 open 약관열기 -->
        <!-- 전체 동의 -->
        <div class="terms_li type2">
          <input type="checkbox" class="check_terms">
          <!--클릭하면 checked true-->
          <span>약관 전체 동의</span>
          <a class="btn_term_open"><i class="ico_arr"></i><em class="new_blind">약관열기</em></a>
        </div>
        <!-- //전체 동의 -->

        <!-- 약관 -->
        <ul>
          <li class="terms_li">
            <input type="checkbox" class="check_terms">
            <!--클릭하면 checked true-->
            <span>개인(신용)정보 수집 · 이용 및 <br>
              제공 관련 고객 권리 안내문</span>
            <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
          </li>
          <li class="terms_li">
            <input type="checkbox" class="check_terms">
            <!--클릭하면 checked true-->
            <span>개인(신용)정보 조회 동의서</span>
            <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
          </li>
          <!--2020-08-13 개인(신용)정보 제3자 제공 동의 삭제-->
          <!-- <li class="terms_li">
                <input type="checkbox" class="check_terms"> 
                <span>개인(신용)정보 제3자 제공 동의</span>
                <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
              </li> -->
          <!--2020-08-13 개인(신용)정보 제3자 제공 동의 삭제-->
          <li class="terms_li">
            <input type="checkbox" class="check_terms">
            <!--클릭하면 checked true-->
            <span>개인(신용)정보 수집 · 이용 ·제공 <br>
              동의서 (여신금융거래)</span>
            <a class="btn_term_move"><i class="ico_arr"></i><em class="new_blind">약관이동</em></a>
          </li>
        </ul>
        <!-- //약관 -->
      </div>
      <!-- 하단 fix 버튼 -->
      <div class="btm_button ">
        <span>취소</span>

        <span class="bgc_green">다음</span>
        <!--클래스 bgc_green 배경색-->
      </div>
      <!-- 하단 fix 버튼 -->
    </div>
  </div>
</body>

</html>
