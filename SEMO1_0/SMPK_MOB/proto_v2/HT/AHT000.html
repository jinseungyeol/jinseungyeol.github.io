    <script>
        var swiper = new Swiper(".event-banner.first", {
            effect: "fade",
            fadeEffect: { crossFade: true },
                pagination: {
                    el: ".swiper-pagination",
                clickable: true,
            },
            loop: true
        }); 

        // 네비게이션바
        $(".tab-menu_nav").click( function() {
            var index = $(this).index();
            $(this).addClass("active").siblings().removeClass("active");
            $(".tab-menu-bar").css("transform", "translate3d(" + index * 23.65 + "vw, 0, 0)");
        }).eq(0).trigger("click");



        // 스크롤 위아래 감지 이벤트
        var didScroll;
        var lastScrollTop = 0;
        var delta = 1;
        var navbarHeight = $(".header_cnt.scroll-react").outerHeight();

        $(window).scroll(function(e) {
            didScroll = true;
        })

        setInterval(function() {
            if (didScroll) {
                hasScrolled();
                didScroll = false;
            }
        }, 100);

        function hasScrolled() {
            var st = $(this).scrollTop();

            if(Math.abs(lastScrollTop - st) <= delta) return;

            if (st > lastScrollTop && st > navbarHeight) {
                $(".scroll-react").removeClass('nav-down').addClass("nav-up");
            } else {
                if (st + $(window).height() < $(document).height() ) {
                    $(".scroll-react").removeClass('nav-up').addClass('nav-down');
                }
            }

            lastScrollTop = st;
        }

        // 매출, 지출 탭메뉴
        document.getElementById('sales').onclick = function(){
            $(this).parent(".radio-tab-menu").addClass("is-increase").removeClass("is-decrease");
            $(".current-state_chart .ico_cont").addClass("thumb_sales").removeClass("thumb_outlay");
        }

        document.getElementById('outlay').onclick = function(){
            $(this).parent(".radio-tab-menu").addClass("is-decrease").removeClass("is-increase");
            $(".current-state_chart .ico_cont").addClass("thumb_outlay").removeClass("thumb_sales");
        }

        
    </script>
