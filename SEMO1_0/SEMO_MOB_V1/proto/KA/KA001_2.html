<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../css/semo_cont.css">
    <link rel="stylesheet" href="../../css/semo_cont_kt.css">
    <!-- <link rel="stylesheet" href="../../css/semo_cont_ibk.css"> -->
    <title>SEMO</title>

</head>

<body>
    <div class="new_content">
        <div class="cont_bg">
            <div class="wrap tax">
                <div class="tax_ai_wrapper">
                    <div class="tax_ai_section_1">
                        <span>
                            사장님 장부비서가 <br>
                            <b>세금을 줄여드립니다.</b>
                        </span>
                        <p>추가 절세예상금액을 조회해보세요 <br>
                            절세AI가 적정 세금을 알려드립니다.</p>
                        <i class="ico_cen"></i>
                        <span class="staff_reg_info">
                            <div>
                                <i class="ico_cen"></i>
                                <i class="ico_cen"></i>
                                <i class="ico_cen"></i>
                            </div>
                        </span>
                    </div>
                    <div class="tax_ai_section_2">
                        <span>
                            절세예상액 <br>
                            <b>어떻게 찾아주는걸까?</b>
                        </span>
                        <i class="ico_cen"></i>
                    </div>
                    <div class="tax_ai_section_3">
                        <div class="tax_ai_terms">
                            <p>절세AI분석 조회서비스 이용약관</p>
                            <i class="ico_cen"></i>
                        </div>
                        <div class="tax_ai_agree">
                            <!-- on클래스로 활성화 -->
                            <i class="ico_cen"></i>
                            <p>부가세 신고서 조회를 위해 사장님의
                                개인정보를 제공하는 것에 동의합니다. </p>
                        </div>
                        <span>- 공동인증서는 홈택스 사전등록되어야 조회가 가능하며,
                            조회용으로만 사용되며 저장되지 않습니다. </span>
                        <input type="text" maxlength="10" placeholder="사업자 등록번호 입력 ( '-'제외 )">
                    </div>

                </div>
            </div>
            <div class="btm_button">
                <span class="bgc_gray">절세예상액 조회하기</span>
                <!--클래스 bgc_green 배경색-->
            </div>

        </div>
    </div>
</body>

</html>
